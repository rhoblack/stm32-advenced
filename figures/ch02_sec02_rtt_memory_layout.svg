<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family='"Noto Sans KR", "Malgun Gothic", sans-serif'>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333333"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">그림 02-3. SEGGER RTT 메모리 기반 동작 구조</text>

  <!-- MCU RAM 영역 (큰 박스) -->
  <rect x="20" y="55" width="440" height="350" rx="6" fill="#F8F9FA" stroke="#1A73E8" stroke-width="2"/>
  <rect x="20" y="55" width="440" height="36" rx="6" fill="#1A73E8"/>
  <text x="240" y="79" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">MCU RAM (SRAM)</text>

  <!-- _SEGGER_RTT 구조체 박스 -->
  <rect x="35" y="103" width="410" height="285" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="35" y="103" width="410" height="28" rx="6" fill="#34A853"/>
  <text x="240" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">_SEGGER_RTT 구조체 (전역 변수)</text>

  <!-- 업링크 버퍼 섹션 -->
  <text x="50" y="152" font-size="13" font-weight="bold" fill="#1A73E8">aUp[0] — 업링크 버퍼 (MCU → Host)</text>

  <!-- 링 버퍼 시각화 (업링크) -->
  <rect x="50" y="160" width="380" height="44" rx="4" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <!-- 링 버퍼 셀들 -->
  <rect x="52" y="162" width="64" height="40" rx="3" fill="#1A73E8"/>
  <text x="84" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">HEAD</text>
  <text x="84" y="195" text-anchor="middle" font-size="10" fill="#BDD7FF">쓰기 포인터</text>

  <rect x="120" y="162" width="70" height="40" rx="3" fill="#4A90D9" stroke="#1A73E8" stroke-width="1"/>
  <text x="155" y="179" text-anchor="middle" font-size="11" fill="#FFFFFF">DATA</text>
  <text x="155" y="195" text-anchor="middle" font-size="10" fill="#E8F0FE">로그 데이터</text>

  <rect x="194" y="162" width="70" height="40" rx="3" fill="#4A90D9" stroke="#1A73E8" stroke-width="1"/>
  <text x="229" y="179" text-anchor="middle" font-size="11" fill="#FFFFFF">DATA</text>
  <text x="229" y="195" text-anchor="middle" font-size="10" fill="#E8F0FE">로그 데이터</text>

  <rect x="268" y="162" width="70" height="40" rx="3" fill="#4A90D9" stroke="#1A73E8" stroke-width="1"/>
  <text x="303" y="179" text-anchor="middle" font-size="11" fill="#FFFFFF">DATA</text>
  <text x="303" y="195" text-anchor="middle" font-size="10" fill="#E8F0FE">로그 데이터</text>

  <rect x="342" y="162" width="86" height="40" rx="3" fill="#1565C0"/>
  <text x="385" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">TAIL</text>
  <text x="385" y="195" text-anchor="middle" font-size="10" fill="#BDD7FF">읽기 포인터</text>

  <!-- 업링크 메모 -->
  <text x="50" y="220" font-size="12" fill="#666666">크기: 기본 1KB (RTT_BUFFER_SIZE_UP 설정 가능)</text>

  <!-- 구분선 -->
  <line x1="50" y1="232" x2="430" y2="232" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- 다운링크 버퍼 섹션 -->
  <text x="50" y="255" font-size="13" font-weight="bold" fill="#34A853">aDown[0] — 다운링크 버퍼 (Host → MCU)</text>

  <!-- 링 버퍼 시각화 (다운링크) -->
  <rect x="50" y="263" width="380" height="44" rx="4" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>

  <rect x="52" y="265" width="64" height="40" rx="3" fill="#34A853"/>
  <text x="84" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">HEAD</text>
  <text x="84" y="298" text-anchor="middle" font-size="10" fill="#C8E6C9">쓰기 포인터</text>

  <rect x="120" y="265" width="70" height="40" rx="3" fill="#5CB85C" stroke="#34A853" stroke-width="1"/>
  <text x="155" y="282" text-anchor="middle" font-size="11" fill="#FFFFFF">DATA</text>
  <text x="155" y="298" text-anchor="middle" font-size="10" fill="#E6F4EA">입력 데이터</text>

  <rect x="194" y="265" width="70" height="40" rx="3" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="229" y="282" text-anchor="middle" font-size="11" fill="#888888">비어있음</text>

  <rect x="268" y="265" width="70" height="40" rx="3" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="303" y="282" text-anchor="middle" font-size="11" fill="#888888">비어있음</text>

  <rect x="342" y="265" width="86" height="40" rx="3" fill="#1B5E20"/>
  <text x="385" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">TAIL</text>
  <text x="385" y="298" text-anchor="middle" font-size="10" fill="#C8E6C9">읽기 포인터</text>

  <!-- 다운링크 메모 -->
  <text x="50" y="325" font-size="12" fill="#666666">크기: 기본 16B (키보드 명령 수신용)</text>

  <!-- 구조체 포인터 정보 -->
  <rect x="50" y="340" width="380" height="36" rx="4" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="240" y="358" text-anchor="middle" font-size="12" fill="#333333">구조체 주소는 디버거가 심볼 "_SEGGER_RTT"로 자동 탐색</text>
  <text x="240" y="373" text-anchor="middle" font-size="11" fill="#666666">또는 RAM 전체 스캔으로 마법 ID "SEGGER RTT" 문자열 탐색</text>

  <!-- 호스트 PC 영역 -->
  <rect x="500" y="55" width="280" height="350" rx="6" fill="#F8F9FA" stroke="#666666" stroke-width="2"/>
  <rect x="500" y="55" width="280" height="36" rx="6" fill="#555555"/>
  <text x="640" y="79" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">호스트 PC</text>

  <!-- J-Link / ST-Link -->
  <rect x="515" y="103" width="250" height="80" rx="6" fill="#FFFFFF" stroke="#999999" stroke-width="1.5"/>
  <text x="640" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">J-Link / ST-Link</text>
  <text x="640" y="149" text-anchor="middle" font-size="12" fill="#666666">디버거 (USB 연결)</text>
  <text x="640" y="168" text-anchor="middle" font-size="12" fill="#666666">JTAG / SWD 인터페이스</text>

  <!-- 연결선 -->
  <line x1="515" y1="200" x2="515" y2="213" stroke="#999999" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- RTT Viewer 박스 -->
  <rect x="515" y="215" width="250" height="80" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="640" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A73E8">RTT Viewer / RTT Terminal</text>
  <text x="640" y="260" text-anchor="middle" font-size="12" fill="#333333">SEGGER 제공 PC 소프트웨어</text>
  <text x="640" y="278" text-anchor="middle" font-size="12" fill="#333333">또는 CubeIDE RTT 플러그인</text>

  <!-- 특징 박스 -->
  <rect x="515" y="310" width="250" height="82" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="640" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">RTT 장점</text>
  <text x="528" y="352" font-size="12" fill="#333333">• 추가 핀 불필요 (JTAG/SWD 공유)</text>
  <text x="528" y="370" font-size="12" fill="#333333">• MCU 실행 중 실시간 폴링</text>
  <text x="528" y="388" font-size="12" fill="#333333">• 양방향 통신 지원</text>

  <!-- 양방향 화살표 -->
  <!-- 업링크 화살표 (MCU → PC) -->
  <line x1="460" y1="182" x2="498" y2="182" stroke="#1A73E8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="460" y="147" width="40" height="28" rx="3" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1"/>
  <text x="480" y="159" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="bold">폴링</text>
  <text x="480" y="172" text-anchor="middle" font-size="10" fill="#1A73E8">(읽기)</text>

  <!-- 다운링크 화살표 (PC → MCU) -->
  <line x1="498" y1="285" x2="460" y2="285" stroke="#34A853" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="460" y="258" width="40" height="28" rx="3" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="480" y="270" text-anchor="middle" font-size="10" fill="#34A853" font-weight="bold">쓰기</text>
  <text x="480" y="283" text-anchor="middle" font-size="10" fill="#34A853">(입력)</text>

  <!-- 업링크 설명 -->
  <text x="480" y="200" text-anchor="middle" font-size="10" fill="#1A73E8">디버거가 _SEGGER_RTT</text>
  <text x="480" y="213" text-anchor="middle" font-size="10" fill="#1A73E8">구조체 주소 스캔</text>

  <!-- 다운링크 설명 -->
  <text x="480" y="325" text-anchor="middle" font-size="10" fill="#34A853">키보드 입력 등</text>

  <!-- 하단 비교 메모 -->
  <rect x="20" y="420" width="760" height="62" rx="4" fill="#F8F9FA" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="400" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">SWO vs RTT 핵심 차이</text>
  <text x="400" y="462" text-anchor="middle" font-size="12" fill="#666666">SWO: 전용 하드웨어 핀(PB3) 필요, TPIU 유닛 사용, 단방향 출력</text>
  <text x="400" y="478" text-anchor="middle" font-size="12" fill="#666666">RTT: RAM 버퍼만 사용, 추가 핀 불필요, 양방향 통신, 고속 전송 가능</text>
</svg>
