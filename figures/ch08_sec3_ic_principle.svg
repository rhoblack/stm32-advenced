<svg xmlns="http://www.w3.org/2000/svg" width="780" height="400"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 780 400">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Input Capture 원리 — "스톱워치 랩 버튼"</text>

  <!-- 카운터 (톱니파) -->
  <text x="30" y="70" font-size="13" font-weight="bold" fill="#1A73E8">CNT</text>
  <text x="30" y="85" font-size="10" fill="#1A73E8">(카운터)</text>

  <polyline points="80,160 180,60 180,160 280,60 280,160 380,60 380,160 480,60 480,160 580,60 580,160 680,60 680,160"
            fill="none" stroke="#1A73E8" stroke-width="2"/>

  <!-- ARR 레벨 -->
  <line x1="60" y1="60" x2="720" y2="60" stroke="#1A73E8" stroke-dasharray="5,3" stroke-width="1"/>
  <text x="730" y="65" font-size="10" fill="#1A73E8">ARR</text>

  <!-- 외부 입력 신호 -->
  <text x="20" y="210" font-size="13" font-weight="bold" fill="#34A853">외부</text>
  <text x="20" y="225" font-size="10" fill="#34A853">입력</text>

  <polyline points="80,260 200,260 200,200 210,200 210,260 450,260 450,200 460,200 460,260 700,260"
            fill="none" stroke="#34A853" stroke-width="2.5"/>

  <!-- 캡처 시점 표시 (수직 점선) -->
  <line x1="200" y1="60" x2="200" y2="280" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="60" x2="450" y2="280" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 캡처 값 -->
  <circle cx="200" cy="80" r="8" fill="#EA4335"/>
  <text x="200" y="84" text-anchor="middle" font-size="9" fill="white" font-weight="bold">C1</text>
  <text x="210" y="100" font-size="11" fill="#EA4335" font-weight="bold">CCR = 1200</text>
  <text x="210" y="115" font-size="10" fill="#EA4335">(캡처 순간의 CNT)</text>

  <circle cx="450" cy="95" r="8" fill="#EA4335"/>
  <text x="450" y="99" text-anchor="middle" font-size="9" fill="white" font-weight="bold">C2</text>
  <text x="460" y="100" font-size="11" fill="#EA4335" font-weight="bold">CCR = 3700</text>
  <text x="460" y="115" font-size="10" fill="#EA4335">(캡처 순간의 CNT)</text>

  <!-- 주기 계산 -->
  <line x1="200" y1="290" x2="450" y2="290" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="295" x2="200" y2="285" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="295" x2="450" y2="285" stroke="#555" stroke-width="2"/>
  <text x="325" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">차이 = C2 - C1 = 2500 카운트</text>

  <!-- 공식 박스 -->
  <rect x="120" y="325" width="540" height="65" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
  <text x="390" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">주파수 = f_cnt / (C2 - C1)</text>
  <text x="390" y="370" text-anchor="middle" font-size="12" fill="#555">예: f_cnt = 1MHz, 차이 = 2500 → 주파수 = 1,000,000 / 2500 = 400 Hz</text>
  <text x="390" y="385" text-anchor="middle" font-size="11" fill="#555">주기 T = (C2 - C1) / f_cnt = 2500 / 1,000,000 = 2.5ms</text>

  <!-- 비유 박스 -->
  <rect x="100" y="170" width="280" height="22" rx="4" fill="#FFF9C4" stroke="#F9A825"/>
  <text x="240" y="185" text-anchor="middle" font-size="11" fill="#795548">Rising Edge에서 "찰칵!" → CNT 값 저장</text>
</svg>