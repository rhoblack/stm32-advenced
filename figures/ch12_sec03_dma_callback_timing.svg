<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="380" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1A1A2E; }
      .label { font-size: 13px; fill: #333; font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .note  { font-size: 12px; fill: #EA4335; font-weight: 600; }
    </style>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1A73E8"/>
    </marker>
  </defs>

  <rect width="800" height="380" fill="#FAFAFA" rx="8"/>
  <rect x="20" y="20" width="760" height="340" fill="white" rx="6" stroke="#E0E0E0" stroke-width="1"/>

  <text x="400" y="50" text-anchor="middle" class="title">DMA 전송 타이밍 — CS 핀 제어 + 완료 콜백</text>
  <text x="400" y="68" text-anchor="middle" class="small">HAL_SPI_Transmit_DMA() 호출 후 CPU는 즉시 반환 → DMA 완료 인터럽트에서 CS HIGH</text>

  <!-- 타임라인 신호 -->
  <text x="60" y="110" text-anchor="middle" class="label" fill="#EA4335">CS</text>
  <text x="60" y="160" text-anchor="middle" class="label" fill="#34A853">DMA</text>
  <text x="60" y="210" text-anchor="middle" class="label" fill="#1A73E8">CPU</text>
  <text x="60" y="260" text-anchor="middle" class="label" fill="#FBBC04">IRQ</text>

  <!-- CS 신호 -->
  <polyline points="100,98 170,98 170,120 560,120 560,98 750,98" fill="none" stroke="#EA4335" stroke-width="2.5"/>
  <text x="135" y="92" text-anchor="middle" class="small" fill="#EA4335">HIGH</text>
  <text x="365" y="115" text-anchor="middle" class="small" fill="#EA4335">LOW (전송 중)</text>
  <text x="655" y="92" text-anchor="middle" class="small" fill="#EA4335">HIGH</text>

  <!-- DMA 전송 구간 -->
  <rect x="170" y="148" width="390" height="22" fill="#C8E6C9" stroke="#34A853" stroke-width="1.5" rx="3"/>
  <text x="365" y="163" text-anchor="middle" class="small" fill="#2E7D32">DMA 전송 중 (CPU 개입 없음) — 수천 바이트</text>

  <!-- CPU 활동 -->
  <!-- CS LOW 설정 + DMA 시작 -->
  <rect x="100" y="198" width="120" height="22" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1.5" rx="3"/>
  <text x="160" y="213" text-anchor="middle" class="small" fill="#1A73E8">CS=LOW + DMA시작</text>
  <!-- CPU 다른 작업 -->
  <rect x="220" y="198" width="340" height="22" fill="#F5F5F5" stroke="#ccc" stroke-width="1" rx="3"/>
  <text x="390" y="213" text-anchor="middle" class="small" fill="#999">CPU 다른 작업 수행 (타이머, 센서 등)</text>
  <!-- CS HIGH -->
  <rect x="560" y="198" width="120" height="22" fill="#FFEBEE" stroke="#EA4335" stroke-width="1.5" rx="3"/>
  <text x="620" y="213" text-anchor="middle" class="small" fill="#EA4335">콜백에서 CS=HIGH</text>

  <!-- IRQ 펄스 -->
  <line x1="100" y1="268" x2="560" y2="268" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polyline points="558,268 558,250 572,250 572,268" fill="none" stroke="#FBBC04" stroke-width="2.5"/>
  <text x="575" y="258" class="small" fill="#FBBC04">DMA 완료 IRQ</text>
  <line x1="575" y1="268" x2="750" y2="268" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- 수직 마커 -->
  <line x1="170" y1="82" x2="170" y2="280" stroke="#EA4335" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="560" y1="82" x2="560" y2="280" stroke="#EA4335" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 콜백 코드 -->
  <rect x="40" y="295" width="720" height="38" fill="#1A1A2E" rx="5"/>
  <text x="60" y="312" class="small" fill="#98C379" font-family="monospace">// DMA 전송 완료 콜백 — SPI TX 완료 시 자동 호출</text>
  <text x="60" y="328" class="small" fill="#61AFEF" font-family="monospace">void HAL_SPI_TxCpltCallback(SPI_HandleTypeDef *hspi) &#123;</text>
  <text x="420" y="328" class="small" fill="#61AFEF" font-family="monospace">HAL_GPIO_WritePin(CS_GPIO, CS_PIN, 1); &#125;  </text>
  <text x="680" y="328" class="small" fill="#98C379" font-family="monospace">// CS HIGH</text>
</svg>
