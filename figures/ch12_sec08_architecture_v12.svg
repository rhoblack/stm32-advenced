<svg xmlns="http://www.w3.org/2000/svg" width="800" height="490" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 490">
  <defs>
    <marker id="arr12f" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">v1.2 최종 아키텍처 — SPI + ILI9341 LCD Driver</text>

  <!-- App Layer -->
  <rect x="50" y="45" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="67" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>
  <rect x="100" y="75" width="175" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="187" y="95" text-anchor="middle" font-size="11" fill="#C62828">main.c (LCD 초기화)</text>
  <rect x="305" y="75" width="170" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="390" y="95" text-anchor="middle" font-size="11" fill="#C62828">Button EXTI (PC13)</text>
  <rect x="505" y="75" width="165" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="587" y="95" text-anchor="middle" font-size="11" fill="#C62828">Log 출력 (Ch02)</text>

  <line x1="400" y1="115" x2="400" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr12f)"/>

  <!-- Service Layer -->
  <rect x="50" y="150" width="700" height="75" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="172" font-size="11" fill="#E65100" font-weight="bold">Service Layer (Ch13에서 추가 예정)</text>
  <rect x="190" y="182" width="185" height="35" rx="5" fill="none" stroke="#FBBC04" stroke-dasharray="5,3"/>
  <text x="282" y="203" text-anchor="middle" font-size="10" fill="#999">gfx_service (Ch13 예정)</text>
  <rect x="395" y="182" width="185" height="35" rx="5" fill="none" stroke="#FBBC04" stroke-dasharray="5,3"/>
  <text x="487" y="203" text-anchor="middle" font-size="10" fill="#999">ui_service (Ch13 예정)</text>

  <line x1="400" y1="225" x2="400" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arr12f)"/>

  <!-- Driver Layer -->
  <rect x="50" y="260" width="700" height="75" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="282" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>
  <rect x="65" y="290" width="185" height="35" rx="5" fill="#A5D6A7" stroke="#34A853" stroke-width="2"/>
  <text x="157" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">spi_driver ★NEW</text>
  <text x="157" y="320" text-anchor="middle" font-size="9" fill="#1B5E20">DMA, CS, RESET 관리</text>
  <rect x="265" y="290" width="225" height="35" rx="5" fill="#A5D6A7" stroke="#34A853" stroke-width="2"/>
  <text x="377" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">ili9341_driver ★NEW</text>
  <text x="377" y="320" text-anchor="middle" font-size="9" fill="#1B5E20">초기화, 픽셀/도형/텍스트</text>
  <rect x="505" y="290" width="225" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="617" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">tim_driver</text>
  <text x="617" y="320" text-anchor="middle" font-size="9" fill="#555">Ch07 기존</text>

  <!-- ili9341 → spi 내부 화살표 -->
  <line x1="265" y1="307" x2="253" y2="307" stroke="#555" stroke-width="1" marker-end="url(#arr12f)"/>

  <line x1="400" y1="335" x2="400" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arr12f)"/>

  <!-- HAL Layer -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="392" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
  <rect x="70" y="398" width="120" height="22" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="130" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">HAL_SPI</text>
  <rect x="205" y="398" width="120" height="22" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="265" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">HAL_DMA</text>
  <rect x="340" y="398" width="110" height="22" rx="4" fill="#BBDEFB"/>
  <text x="395" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_GPIO</text>
  <rect x="465" y="398" width="90" height="22" rx="4" fill="#BBDEFB"/>
  <text x="510" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">SWO/ITM</text>

  <!-- 버전 뱃지 -->
  <rect x="300" y="438" width="200" height="22" rx="11" fill="#1A73E8"/>
  <text x="400" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="white">v1.2 — Ch12 완성</text>

  <!-- 하단 추가 텍스트 -->
  <text x="400" y="476" text-anchor="middle" font-size="10" fill="#555">✓ SPI1 DMA 기반 고속 전송    ✓ D/C 핀으로 명령어/데이터 구분</text>
</svg>
