<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">프로젝트 아키텍처 v0.6 최종 — Part 1 완성</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#888">주황 테두리 = v0.5 대비 변경/추가 | 초록 = 기존 구현 | 회색 = 향후 예정</text>

  <!-- App 레이어 -->
  <rect x="30" y="65" width="740" height="100" rx="8" fill="#EA4335" opacity="0.08" stroke="#EA4335" stroke-width="2"/>
  <text x="50" y="85" font-size="14" font-weight="700" fill="#EA4335">App</text>

  <rect x="50" y="95" width="100" height="55" rx="6" fill="#EA4335" opacity="0.85"/>
  <text x="100" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="600">main()</text>
  <text x="100" y="126" text-anchor="middle" font-size="9" fill="white">v0.1</text>

  <rect x="170" y="95" width="120" height="55" rx="6" fill="#EA4335" opacity="0.5" stroke="#FFA500" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="600">perf_test</text>
  <text x="230" y="126" text-anchor="middle" font-size="9" fill="white">v0.6 NEW</text>

  <rect x="310" y="95" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="360" y="112" text-anchor="middle" font-size="11" fill="#999">cli_app</text>
  <text x="360" y="126" text-anchor="middle" font-size="9" fill="#BBB">Ch15</text>

  <!-- Service 레이어 -->
  <rect x="30" y="165" width="740" height="100" rx="8" fill="#FBBC04" opacity="0.08" stroke="#FBBC04" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="185" font-size="14" font-weight="700" fill="#F57F17">Service</text>

  <rect x="50" y="195" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="100" y="212" text-anchor="middle" font-size="11" fill="#999">clock_service</text>
  <text x="100" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch10</text>

  <rect x="170" y="195" width="110" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="225" y="212" text-anchor="middle" font-size="11" fill="#999">sensor_service</text>
  <text x="225" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <!-- Driver 레이어 -->
  <rect x="30" y="265" width="740" height="140" rx="8" fill="#34A853" opacity="0.08" stroke="#34A853" stroke-width="2"/>
  <text x="50" y="285" font-size="14" font-weight="700" fill="#34A853">Driver</text>

  <!-- logger -->
  <rect x="50" y="300" width="90" height="55" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="95" y="322" text-anchor="middle" font-size="11" fill="white" font-weight="600">logger</text>
  <text x="95" y="340" text-anchor="middle" font-size="9" fill="white">v0.2</text>

  <!-- ★ uart_driver v0.6 (주황 강조 — 변경됨) -->
  <rect x="155" y="300" width="140" height="60" rx="6" fill="#34A853" opacity="0.85" stroke="#FFA500" stroke-width="3"/>
  <text x="225" y="316" text-anchor="middle" font-size="11" fill="white" font-weight="700">uart_driver</text>
  <text x="225" y="331" text-anchor="middle" font-size="9" fill="#FFD600">v0.6 DMA 전환</text>
  <text x="225" y="346" text-anchor="middle" font-size="8" fill="white">TX/RX DMA + 링 버퍼</text>

  <!-- ★ ring_buffer (신규 유틸리티 — 주황 강조) -->
  <rect x="310" y="300" width="100" height="55" rx="6" fill="#34A853" opacity="0.6" stroke="#FFA500" stroke-width="3"/>
  <text x="360" y="322" text-anchor="middle" font-size="11" fill="white" font-weight="700">ring_buffer</text>
  <text x="360" y="340" text-anchor="middle" font-size="9" fill="#FFD600">v0.6 NEW</text>

  <!-- 미래 Driver -->
  <rect x="425" y="300" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="470" y="322" text-anchor="middle" font-size="11" fill="#999">tim_driver</text>
  <text x="470" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch07</text>

  <rect x="530" y="300" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="575" y="322" text-anchor="middle" font-size="11" fill="#999">rtc_driver</text>
  <text x="575" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch09</text>

  <rect x="635" y="300" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="685" y="322" text-anchor="middle" font-size="11" fill="#999">sht31_driver</text>
  <text x="685" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <!-- HAL 레이어 -->
  <rect x="30" y="405" width="740" height="75" rx="8" fill="#1A73E8" opacity="0.08" stroke="#1A73E8" stroke-width="2"/>
  <text x="50" y="425" font-size="14" font-weight="700" fill="#1A73E8">HAL</text>

  <rect x="50" y="435" width="710" height="30" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="405" y="455" text-anchor="middle" font-size="12" fill="white" font-weight="600">ST HAL — HAL_GPIO / HAL_UART / HAL_DMA / HAL_TIM / HAL_SPI / HAL_I2C / HAL_RTC</text>

  <!-- DMA 횡단 (주황 강조 — v0.5에서 추가, v0.6에서 UART 연결) -->
  <rect x="30" y="490" width="740" height="35" rx="8" fill="#FFF3E0" stroke="#FFA500" stroke-width="2"/>
  <text x="400" y="512" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">DMA 컨트롤러: DMA1 Stream5(USART2_RX, Circular) + Stream6(USART2_TX, Normal)</text>

  <!-- 로그 횡단 -->
  <rect x="30" y="535" width="740" height="35" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="557" text-anchor="middle" font-size="12" fill="#7B1FA2" font-weight="600">횡단 관심사: LOG_E/W/I/D 매크로 — 모든 계층에서 사용 (v0.2~)</text>

  <!-- 의존 화살표 -->
  <defs>
    <marker id="depArrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
    <marker id="dmaArrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFA500"/>
    </marker>
  </defs>

  <!-- main → uart_driver -->
  <line x1="100" y1="150" x2="225" y2="300" stroke="#34A853" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#depArrow2)"/>
  <text x="130" y="215" font-size="10" fill="#34A853" font-weight="600">uart_send()</text>

  <!-- uart_driver → ring_buffer -->
  <line x1="295" y1="327" x2="310" y2="327" stroke="#34A853" stroke-width="1.5" marker-end="url(#depArrow2)"/>

  <!-- uart_driver → DMA -->
  <line x1="225" y1="360" x2="225" y2="435" stroke="#FFA500" stroke-width="2.5" marker-end="url(#dmaArrow2)"/>
  <text x="245" y="400" font-size="10" fill="#FFA500" font-weight="600">DMA</text>

  <!-- 변경점 범례 -->
  <rect x="530" y="65" width="240" height="90" rx="6" fill="white" stroke="#FFA500" stroke-width="1.5"/>
  <text x="545" y="82" font-size="11" font-weight="700" fill="#E65100">v0.5 → v0.6 변경점</text>
  <text x="545" y="98" font-size="10" fill="#555">1. uart_driver 내부 DMA 전환</text>
  <text x="545" y="113" font-size="10" fill="#555">2. ring_buffer 모듈 신규 추가</text>
  <text x="545" y="128" font-size="10" fill="#555">3. DMA Stream5/6 UART 연결</text>
</svg>
