<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .hal { fill: #1A73E8; }
      .driver { fill: #34A853; }
      .service { fill: #FBBC04; }
      .app { fill: #EA4335; }
      .spi { fill: #4285F4; }
      .text { fill: white; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; text-anchor: middle; }
      .label { fill: #333; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }
      .line { stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="label" font-size="18" font-weight="bold" text-anchor="middle">
    v1.2 아키텍처: SPI Driver + LCD Driver 추가
  </text>

  <!-- Layer boxes -->
  <!-- App Layer -->
  <rect x="150" y="80" width="500" height="60" class="app" rx="5"/>
  <text x="400" y="115" class="text" font-size="16">App Layer: main.c (LCD 사용)</text>

  <!-- Service Layer -->
  <rect x="150" y="160" width="500" height="60" class="service" rx="5"/>
  <text x="400" y="190" class="text" font-size="14">Service Layer: (Ch13 gfx_service 추가 예정)</text>
  <text x="400" y="207" class="text" font-size="12">⚙ RTC Driver ⚙ Stepper Driver ⚙ Sensor Service</text>

  <!-- Driver Layer (SPI + LCD) -->
  <g>
    <!-- SPI Driver -->
    <rect x="150" y="240" width="230" height="70" class="driver" rx="5"/>
    <text x="265" y="270" class="text" font-size="14">SPI Driver</text>
    <text x="265" y="290" class="text" font-size="11">spi_driver.c/h</text>
    <text x="265" y="305" class="text" font-size="10">DMA 제어, CS 관리</text>

    <!-- LCD Driver -->
    <rect x="420" y="240" width="230" height="70" class="driver" rx="5"/>
    <text x="535" y="270" class="text" font-size="14">LCD Driver (ILI9341)</text>
    <text x="535" y="290" class="text" font-size="11">ili9341_driver.c/h</text>
    <text x="535" y="305" class="text" font-size="10">초기화, 픽셀/도형/텍스트</text>
  </g>

  <!-- HAL Layer -->
  <rect x="150" y="330" width="500" height="60" class="hal" rx="5"/>
  <text x="400" y="360" class="text" font-size="14">HAL Layer: SPI1, GPIO, DMA, TIM</text>
  <text x="400" y="378" class="text" font-size="11">(STM32CubeIDE 자동 생성)</text>

  <!-- Hardware -->
  <rect x="150" y="410" width="500" height="60" class="spi" rx="5"/>
  <text x="400" y="435" class="text" font-size="14">Hardware: NUCLEO-F411RE + ILI9341 LCD</text>
  <text x="400" y="453" class="text" font-size="11">SPI1 (PB3/PB5) + GPIO (PA3/PA4/PA5)</text>

  <!-- Arrows showing data flow -->
  <path d="M 400 140 L 400 160" class="arrow"/>
  <path d="M 265 220 L 265 240" class="arrow"/>
  <path d="M 535 220 L 535 240" class="arrow"/>
  <path d="M 400 310 L 400 330" class="arrow"/>
  <path d="M 400 390 L 400 410" class="arrow"/>

  <!-- Legend -->
  <text x="50" y="480" class="label" font-size="11" font-weight="bold">범례:</text>
  <rect x="30" y="490" width="15" height="15" class="app"/>
  <text x="50" y="502" class="label" font-size="10">Application</text>
  
  <rect x="170" y="490" width="15" height="15" class="service"/>
  <text x="190" y="502" class="label" font-size="10">Service</text>
  
  <rect x="290" y="490" width="15" height="15" class="driver"/>
  <text x="310" y="502" class="label" font-size="10">Driver</text>
  
  <rect x="410" y="490" width="15" height="15" class="hal"/>
  <text x="430" y="502" class="label" font-size="10">HAL</text>
</svg>
