<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 700 480">
  <defs>
    <filter id="shadow05a" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A2E">프로젝트 아키텍처 v0.5 — DMA Controller 추가</text>

  <!-- App Layer -->
  <rect x="50" y="55" width="600" height="60" rx="8" fill="#EA4335" opacity="0.15" stroke="#EA4335" stroke-width="2" filter="url(#shadow05a)"/>
  <text x="70" y="80" font-weight="700" fill="#EA4335">App Layer</text>
  <rect x="180" y="65" width="120" height="40" rx="6" fill="#EA4335" stroke="#EA4335" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" fill="white" font-size="12" font-weight="600">main.c</text>
  <rect x="320" y="65" width="120" height="40" rx="6" fill="#EA4335" opacity="0.3" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="380" y="90" text-anchor="middle" fill="#EA4335" font-size="11">cli_app (Ch15)</text>

  <!-- Service Layer -->
  <rect x="50" y="130" width="600" height="60" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2" filter="url(#shadow05a)"/>
  <text x="70" y="155" font-weight="700" fill="#E65100">Service Layer</text>
  <rect x="250" y="140" width="150" height="40" rx="6" fill="#FBBC04" opacity="0.3" stroke="#FBBC04" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="325" y="165" text-anchor="middle" fill="#E65100" font-size="11">clock_service (Ch10)</text>

  <!-- Driver Layer -->
  <rect x="50" y="205" width="600" height="60" rx="8" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="2" filter="url(#shadow05a)"/>
  <text x="70" y="230" font-weight="700" fill="#34A853">Driver Layer</text>
  <rect x="200" y="215" width="130" height="40" rx="6" fill="#34A853" stroke="#34A853" stroke-width="1.5"/>
  <text x="265" y="240" text-anchor="middle" fill="white" font-size="12" font-weight="600">uart_driver</text>
  <rect x="350" y="215" width="130" height="40" rx="6" fill="#34A853" opacity="0.3" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="415" y="240" text-anchor="middle" fill="#34A853" font-size="11">spi_driver (Ch12)</text>
  <rect x="500" y="215" width="130" height="40" rx="6" fill="#34A853" opacity="0.3" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="565" y="240" text-anchor="middle" fill="#34A853" font-size="11">i2c_driver (Ch11)</text>

  <!-- HAL Layer -->
  <rect x="50" y="280" width="600" height="60" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2" filter="url(#shadow05a)"/>
  <text x="70" y="305" font-weight="700" fill="#1A73E8">HAL Layer</text>
  <rect x="180" y="290" width="120" height="40" rx="6" fill="#1A73E8" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="240" y="315" text-anchor="middle" fill="white" font-size="12">HAL_UART</text>
  <rect x="320" y="290" width="120" height="40" rx="6" fill="#1A73E8" opacity="0.3" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="380" y="315" text-anchor="middle" fill="#1A73E8" font-size="11">HAL_SPI</text>
  <rect x="460" y="290" width="120" height="40" rx="6" fill="#1A73E8" opacity="0.3" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="520" y="315" text-anchor="middle" fill="#1A73E8" font-size="11">HAL_I2C</text>

  <!-- DMA Controller (NEW - highlighted) -->
  <rect x="50" y="358" width="600" height="55" rx="8" fill="#FF6D00" opacity="0.15" stroke="#FF6D00" stroke-width="3" filter="url(#shadow05a)"/>
  <text x="70" y="383" font-weight="700" fill="#FF6D00">DMA Controller</text>
  <text x="70" y="403" font-size="11" fill="#E65100">(횡단 관심사 — 모든 Driver 공유)</text>
  <rect x="250" y="365" width="100" height="40" rx="6" fill="#FF6D00" stroke="#FF6D00" stroke-width="2"/>
  <text x="300" y="385" text-anchor="middle" fill="white" font-size="12" font-weight="700">DMA1</text>
  <text x="300" y="400" text-anchor="middle" fill="white" font-size="10">8 Streams</text>
  <rect x="370" y="365" width="100" height="40" rx="6" fill="#FF6D00" stroke="#FF6D00" stroke-width="2"/>
  <text x="420" y="385" text-anchor="middle" fill="white" font-size="12" font-weight="700">DMA2</text>
  <text x="420" y="400" text-anchor="middle" fill="white" font-size="10">8 Streams</text>

  <!-- NEW badge -->
  <rect x="530" y="370" width="55" height="22" rx="11" fill="#FF6D00"/>
  <text x="557" y="386" text-anchor="middle" fill="white" font-size="11" font-weight="700">NEW!</text>

  <!-- Hardware -->
  <rect x="50" y="428" width="600" height="45" rx="8" fill="#616161" opacity="0.15" stroke="#616161" stroke-width="2" filter="url(#shadow05a)"/>
  <text x="70" y="455" font-weight="700" fill="#616161">Hardware</text>
  <text x="250" y="455" fill="#616161" font-size="12">USART2 · SPI1 · I2C1 · TIM · GPIO · SRAM</text>

  <!-- Arrows -->
  <line x1="265" y1="115" x2="265" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="265" y1="255" x2="265" y2="280" stroke="#666" stroke-width="1.5" marker-end="url(#arrow05)"/>
  <line x1="265" y1="340" x2="300" y2="358" stroke="#FF6D00" stroke-width="2" marker-end="url(#arrow05o)"/>
  <line x1="380" y1="340" x2="380" y2="358" stroke="#FF6D00" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="520" y1="340" x2="450" y2="358" stroke="#FF6D00" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="350" y1="413" x2="350" y2="428" stroke="#666" stroke-width="1.5" marker-end="url(#arrow05)"/>

  <defs>
    <marker id="arrow05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="arrow05o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6D00"/>
    </marker>
  </defs>
</svg>
