<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF3E0;stop-opacity:1"/>
    </linearGradient>
    <marker id="jarrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1A73E8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="460" rx="0" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#212121">v0.1 → v2.2 여정 — 19챕터의 성장 로드맵</text>

  <!-- Journey path line -->
  <path d="M 80 380 Q 200 300 320 280 Q 440 260 560 200 Q 650 160 720 100"
        stroke="#1A73E8" stroke-width="3" fill="none" stroke-dasharray="8,3" marker-end="url(#jarrow)"/>

  <!-- Milestones -->
  <!-- v0.1 ~ v0.3 -->
  <circle cx="90" cy="375" r="22" fill="#607D8B" stroke="white" stroke-width="2"/>
  <text x="90" y="379" text-anchor="middle" fill="white" font-size="11" font-weight="bold">v0.1~</text>
  <text x="90" y="392" text-anchor="middle" fill="white" font-size="9">v0.3</text>
  <rect x="50" y="400" width="90" height="45" rx="5" fill="white" fill-opacity="0.9" stroke="#607D8B"/>
  <text x="95" y="416" text-anchor="middle" font-size="10" font-weight="bold" fill="#455A64">기초 구축</text>
  <text x="95" y="430" text-anchor="middle" font-size="9" fill="#607D8B">GPIO·로그·아키텍처</text>
  <text x="95" y="442" text-anchor="middle" font-size="9" fill="#607D8B">Part 0</text>

  <!-- v0.4 ~ v0.6 -->
  <circle cx="230" cy="310" r="22" fill="#1A73E8" stroke="white" stroke-width="2"/>
  <text x="230" y="314" text-anchor="middle" fill="white" font-size="11" font-weight="bold">v0.4~</text>
  <text x="230" y="327" text-anchor="middle" fill="white" font-size="9">v0.6</text>
  <rect x="190" y="335" width="90" height="45" rx="5" fill="white" fill-opacity="0.9" stroke="#1A73E8"/>
  <text x="235" y="351" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">통신 &amp; DMA</text>
  <text x="235" y="365" text-anchor="middle" font-size="9" fill="#1565C0">UART·DMA·링버퍼</text>
  <text x="235" y="377" text-anchor="middle" font-size="9" fill="#1565C0">Part 1</text>

  <!-- v0.7 ~ v1.0 Milestone 1 -->
  <circle cx="370" cy="265" r="26" fill="#34A853" stroke="#FFD700" stroke-width="3"/>
  <text x="370" y="263" text-anchor="middle" fill="white" font-size="11" font-weight="bold">v1.0</text>
  <text x="370" y="276" text-anchor="middle" fill="white" font-size="9">①</text>
  <rect x="325" y="295" width="95" height="55" rx="5" fill="white" fill-opacity="0.9" stroke="#34A853"/>
  <text x="372" y="313" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">마일스톤 ①</text>
  <text x="372" y="327" text-anchor="middle" font-size="9" fill="#2E7D32">TIM·RTC·스텝모터</text>
  <text x="372" y="341" text-anchor="middle" font-size="9" fill="#2E7D32">스마트 시계 완성</text>

  <!-- v1.1 ~ v1.4 -->
  <circle cx="490" cy="210" r="22" fill="#9C27B0" stroke="white" stroke-width="2"/>
  <text x="490" y="214" text-anchor="middle" fill="white" font-size="11" font-weight="bold">v1.1~</text>
  <text x="490" y="227" text-anchor="middle" fill="white" font-size="9">v1.4</text>
  <rect x="450" y="235" width="90" height="45" rx="5" fill="white" fill-opacity="0.9" stroke="#9C27B0"/>
  <text x="495" y="251" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">센서 &amp; LCD</text>
  <text x="495" y="265" text-anchor="middle" font-size="9" fill="#7B1FA2">I2C·SPI·GFX</text>
  <text x="495" y="277" text-anchor="middle" font-size="9" fill="#7B1FA2">Part 3</text>

  <!-- v1.5 ~ v1.6 Milestone 2 -->
  <circle cx="590" cy="165" r="26" fill="#FF6F00" stroke="#FFD700" stroke-width="3"/>
  <text x="590" y="163" text-anchor="middle" fill="white" font-size="11" font-weight="bold">v1.6</text>
  <text x="590" y="176" text-anchor="middle" fill="white" font-size="9">②</text>
  <rect x="545" y="195" width="95" height="55" rx="5" fill="white" fill-opacity="0.9" stroke="#FF6F00"/>
  <text x="592" y="213" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">마일스톤 ②</text>
  <text x="592" y="227" text-anchor="middle" font-size="9" fill="#BF360C">CLI·대시보드</text>
  <text x="592" y="241" text-anchor="middle" font-size="9" fill="#BF360C">Part 4</text>

  <!-- v2.2 Milestone 3 — STAR -->
  <circle cx="720" cy="105" r="32" fill="#EA4335" stroke="#FFD700" stroke-width="4"/>
  <text x="720" y="101" text-anchor="middle" fill="white" font-size="13" font-weight="bold">v2.2</text>
  <text x="720" y="117" text-anchor="middle" fill="white" font-size="10">③ 완성!</text>

  <!-- Star rays -->
  <line x1="720" y1="65" x2="720" y2="55" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="752" y1="73" x2="758" y2="65" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="763" y1="105" x2="773" y2="105" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="752" y1="137" x2="758" y2="145" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="688" y1="73" x2="682" y2="65" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="677" y1="105" x2="667" y2="105" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="688" y1="137" x2="682" y2="145" stroke="#FFD700" stroke-width="2.5"/>

  <rect x="660" y="150" width="125" height="55" rx="5" fill="white" fill-opacity="0.95" stroke="#EA4335" stroke-width="2"/>
  <text x="722" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#B71C1C">마일스톤 ③ 달성!</text>
  <text x="722" y="182" text-anchor="middle" font-size="9" fill="#C62828">아키텍처·디버깅·품질</text>
  <text x="722" y="196" text-anchor="middle" font-size="9" fill="#C62828">Part 5 &amp; 6 완성</text>

  <!-- Bottom message -->
  <rect x="150" y="415" width="500" height="35" rx="8" fill="#1A73E8" fill-opacity="0.1" stroke="#1A73E8"/>
  <text x="400" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">
    "v0.1의 LED 하나에서 v2.2의 실무급 시스템으로 — 이 여정이 실력입니다"
  </text>
</svg>
