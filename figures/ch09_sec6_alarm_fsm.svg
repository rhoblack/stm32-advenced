<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 560">
  <defs>
    <marker id="arr9f" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Alarm FSM — 상태 전이 다이어그램 (4상태, 4전이)</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#555">Ch08 Stopwatch FSM과 동일 패턴 — 이벤트 소스만 다르다!</text>

  <!-- IDLE 상태 -->
  <circle cx="160" cy="170" r="55" fill="#E3F2FD" stroke="#1A73E8" stroke-width="3"/>
  <text x="160" y="165" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A73E8">IDLE</text>
  <text x="160" y="185" text-anchor="middle" font-size="10" fill="#555">알람 미설정</text>

  <!-- ARMED 상태 -->
  <circle cx="600" cy="170" r="55" fill="#E8F5E9" stroke="#34A853" stroke-width="3"/>
  <text x="600" y="165" text-anchor="middle" font-size="15" font-weight="bold" fill="#34A853">ARMED</text>
  <text x="600" y="185" text-anchor="middle" font-size="10" fill="#555">알람 대기 중</text>

  <!-- TRIGGERED 상태 -->
  <circle cx="600" cy="400" r="55" fill="#FCE4EC" stroke="#EA4335" stroke-width="3"/>
  <text x="600" y="395" text-anchor="middle" font-size="15" font-weight="bold" fill="#C62828">TRIGGERED</text>
  <text x="600" y="415" text-anchor="middle" font-size="10" fill="#555">알람 울리는 중!</text>

  <!-- ACKNOWLEDGED 상태 -->
  <circle cx="160" cy="400" r="55" fill="#FFF8E1" stroke="#FBBC04" stroke-width="3"/>
  <text x="160" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">ACKNOW-</text>
  <text x="160" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">LEDGED</text>
  <text x="160" y="425" text-anchor="middle" font-size="10" fill="#555">확인 완료</text>

  <!-- 초기 진입 화살표 -->
  <line x1="40" y1="170" x2="100" y2="170" stroke="#333" stroke-width="2" marker-end="url(#arr9f)"/>
  <text x="55" y="160" font-size="10" fill="#333">시작</text>

  <!-- ① IDLE → ARMED (SET_ALARM) -->
  <line x1="215" y1="155" x2="540" y2="155" stroke="#34A853" stroke-width="2.5" marker-end="url(#arr9f)"/>
  <rect x="310" y="128" width="160" height="42" rx="5" fill="#E8F5E9" stroke="#34A853"/>
  <text x="390" y="146" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">SET_ALARM</text>
  <text x="390" y="163" text-anchor="middle" font-size="10" fill="#34A853">/ RTC_SetAlarm(), LOG</text>

  <!-- ② ARMED → TRIGGERED (ALARM_MATCH) -->
  <line x1="615" y1="225" x2="615" y2="340" stroke="#C62828" stroke-width="2.5" marker-end="url(#arr9f)"/>
  <rect x="625" y="260" width="155" height="42" rx="5" fill="#FCE4EC" stroke="#EA4335"/>
  <text x="703" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">ALARM_MATCH</text>
  <text x="703" y="295" text-anchor="middle" font-size="10" fill="#C62828">/ LED+부저 시작!</text>

  <!-- ③ TRIGGERED → ACKNOWLEDGED (ACK_BUTTON) -->
  <line x1="545" y1="400" x2="220" y2="400" stroke="#E65100" stroke-width="2.5" marker-end="url(#arr9f)"/>
  <rect x="310" y="375" width="160" height="42" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="390" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">ACK (버튼)</text>
  <text x="390" y="410" text-anchor="middle" font-size="10" fill="#E65100">/ LED+부저 정지</text>

  <!-- ④ ACKNOWLEDGED → IDLE (자동 / 새 알람) -->
  <line x1="160" y1="345" x2="160" y2="230" stroke="#1A73E8" stroke-width="2.5" marker-end="url(#arr9f)"/>
  <rect x="30" y="265" width="130" height="42" rx="5" fill="#E3F2FD" stroke="#1A73E8"/>
  <text x="95" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">TIMEOUT</text>
  <text x="95" y="300" text-anchor="middle" font-size="10" fill="#1A73E8">/ 자동 복귀</text>

  <!-- ARMED → IDLE (CANCEL) -->
  <path d="M 545,185 Q 380,230 175,225" fill="none" stroke="#EA4335" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr9f)"/>
  <rect x="320" y="208" width="120" height="28" rx="5" fill="#FCE4EC" stroke="#EA4335" stroke-dasharray="4,2"/>
  <text x="380" y="227" text-anchor="middle" font-size="10" fill="#C62828">CANCEL / 알람 해제</text>

  <!-- ACKNOWLEDGED → ARMED (SET_ALARM 재설정) -->
  <path d="M 215,395 Q 380,350 545,395" fill="none" stroke="#34A853" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr9f)"/>
  <text x="380" y="360" text-anchor="middle" font-size="10" fill="#34A853">SET_ALARM / 새 알람 설정</text>

  <!-- 상태 전이 요약 -->
  <rect x="50" y="470" width="700" height="80" rx="6" fill="#F5F5F5" stroke="#BDBDBD"/>
  <text x="400" y="492" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">상태 전이 요약 (Ch08 패턴 비교)</text>
  <text x="80" y="515" font-size="11" fill="#555">Stopwatch: IDLE → RUNNING → PAUSED → IDLE (3상태, 이벤트=버튼)</text>
  <text x="80" y="535" font-size="11" fill="#E65100">Alarm:     IDLE → ARMED → TRIGGERED → ACKNOWLEDGED → IDLE (4상태, 이벤트=RTC+버튼)</text>
</svg>
