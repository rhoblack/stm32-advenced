<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" font-family="'Noto Sans KR', sans-serif" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#F8F9FA" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">시나리오 1: 알람(Alarm) 시퀀스 다이어그램</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#666">RTC AlarmA 인터럽트 → 전체 시스템 알람 동작</text>

  <!-- 참가자 헤더 -->
  <rect x="30" y="70" width="90" height="36" fill="#1A73E8" rx="5"/>
  <text x="75" y="93" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RTC HW</text>

  <rect x="160" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="205" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">rtc_driver</text>
  <text x="205" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <rect x="290" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="335" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">alarm_service</text>
  <text x="335" y="98" text-anchor="middle" font-size="9" fill="white">(Service)</text>

  <rect x="420" y="70" width="90" height="36" fill="#EA4335" rx="5"/>
  <text x="465" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">cli_app</text>
  <text x="465" y="98" text-anchor="middle" font-size="9" fill="white">(App)</text>

  <rect x="550" y="70" width="90" height="36" fill="#FBBC04" rx="5"/>
  <text x="595" y="85" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">ui_service</text>
  <text x="595" y="98" text-anchor="middle" font-size="9" fill="#333">(Service)</text>

  <rect x="680" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="725" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">stepper_drv</text>
  <text x="725" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <!-- 생명선 -->
  <line x1="75"  y1="106" x2="75"  y2="468" stroke="#1A73E8" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="205" y1="106" x2="205" y2="468" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="335" y1="106" x2="335" y2="468" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="465" y1="106" x2="465" y2="468" stroke="#EA4335" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="595" y1="106" x2="595" y2="468" stroke="#FBBC04" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="725" y1="106" x2="725" y2="468" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- 메시지 1: RTC IRQ → rtc_driver (y=140) -->
  <rect x="70" y="124" width="140" height="16" fill="#E3F2FD" rx="2"/>
  <text x="140" y="136" text-anchor="middle" font-size="8.5" fill="#1565C0">HAL_RTC_AlarmA_Callback()</text>
  <line x1="75" y1="140" x2="200" y2="140" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 메시지 2: alarm_event(ALARM_TRIGGERED) (y=175) -->
  <rect x="198" y="159" width="148" height="16" fill="#E8F5E9" rx="2"/>
  <text x="272" y="171" text-anchor="middle" font-size="8.5" fill="#2E7D32">alarm_event(ALARM_TRIGGERED)</text>
  <line x1="205" y1="175" x2="330" y2="175" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FSM 상태 전이 노트 — alarm_service lifeline 앵커 (x=335) -->
  <rect x="335" y="180" width="100" height="24" fill="#FFF9C4" stroke="#F9A825" rx="3"/>
  <text x="385" y="192" text-anchor="middle" font-size="9" fill="#F57F17">FSM: ARMED</text>
  <text x="385" y="202" text-anchor="middle" font-size="9" fill="#F57F17">→ TRIGGERED</text>

  <!-- 메시지 3: alarm_notify → cli_app (y=222) -->
  <rect x="335" y="214" width="130" height="16" fill="#E8F5E9" rx="2"/>
  <text x="400" y="226" text-anchor="middle" font-size="9" fill="#2E7D32">alarm_notify(ALARM_MSG)</text>
  <line x1="335" y1="230" x2="460" y2="230" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CLI 자체 동작 박스 -->
  <rect x="415" y="240" width="100" height="28" fill="#FFEBEE" stroke="#EA4335" rx="3"/>
  <text x="465" y="252" text-anchor="middle" font-size="9" fill="#B71C1C">[ALARM] 온도 초과!</text>
  <text x="465" y="263" text-anchor="middle" font-size="9" fill="#B71C1C">UART 전송</text>

  <!-- 메시지 5: ui_show_alarm_screen (y=295) -->
  <rect x="335" y="278" width="260" height="16" fill="#E8F5E9" rx="2"/>
  <text x="465" y="290" text-anchor="middle" font-size="9" fill="#2E7D32">ui_show_alarm_screen()</text>
  <line x1="335" y1="295" x2="590" y2="295" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LCD FSM 전이 노트 — ui_service lifeline 앵커 (x=595) -->
  <rect x="595" y="300" width="100" height="24" fill="#FFF9C4" stroke="#F9A825" rx="3"/>
  <text x="645" y="312" text-anchor="middle" font-size="9" fill="#F57F17">DISPLAY FSM:</text>
  <text x="645" y="322" text-anchor="middle" font-size="9" fill="#F57F17">→ ALARM_VIEW</text>

  <!-- 메시지 6: motor_alarm_pattern (y=345) -->
  <rect x="335" y="335" width="390" height="16" fill="#E8F5E9" rx="2"/>
  <text x="530" y="347" text-anchor="middle" font-size="9" fill="#2E7D32">motor_alarm_pattern() — 2회 진동 패턴</text>
  <line x1="335" y1="352" x2="720" y2="352" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 메시지 7: 사용자 btn_long_press (점선, y=382) -->
  <rect x="350" y="365" width="115" height="16" fill="#F5F5F5" rx="2"/>
  <text x="407" y="377" text-anchor="middle" font-size="9" fill="#555">btn_long_press (사용자)</text>
  <line x1="465" y1="382" x2="340" y2="382" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>

  <!-- 메시지 8: ACKNOWLEDGED 상태 박스 — alarm_service lifeline 앵커 (x=335) -->
  <rect x="335" y="390" width="110" height="24" fill="#E8F5E9" stroke="#34A853" rx="3"/>
  <text x="390" y="402" text-anchor="middle" font-size="9" fill="#2E7D32">FSM: TRIGGERED</text>
  <text x="390" y="412" text-anchor="middle" font-size="9" fill="#2E7D32">→ ACKNOWLEDGED</text>

  <!-- 메시지 9: ui_show_time_screen (y=432) -->
  <rect x="335" y="424" width="260" height="16" fill="#E8F5E9" rx="2"/>
  <text x="465" y="436" text-anchor="middle" font-size="9" fill="#2E7D32">ui_show_time_screen() — 정상 화면 복귀</text>
  <line x1="335" y1="440" x2="590" y2="440" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 로그 출력 -->
  <rect x="30" y="460" width="840" height="40" fill="#263238" rx="4"/>
  <text x="50" y="475" font-size="9.5" fill="#80CBC4" font-family="monospace">[INFO ] alarm_service: AlarmA 발생 — TRIGGERED 전이</text>
  <text x="50" y="491" font-size="9.5" fill="#80CBC4" font-family="monospace">[INFO ] alarm_service: 사용자 응답 — ACKNOWLEDGED</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
