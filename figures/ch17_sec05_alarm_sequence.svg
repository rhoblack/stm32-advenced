<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480"  font-family="'Noto Sans KR', sans-serif" viewBox="0 0 860 480">
  <rect width="860" height="480" fill="#F8F9FA" rx="12"/>
  <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">시나리오 1: 알람(Alarm) 시퀀스 다이어그램</text>
  <text x="430" y="52" text-anchor="middle" font-size="11" fill="#666">RTC AlarmA 인터럽트 → 전체 시스템 알람 동작</text>

  <!-- 참가자 헤더 -->
  <rect x="30" y="70" width="90" height="36" fill="#1A73E8" rx="5"/>
  <text x="75" y="93" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RTC HW</text>

  <rect x="160" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="205" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">rtc_driver</text>
  <text x="205" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <rect x="290" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="335" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">alarm_service</text>
  <text x="335" y="98" text-anchor="middle" font-size="9" fill="white">(Service)</text>

  <rect x="420" y="70" width="90" height="36" fill="#EA4335" rx="5"/>
  <text x="465" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">cli_app</text>
  <text x="465" y="98" text-anchor="middle" font-size="9" fill="white">(App)</text>

  <rect x="550" y="70" width="90" height="36" fill="#FBBC04" rx="5"/>
  <text x="595" y="85" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">ui_service</text>
  <text x="595" y="98" text-anchor="middle" font-size="9" fill="#333">(Service)</text>

  <rect x="680" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="725" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">stepper_drv</text>
  <text x="725" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <!-- 생명선 -->
  <line x1="75" y1="106" x2="75" y2="450" stroke="#1A73E8" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="205" y1="106" x2="205" y2="450" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="335" y1="106" x2="335" y2="450" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="465" y1="106" x2="465" y2="450" stroke="#EA4335" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="595" y1="106" x2="595" y2="450" stroke="#FBBC04" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="725" y1="106" x2="725" y2="450" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- 메시지 1: RTC IRQ -->
  <line x1="75" y1="135" x2="200" y2="135" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="75" y="120" width="125" height="16" fill="#E3F2FD" rx="2"/>
  <text x="137" y="131" text-anchor="middle" font-size="9" fill="#1A73E8">HAL_RTC_AlarmA_Callback()</text>

  <!-- 메시지 2: Alarm FSM → TRIGGERED -->
  <line x1="205" y1="160" x2="330" y2="160" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="205" y="145" width="125" height="16" fill="#E8F5E9" rx="2"/>
  <text x="267" y="156" text-anchor="middle" font-size="9" fill="#2E7D32">alarm_event(ALARM_TRIGGERED)</text>

  <!-- 메시지 3: alarm FSM 상태 전이 노트 -->
  <rect x="335" y="148" width="80" height="22" fill="#FFF9C4" stroke="#F9A825" rx="3"/>
  <text x="375" y="160" text-anchor="middle" font-size="9" fill="#F57F17">FSM: ARMED</text>
  <text x="375" y="170" text-anchor="middle" font-size="9" fill="#F57F17">→ TRIGGERED</text>

  <!-- 메시지 4: CLI 알람 출력 -->
  <line x1="335" y1="195" x2="460" y2="195" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="335" y="180" width="125" height="16" fill="#E8F5E9" rx="2"/>
  <text x="397" y="191" text-anchor="middle" font-size="9" fill="#2E7D32">alarm_notify(ALARM_MSG)</text>

  <!-- CLI 출력 -->
  <line x1="465" y1="220" x2="465" y2="236" stroke="#EA4335" stroke-width="1.5"/>
  <rect x="410" y="207" width="110" height="30" fill="#FFEBEE" rx="3"/>
  <text x="465" y="220" text-anchor="middle" font-size="9" fill="#B71C1C">[ALARM] 온도 초과!</text>
  <text x="465" y="234" text-anchor="middle" font-size="9" fill="#B71C1C">UART 전송</text>

  <!-- 메시지 5: LCD 알람 표시 요청 -->
  <line x1="335" y1="255" x2="590" y2="255" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="335" y="240" width="255" height="16" fill="#E8F5E9" rx="2"/>
  <text x="462" y="251" text-anchor="middle" font-size="9" fill="#2E7D32">ui_show_alarm_screen()</text>

  <!-- LCD FSM 전이 -->
  <rect x="595" y="243" width="80" height="22" fill="#FFF9C4" stroke="#F9A825" rx="3"/>
  <text x="635" y="255" text-anchor="middle" font-size="9" fill="#F57F17">DISPLAY FSM:</text>
  <text x="635" y="265" text-anchor="middle" font-size="9" fill="#F57F17">→ ALARM_VIEW</text>

  <!-- 메시지 6: 스텝모터 알람 동작 -->
  <line x1="335" y1="295" x2="720" y2="295" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="335" y="280" width="385" height="16" fill="#E8F5E9" rx="2"/>
  <text x="527" y="291" text-anchor="middle" font-size="9" fill="#2E7D32">motor_alarm_pattern() — 2회 진동 패턴</text>

  <!-- 메시지 7: 사용자 응답 (버튼) -->
  <line x1="465" y1="325" x2="330" y2="325" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <rect x="350" y="310" width="115" height="16" fill="#F5F5F5" rx="2"/>
  <text x="407" y="321" text-anchor="middle" font-size="9" fill="#555">btn_long_press (사용자)</text>

  <!-- 메시지 8: Alarm 해제 -->
  <line x1="335" y1="350" x2="330" y2="350" stroke="#666"/>
  <rect x="335" y="337" width="80" height="22" fill="#E8F5E9" stroke="#34A853" rx="3"/>
  <text x="375" y="349" text-anchor="middle" font-size="9" fill="#2E7D32">FSM: TRIGGERED</text>
  <text x="375" y="360" text-anchor="middle" font-size="9" fill="#2E7D32">→ ACKNOWLEDGED</text>

  <!-- 메시지 9: UI 복귀 -->
  <line x1="335" y1="385" x2="590" y2="385" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="335" y="372" width="255" height="16" fill="#E8F5E9" rx="2"/>
  <text x="462" y="382" text-anchor="middle" font-size="9" fill="#2E7D32">ui_show_time_screen() — 정상 화면 복귀</text>

  <!-- 로그 출력 -->
  <rect x="30" y="410" width="800" height="30" fill="#263238" rx="4"/>
  <text x="50" y="423" font-size="9.5" fill="#80CBC4" font-family="monospace">[INFO ] alarm_service: AlarmA 발생 — TRIGGERED 전이</text>
  <text x="50" y="436" font-size="9.5" fill="#80CBC4" font-family="monospace">[INFO ] alarm_service: 사용자 응답 — ACKNOWLEDGED</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
