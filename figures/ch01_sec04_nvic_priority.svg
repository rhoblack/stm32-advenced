<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="10" refX="4" refY="0" orient="auto">
      <polygon points="0 10, 8 10, 4 0" fill="#EA4335"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="10" refX="4" refY="9" orient="auto">
      <polygon points="0 0, 8 0, 4 10" fill="#9E9E9E"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A73E8"/>
    </marker>
    <marker id="arrowRightRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA4335"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1000" height="640" fill="#FAFAFA"/>

  <!-- 제목 -->
  <rect x="0" y="0" width="1000" height="50" fill="#212121"/>
  <text x="500" y="32" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">NVIC 우선순위 그룹 설명 다이어그램</text>

  <!-- ===== 상단: Priority Group 4 설명 ===== -->
  <rect x="30" y="65" width="940" height="120" rx="10" fill="white" stroke="#FBBC04" stroke-width="3"/>
  <rect x="30" y="65" width="940" height="35" rx="10" fill="#F9A825"/>
  <rect x="30" y="88" width="940" height="12" fill="#F9A825"/>
  <text x="500" y="88" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Priority Group 4 (CubeMX 기본값)</text>

  <!-- Group 4 비트 분배 -->
  <rect x="60" y="108" width="400" height="65" rx="8" fill="#FFF9C4" stroke="#FBBC04" stroke-width="2"/>
  <text x="260" y="128" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#F57F17" text-anchor="middle">PreemptPriority (선점 우선순위)</text>
  <!-- 4비트 박스 -->
  <rect x="80" y="135" width="42" height="28" rx="3" fill="#FBBC04"/>
  <text x="101" y="154" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">비트3</text>
  <rect x="125" y="135" width="42" height="28" rx="3" fill="#FBBC04"/>
  <text x="146" y="154" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">비트2</text>
  <rect x="170" y="135" width="42" height="28" rx="3" fill="#FBBC04"/>
  <text x="191" y="154" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">비트1</text>
  <rect x="215" y="135" width="42" height="28" rx="3" fill="#FBBC04"/>
  <text x="236" y="154" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">비트0</text>
  <text x="285" y="151" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">= 4비트 → 0~15 범위</text>

  <rect x="480" y="108" width="350" height="65" rx="8" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="2"/>
  <text x="655" y="128" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#757575" text-anchor="middle">SubPriority (서브 우선순위)</text>
  <rect x="550" y="135" width="120" height="28" rx="3" fill="#BDBDBD"/>
  <text x="610" y="154" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">0비트 (없음)</text>
  <text x="700" y="151" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#757575" text-anchor="middle">Group4에서는 미사용</text>

  <!-- CubeMX 기본값 태그 -->
  <rect x="840" y="95" width="120" height="24" rx="12" fill="#34A853"/>
  <text x="900" y="112" font-family="Noto Sans KR, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">CubeMX 기본값</text>

  <!-- ===== 중앙: 우선순위 계층 테이블 ===== -->
  <rect x="30" y="198" width="940" height="200" rx="10" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="30" y="198" width="940" height="35" rx="10" fill="#1A73E8"/>
  <rect x="30" y="221" width="940" height="12" fill="#1A73E8"/>
  <text x="500" y="221" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PreemptPriority 값과 우선순위 관계</text>

  <!-- 우선순위 화살표 (위쪽 = 높음) -->
  <line x1="62" y1="385" x2="62" y2="248" stroke="#EA4335" stroke-width="3" marker-end="url(#arrowUp)"/>
  <text x="40" y="320" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle" transform="rotate(-90, 40, 320)">우선순위 높음</text>

  <line x1="62" y1="248" x2="62" y2="385" stroke="#9E9E9E" stroke-width="3" marker-end="url(#arrowDown)"/>

  <!-- 우선순위 값 블록들 -->
  <!-- 값 0 (최고) -->
  <rect x="80" y="242" width="60" height="36" rx="4" fill="#EA4335"/>
  <text x="110" y="258" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">0</text>
  <text x="110" y="272" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle">최고</text>

  <!-- 값 1 -->
  <rect x="150" y="249" width="54" height="30" rx="4" fill="#EF5350"/>
  <text x="177" y="268" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <!-- 값 2 -->
  <rect x="215" y="255" width="54" height="28" rx="4" fill="#EF9A9A" stroke="#EF5350" stroke-width="1"/>
  <text x="242" y="273" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#C62828" text-anchor="middle">2</text>
  <!-- 값 3 -->
  <rect x="280" y="260" width="54" height="27" rx="4" fill="#FF9800"/>
  <text x="307" y="277" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle">3</text>
  <!-- 값 4 -->
  <rect x="345" y="264" width="54" height="26" rx="4" fill="#FFC107"/>
  <text x="372" y="281" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">4</text>
  <!-- 값 5 강조 (현재 예제에서 사용) -->
  <rect x="410" y="267" width="60" height="30" rx="4" fill="#FBBC04" stroke="#F9A825" stroke-width="2"/>
  <text x="440" y="280" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle" font-weight="bold">5</text>
  <text x="440" y="292" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#E65100" text-anchor="middle">예제값</text>
  <!-- 값 6~9 생략 -->
  <text x="545" y="285" font-family="Noto Sans KR, sans-serif" font-size="14" fill="#9E9E9E" text-anchor="middle">6 · · · 9</text>
  <!-- 값 10 -->
  <rect x="590" y="285" width="54" height="25" rx="4" fill="#B0BEC5"/>
  <text x="617" y="302" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle">10</text>
  <!-- 값 11 -->
  <rect x="655" y="288" width="54" height="24" rx="4" fill="#B0BEC5"/>
  <text x="682" y="304" font-family="Noto Sans KR, sans-serif" font-size="12" fill="white" text-anchor="middle">11</text>
  <!-- 값 12 -->
  <rect x="720" y="291" width="54" height="24" rx="4" fill="#CFD8DC"/>
  <text x="747" y="307" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#757575" text-anchor="middle">12</text>
  <!-- 값 13 -->
  <rect x="785" y="294" width="54" height="24" rx="4" fill="#ECEFF1"/>
  <text x="812" y="310" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E" text-anchor="middle">13</text>
  <!-- 값 14 -->
  <rect x="845" y="297" width="54" height="24" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="872" y="313" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#BDBDBD" text-anchor="middle">14</text>
  <!-- 값 15 (최저) -->
  <rect x="905" y="300" width="55" height="36" rx="4" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1"/>
  <text x="932" y="315" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#9E9E9E" text-anchor="middle">15</text>
  <text x="932" y="329" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#BDBDBD" text-anchor="middle">최저</text>

  <!-- 설명 레이블 -->
  <text x="110" y="340" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle" font-weight="bold">최고 우선순위</text>
  <text x="110" y="354" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#EA4335" text-anchor="middle">(선점 최강)</text>
  <text x="932" y="357" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#9E9E9E" text-anchor="middle">최저 우선순위</text>

  <!-- 핵심 원칙 -->
  <rect x="200" y="368" width="600" height="22" rx="5" fill="#FFEB3B"/>
  <text x="500" y="383" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle" font-weight="bold">숫자가 작을수록 우선순위 높음 (선점 가능)</text>

  <!-- ===== 하단: 선점 시나리오 ===== -->
  <rect x="30" y="410" width="940" height="215" rx="10" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="30" y="410" width="940" height="35" rx="10" fill="#34A853"/>
  <rect x="30" y="433" width="940" height="12" fill="#34A853"/>
  <text x="500" y="433" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">선점(Preemption) 시나리오</text>

  <!-- 타임라인 -->
  <!-- CPU 레이블 -->
  <text x="80" y="478" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" font-weight="bold">CPU</text>
  <text x="80" y="493" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">타임라인</text>

  <!-- 타임 축 -->
  <line x1="140" y1="482" x2="940" y2="482" stroke="#212121" stroke-width="1.5"/>

  <!-- 인터럽트 A 실행 블록 (priority=5) -->
  <rect x="140" y="455" width="260" height="50" rx="5" fill="#FBBC04" stroke="#F9A825" stroke-width="2"/>
  <text x="270" y="474" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#212121" text-anchor="middle">인터럽트 A 실행 중</text>
  <text x="270" y="490" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">Priority = 5</text>
  <text x="270" y="503" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">(ISR_A 처리)</text>

  <!-- 인터럽트 B 발생 표시 -->
  <line x1="400" y1="438" x2="400" y2="505" stroke="#EA4335" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="404" y="446" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#EA4335" font-weight="bold">인터럽트 B 발생!</text>
  <text x="404" y="458" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#EA4335">Priority = 3</text>

  <!-- 선점 화살표 -->
  <path d="M 400 460 L 420 460" stroke="#EA4335" stroke-width="2.5" fill="none" marker-end="url(#arrowRightRed)"/>

  <!-- 인터럽트 B 선점 블록 (priority=3) -->
  <rect x="420" y="448" width="200" height="60" rx="5" fill="#EA4335" stroke="#C62828" stroke-width="2"/>
  <text x="520" y="468" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">인터럽트 B 선점!</text>
  <text x="520" y="485" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#FFCDD2" text-anchor="middle">Priority = 3</text>
  <text x="520" y="500" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle">(ISR_B 처리 - A 중단)</text>

  <!-- B 완료 후 A 재개 화살표 -->
  <line x1="620" y1="460" x2="660" y2="460" stroke="#1A73E8" stroke-width="2.5" marker-end="url(#arrowRight)"/>
  <text x="640" y="450" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1A73E8" text-anchor="middle">B 완료</text>
  <text x="640" y="474" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1A73E8" text-anchor="middle">→ A 재개</text>

  <!-- 인터럽트 A 재개 블록 -->
  <rect x="660" y="455" width="220" height="50" rx="5" fill="#FFF9C4" stroke="#FBBC04" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="770" y="474" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">인터럽트 A 재개</text>
  <text x="770" y="490" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#F57F17" text-anchor="middle">Priority = 5 (재개)</text>
  <text x="770" y="503" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">(ISR_A 나머지 처리)</text>

  <!-- 우선순위 비교 표시 박스 -->
  <rect x="60" y="518" width="880" height="90" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="500" y="538" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#4A148C" text-anchor="middle">선점 원칙: 낮은 번호가 더 강한 선점 우선순위</text>

  <!-- 비교 -->
  <rect x="100" y="548" width="150" height="48" rx="5" fill="#FBBC04"/>
  <text x="175" y="565" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#212121" text-anchor="middle">인터럽트 A</text>
  <text x="175" y="582" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#E65100" text-anchor="middle">Priority = 5</text>
  <text x="175" y="592" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">(낮은 우선순위)</text>

  <text x="310" y="576" font-family="Noto Sans KR, sans-serif" font-size="20" fill="#9C27B0" text-anchor="middle" font-weight="bold">&lt;</text>

  <rect x="360" y="548" width="150" height="48" rx="5" fill="#EA4335"/>
  <text x="435" y="565" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">인터럽트 B</text>
  <text x="435" y="582" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#FFCDD2" text-anchor="middle">Priority = 3</text>
  <text x="435" y="592" font-family="Noto Sans KR, sans-serif" font-size="10" fill="white" text-anchor="middle">(높은 우선순위)</text>

  <text x="570" y="576" font-family="Noto Sans KR, sans-serif" font-size="14" fill="#9C27B0" text-anchor="middle" font-weight="bold">→</text>

  <rect x="600" y="548" width="320" height="48" rx="5" fill="#EDE7F6" stroke="#7C4DFF" stroke-width="1.5"/>
  <text x="760" y="565" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#4A148C" text-anchor="middle" font-weight="bold">B가 실행 중인 A를 선점 가능</text>
  <text x="760" y="583" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#6A1B9A" text-anchor="middle">B 완료 후 A의 중단 지점에서 재개</text>
  <text x="760" y="596" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#9C27B0" text-anchor="middle">HAL_NVIC_SetPriority(IRQn, preempt, sub)</text>
</svg>
