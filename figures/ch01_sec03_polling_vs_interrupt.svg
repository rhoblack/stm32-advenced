<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#212121"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA4335"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A73E8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1000" height="580" fill="#FAFAFA"/>

  <!-- 제목 -->
  <rect x="0" y="0" width="1000" height="50" fill="#212121"/>
  <text x="500" y="32" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">CPU 타임라인 비교: 폴링 방식 vs 인터럽트 방식</text>

  <!-- ======================================================= -->
  <!-- 상단: 폴링 방식 -->
  <!-- ======================================================= -->
  <rect x="20" y="60" width="960" height="220" rx="10" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="20" y="60" width="960" height="36" rx="10" fill="#EA4335"/>
  <rect x="20" y="84" width="960" height="12" fill="#EA4335"/>
  <text x="500" y="84" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">폴링(Polling) 방식</text>

  <!-- 시간 축 레이블 -->
  <text x="130" y="118" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" font-weight="bold">CPU</text>
  <!-- 시간 축 -->
  <line x1="160" y1="148" x2="960" y2="148" stroke="#212121" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <!-- 시간 눈금 -->
  <line x1="160" y1="145" x2="160" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="160" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">0ms</text>
  <line x1="320" y1="145" x2="320" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="320" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">20ms</text>
  <line x1="480" y1="145" x2="480" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="480" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">40ms</text>
  <line x1="640" y1="145" x2="640" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="640" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">60ms</text>
  <line x1="800" y1="145" x2="800" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="800" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">80ms</text>
  <line x1="940" y1="145" x2="940" y2="152" stroke="#212121" stroke-width="1.5"/>
  <text x="940" y="163" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">100ms</text>

  <!-- CPU 타임라인 바 (폴링 - 전체 빨간 busy 블록들) -->
  <!-- ReadPin 확인 반복 블록 -->
  <rect x="160" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="188" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="220" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="248" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="280" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="308" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="340" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="368" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="400" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="428" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="460" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="488" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="520" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="548" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="580" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="608" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="640" y="118" width="56" height="25" rx="3" fill="#EA4335" stroke="#C62828" stroke-width="1.5"/>
  <text x="668" y="132" font-family="Noto Sans KR, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">감지!</text>
  <text x="668" y="141" font-family="Noto Sans KR, sans-serif" font-size="7" fill="white" text-anchor="middle">ReadPin</text>
  <rect x="700" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="728" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="760" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="788" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="820" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="848" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>
  <rect x="880" y="118" width="56" height="25" rx="3" fill="#FFCDD2" stroke="#EA4335" stroke-width="1"/>
  <text x="908" y="135" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">ReadPin</text>

  <!-- 버튼 눌림 이벤트 세로선 -->
  <line x1="590" y1="100" x2="590" y2="175" stroke="#FF6F00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="594" y="108" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#FF6F00" font-weight="bold">버튼 눌림!</text>

  <!-- 지연 화살표 -->
  <line x1="590" y1="175" x2="640" y2="175" stroke="#EA4335" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="615" y="170" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#EA4335" text-anchor="middle">지연</text>

  <!-- 감지 시점 표시 -->
  <line x1="668" y1="100" x2="668" y2="116" stroke="#C62828" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="668" y="99" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#C62828" text-anchor="middle">감지 시점</text>

  <!-- 폴링 방식 설명 -->
  <rect x="30" y="185" width="940" height="80" rx="6" fill="#FFF3F3"/>
  <text x="500" y="206" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#C62828" text-anchor="middle">폴링 방식의 문제점</text>
  <text x="500" y="225" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">CPU가 쉬지 않고 ReadPin만 반복 → CPU 점유율 100%에 가까움</text>
  <text x="500" y="243" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">버튼 눌림 감지까지 최대 1 폴링 주기 지연 발생 / 다른 작업 수행 불가</text>
  <text x="500" y="261" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">while(HAL_GPIO_ReadPin(...) == GPIO_PIN_SET) { }  ← CPU가 여기서 멈춤</text>

  <!-- ======================================================= -->
  <!-- 하단: 인터럽트 방식 -->
  <!-- ======================================================= -->
  <rect x="20" y="295" width="960" height="220" rx="10" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="20" y="295" width="960" height="36" rx="10" fill="#34A853"/>
  <rect x="20" y="319" width="960" height="12" fill="#34A853"/>
  <text x="500" y="319" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">인터럽트(Interrupt) 방식</text>

  <!-- 시간 축 레이블 -->
  <text x="130" y="353" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" font-weight="bold">CPU</text>
  <!-- 시간 축 -->
  <line x1="160" y1="383" x2="960" y2="383" stroke="#212121" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <!-- 시간 눈금 -->
  <line x1="160" y1="380" x2="160" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="160" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">0ms</text>
  <line x1="320" y1="380" x2="320" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="320" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">20ms</text>
  <line x1="480" y1="380" x2="480" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="480" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">40ms</text>
  <line x1="640" y1="380" x2="640" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="640" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">60ms</text>
  <line x1="800" y1="380" x2="800" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="800" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">80ms</text>
  <line x1="940" y1="380" x2="940" y2="387" stroke="#212121" stroke-width="1.5"/>
  <text x="940" y="398" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">100ms</text>

  <!-- 다른 작업 블록 (초록) -->
  <rect x="160" y="353" width="420" height="25" rx="3" fill="#C8E6C9" stroke="#34A853" stroke-width="1.5"/>
  <text x="370" y="370" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">다른 작업 처리 (Main Loop)</text>

  <!-- 버튼 눌림 이벤트 세로선 -->
  <line x1="590" y1="335" x2="590" y2="410" stroke="#FF6F00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="594" y="343" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#FF6F00" font-weight="bold">버튼 눌림!</text>

  <!-- ISR 처리 블록 (파랑) -->
  <rect x="590" y="353" width="100" height="25" rx="3" fill="#1A73E8" stroke="#1565C0" stroke-width="1.5"/>
  <text x="640" y="365" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ISR 처리</text>
  <text x="640" y="375" font-family="Noto Sans KR, sans-serif" font-size="8" fill="white" text-anchor="middle">즉시 실행!</text>

  <!-- ISR 복귀 후 다른 작업 재개 -->
  <rect x="694" y="353" width="246" height="25" rx="3" fill="#C8E6C9" stroke="#34A853" stroke-width="1.5"/>
  <text x="817" y="370" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">다른 작업 재개</text>

  <!-- ISR 복귀 화살표 -->
  <line x1="690" y1="378" x2="692" y2="378" stroke="#1A73E8" stroke-width="1"/>
  <text x="694" y="347" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#1A73E8">ISR 복귀</text>

  <!-- 즉시 반응 화살표 -->
  <path d="M 590 340 L 640 340 L 640 353" stroke="#FF6F00" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="615" y="337" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#FF6F00" text-anchor="middle">즉시</text>

  <!-- 인터럽트 방식 설명 -->
  <rect x="30" y="420" width="940" height="80" rx="6" fill="#F1F8E9"/>
  <text x="500" y="441" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#1B5E20" text-anchor="middle">인터럽트 방식의 장점</text>
  <text x="500" y="460" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">CPU는 평소에 다른 유용한 작업 수행 → CPU 여유 있음</text>
  <text x="500" y="478" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">이벤트 발생 즉시 하드웨어가 CPU에 신호 → 지연 없이 반응</text>
  <text x="500" y="496" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">void HAL_GPIO_EXTI_Callback(uint16_t GPIO_Pin)  ← 이벤트 시에만 호출됨</text>

  <!-- 하단 요약 비교 -->
  <rect x="20" y="525" width="960" height="44" rx="8" fill="#212121"/>
  <text x="300" y="545" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#FFCDD2" text-anchor="middle">폴링: CPU 점유율 높음 / 다른 작업 어려움</text>
  <text x="500" y="545" font-family="Noto Sans KR, sans-serif" font-size="14" fill="#FBBC04" text-anchor="middle" font-weight="bold">VS</text>
  <text x="700" y="545" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#C8E6C9" text-anchor="middle">인터럽트: 이벤트 발생 즉시 반응 / CPU 여유</text>
  <text x="300" y="561" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#EF9A9A" text-anchor="middle">단순 구현, 타이밍 예측 가능</text>
  <text x="700" y="561" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#A5D6A7" text-anchor="middle">복잡하지만 실시간 반응성 뛰어남</text>
</svg>
