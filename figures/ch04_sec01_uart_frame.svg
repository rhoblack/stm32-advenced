<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320"  font-family="'Noto Sans KR', sans-serif" font-size="13" viewBox="0 0 800 320">
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#212121">UART 프레임 구조 — 115200-8-N-1</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#888">1바이트(0x41 = 'A') 전송 시 실제 핀에서 관찰되는 신호</text>

  <!-- 시간 축 -->
  <line x1="40" y1="180" x2="770" y2="180" stroke="#CCC" stroke-width="1"/>
  <text x="405" y="200" text-anchor="middle" font-size="10" fill="#999">시간 →</text>

  <!-- Idle (High) -->
  <line x1="40" y1="100" x2="100" y2="100" stroke="#34A853" stroke-width="3"/>
  <text x="70" y="90" text-anchor="middle" font-size="10" fill="#34A853" font-weight="600">IDLE</text>
  <text x="70" y="215" text-anchor="middle" font-size="9" fill="#999">High</text>

  <!-- Start bit (Low) -->
  <line x1="100" y1="100" x2="100" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="160" x2="160" y2="160" stroke="#EA4335" stroke-width="3"/>
  <rect x="100" y="125" width="60" height="40" rx="0" fill="#EA4335" opacity="0.1"/>
  <text x="130" y="148" text-anchor="middle" font-size="10" fill="#EA4335" font-weight="700">Start</text>
  <text x="130" y="215" text-anchor="middle" font-size="9" fill="#EA4335">0</text>

  <!-- Data bits: 0x41 = 01000001 (LSB first: 1,0,0,0,0,0,1,0) -->
  <!-- D0=1 -->
  <line x1="160" y1="160" x2="160" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="160" y1="100" x2="220" y2="100" stroke="#1A73E8" stroke-width="3"/>
  <text x="190" y="90" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D0</text>
  <text x="190" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">1</text>

  <!-- D1=0 -->
  <line x1="220" y1="100" x2="220" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="160" x2="280" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="250" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D1</text>
  <text x="250" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- D2=0 -->
  <line x1="280" y1="160" x2="340" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="310" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D2</text>
  <text x="310" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- D3=0 -->
  <line x1="340" y1="160" x2="400" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="370" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D3</text>
  <text x="370" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- D4=0 -->
  <line x1="400" y1="160" x2="460" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="430" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D4</text>
  <text x="430" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- D5=0 -->
  <line x1="460" y1="160" x2="520" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="490" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D5</text>
  <text x="490" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- D6=1 -->
  <line x1="520" y1="160" x2="520" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="520" y1="100" x2="580" y2="100" stroke="#1A73E8" stroke-width="3"/>
  <text x="550" y="90" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D6</text>
  <text x="550" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">1</text>

  <!-- D7=0 -->
  <line x1="580" y1="100" x2="580" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="580" y1="160" x2="640" y2="160" stroke="#1A73E8" stroke-width="3"/>
  <text x="610" y="148" text-anchor="middle" font-size="10" fill="#1A73E8" font-weight="600">D7</text>
  <text x="610" y="215" text-anchor="middle" font-size="9" fill="#1A73E8">0</text>

  <!-- Stop bit (High) -->
  <line x1="640" y1="160" x2="640" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="640" y1="100" x2="710" y2="100" stroke="#34A853" stroke-width="3"/>
  <rect x="640" y="80" width="70" height="30" rx="0" fill="#34A853" opacity="0.1"/>
  <text x="675" y="96" text-anchor="middle" font-size="10" fill="#34A853" font-weight="700">Stop</text>
  <text x="675" y="215" text-anchor="middle" font-size="9" fill="#34A853">1</text>

  <!-- Idle -->
  <line x1="710" y1="100" x2="770" y2="100" stroke="#34A853" stroke-width="3"/>
  <text x="740" y="90" text-anchor="middle" font-size="10" fill="#34A853" font-weight="600">IDLE</text>

  <!-- 괄호: 데이터 영역 -->
  <line x1="160" y1="230" x2="640" y2="230" stroke="#1A73E8" stroke-width="1.5"/>
  <line x1="160" y1="225" x2="160" y2="235" stroke="#1A73E8" stroke-width="1.5"/>
  <line x1="640" y1="225" x2="640" y2="235" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="400" y="248" text-anchor="middle" font-size="11" fill="#1A73E8" font-weight="600">8 Data Bits (LSB First) — 0x41 = 'A'</text>

  <!-- 비트 시간 표시 -->
  <line x1="100" y1="265" x2="160" y2="265" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="260" x2="100" y2="270" stroke="#666" stroke-width="1"/>
  <line x1="160" y1="260" x2="160" y2="270" stroke="#666" stroke-width="1"/>
  <text x="130" y="282" text-anchor="middle" font-size="10" fill="#666">1 bit = 8.68us</text>
  <text x="130" y="296" text-anchor="middle" font-size="10" fill="#666">(1/115200)</text>

  <!-- 전체 프레임 시간 -->
  <text x="400" y="312" text-anchor="middle" font-size="11" fill="#333" font-weight="600">1 프레임 = Start(1) + Data(8) + Stop(1) = 10 bits = 86.8us</text>
</svg>
