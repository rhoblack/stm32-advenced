<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 900 550">
  <defs>
    <marker id="arr17f" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- v2.0 뱃지 우상단 -->
  <rect x="808" y="12" width="72" height="30" rx="15" fill="#EA4335"/>
  <text x="844" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="white">v2.0</text>

  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">v2.0 최종 시스템 아키텍처 — HAL → Driver → Service → App</text>

  <!-- App Layer -->
  <rect x="30" y="45" width="840" height="90" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="65" y="67" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>
  <text x="430" y="62" text-anchor="middle" font-size="9" fill="#C62828">[ DIP 준수: Service 인터페이스만 의존 ]</text>
  <rect x="50" y="72" width="245" height="50" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="172" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">main_app.c</text>
  <text x="172" y="105" text-anchor="middle" font-size="9" fill="#C62828">시스템 루프 / 1초 갱신 / 초기화</text>
  <rect x="315" y="72" width="245" height="50" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="437" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">cli_app.c</text>
  <text x="437" y="105" text-anchor="middle" font-size="9" fill="#C62828">명령어 파서 / cmd_table</text>
  <rect x="580" y="72" width="265" height="50" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="712" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">protocol_app.c</text>
  <text x="712" y="105" text-anchor="middle" font-size="9" fill="#C62828">PC 프레임 / 직렬화 / 체크섬</text>

  <line x1="450" y1="135" x2="450" y2="163" stroke="#555" stroke-width="1.5" marker-end="url(#arr17f)"/>

  <!-- Service Layer -->
  <rect x="30" y="168" width="840" height="90" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="65" y="190" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="#E65100">[ ISP 준수: 필요한 인터페이스만 노출 ]</text>
  <rect x="50" y="196" width="185" height="50" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="142" y="215" text-anchor="middle" font-size="11" fill="#E65100">clock_service.c</text>
  <text x="142" y="229" text-anchor="middle" font-size="9" fill="#E65100">RTC→침 각도 변환</text>
  <rect x="250" y="196" width="185" height="50" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="342" y="215" text-anchor="middle" font-size="11" fill="#E65100">sensor_service.c</text>
  <text x="342" y="229" text-anchor="middle" font-size="9" fill="#E65100">SHT31 추상화 / 임계값</text>
  <rect x="450" y="196" width="185" height="50" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="542" y="215" text-anchor="middle" font-size="11" fill="#E65100">gfx_service.c</text>
  <text x="542" y="229" text-anchor="middle" font-size="9" fill="#E65100">폰트 렌더링 / 픽셀 추상화</text>
  <rect x="650" y="196" width="200" height="50" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="750" y="215" text-anchor="middle" font-size="11" fill="#E65100">ui_service.c</text>
  <text x="750" y="229" text-anchor="middle" font-size="9" fill="#E65100">화면 레이아웃 / DISPLAY HFSM</text>

  <line x1="450" y1="258" x2="450" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arr17f)"/>

  <!-- Driver Layer -->
  <rect x="30" y="290" width="840" height="90" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="65" y="312" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>
  <text x="450" y="307" text-anchor="middle" font-size="9" fill="#1B5E20">[ SRP 준수: 1 Driver = 1 주변장치 ]</text>
  <rect x="42" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="96" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">uart_driver.c</text>
  <text x="96" y="350" text-anchor="middle" font-size="8" fill="#555">TX/RX DMA/링버퍼</text>
  <rect x="160" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="214" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">tim_driver.c</text>
  <text x="214" y="350" text-anchor="middle" font-size="8" fill="#555">GP/Adv/PWM/IC/OC</text>
  <rect x="278" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="332" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">rtc_driver.c</text>
  <text x="332" y="350" text-anchor="middle" font-size="8" fill="#555">시각/날짜/AlarmA/B</text>
  <rect x="396" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="450" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">stepper_drv.c</text>
  <text x="450" y="350" text-anchor="middle" font-size="8" fill="#555">풀/하프 스텝/MOTOR FSM</text>
  <rect x="514" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="568" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">i2c_driver.c</text>
  <text x="568" y="350" text-anchor="middle" font-size="8" fill="#555">폴링/DMA/W-R 시퀀스</text>
  <rect x="632" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="686" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">sht31_driver.c</text>
  <text x="686" y="350" text-anchor="middle" font-size="8" fill="#555">측정 명령/CRC-8</text>
  <rect x="750" y="318" width="108" height="50" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="804" y="336" text-anchor="middle" font-size="10" fill="#1B5E20">spi_driver.c</text>
  <text x="804" y="350" text-anchor="middle" font-size="8" fill="#555">+ili9341_driver</text>

  <line x1="450" y1="380" x2="450" y2="408" stroke="#555" stroke-width="1.5" marker-end="url(#arr17f)"/>

  <!-- HAL Layer -->
  <rect x="30" y="413" width="840" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="65" y="435" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
  <text x="450" y="450" text-anchor="middle" font-size="12" fill="#0D47A1">HAL_GPIO / HAL_UART / HAL_TIM / HAL_RTC / HAL_I2C / HAL_SPI / HAL_DMA</text>

  <!-- 하단 설명 -->
  <text x="450" y="490" text-anchor="middle" font-size="11" fill="#555">STM32 스마트 시계 &amp; 환경 모니터링 시스템 — 소프트웨어 아키텍처 원칙 검증 완료</text>
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#888">SRP / DIP / ISP 준수 · 의존성 위반 0건 · 테이블 기반 FSM · HFSM 적용</text>
</svg>
