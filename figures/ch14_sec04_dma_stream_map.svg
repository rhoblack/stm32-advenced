<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" width="840" height="500" font-family="'Noto Sans KR', sans-serif">
  <rect width="840" height="500" fill="#FAFAFA" rx="8"/>
  <text x="420" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">STM32F411 DMA 스트림-채널 배치 및 프로젝트 v1.4 할당</text>

  <!-- ===== DMA1 ===== -->
  <text x="20" y="55" font-size="13" font-weight="bold" fill="#1A73E8">DMA1 컨트롤러</text>
  <rect x="20" y="60" width="390" height="320" rx="6" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2"/>

  <!-- DMA1 헤더 -->
  <rect x="20" y="60" width="390" height="28" rx="6" fill="#1A73E8"/>
  <text x="50" y="79" font-size="11" font-weight="bold" fill="white">스트림</text>
  <text x="130" y="79" font-size="11" font-weight="bold" fill="white">CH1</text>
  <text x="185" y="79" font-size="11" font-weight="bold" fill="white">CH4</text>
  <text x="255" y="79" font-size="11" font-weight="bold" fill="white">할당 용도 (v1.4)</text>

  <!-- Stream 0 -->
  <rect x="20" y="88" width="390" height="28" rx="0" fill="white" stroke="#BBDEFB"/>
  <text x="50" y="107" font-size="11" fill="#555">Stream 0</text>
  <rect x="110" y="91" width="55" height="22" rx="3" fill="#C8E6C9" stroke="#34A853"/>
  <text x="137" y="106" text-anchor="middle" font-size="10" fill="#1B5E20">I2C1_RX</text>
  <text x="255" y="107" font-size="10" fill="#34A853" font-weight="bold">★ I2C1 RX — Low Priority</text>

  <!-- Stream 1 -->
  <rect x="20" y="116" width="390" height="28" rx="0" fill="#F5F5F5" stroke="#BBDEFB"/>
  <text x="50" y="135" font-size="11" fill="#555">Stream 1</text>
  <text x="130" y="135" font-size="10" fill="#BDBDBD">-</text>
  <text x="185" y="135" font-size="10" fill="#BDBDBD">-</text>
  <text x="255" y="135" font-size="10" fill="#BDBDBD">미사용</text>

  <!-- Stream 2 -->
  <rect x="20" y="144" width="390" height="28" rx="0" fill="white" stroke="#BBDEFB"/>
  <text x="50" y="163" font-size="11" fill="#555">Stream 2</text>
  <text x="130" y="163" font-size="10" fill="#BDBDBD">SPI3_RX</text>
  <text x="185" y="163" font-size="10" fill="#BDBDBD">-</text>
  <text x="255" y="163" font-size="10" fill="#BDBDBD">미사용 (SPI3 없음)</text>

  <!-- Stream 3 -->
  <rect x="20" y="172" width="390" height="28" rx="0" fill="#F5F5F5" stroke="#BBDEFB"/>
  <text x="50" y="191" font-size="11" fill="#555">Stream 3</text>
  <text x="130" y="191" font-size="10" fill="#BDBDBD">SPI2_RX</text>
  <text x="185" y="191" font-size="10" fill="#BDBDBD">-</text>
  <text x="255" y="191" font-size="10" fill="#BDBDBD">미사용</text>

  <!-- Stream 5 -->
  <rect x="20" y="200" width="390" height="28" rx="0" fill="white" stroke="#BBDEFB"/>
  <text x="50" y="219" font-size="11" fill="#555">Stream 5</text>
  <rect x="110" y="203" width="55" height="22" rx="3" fill="#C8E6C9" stroke="#34A853"/>
  <text x="137" y="218" text-anchor="middle" font-size="10" fill="#1B5E20">I2C1_RX</text>
  <rect x="170" y="203" width="55" height="22" rx="3" fill="#FFE0B2" stroke="#FF9800"/>
  <text x="197" y="218" text-anchor="middle" font-size="10" fill="#E65100">UART2_RX</text>
  <text x="255" y="219" font-size="10" fill="#FF9800" font-weight="bold">★ UART2 RX — Medium Priority</text>

  <!-- Stream 6 (충돌 위험) -->
  <rect x="20" y="228" width="390" height="28" rx="0" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="2"/>
  <text x="50" y="247" font-size="11" fill="#555">Stream 6</text>
  <rect x="110" y="231" width="55" height="22" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="2"/>
  <text x="137" y="246" text-anchor="middle" font-size="10" fill="#B71C1C">I2C1_TX</text>
  <rect x="170" y="231" width="55" height="22" rx="3" fill="#FFE0B2" stroke="#FF9800"/>
  <text x="197" y="246" text-anchor="middle" font-size="10" fill="#E65100">UART2_TX</text>
  <text x="255" y="247" font-size="10" fill="#E53935" font-weight="bold">⚠ 충돌! — I2C1_TX 여기 배치 금지</text>

  <!-- Stream 7 (해결책) -->
  <rect x="20" y="256" width="390" height="28" rx="0" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="2"/>
  <text x="50" y="275" font-size="11" fill="#555">Stream 7</text>
  <rect x="110" y="259" width="55" height="22" rx="3" fill="#C8E6C9" stroke="#34A853" stroke-width="2"/>
  <text x="137" y="274" text-anchor="middle" font-size="10" fill="#1B5E20">I2C1_TX</text>
  <text x="185" y="275" font-size="10" fill="#BDBDBD">-</text>
  <text x="255" y="275" font-size="10" fill="#34A853" font-weight="bold">✓ I2C1 TX — Low Priority (재배치)</text>

  <!-- DMA1 Stream 4 (USART1 등 미사용) -->
  <rect x="20" y="284" width="390" height="28" rx="0" fill="#F5F5F5" stroke="#BBDEFB"/>
  <text x="50" y="303" font-size="11" fill="#555">Stream 4</text>
  <text x="130" y="303" font-size="10" fill="#BDBDBD">-</text>
  <rect x="170" y="287" width="55" height="22" rx="3" fill="#FFE0B2" stroke="#FF9800"/>
  <text x="197" y="302" text-anchor="middle" font-size="10" fill="#E65100">UART2_TX</text>
  <text x="255" y="303" font-size="10" fill="#FF9800">대안 (Stream 6 사용 권장)</text>

  <!-- DMA1 충돌 해설 박스 -->
  <rect x="20" y="318" width="390" height="60" rx="6" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
  <text x="215" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">충돌 시나리오</text>
  <text x="30" y="352" font-size="10" fill="#B71C1C">I2C1_TX(Stream6 Ch1) ↔ UART2_TX(Stream6 Ch4)</text>
  <text x="30" y="368" font-size="10" fill="#B71C1C">→ 동시 DMA 요청 시 하드웨어 충돌 → 데이터 손실/락업</text>

  <!-- ===== DMA2 ===== -->
  <text x="430" y="55" font-size="13" font-weight="bold" fill="#1565C0">DMA2 컨트롤러</text>
  <rect x="430" y="60" width="390" height="200" rx="6" fill="#E8EAF6" stroke="#1565C0" stroke-width="2"/>

  <!-- DMA2 헤더 -->
  <rect x="430" y="60" width="390" height="28" rx="6" fill="#1565C0"/>
  <text x="460" y="79" font-size="11" font-weight="bold" fill="white">스트림</text>
  <text x="540" y="79" font-size="11" font-weight="bold" fill="white">CH3</text>
  <text x="615" y="79" font-size="11" font-weight="bold" fill="white">할당 용도 (v1.4)</text>

  <!-- DMA2 Stream 0 -->
  <rect x="430" y="88" width="390" height="28" rx="0" fill="white" stroke="#C5CAE9"/>
  <text x="460" y="107" font-size="11" fill="#555">Stream 0</text>
  <rect x="520" y="91" width="60" height="22" rx="3" fill="#B3E5FC" stroke="#0288D1"/>
  <text x="550" y="106" text-anchor="middle" font-size="10" fill="#01579B">SPI1_RX</text>
  <text x="615" y="107" font-size="10" fill="#0288D1">SPI1 RX (미사용, CS 수동)</text>

  <!-- DMA2 Stream 2 -->
  <rect x="430" y="116" width="390" height="28" rx="0" fill="#F5F5F5" stroke="#C5CAE9"/>
  <text x="460" y="135" font-size="11" fill="#555">Stream 2</text>
  <rect x="520" y="119" width="60" height="22" rx="3" fill="#B3E5FC" stroke="#0288D1"/>
  <text x="550" y="134" text-anchor="middle" font-size="10" fill="#01579B">SPI1_RX</text>
  <text x="615" y="135" font-size="10" fill="#BDBDBD">대안 스트림</text>

  <!-- DMA2 Stream 3 (SPI1 TX — 핵심) -->
  <rect x="430" y="144" width="390" height="28" rx="0" fill="#E8EAF6" stroke="#7986CB" stroke-width="2"/>
  <text x="460" y="163" font-size="11" fill="#555">Stream 3</text>
  <rect x="520" y="147" width="60" height="22" rx="3" fill="#7986CB" stroke="#3F51B5" stroke-width="2"/>
  <text x="550" y="162" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SPI1_TX</text>
  <text x="615" y="163" font-size="10" fill="#3F51B5" font-weight="bold">★ SPI1(LCD) TX — Very High</text>

  <!-- DMA2 Stream 5 -->
  <rect x="430" y="172" width="390" height="28" rx="0" fill="white" stroke="#C5CAE9"/>
  <text x="460" y="191" font-size="11" fill="#555">Stream 5</text>
  <rect x="520" y="175" width="60" height="22" rx="3" fill="#B3E5FC" stroke="#0288D1"/>
  <text x="550" y="190" text-anchor="middle" font-size="10" fill="#01579B">SPI1_TX</text>
  <text x="615" y="191" font-size="10" fill="#BDBDBD">대안 스트림</text>

  <!-- DMA2 설명 박스 -->
  <rect x="430" y="208" width="390" height="50" rx="6" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <text x="625" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">DMA2는 DMA1과 완전 독립</text>
  <text x="440" y="244" font-size="10" fill="#1B5E20">SPI1(DMA2) + I2C1(DMA1) + UART2(DMA1) 동시 운용 가능</text>

  <!-- ===== v1.4 최종 할당 요약 ===== -->
  <rect x="20" y="390" width="800" height="100" rx="8" fill="#263238" stroke="#546E7A" stroke-width="2"/>
  <text x="420" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#80CBC4">v1.4 최종 DMA 스트림 할당 요약</text>

  <rect x="30" y="418" width="180" height="62" rx="4" fill="#1B5E2033" stroke="#34A853"/>
  <text x="120" y="434" text-anchor="middle" font-size="11" font-weight="bold" fill="#A5D6A7">I2C1 (SHT31)</text>
  <text x="120" y="450" text-anchor="middle" font-size="10" fill="#E0E0E0">TX: DMA1 S7 Ch1 — Low</text>
  <text x="120" y="464" text-anchor="middle" font-size="10" fill="#E0E0E0">RX: DMA1 S0 Ch1 — Low</text>

  <rect x="220" y="418" width="180" height="62" rx="4" fill="#FF980033" stroke="#FF9800"/>
  <text x="310" y="434" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFE0B2">UART2 (PC 로그)</text>
  <text x="310" y="450" text-anchor="middle" font-size="10" fill="#E0E0E0">TX: DMA1 S6 Ch4 — Medium</text>
  <text x="310" y="464" text-anchor="middle" font-size="10" fill="#E0E0E0">RX: DMA1 S5 Ch4 — Medium</text>

  <rect x="410" y="418" width="200" height="62" rx="4" fill="#1565C033" stroke="#1565C0"/>
  <text x="510" y="434" text-anchor="middle" font-size="11" font-weight="bold" fill="#90CAF9">SPI1 (ILI9341 LCD)</text>
  <text x="510" y="450" text-anchor="middle" font-size="10" fill="#E0E0E0">TX: DMA2 S3 Ch3 — Very High</text>
  <text x="510" y="464" text-anchor="middle" font-size="10" fill="#E0E0E0">RX: 미사용 (단방향 LCD)</text>

  <rect x="620" y="418" width="190" height="62" rx="4" fill="#E53935" fill-opacity="0.2" stroke="#E53935"/>
  <text x="715" y="434" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFCDD2">우선순위 정책</text>
  <text x="715" y="450" text-anchor="middle" font-size="10" fill="#E0E0E0">LCD &gt; UART &gt; I2C</text>
  <text x="715" y="464" text-anchor="middle" font-size="10" fill="#E0E0E0">화면 끊김 방지 최우선</text>
</svg>
