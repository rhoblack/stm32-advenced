<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">Ch19 — 전체 레이어드 아키텍처 최종 현황 (v2.2)</text>

  <!-- App Layer -->
  <rect x="40" y="50" width="620" height="60" rx="8" fill="#EA4335" fill-opacity="0.15" stroke="#EA4335" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="72" font-weight="bold" fill="#EA4335">App 레이어</text>
  <text x="60" y="94" font-size="12" fill="#333">cli_app.c · protocol_app.c · app_main.c</text>
  <rect x="480" y="58" width="160" height="44" rx="6" fill="#EA4335" fill-opacity="0.3" stroke="#EA4335" stroke-width="1.5"/>
  <text x="560" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">리팩토링 검증</text>
  <text x="560" y="94" text-anchor="middle" font-size="11" fill="#C62828">레이어 경계 준수 확인</text>

  <!-- Service Layer -->
  <rect x="40" y="130" width="620" height="60" rx="8" fill="#FBBC04" fill-opacity="0.15" stroke="#FBBC04" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="152" font-weight="bold" fill="#E37400">Service 레이어</text>
  <text x="60" y="174" font-size="12" fill="#333">clock_service.c · sensor_service.c · ui_service.c · gfx_service.c</text>

  <!-- Driver Layer -->
  <rect x="40" y="210" width="620" height="60" rx="8" fill="#34A853" fill-opacity="0.15" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="232" font-weight="bold" fill="#1B7A3A">Driver 레이어</text>
  <text x="60" y="254" font-size="12" fill="#333">uart_driver.c · tim_driver.c · rtc_driver.c · i2c_driver.c · spi_driver.c · stepper_driver.c · ili9341_driver.c</text>

  <!-- HAL Layer -->
  <rect x="40" y="290" width="620" height="60" rx="8" fill="#1A73E8" fill-opacity="0.15" stroke="#1A73E8" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="312" font-weight="bold" fill="#0D47A1">HAL 레이어</text>
  <text x="60" y="334" font-size="12" fill="#333">STM32 HAL Library · DMA Controller · NVIC</text>

  <!-- Hardware Layer -->
  <rect x="40" y="370" width="620" height="40" rx="8" fill="#607D8B" fill-opacity="0.15" stroke="#607D8B" stroke-width="2"/>
  <text x="350" y="395" text-anchor="middle" fill="#37474F" font-size="12">Hardware: NUCLEO-F411RE · UART · TIM · RTC · I2C · SPI · GPIO · DMA</text>

  <!-- Arrows -->
  <line x1="350" y1="110" x2="350" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="190" x2="350" y2="210" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="270" x2="350" y2="290" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="350" x2="350" y2="370" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Ch19 highlight annotation -->
  <rect x="380" y="136" width="90" height="28" rx="4" fill="#FBBC04" fill-opacity="0.5" stroke="#E37400" stroke-width="1.5"/>
  <text x="425" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#E37400">Ch19 대상</text>
</svg>
