<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Noto Sans KR', sans-serif">
  <rect width="860" height="560" fill="#F8F9FA" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A1A2E">테이블 기반 FSM (Table-Driven FSM) 구조</text>
  <text x="430" y="56" text-anchor="middle" font-size="12" fill="#666">DISPLAY FSM 리팩토링 예시</text>

  <!-- ===== 왼쪽: switch-case 방식 ===== -->
  <rect x="30" y="75" width="380" height="360" fill="white" stroke="#AAAAAA" stroke-width="1.5" rx="8"/>
  <rect x="30" y="75" width="380" height="30" fill="#CFD8DC" rx="8"/>
  <text x="220" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#37474F">switch-case FSM (기존 방식)</text>

  <text x="50" y="128" font-size="10" fill="#455A64" font-family="monospace">void display_fsm_run(EVENT e) {</text>
  <text x="50" y="146" font-size="10" fill="#455A64" font-family="monospace">  switch (g_state) {</text>
  <text x="50" y="164" font-size="10" fill="#455A64" font-family="monospace">    case TIME_VIEW:</text>
  <text x="50" y="182" font-size="10" fill="#455A64" font-family="monospace">      switch (e) {</text>
  <text x="50" y="200" font-size="10" fill="#1A73E8" font-family="monospace">        case BTN_SHORT:</text>
  <text x="50" y="218" font-size="10" fill="#455A64" font-family="monospace">          show_sensor_view();</text>
  <text x="50" y="236" font-size="10" fill="#455A64" font-family="monospace">          g_state = SENSOR_VIEW;</text>
  <text x="50" y="254" font-size="10" fill="#455A64" font-family="monospace">          break;</text>
  <text x="50" y="272" font-size="10" fill="#1A73E8" font-family="monospace">        case BTN_LONG:</text>
  <text x="50" y="290" font-size="10" fill="#455A64" font-family="monospace">          show_stopwatch_view();</text>
  <text x="50" y="308" font-size="10" fill="#455A64" font-family="monospace">          g_state = STOPWATCH_VIEW;</text>
  <text x="50" y="326" font-size="10" fill="#455A64" font-family="monospace">          break;</text>
  <text x="50" y="344" font-size="10" fill="#455A64" font-family="monospace">      }  /* 이하 반복 ... */</text>
  <text x="50" y="362" font-size="10" fill="#455A64" font-family="monospace">    case SENSOR_VIEW: ...</text>
  <text x="50" y="380" font-size="10" fill="#455A64" font-family="monospace">    case STOPWATCH_VIEW: ...</text>
  <text x="50" y="398" font-size="10" fill="#455A64" font-family="monospace">  }</text>
  <text x="50" y="416" font-size="10" fill="#455A64" font-family="monospace">}</text>

  <!-- 단점 표시 -->
  <rect x="40" y="425" width="360" height="18" fill="#FFEBEE" rx="3"/>
  <text x="220" y="438" text-anchor="middle" font-size="10" fill="#B71C1C">상태 추가 시 switch-case 전체 수정 필요 — 폐쇄 원칙 위반</text>

  <!-- ===== 오른쪽: 테이블 기반 방식 ===== -->
  <rect x="450" y="75" width="380" height="430" fill="white" stroke="#1A73E8" stroke-width="2" rx="8"/>
  <rect x="450" y="75" width="380" height="30" fill="#E8F0FE" rx="8"/>
  <text x="640" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A73E8">테이블 기반 FSM (v2.0)</text>

  <!-- 구조체 정의 -->
  <rect x="465" y="115" width="350" height="100" fill="#F5F5F5" rx="4"/>
  <text x="640" y="130" text-anchor="middle" font-size="10" fill="#666">전이 테이블 구조체</text>
  <text x="475" y="147" font-size="9.5" fill="#455A64" font-family="monospace">typedef struct {</text>
  <text x="475" y="163" font-size="9.5" fill="#455A64" font-family="monospace">  display_state_t  current;</text>
  <text x="475" y="179" font-size="9.5" fill="#455A64" font-family="monospace">  display_event_t  event;</text>
  <text x="475" y="195" font-size="9.5" fill="#455A64" font-family="monospace">  bool (*guard)(void);  /* 조건 (NULL = 무조건) */</text>
  <text x="475" y="210" font-size="9.5" fill="#1A73E8" font-family="monospace">  void (*action)(void); /* 액션 함수 포인터 */</text>
  <text x="475" y="226" font-size="9.5" fill="#455A64" font-family="monospace">  display_state_t  next;</text>

  <!-- 전이 테이블 -->
  <text x="640" y="258" text-anchor="middle" font-size="10" fill="#666">전이 테이블 (배열)</text>
  <rect x="465" y="265" width="350" height="130" fill="#F5F5F5" rx="4"/>

  <!-- 헤더 -->
  <rect x="465" y="265" width="350" height="18" fill="#1A73E8" rx="4"/>
  <text x="510" y="278" font-size="9" fill="white">현재 상태</text>
  <text x="580" y="278" font-size="9" fill="white">이벤트</text>
  <text x="640" y="278" font-size="9" fill="white">조건</text>
  <text x="690" y="278" font-size="9" fill="white">액션</text>
  <text x="770" y="278" font-size="9" fill="white">다음 상태</text>

  <!-- 행 1 -->
  <line x1="465" y1="283" x2="815" y2="283" stroke="#E0E0E0"/>
  <text x="510" y="296" font-size="9" fill="#455A64">TIME_VIEW</text>
  <text x="580" y="296" font-size="9" fill="#455A64">BTN_SHORT</text>
  <text x="640" y="296" font-size="9" fill="#666">NULL</text>
  <text x="690" y="296" font-size="9" fill="#1A73E8">show_sensor</text>
  <text x="770" y="296" font-size="9" fill="#455A64">SENSOR_VIEW</text>

  <!-- 행 2 -->
  <line x1="465" y1="301" x2="815" y2="301" stroke="#E0E0E0"/>
  <text x="510" y="314" font-size="9" fill="#455A64">TIME_VIEW</text>
  <text x="580" y="314" font-size="9" fill="#455A64">BTN_LONG</text>
  <text x="640" y="314" font-size="9" fill="#666">NULL</text>
  <text x="690" y="314" font-size="9" fill="#1A73E8">show_stopwatch</text>
  <text x="770" y="314" font-size="9" fill="#455A64">STOPWATCH_VIEW</text>

  <!-- 행 3 -->
  <line x1="465" y1="319" x2="815" y2="319" stroke="#E0E0E0"/>
  <text x="510" y="332" font-size="9" fill="#455A64">SENSOR_VIEW</text>
  <text x="580" y="332" font-size="9" fill="#455A64">BTN_SHORT</text>
  <text x="640" y="332" font-size="9" fill="#666">NULL</text>
  <text x="690" y="332" font-size="9" fill="#1A73E8">show_time</text>
  <text x="770" y="332" font-size="9" fill="#455A64">TIME_VIEW</text>

  <!-- 행 4 -->
  <line x1="465" y1="337" x2="815" y2="337" stroke="#E0E0E0"/>
  <text x="510" y="350" font-size="9" fill="#455A64">STOPWATCH_VIEW</text>
  <text x="580" y="350" font-size="9" fill="#455A64">ALARM_TRIGGER</text>
  <text x="640" y="350" font-size="9" fill="#34A853">is_alarm_on</text>
  <text x="690" y="350" font-size="9" fill="#1A73E8">show_alarm</text>
  <text x="770" y="350" font-size="9" fill="#455A64">ALARM_VIEW*</text>

  <text x="640" y="378" text-anchor="middle" font-size="9" fill="#1A73E8">* 새 상태 추가 = 테이블에 행 추가만!</text>

  <!-- 엔진 함수 -->
  <rect x="465" y="390" width="350" height="70" fill="#E8F0FE" rx="4"/>
  <text x="640" y="406" text-anchor="middle" font-size="10" fill="#1A73E8">fsm_run() 엔진 (1개로 모든 FSM 처리)</text>
  <text x="475" y="423" font-size="9.5" fill="#455A64" font-family="monospace">for (각 행) {</text>
  <text x="475" y="440" font-size="9.5" fill="#455A64" font-family="monospace">  if (행.현재==g_state &amp;&amp; 행.이벤트==e)</text>
  <text x="475" y="456" font-size="9.5" fill="#455A64" font-family="monospace">    if (!guard || guard()) { action(); next; }</text>

  <!-- 장점 표시 -->
  <rect x="465" y="468" width="350" height="30" fill="#E8F5E9" rx="3"/>
  <text x="640" y="481" text-anchor="middle" font-size="10" fill="#2E7D32">새 상태/이벤트 추가 = 테이블 행 추가만 — 개방 폐쇄 원칙(OCP) 준수</text>
  <text x="640" y="496" text-anchor="middle" font-size="10" fill="#2E7D32">엔진 코드 변경 없음 — 재사용 가능</text>

  <!-- 제목 설명 -->
  <text x="430" y="528" text-anchor="middle" font-size="11" fill="#888">테이블 기반 FSM은 "상태 전이 규칙"과 "처리 로직"을 분리하여 유지보수성을 높입니다.</text>
</svg>
