<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">프로젝트 아키텍처 v0.4 — uart_driver 추가</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#888">초록 강조 = 이번 챕터에서 추가 | 색상 블록 = 구현됨 | 회색 = 향후 예정</text>

  <!-- App 레이어 -->
  <rect x="30" y="65" width="740" height="85" rx="8" fill="#EA4335" opacity="0.08" stroke="#EA4335" stroke-width="2"/>
  <text x="50" y="85" font-size="14" font-weight="700" fill="#EA4335">App</text>

  <rect x="50" y="95" width="100" height="40" rx="6" fill="#EA4335" opacity="0.85"/>
  <text x="100" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="600">main()</text>
  <text x="100" y="126" text-anchor="middle" font-size="9" fill="white">v0.1</text>

  <rect x="170" y="95" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="220" y="112" text-anchor="middle" font-size="11" fill="#999">cli_app</text>
  <text x="220" y="126" text-anchor="middle" font-size="9" fill="#BBB">Ch15</text>

  <rect x="290" y="95" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="340" y="112" text-anchor="middle" font-size="11" fill="#999">protocol_app</text>
  <text x="340" y="126" text-anchor="middle" font-size="9" fill="#BBB">Ch16</text>

  <!-- Service 레이어 -->
  <rect x="30" y="165" width="740" height="85" rx="8" fill="#FBBC04" opacity="0.08" stroke="#FBBC04" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="185" font-size="14" font-weight="700" fill="#F57F17">Service</text>

  <rect x="50" y="195" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="100" y="212" text-anchor="middle" font-size="11" fill="#999">clock_service</text>
  <text x="100" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch10</text>

  <rect x="170" y="195" width="110" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="225" y="212" text-anchor="middle" font-size="11" fill="#999">sensor_service</text>
  <text x="225" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <rect x="300" y="195" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="350" y="212" text-anchor="middle" font-size="11" fill="#999">gfx_service</text>
  <text x="350" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch13</text>

  <rect x="420" y="195" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="470" y="212" text-anchor="middle" font-size="11" fill="#999">ui_service</text>
  <text x="470" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch13</text>

  <!-- Driver 레이어 -->
  <rect x="30" y="265" width="740" height="100" rx="8" fill="#34A853" opacity="0.08" stroke="#34A853" stroke-width="2"/>
  <text x="50" y="285" font-size="14" font-weight="700" fill="#34A853">Driver</text>

  <!-- 현재 Driver: logger -->
  <rect x="50" y="295" width="90" height="55" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="95" y="317" text-anchor="middle" font-size="11" fill="white" font-weight="600">logger</text>
  <text x="95" y="335" text-anchor="middle" font-size="9" fill="white">v0.2</text>

  <!-- ★ 신규 Driver: uart_driver (강조) -->
  <rect x="155" y="295" width="90" height="55" rx="6" fill="#34A853" opacity="0.85" stroke="#FFD600" stroke-width="3"/>
  <text x="200" y="317" text-anchor="middle" font-size="11" fill="white" font-weight="700">uart_driver</text>
  <text x="200" y="335" text-anchor="middle" font-size="9" fill="white">v0.4 NEW</text>

  <!-- 미래 Driver -->
  <rect x="260" y="295" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="305" y="317" text-anchor="middle" font-size="11" fill="#999">tim_driver</text>
  <text x="305" y="335" text-anchor="middle" font-size="9" fill="#BBB">Ch07</text>

  <rect x="365" y="295" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="410" y="317" text-anchor="middle" font-size="11" fill="#999">rtc_driver</text>
  <text x="410" y="335" text-anchor="middle" font-size="9" fill="#BBB">Ch09</text>

  <rect x="470" y="295" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="520" y="312" text-anchor="middle" font-size="11" fill="#999">stepper</text>
  <text x="520" y="326" text-anchor="middle" font-size="11" fill="#999">_driver</text>
  <text x="520" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch10</text>

  <rect x="585" y="295" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="630" y="317" text-anchor="middle" font-size="11" fill="#999">sht31_driver</text>
  <text x="630" y="335" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <rect x="690" y="295" width="70" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="725" y="317" text-anchor="middle" font-size="10" fill="#999">ili9341</text>
  <text x="725" y="335" text-anchor="middle" font-size="9" fill="#BBB">Ch12</text>

  <!-- HAL 레이어 -->
  <rect x="30" y="380" width="740" height="70" rx="8" fill="#1A73E8" opacity="0.08" stroke="#1A73E8" stroke-width="2"/>
  <text x="50" y="400" font-size="14" font-weight="700" fill="#1A73E8">HAL</text>

  <rect x="50" y="410" width="710" height="30" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="405" y="430" text-anchor="middle" font-size="12" fill="white" font-weight="600">ST HAL 라이브러리 — HAL_GPIO / HAL_UART / HAL_TIM / HAL_SPI / HAL_I2C / HAL_RTC / HAL_DMA</text>

  <!-- 횡단 관심사 -->
  <rect x="30" y="465" width="740" height="40" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="490" text-anchor="middle" font-size="12" fill="#7B1FA2" font-weight="600">횡단 관심사 (Cross-cutting): LOG_E/W/I/D 매크로 — 모든 계층에서 사용 (v0.2~)</text>

  <!-- 의존 화살표: main() → uart_driver -->
  <defs>
    <marker id="depArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
  </defs>
  <line x1="100" y1="135" x2="200" y2="295" stroke="#34A853" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#depArrow)"/>
  <text x="120" y="220" font-size="10" fill="#34A853" font-weight="600">uart_send()</text>
</svg>
