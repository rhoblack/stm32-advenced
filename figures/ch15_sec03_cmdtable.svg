<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', Arial, sans-serif">
  <rect width="720" height="360" fill="#F8F9FA" rx="8"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">커맨드 테이블 패턴 구조</text>

  <!-- cmd_table[] 배열 -->
  <text x="30" y="55" font-size="13" font-weight="bold" fill="#333">cmd_table[] 배열 (cmd_table.c)</text>

  <!-- 테이블 헤더 -->
  <rect x="30" y="62" width="680" height="28" fill="#EA4335" rx="4"/>
  <text x="100" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">name</text>
  <text x="260" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">usage</text>
  <text x="450" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">description</text>
  <text x="640" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="white">handler (함수포인터)</text>
  <line x1="155" y1="62" x2="155" y2="330" stroke="white" stroke-width="1"/>
  <line x1="360" y1="62" x2="360" y2="330" stroke="white" stroke-width="1"/>
  <line x1="555" y1="62" x2="555" y2="330" stroke="white" stroke-width="1"/>

  <!-- 행 1: time -->
  <rect x="30" y="90" width="680" height="36" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="112" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"time"</text>
  <text x="165" y="112" font-size="11" font-family="monospace" fill="#555">"time set HH:MM:SS"</text>
  <text x="365" y="112" font-size="11" fill="#555">시간 설정/조회</text>
  <text x="560" y="112" font-size="11" font-family="monospace" fill="#1A73E8">cmd_time_handler</text>
  <line x1="155" y1="90" x2="155" y2="126" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="90" x2="360" y2="126" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="90" x2="555" y2="126" stroke="#DDD" stroke-width="1"/>

  <!-- 행 2: alarm -->
  <rect x="30" y="126" width="680" height="36" fill="#F8F9FA" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="148" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"alarm"</text>
  <text x="165" y="148" font-size="11" font-family="monospace" fill="#555">"alarm set HH:MM"</text>
  <text x="365" y="148" font-size="11" fill="#555">알람 설정</text>
  <text x="560" y="148" font-size="11" font-family="monospace" fill="#1A73E8">cmd_alarm_handler</text>
  <line x1="155" y1="126" x2="155" y2="162" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="126" x2="360" y2="162" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="126" x2="555" y2="162" stroke="#DDD" stroke-width="1"/>

  <!-- 행 3: motor -->
  <rect x="30" y="162" width="680" height="36" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="184" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"motor"</text>
  <text x="165" y="184" font-size="11" font-family="monospace" fill="#555">"motor pos N"</text>
  <text x="365" y="184" font-size="11" fill="#555">스텝모터 위치 이동</text>
  <text x="560" y="184" font-size="11" font-family="monospace" fill="#1A73E8">cmd_motor_handler</text>
  <line x1="155" y1="162" x2="155" y2="198" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="162" x2="360" y2="198" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="162" x2="555" y2="198" stroke="#DDD" stroke-width="1"/>

  <!-- 행 4: sensor -->
  <rect x="30" y="198" width="680" height="36" fill="#F8F9FA" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="220" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"sensor"</text>
  <text x="165" y="220" font-size="11" font-family="monospace" fill="#555">"sensor read"</text>
  <text x="365" y="220" font-size="11" fill="#555">온습도 즉시 읽기</text>
  <text x="560" y="220" font-size="11" font-family="monospace" fill="#1A73E8">cmd_sensor_handler</text>
  <line x1="155" y1="198" x2="155" y2="234" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="198" x2="360" y2="234" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="198" x2="555" y2="234" stroke="#DDD" stroke-width="1"/>

  <!-- 행 5: lcd -->
  <rect x="30" y="234" width="680" height="36" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="256" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"lcd"</text>
  <text x="165" y="256" font-size="11" font-family="monospace" fill="#555">"lcd clear"</text>
  <text x="365" y="256" font-size="11" fill="#555">LCD 화면 지우기</text>
  <text x="560" y="256" font-size="11" font-family="monospace" fill="#1A73E8">cmd_lcd_handler</text>
  <line x1="155" y1="234" x2="155" y2="270" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="234" x2="360" y2="270" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="234" x2="555" y2="270" stroke="#DDD" stroke-width="1"/>

  <!-- 행 6: help -->
  <rect x="30" y="270" width="680" height="36" fill="#F8F9FA" stroke="#DDD" stroke-width="1"/>
  <text x="92" y="292" font-size="12" font-family="monospace" fill="#EA4335" font-weight="bold">"help"</text>
  <text x="165" y="292" font-size="11" font-family="monospace" fill="#555">"help"</text>
  <text x="365" y="292" font-size="11" fill="#555">도움말 출력</text>
  <text x="560" y="292" font-size="11" font-family="monospace" fill="#1A73E8">cmd_help_handler</text>
  <line x1="155" y1="270" x2="155" y2="306" stroke="#DDD" stroke-width="1"/>
  <line x1="360" y1="270" x2="360" y2="306" stroke="#DDD" stroke-width="1"/>
  <line x1="555" y1="270" x2="555" y2="306" stroke="#DDD" stroke-width="1"/>

  <!-- NULL 종료 -->
  <rect x="30" y="306" width="680" height="28" fill="#E8E8E8" stroke="#DDD" stroke-width="1" rx="0 0 4 4"/>
  <text x="360" y="324" text-anchor="middle" font-size="12" font-family="monospace" fill="#888">{ NULL, NULL, NULL, NULL }  ← 테이블 종료 마커</text>

  <!-- 장점 설명 -->
  <text x="30" y="352" font-size="11" fill="#34A853" font-weight="bold">장점: 새 명령어 추가 = 테이블에 행 1개 추가 (다른 코드 수정 불필요)</text>
</svg>
