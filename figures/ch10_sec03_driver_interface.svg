<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <style>
      .hal-bg     { fill: #E8F0FF; stroke: #1A73E8; stroke-width: 2; }
      .driver-bg  { fill: #E8F5E9; stroke: #34A853; stroke-width: 2; }
      .app-bg     { fill: #FFEBEE; stroke: #EA4335; stroke-width: 2; }
      .text-title  { font-size: 15px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
      .text-normal { font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
      .text-small  { font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }
      .code-box   { fill: #1E1E2E; stroke: #666; stroke-width: 1; }
      .code-text  { font-size: 11px; font-family: monospace; fill: #CDD6F4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="450" y="28" class="text-title" text-anchor="middle" fill="#1A1A2E">
    Driver 레이어의 추상화: 복잡성 감춤, 깔끔한 인터페이스 제공
  </text>
  <text x="450" y="46" class="text-small" text-anchor="middle" fill="#666">
    의존성 방향: App → Driver → HAL (상위 레이어가 하위 레이어를 사용)
  </text>

  <!-- ===== Application Layer (상단) ===== -->
  <rect x="50" y="60" width="800" height="100" class="app-bg" rx="8"/>
  <text x="70" y="85" class="text-title" fill="#EA4335">Application Layer</text>
  <text x="80" y="105" class="text-normal">main() / clock_service.c</text>

  <rect x="80" y="115" width="740" height="32" class="code-box" rx="3"/>
  <text x="85" y="127" class="code-text">/* App은 이것만 알면 됨 — HAL 세부사항 불필요 */</text>
  <text x="85" y="142" class="code-text">stepper_move_steps(delta_steps, 50);   // 64 스텝 이동, 50ms 딜레이</text>

  <!-- 화살표: App → Driver (의존성) -->
  <line x1="200" y1="160" x2="200" y2="193" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="160" x2="450" y2="193" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="160" x2="700" y2="193" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="480" y="182" class="text-small" fill="#555">의존 (사용)</text>

  <!-- ===== Driver Layer (중단) ===== -->
  <rect x="50" y="195" width="800" height="120" class="driver-bg" rx="8"/>
  <text x="70" y="218" class="text-title" fill="#34A853">Driver Layer — stepper_driver.c</text>

  <rect x="80" y="228" width="740" height="72" class="code-box" rx="3"/>
  <text x="85" y="241" class="code-text">/* 공개 API — 상위 레이어에 노출하는 인터페이스 */</text>
  <text x="85" y="254" class="code-text">void     stepper_init(void);</text>
  <text x="85" y="267" class="code-text">void     stepper_move_steps(int16_t steps, uint16_t delay_ms);</text>
  <text x="85" y="280" class="code-text">uint16_t stepper_get_position(void);   /* 현재 위치 (0~4095) */</text>
  <text x="85" y="293" class="code-text">/* 내부에서 HAL_GPIO_WritePin(), HAL_Delay() 등을 사용 → 외부에 숨김 */</text>

  <!-- 화살표: Driver → HAL (의존성) -->
  <line x1="200" y1="315" x2="200" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="315" x2="450" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="315" x2="700" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="480" y="337" class="text-small" fill="#555">의존 (사용)</text>

  <!-- ===== HAL Layer (하단) ===== -->
  <rect x="50" y="350" width="800" height="100" class="hal-bg" rx="8"/>
  <text x="70" y="374" class="text-title" fill="#1A73E8">HAL (Hardware Abstraction Layer)</text>
  <text x="80" y="394" class="text-normal">GPIO, TIM, RTC — STM32F4xx HAL 라이브러리</text>

  <rect x="80" y="405" width="740" height="32" class="code-box" rx="3"/>
  <text x="85" y="418" class="code-text">HAL_GPIO_WritePin(GPIOB, GPIO_PIN_0, GPIO_PIN_SET);   /* PB0 HIGH */</text>
  <text x="85" y="430" class="code-text">HAL_Delay(delay_ms);                                  /* 스텝 간 딜레이 */</text>

  <!-- 추상화 이점 설명 박스 -->
  <rect x="50" y="465" width="800" height="45" fill="#FFF9C4" stroke="#F9A825" stroke-width="1" rx="5"/>
  <text x="450" y="482" class="text-normal" text-anchor="middle" font-weight="bold" fill="#F57F17">
    💡 추상화의 이점: HAL의 8핀 GPIO 시퀀스 전체가 stepper_driver 내부에 캡슐화됨
  </text>
  <text x="450" y="498" class="text-small" text-anchor="middle" fill="#666">
    ❌ HAL 직접 사용: 8핀 제어 + 시퀀스 로직 + 딜레이 타이밍 모두 App에 노출   ✅ Driver 사용: stepper_move_steps(steps, delay_ms) 한 줄
  </text>
</svg>
