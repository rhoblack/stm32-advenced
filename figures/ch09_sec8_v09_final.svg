<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 820 540">
  <defs>
    <marker id="arr9h" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">v0.9 최종 아키텍처 — Stopwatch + RTC Alarm 통합</text>

  <!-- App Layer -->
  <rect x="30" y="50" width="760" height="75" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="60" y="72" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>

  <rect x="50" y="82" width="130" height="32" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="115" y="103" text-anchor="middle" font-size="10" fill="#C62828">main.c (슈퍼루프)</text>

  <rect x="195" y="82" width="140" height="32" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="265" y="103" text-anchor="middle" font-size="10" fill="#C62828">Button EXTI (PC13)</text>

  <rect x="350" y="82" width="100" height="32" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="400" y="103" text-anchor="middle" font-size="10" fill="#C62828">CLI (Ch06)</text>

  <rect x="465" y="82" width="90" height="32" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="510" y="103" text-anchor="middle" font-size="10" fill="#C62828">Log (Ch02)</text>

  <!-- App → Service 화살표 -->
  <line x1="265" y1="125" x2="265" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr9h)"/>
  <line x1="400" y1="125" x2="500" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr9h)"/>

  <!-- Service Layer -->
  <rect x="30" y="160" width="760" height="85" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="60" y="182" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>

  <rect x="50" y="192" width="190" height="42" rx="5" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="145" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">stopwatch_service (Ch08)</text>
  <text x="145" y="227" text-anchor="middle" font-size="9" fill="#E65100">FSM: IDLE/RUNNING/PAUSED</text>

  <rect x="260" y="192" width="210" height="42" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>
  <text x="365" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">alarm_service (Ch09) ★</text>
  <text x="365" y="227" text-anchor="middle" font-size="9" fill="#E65100">FSM: IDLE/ARMED/TRIGGERED/ACK</text>

