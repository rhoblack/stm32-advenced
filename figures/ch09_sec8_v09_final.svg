  <rect x="140" y="412" width="70" height="20" rx="4" fill="#BBDEFB"/>
  <text x="175" y="426" text-anchor="middle" font-size="9" fill="#0D47A1">HAL_DMA</text>

  <rect x="220" y="412" width="70" height="20" rx="4" fill="#BBDEFB"/>
  <text x="255" y="426" text-anchor="middle" font-size="9" fill="#0D47A1">HAL_TIM</text>

  <rect x="300" y="412" width="80" height="20" rx="4" fill="#BBDEFB"/>
  <text x="340" y="426" text-anchor="middle" font-size="9" fill="#0D47A1">HAL_TIMEx</text>

  <rect x="390" y="412" width="90" height="20" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="435" y="426" text-anchor="middle" font-size="9" font-weight="bold" fill="#0D47A1">HAL_RTC ★</text>

  <rect x="490" y="412" width="100" height="20" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="540" y="426" text-anchor="middle" font-size="9" font-weight="bold" fill="#0D47A1">HAL_RTCEx ★</text>

  <rect x="600" y="412" width="70" height="20" rx="4" fill="#BBDEFB"/>
  <text x="635" y="426" text-anchor="middle" font-size="9" fill="#0D47A1">HAL_GPIO</text>

  <rect x="680" y="412" width="70" height="20" rx="4" fill="#BBDEFB"/>
  <text x="715" y="426" text-anchor="middle" font-size="9" fill="#0D47A1">HAL_PWR</text>

  <!-- 범례 -->
  <rect x="50" y="460" width="15" height="12" fill="#EA4335" opacity="0.3"/>
  <text x="70" y="471" font-size="10" fill="#555">App</text>
  <rect x="120" y="460" width="15" height="12" fill="#FBBC04" opacity="0.3"/>
  <text x="140" y="471" font-size="10" fill="#555">Service</text>
  <rect x="190" y="460" width="15" height="12" fill="#34A853" opacity="0.3"/>
  <text x="210" y="471" font-size="10" fill="#555">Driver</text>
  <rect x="260" y="460" width="15" height="12" fill="#1A73E8" opacity="0.3"/>
  <text x="280" y="471" font-size="10" fill="#555">HAL</text>
  <rect x="330" y="460" width="15" height="12" fill="none" stroke="#999" stroke-dasharray="3,2"/>
  <text x="350" y="471" font-size="10" fill="#555">미래 (예정)</text>

  <!-- 버전 + 마일스톤 예고 -->
  <rect x="180" y="490" width="460" height="45" rx="8" fill="#1A1A2E"/>
  <text x="410" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="white">v0.9 — RTC 시각 + Alarm FSM 완성</text>
  <text x="410" y="528" text-anchor="middle" font-size="11" fill="#90CAF9">다음: Ch10 스텝 모터 + clock_service → v1.0 마일스톤 ①</text>
</svg>
