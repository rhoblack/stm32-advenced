  <text x="225" y="327" text-anchor="middle" font-size="8" fill="#555">Ch05</text>

  <rect x="290" y="292" width="140" height="42" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="360" y="310" text-anchor="middle" font-size="10" fill="#1B5E20">tim_driver (확장)</text>
  <text x="360" y="327" text-anchor="middle" font-size="8" fill="#555">Ch07~08 (+CPWM, IC)</text>

  <rect x="445" y="292" width="180" height="42" rx="5" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2.5"/>
  <text x="535" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">rtc_driver (Ch09) ★</text>
  <text x="535" y="327" text-anchor="middle" font-size="9" fill="#1B5E20">시간/알람/Wake-up/백업</text>

  <rect x="640" y="292" width="70" height="42" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="675" y="313" text-anchor="middle" font-size="10" fill="#1B5E20">log</text>

