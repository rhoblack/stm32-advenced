  <rect x="490" y="192" width="130" height="42" rx="5" fill="none" stroke="#FBBC04" stroke-dasharray="5,3"/>
  <text x="555" y="210" text-anchor="middle" font-size="10" fill="#999">Ch10: clock_service</text>
