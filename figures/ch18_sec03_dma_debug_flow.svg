<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <rect width="780" height="520" fill="#F8F9FA" rx="8"/>
  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A1A">DMA 에러 진단 플로우차트</text>

  <!-- START -->
  <ellipse cx="390" cy="65" rx="80" ry="24" fill="#555" stroke="#333" stroke-width="1.5"/>
  <text x="390" y="70" text-anchor="middle" fill="white" font-weight="bold">DMA 문제 감지</text>

  <line x1="390" y1="89" x2="390" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 다이아몬드: 에러 인터럽트 발생? -->
  <polygon points="390,111 490,145 390,179 290,145" fill="#FBBC04" stroke="#E37400" stroke-width="1.5"/>
  <text x="390" y="140" text-anchor="middle" fill="#1A1A1A" font-weight="bold">DMA Error</text>
  <text x="390" y="158" text-anchor="middle" fill="#1A1A1A">인터럽트 발생?</text>

  <!-- YES → 왼쪽: LISR 확인 -->
  <line x1="290" y1="145" x2="155" y2="145" stroke="#EA4335" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="138" font-size="11" fill="#EA4335" font-weight="bold">YES</text>
  <rect x="60" y="122" width="190" height="46" rx="6" fill="#EA4335" stroke="#C62828" stroke-width="1.5"/>
  <text x="155" y="145" text-anchor="middle" fill="white" font-weight="bold">LISR/HISR 레지스터 확인</text>
  <text x="155" y="162" text-anchor="middle" fill="white" font-size="11">TEIF / DMEIF 비트 확인</text>

  <!-- NO → 오른쪽: 전송 완료 타임아웃? -->
  <line x1="490" y1="145" x2="625" y2="145" stroke="#34A853" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="550" y="138" font-size="11" fill="#34A853" font-weight="bold">NO</text>
  <rect x="530" y="122" width="200" height="46" rx="6" fill="#34A853" stroke="#256429" stroke-width="1.5"/>
  <text x="630" y="145" text-anchor="middle" fill="white" font-weight="bold">전송 완료 타임아웃?</text>
  <text x="630" y="162" text-anchor="middle" fill="white" font-size="11">HAL_DMA_PollForTransfer()</text>

  <!-- LISR → DMA 설정 확인 -->
  <line x1="155" y1="168" x2="155" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="60" y="211" width="190" height="46" rx="6" fill="#1A73E8" stroke="#1558B0" stroke-width="1.5"/>
  <text x="155" y="234" text-anchor="middle" fill="white" font-weight="bold">DMA_SxCR 레지스터</text>
  <text x="155" y="250" text-anchor="middle" fill="white" font-size="11">EN 비트 / 방향 / 크기 확인</text>

  <!-- 타임아웃 → SxNDTR 확인 -->
  <line x1="630" y1="168" x2="630" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="530" y="211" width="200" height="46" rx="6" fill="#1A73E8" stroke="#1558B0" stroke-width="1.5"/>
  <text x="630" y="234" text-anchor="middle" fill="white" font-weight="bold">DMA_SxNDTR 확인</text>
  <text x="630" y="250" text-anchor="middle" fill="white" font-size="11">남은 전송 카운트 (0이면 완료)</text>

  <!-- 두 경로 합류 → 소스/타깃 주소 검증 -->
  <line x1="155" y1="257" x2="155" y2="300" stroke="#555" stroke-width="1.5"/>
  <line x1="630" y1="257" x2="630" y2="300" stroke="#555" stroke-width="1.5"/>
  <line x1="155" y1="300" x2="390" y2="300" stroke="#555" stroke-width="1.5"/>
  <line x1="630" y1="300" x2="390" y2="300" stroke="#555" stroke-width="1.5"/>
  <line x1="390" y1="300" x2="390" y2="318" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="245" y="319" width="290" height="46" rx="6" fill="#FBBC04" stroke="#E37400" stroke-width="1.5"/>
  <text x="390" y="342" text-anchor="middle" fill="#1A1A1A" font-weight="bold">소스/타깃 주소 유효성 검증</text>
  <text x="390" y="358" text-anchor="middle" fill="#1A1A1A" font-size="11">DMA_SxM0AR / DMA_SxPAR 확인</text>

  <line x1="390" y1="365" x2="390" y2="388" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Half-transfer 동기화 확인 -->
  <rect x="245" y="389" width="290" height="46" rx="6" fill="#FBBC04" stroke="#E37400" stroke-width="1.5"/>
  <text x="390" y="412" text-anchor="middle" fill="#1A1A1A" font-weight="bold">Half-transfer 동기화 확인</text>
  <text x="390" y="428" text-anchor="middle" fill="#1A1A1A" font-size="11">버퍼 포인터 교체 시점 로그 점검</text>

  <line x1="390" y1="435" x2="390" y2="458" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 해결 -->
  <ellipse cx="390" cy="480" rx="100" ry="24" fill="#34A853" stroke="#256429" stroke-width="1.5"/>
  <text x="390" y="485" text-anchor="middle" fill="white" font-weight="bold">원인 특정 및 수정</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
