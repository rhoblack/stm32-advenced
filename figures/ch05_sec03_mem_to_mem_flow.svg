<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350"  font-family="'Noto Sans KR', sans-serif" font-size="13" viewBox="0 0 700 350">
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A2E">DMA Mem-to-Mem 전송 흐름</text>

  <!-- Step 1: Configure -->
  <rect x="30" y="50" width="140" height="70" rx="8" fill="#1A73E8" opacity="0.15" stroke="#1A73E8" stroke-width="2"/>
  <text x="100" y="72" text-anchor="middle" font-weight="700" fill="#1A73E8" font-size="14">1. 설정</text>
  <text x="100" y="92" text-anchor="middle" font-size="10" fill="#333">CPU가 DMA 레지스터에</text>
  <text x="100" y="106" text-anchor="middle" font-size="10" fill="#333">소스/목적지/크기 기록</text>

  <!-- Arrow -->
  <line x1="170" y1="85" x2="200" y2="85" stroke="#666" stroke-width="2" marker-end="url(#fa05)"/>

  <!-- Step 2: Start -->
  <rect x="200" y="50" width="140" height="70" rx="8" fill="#FF6D00" opacity="0.15" stroke="#FF6D00" stroke-width="2"/>
  <text x="270" y="72" text-anchor="middle" font-weight="700" fill="#FF6D00" font-size="14">2. 시작</text>
  <text x="270" y="92" text-anchor="middle" font-size="10" fill="#333">HAL_DMA_Start_IT()</text>
  <text x="270" y="106" text-anchor="middle" font-size="10" fill="#333">EN 비트 활성화</text>

  <!-- Arrow -->
  <line x1="340" y1="85" x2="370" y2="85" stroke="#666" stroke-width="2" marker-end="url(#fa05)"/>

  <!-- Step 3: Transfer -->
  <rect x="370" y="50" width="160" height="70" rx="8" fill="#FF6D00" opacity="0.3" stroke="#FF6D00" stroke-width="2"/>
  <text x="450" y="72" text-anchor="middle" font-weight="700" fill="#FF6D00" font-size="14">3. 전송</text>
  <text x="450" y="92" text-anchor="middle" font-size="10" fill="#333">DMA가 AHB 버스로</text>
  <text x="450" y="106" text-anchor="middle" font-size="10" fill="#333">word 단위 자동 이동</text>

  <!-- Arrow -->
  <line x1="530" y1="85" x2="560" y2="85" stroke="#666" stroke-width="2" marker-end="url(#fa05)"/>

  <!-- Step 4: Complete -->
  <rect x="560" y="50" width="120" height="70" rx="8" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="2"/>
  <text x="620" y="72" text-anchor="middle" font-weight="700" fill="#34A853" font-size="14">4. 완료</text>
  <text x="620" y="92" text-anchor="middle" font-size="10" fill="#333">TC 인터럽트 발생</text>
  <text x="620" y="106" text-anchor="middle" font-size="10" fill="#333">콜백 호출</text>

  <!-- Memory diagram -->
  <text x="180" y="155" text-anchor="middle" font-weight="700" fill="#1A73E8" font-size="14">src_buf[ ] (SRAM)</text>
  <text x="520" y="155" text-anchor="middle" font-weight="700" fill="#34A853" font-size="14">dst_buf[ ] (SRAM)</text>

  <!-- Source array -->
  <g>
    <rect x="80" y="165" width="200" height="30" rx="4" fill="#E3F2FD" stroke="#1A73E8"/>
    <text x="115" y="184" font-size="10" fill="#1A73E8">[0] 0xDEAD0000</text>
    <rect x="80" y="195" width="200" height="30" rx="4" fill="#E3F2FD" stroke="#1A73E8"/>
    <text x="115" y="214" font-size="10" fill="#1A73E8">[1] 0xDEAD0001</text>
    <rect x="80" y="225" width="200" height="30" rx="4" fill="#E3F2FD" stroke="#1A73E8"/>
    <text x="115" y="244" font-size="10" fill="#1A73E8">[2] 0xDEAD0002</text>
    <rect x="80" y="255" width="200" height="20" rx="4" fill="#E3F2FD" stroke="#1A73E8" stroke-dasharray="3,3"/>
    <text x="180" y="269" text-anchor="middle" font-size="10" fill="#999">...</text>
    <rect x="80" y="275" width="200" height="30" rx="4" fill="#E3F2FD" stroke="#1A73E8"/>
    <text x="115" y="294" font-size="10" fill="#1A73E8">[1023] 0xDEAD03FF</text>
  </g>

  <!-- Destination array -->
  <g>
    <rect x="420" y="165" width="200" height="30" rx="4" fill="#E8F5E9" stroke="#34A853"/>
    <text x="455" y="184" font-size="10" fill="#34A853">[0] 0xDEAD0000</text>
    <rect x="420" y="195" width="200" height="30" rx="4" fill="#E8F5E9" stroke="#34A853"/>
    <text x="455" y="214" font-size="10" fill="#34A853">[1] 0xDEAD0001</text>
    <rect x="420" y="225" width="200" height="30" rx="4" fill="#E8F5E9" stroke="#34A853"/>
    <text x="455" y="244" font-size="10" fill="#34A853">[2] 0xDEAD0002</text>
    <rect x="420" y="255" width="200" height="20" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-dasharray="3,3"/>
    <text x="520" y="269" text-anchor="middle" font-size="10" fill="#999">...</text>
    <rect x="420" y="275" width="200" height="30" rx="4" fill="#E8F5E9" stroke="#34A853"/>
    <text x="455" y="294" font-size="10" fill="#34A853">[1023] 0xDEAD03FF</text>
  </g>

  <!-- DMA arrows -->
  <line x1="280" y1="180" x2="420" y2="180" stroke="#FF6D00" stroke-width="2.5" marker-end="url(#fa05o)"/>
  <line x1="280" y1="210" x2="420" y2="210" stroke="#FF6D00" stroke-width="2.5" marker-end="url(#fa05o)"/>
  <line x1="280" y1="240" x2="420" y2="240" stroke="#FF6D00" stroke-width="2.5" marker-end="url(#fa05o)"/>
  <line x1="280" y1="290" x2="420" y2="290" stroke="#FF6D00" stroke-width="2.5" marker-end="url(#fa05o)"/>

  <!-- DMA label -->
  <rect x="320" y="225" width="60" height="24" rx="12" fill="#FF6D00"/>
  <text x="350" y="241" text-anchor="middle" fill="white" font-size="11" font-weight="700">DMA</text>

  <!-- Verify -->
  <rect x="250" y="320" width="200" height="24" rx="12" fill="#34A853"/>
  <text x="350" y="336" text-anchor="middle" fill="white" font-size="11" font-weight="600">검증: src[i] == dst[i] ? PASS</text>

  <defs>
    <marker id="fa05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <marker id="fa05o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6D00"/>
    </marker>
  </defs>
</svg>
