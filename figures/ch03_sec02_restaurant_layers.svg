<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 480">
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">레스토랑 주방으로 이해하는 4계층 아키텍처</text>

  <!-- 레스토랑 측 -->
  <text x="200" y="65" text-anchor="middle" font-size="15" font-weight="600" fill="#555">레스토랑</text>

  <!-- 홀 매니저 -->
  <rect x="50" y="80" width="300" height="60" rx="8" fill="#EA4335" opacity="0.15" stroke="#EA4335" stroke-width="2"/>
  <text x="70" y="105" font-size="24">🎩</text>
  <text x="105" y="105" font-size="14" font-weight="600" fill="#EA4335">홀 매니저</text>
  <text x="105" y="125" font-size="12" fill="#666">고객 주문 접수, 서빙 결정</text>

  <!-- 화살표 -->
  <line x1="200" y1="140" x2="200" y2="160" stroke="#555" stroke-width="1.5"/>
  <text x="215" y="155" font-size="11" fill="#888">주문서 전달</text>

  <!-- 메뉴 관리자 -->
  <rect x="50" y="165" width="300" height="60" rx="8" fill="#FBBC04" opacity="0.15" stroke="#FBBC04" stroke-width="2"/>
  <text x="70" y="190" font-size="24">📋</text>
  <text x="105" y="190" font-size="14" font-weight="600" fill="#F57F17">메뉴 관리자</text>
  <text x="105" y="210" font-size="12" fill="#666">코스 구성: 전채 → 메인 → 디저트</text>

  <!-- 화살표 -->
  <line x1="200" y1="225" x2="200" y2="245" stroke="#555" stroke-width="1.5"/>
  <text x="215" y="240" font-size="11" fill="#888">조리 지시</text>

  <!-- 요리사 -->
  <rect x="50" y="250" width="300" height="60" rx="8" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="2"/>
  <text x="70" y="275" font-size="24">👨‍🍳</text>
  <text x="110" y="275" font-size="14" font-weight="600" fill="#34A853">요리사</text>
  <text x="110" y="295" font-size="12" fill="#666">단위 조리: 볶기, 끓이기, 굽기</text>

  <!-- 화살표 -->
  <line x1="200" y1="310" x2="200" y2="330" stroke="#555" stroke-width="1.5"/>
  <text x="215" y="325" font-size="11" fill="#888">기기 조작</text>

  <!-- 주방 기기 -->
  <rect x="50" y="335" width="300" height="60" rx="8" fill="#1A73E8" opacity="0.15" stroke="#1A73E8" stroke-width="2"/>
  <text x="70" y="360" font-size="24">🔥</text>
  <text x="105" y="360" font-size="14" font-weight="600" fill="#1A73E8">주방 기기</text>
  <text x="105" y="380" font-size="12" fill="#666">가스레인지, 오븐, 냉장고</text>

  <!-- 등호 -->
  <text x="400" y="120" text-anchor="middle" font-size="28" fill="#888">=</text>
  <text x="400" y="205" text-anchor="middle" font-size="28" fill="#888">=</text>
  <text x="400" y="290" text-anchor="middle" font-size="28" fill="#888">=</text>
  <text x="400" y="375" text-anchor="middle" font-size="28" fill="#888">=</text>

  <!-- 소프트웨어 측 -->
  <text x="600" y="65" text-anchor="middle" font-size="15" font-weight="600" fill="#555">소프트웨어</text>

  <!-- App -->
  <rect x="450" y="80" width="300" height="60" rx="8" fill="#EA4335" opacity="0.9"/>
  <text x="600" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="white">App 레이어</text>
  <text x="600" y="125" text-anchor="middle" font-size="12" fill="white">main(), CLI, UI 이벤트 처리</text>

  <!-- 화살표 -->
  <line x1="600" y1="140" x2="600" y2="160" stroke="#555" stroke-width="1.5"/>
  <text x="615" y="155" font-size="11" fill="#888">API 호출</text>

  <!-- Service -->
  <rect x="450" y="165" width="300" height="60" rx="8" fill="#FBBC04" opacity="0.9"/>
  <text x="600" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Service 레이어</text>
  <text x="600" y="210" text-anchor="middle" font-size="12" fill="#333">clock_service, sensor_service</text>

  <!-- 화살표 -->
  <line x1="600" y1="225" x2="600" y2="245" stroke="#555" stroke-width="1.5"/>

  <!-- Driver -->
  <rect x="450" y="250" width="300" height="60" rx="8" fill="#34A853" opacity="0.9"/>
  <text x="600" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="white">Driver 레이어</text>
  <text x="600" y="295" text-anchor="middle" font-size="12" fill="white">uart_driver, gpio_driver, spi_driver</text>

  <!-- 화살표 -->
  <line x1="600" y1="310" x2="600" y2="330" stroke="#555" stroke-width="1.5"/>

  <!-- HAL -->
  <rect x="450" y="335" width="300" height="60" rx="8" fill="#1A73E8" opacity="0.9"/>
  <text x="600" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="white">HAL 레이어</text>
  <text x="600" y="380" text-anchor="middle" font-size="12" fill="white">ST HAL: HAL_GPIO_*, HAL_UART_*</text>

  <!-- 핵심 메시지 -->
  <rect x="100" y="420" width="600" height="45" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="400" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#E65100">홀 매니저가 가스레인지를 직접 만지지 않듯,</text>
  <text x="400" y="458" text-anchor="middle" font-size="13" font-weight="600" fill="#E65100">App 레이어는 HAL을 직접 호출하지 않습니다.</text>
</svg>
