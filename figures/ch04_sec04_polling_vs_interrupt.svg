<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350"  font-family="'Noto Sans KR', sans-serif" font-size="13" viewBox="0 0 800 350">
  <text x="400" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#212121">CPU 타임라인 비교: 폴링 vs 인터럽트 수신</text>

  <!-- ===== 폴링 방식 ===== -->
  <text x="50" y="60" font-size="13" font-weight="700" fill="#EA4335">폴링 수신 (HAL_UART_Receive)</text>

  <!-- 시간 축 -->
  <line x1="50" y1="130" x2="760" y2="130" stroke="#CCC" stroke-width="1"/>

  <!-- CPU 블로킹 구간 (대부분 빨간색) -->
  <rect x="60" y="75" width="300" height="35" rx="4" fill="#EA4335" opacity="0.85"/>
  <text x="210" y="97" text-anchor="middle" font-size="10" fill="white" font-weight="700">HAL_UART_Receive() 블로킹 대기</text>
  <text x="210" y="115" text-anchor="middle" font-size="9" fill="#EA4335">CPU: RXNE 플래그 폴링 (while 루프)</text>

  <!-- 데이터 도착 표시 -->
  <line x1="350" y1="70" x2="350" y2="130" stroke="#34A853" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="350" y="65" text-anchor="middle" font-size="9" fill="#34A853" font-weight="600">'A' 도착</text>

  <!-- 짧은 처리 -->
  <rect x="360" y="75" width="40" height="35" rx="4" fill="#34A853" opacity="0.7"/>
  <text x="380" y="97" text-anchor="middle" font-size="8" fill="white">처리</text>

  <!-- 다시 블로킹 -->
  <rect x="410" y="75" width="300" height="35" rx="4" fill="#EA4335" opacity="0.85"/>
  <text x="560" y="97" text-anchor="middle" font-size="10" fill="white" font-weight="700">다시 블로킹 대기...</text>

  <!-- LED 상태 -->
  <text x="210" y="150" text-anchor="middle" font-size="10" fill="#EA4335" font-weight="600">LED 토글 불가 (main 정지)</text>

  <!-- ===== 인터럽트 방식 ===== -->
  <text x="50" y="190" font-size="13" font-weight="700" fill="#34A853">인터럽트 수신 (HAL_UART_Receive_IT)</text>

  <!-- 시간 축 -->
  <line x1="50" y1="280" x2="760" y2="280" stroke="#CCC" stroke-width="1"/>

  <!-- main loop (대부분 초록) -->
  <rect x="60" y="225" width="280" height="35" rx="4" fill="#34A853" opacity="0.7"/>
  <text x="200" y="247" text-anchor="middle" font-size="10" fill="white" font-weight="600">main loop (LED 토글, 로직 수행)</text>

  <!-- 데이터 도착 → ISR -->
  <line x1="350" y1="220" x2="350" y2="280" stroke="#1A73E8" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="350" y="215" text-anchor="middle" font-size="9" fill="#1A73E8" font-weight="600">'A' 도착</text>

  <!-- 짧은 ISR -->
  <rect x="340" y="225" width="30" height="35" rx="4" fill="#FBBC04" opacity="0.85"/>
  <text x="355" y="247" text-anchor="middle" font-size="8" fill="#333" font-weight="600">ISR</text>

  <!-- 다시 main loop -->
  <rect x="380" y="225" width="330" height="35" rx="4" fill="#34A853" opacity="0.7"/>
  <text x="545" y="247" text-anchor="middle" font-size="10" fill="white" font-weight="600">main loop 계속 (LED 계속 토글!)</text>

  <!-- LED 상태 -->
  <text x="200" y="300" text-anchor="middle" font-size="10" fill="#34A853" font-weight="600">LED 500ms 토글 정상 동작</text>

  <!-- 범례 + 결론 -->
  <rect x="50" y="310" width="710" height="35" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <rect x="70" y="321" width="20" height="14" rx="3" fill="#EA4335" opacity="0.85"/>
  <text x="100" y="332" font-size="10" fill="#666">CPU 블로킹</text>
  <rect x="200" y="321" width="20" height="14" rx="3" fill="#34A853" opacity="0.7"/>
  <text x="230" y="332" font-size="10" fill="#666">CPU 여유</text>
  <rect x="330" y="321" width="20" height="14" rx="3" fill="#FBBC04" opacity="0.85"/>
  <text x="360" y="332" font-size="10" fill="#666">ISR (~수 us)</text>
  <text x="560" y="332" font-size="11" fill="#34A853" font-weight="700">인터럽트 = CPU 99% 해방!</text>
</svg>
