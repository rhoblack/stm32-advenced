<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <defs>
    <marker id="fsmArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">Ch01 버튼 디바운싱 — FSM 상태 전이 다이어그램</text>

  <!-- IDLE 상태 -->
  <circle cx="150" cy="160" r="50" fill="#E3F2FD" stroke="#1A73E8" stroke-width="3"/>
  <text x="150" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#1A73E8">IDLE</text>
  <text x="150" y="175" text-anchor="middle" font-size="11" fill="#1A73E8">대기 중</text>

  <!-- 초기 상태 화살표 -->
  <circle cx="40" cy="160" r="8" fill="#333"/>
  <line x1="48" y1="160" x2="95" y2="160" stroke="#333" stroke-width="2" marker-end="url(#fsmArrow)"/>

  <!-- PRESSED 상태 -->
  <circle cx="400" cy="100" r="50" fill="#FFF3E0" stroke="#FF9800" stroke-width="3"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">PRESSED</text>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#E65100">디바운싱 중</text>

  <!-- DEBOUNCED 상태 -->
  <circle cx="400" cy="250" r="50" fill="#E8F5E9" stroke="#34A853" stroke-width="3"/>
  <text x="400" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#34A853">DEBOUNCED</text>
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#34A853">LED 토글</text>
  <text x="400" y="275" text-anchor="middle" font-size="10" fill="#34A853">카운트 증가</text>

  <!-- IDLE → PRESSED -->
  <path d="M 195 140 Q 280 80 345 95" fill="none" stroke="#333" stroke-width="2" marker-end="url(#fsmArrow)"/>
  <text x="260" y="92" text-anchor="middle" font-size="11" fill="#333" font-weight="600">EXTI 엣지 감지</text>
  <text x="260" y="106" text-anchor="middle" font-size="10" fill="#888">(하강 에지)</text>

  <!-- PRESSED → PRESSED (자기 루프) -->
  <path d="M 435 60 Q 480 20 460 55" fill="none" stroke="#EA4335" stroke-width="2" marker-end="url(#fsmArrow)"/>
  <text x="510" y="45" text-anchor="middle" font-size="11" fill="#EA4335" font-weight="600">재트리거</text>
  <text x="510" y="60" text-anchor="middle" font-size="10" fill="#EA4335">(50ms 미만, 무시)</text>

  <!-- PRESSED → DEBOUNCED -->
  <line x1="400" y1="150" x2="400" y2="195" stroke="#333" stroke-width="2" marker-end="url(#fsmArrow)"/>
  <text x="460" y="175" font-size="11" fill="#333" font-weight="600">50ms 경과</text>

  <!-- DEBOUNCED → IDLE -->
  <path d="M 355 270 Q 250 310 175 215" fill="none" stroke="#333" stroke-width="2" marker-end="url(#fsmArrow)"/>
  <text x="240" y="290" text-anchor="middle" font-size="11" fill="#333" font-weight="600">처리 완료</text>

  <!-- 범례 -->
  <rect x="530" y="140" width="150" height="120" rx="6" fill="#F5F5F5" stroke="#CCC"/>
  <text x="605" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#333">범례</text>
  <circle cx="550" cy="182" r="8" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2"/>
  <text x="565" y="186" font-size="11" fill="#333">상태 (State)</text>
  <line x1="540" y1="205" x2="570" y2="205" stroke="#333" stroke-width="2" marker-end="url(#fsmArrow)"/>
  <text x="580" y="209" font-size="11" fill="#333">전이 (Transition)</text>
  <text x="545" y="232" font-size="11" fill="#333" font-weight="600">이벤트</text>
  <text x="545" y="247" font-size="10" fill="#888">(트리거 조건)</text>
</svg>
