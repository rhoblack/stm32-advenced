<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="360" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1A1A2E; }
      .label { font-size: 13px; fill: #333; font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .time  { font-size: 11px; fill: #EA4335; font-weight: 600; }
      .step  { font-size: 12px; fill: white; font-weight: 700; }
    </style>
  </defs>

  <rect width="800" height="360" fill="#FAFAFA" rx="8"/>
  <rect x="20" y="20" width="760" height="320" fill="white" rx="6" stroke="#E0E0E0" stroke-width="1"/>

  <text x="400" y="50" text-anchor="middle" class="title">ILI9341 RESET 시퀀스 — 하드웨어 초기화 절차</text>
  <text x="400" y="68" text-anchor="middle" class="small">전원 인가 후 반드시 RESET 펄스 → 최소 딜레이 → 소프트웨어 초기화 순서 준수</text>

  <!-- RESET 신호 -->
  <text x="60" y="115" text-anchor="middle" class="label" fill="#EA4335">RESET</text>
  <polyline points="100,100 160,100 160,130 280,130 280,100 750,100" fill="none" stroke="#EA4335" stroke-width="2.5"/>

  <!-- VCC 신호 -->
  <text x="60" y="160" text-anchor="middle" class="label" fill="#34A853">VCC</text>
  <polyline points="100,148 130,148 130,170 750,170" fill="none" stroke="#34A853" stroke-width="2.5"/>

  <!-- SPI 활동 -->
  <text x="60" y="220" text-anchor="middle" class="label" fill="#1A73E8">SPI</text>
  <line x1="100" y1="215" x2="340" y2="215" stroke="#ccc" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="340" y="205" width="180" height="22" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1.5" rx="3"/>
  <text x="430" y="219" text-anchor="middle" class="small" fill="#1A73E8">초기화 명령어 시퀀스</text>
  <line x1="520" y1="215" x2="750" y2="215" stroke="#1A73E8" stroke-width="2"/>

  <!-- 타이밍 구간 -->
  <!-- 구간 1: 전원 인가 대기 -->
  <line x1="130" y1="240" x2="160" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="145" y="258" text-anchor="middle" class="time">①</text>
  <text x="145" y="272" text-anchor="middle" class="small">전원 안정</text>
  <text x="145" y="284" text-anchor="middle" class="time">≥5ms</text>

  <!-- 구간 2: RESET LOW -->
  <line x1="160" y1="240" x2="280" y2="240" stroke="#EA4335" stroke-width="1.5"/>
  <text x="220" y="258" text-anchor="middle" class="time">②</text>
  <text x="220" y="272" text-anchor="middle" class="small">RESET LOW</text>
  <text x="220" y="284" text-anchor="middle" class="time">≥10ms</text>

  <!-- 구간 3: RESET HIGH 후 대기 -->
  <line x1="280" y1="240" x2="340" y2="240" stroke="#34A853" stroke-width="1.5"/>
  <text x="310" y="258" text-anchor="middle" class="time">③</text>
  <text x="310" y="272" text-anchor="middle" class="small">복귀 대기</text>
  <text x="310" y="284" text-anchor="middle" class="time">≥120ms</text>

  <!-- 구간 4: 초기화 명령 -->
  <line x1="340" y1="240" x2="520" y2="240" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="430" y="258" text-anchor="middle" class="time">④</text>
  <text x="430" y="272" text-anchor="middle" class="small">초기화 명령어 전송</text>

  <!-- 수직 마커 선 -->
  <line x1="130" y1="85" x2="130" y2="245" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="85" x2="160" y2="245" stroke="#EA4335" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="85" x2="280" y2="245" stroke="#EA4335" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="85" x2="340" y2="245" stroke="#34A853" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="520" y1="85" x2="520" y2="245" stroke="#1A73E8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 코드 박스 -->
  <rect x="40" y="298" width="720" height="35" fill="#1A1A2E" rx="5"/>
  <text x="60" y="316" class="small" fill="#98C379" font-family="monospace">HAL_GPIO_WritePin(RST_GPIO, RST_PIN, 0); HAL_Delay(10);  // ② RESET LOW</text>
  <text x="60" y="330" class="small" fill="#61AFEF" font-family="monospace">HAL_GPIO_WritePin(RST_GPIO, RST_PIN, 1); HAL_Delay(120); // ③ RESET HIGH + 120ms 대기</text>
</svg>
