<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1A1A2E; }
      .box   { font-size: 13px; font-weight: 700; fill: white; }
      .label { font-size: 12px; fill: #333; }
      .small { font-size: 11px; fill: #555; }
      .note  { font-size: 12px; fill: #EA4335; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#FAFAFA" rx="8"/>
  <rect x="20" y="20" width="760" height="380" fill="white" rx="6" stroke="#E0E0E0" stroke-width="1"/>

  <text x="400" y="50" text-anchor="middle" class="title">STM32F411 SPI1 + DMA2 Stream 배치도</text>
  <text x="400" y="68" text-anchor="middle" class="small">SPI1 TX → DMA2 Stream3 Channel3 | SPI1 RX → DMA2 Stream2 Channel3 (LCD는 TX만 사용)</text>

  <!-- STM32F411 MCU 박스 -->
  <rect x="40" y="85" width="280" height="260" fill="#E8EAF6" rx="8" stroke="#3949AB" stroke-width="2"/>
  <rect x="40" y="85" width="280" height="28" fill="#3949AB" rx="8"/>
  <rect x="40" y="101" width="280" height="12" fill="#3949AB"/>
  <text x="180" y="105" text-anchor="middle" class="box">STM32F411RE</text>

  <!-- SPI1 블록 -->
  <rect x="60" y="125" width="120" height="55" fill="#1A73E8" rx="5"/>
  <text x="120" y="148" text-anchor="middle" class="box" font-size="12">SPI1</text>
  <text x="120" y="164" text-anchor="middle" class="small" fill="white">PA5=SCLK</text>
  <text x="120" y="176" text-anchor="middle" class="small" fill="white">PA7=MOSI</text>

  <!-- DMA2 블록 -->
  <rect x="60" y="200" width="120" height="55" fill="#34A853" rx="5"/>
  <text x="120" y="220" text-anchor="middle" class="box" font-size="12">DMA2</text>
  <text x="120" y="236" text-anchor="middle" class="small" fill="white">Stream3 Ch3</text>
  <text x="120" y="248" text-anchor="middle" class="small" fill="white">TX 전용</text>

  <!-- GPIO 제어 핀 -->
  <rect x="200" y="125" width="105" height="75" fill="#FBBC04" rx="5"/>
  <text x="252" y="148" text-anchor="middle" class="box" font-size="11">GPIO 제어</text>
  <text x="252" y="163" text-anchor="middle" class="small" fill="white">PA4 = CS</text>
  <text x="252" y="176" text-anchor="middle" class="small" fill="white">PB0 = D/C</text>
  <text x="252" y="189" text-anchor="middle" class="small" fill="white">PB1 = RST</text>

  <!-- NVIC -->
  <rect x="200" y="210" width="105" height="45" fill="#EA4335" rx="5"/>
  <text x="252" y="230" text-anchor="middle" class="box" font-size="11">NVIC</text>
  <text x="252" y="245" text-anchor="middle" class="small" fill="white">DMA2_Str3_IRQ</text>

  <!-- 연결 화살표 SPI1 → DMA2 -->
  <line x1="120" y1="180" x2="120" y2="200" stroke="#34A853" stroke-width="2" marker-end="url(#arr)"/>
  <text x="130" y="193" class="small" fill="#34A853">링크</text>

  <!-- ILI9341 LCD -->
  <rect x="530" y="100" width="210" height="230" fill="#FFF9C4" rx="8" stroke="#F9A825" stroke-width="2"/>
  <rect x="530" y="100" width="210" height="28" fill="#F9A825" rx="8"/>
  <rect x="530" y="116" width="210" height="12" fill="#F9A825"/>
  <text x="635" y="120" text-anchor="middle" class="box">ILI9341 TFT LCD</text>
  <text x="635" y="150" text-anchor="middle" class="label">SCK ← PA5</text>
  <text x="635" y="168" text-anchor="middle" class="label">SDA ← PA7 (MOSI)</text>
  <text x="635" y="186" text-anchor="middle" class="label">CS  ← PA4</text>
  <text x="635" y="204" text-anchor="middle" class="label">DC  ← PB0</text>
  <text x="635" y="222" text-anchor="middle" class="label">RST ← PB1</text>
  <text x="635" y="240" text-anchor="middle" class="label">VCC ← 3.3V</text>
  <text x="635" y="258" text-anchor="middle" class="label">GND ← GND</text>
  <text x="635" y="278" text-anchor="middle" class="small" fill="#F9A825">240×320 픽셀 | 262K 색상</text>
  <text x="635" y="292" text-anchor="middle" class="small" fill="#F9A825">최대 42MHz SPI</text>

  <!-- 연결 라인 STM32 → LCD -->
  <line x1="320" y1="152" x2="530" y2="152" stroke="#1A73E8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="425" y="145" text-anchor="middle" class="small" fill="#1A73E8">SPI1 (DMA TX)</text>
  <line x1="305" y1="163" x2="530" y2="168" stroke="#FBBC04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="305" y1="175" x2="530" y2="186" stroke="#FBBC04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="305" y1="187" x2="530" y2="204" stroke="#FBBC04" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 하단 주석 -->
  <rect x="40" y="360" width="720" height="32" fill="#E3F2FD" rx="5" stroke="#1A73E8" stroke-width="1"/>
  <text x="400" y="375" text-anchor="middle" class="note">DMA2만 메모리→주변장치(M2P) 전송 지원 | SPI1은 APB2(84MHz)에 연결 — SPI 클럭 = 84MHz ÷ 분주비</text>
  <text x="400" y="389" text-anchor="middle" class="small">CubeMX: SPI1 → DMA Settings → Add → DMA2 Stream3 CH3 → Normal Mode → Byte</text>
</svg>
