<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="25" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">RX Circular DMA + 링 버퍼 타이밍 다이어그램</text>
  <text x="400" y="45" text-anchor="middle" font-size="12" fill="#888">DMA가 쓰고 → 콜백이 옮기고 → 메인이 읽는다</text>

  <!-- 시간축 -->
  <line x1="80" y1="370" x2="760" y2="370" stroke="#333" stroke-width="2"/>
  <text x="770" y="375" font-size="11" fill="#333">시간 →</text>

  <!-- === UART 라인 (최상단) === -->
  <text x="20" y="85" font-size="12" fill="#333" font-weight="700">UART</text>
  <text x="20" y="98" font-size="9" fill="#999">RX 핀</text>
  <line x1="80" y1="90" x2="760" y2="90" stroke="#BDBDBD" stroke-width="1"/>

  <!-- 데이터 패킷 1 -->
  <rect x="100" y="75" width="120" height="20" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="160" y="90" text-anchor="middle" font-size="10" fill="white" font-weight="600">패킷 1 (5바이트)</text>

  <!-- IDLE 구간 -->
  <rect x="220" y="80" width="50" height="15" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-dasharray="3,2"/>
  <text x="245" y="92" text-anchor="middle" font-size="8" fill="#F57F17">IDLE</text>

  <!-- 데이터 패킷 2 -->
  <rect x="270" y="75" width="180" height="20" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="360" y="90" text-anchor="middle" font-size="10" fill="white" font-weight="600">패킷 2 (10바이트)</text>

  <!-- IDLE 구간 2 -->
  <rect x="450" y="80" width="50" height="15" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-dasharray="3,2"/>
  <text x="475" y="92" text-anchor="middle" font-size="8" fill="#F57F17">IDLE</text>

  <!-- === DMA 버퍼 (Circular) === -->
  <text x="20" y="155" font-size="12" fill="#FFA500" font-weight="700">DMA</text>
  <text x="20" y="168" font-size="9" fill="#999">하드웨어</text>
  <line x1="80" y1="160" x2="760" y2="160" stroke="#BDBDBD" stroke-width="1"/>

  <!-- DMA 기록 구간 1 -->
  <rect x="100" y="145" width="120" height="20" rx="4" fill="#FFA500" opacity="0.6"/>
  <text x="160" y="160" text-anchor="middle" font-size="10" fill="white" font-weight="600">dma_buf[0..4]</text>

  <!-- DMA 기록 구간 2 -->
  <rect x="270" y="145" width="180" height="20" rx="4" fill="#FFA500" opacity="0.6"/>
  <text x="360" y="160" text-anchor="middle" font-size="10" fill="white" font-weight="600">dma_buf[5..14] (순환)</text>

  <!-- === ISR 콜백 === -->
  <text x="20" y="225" font-size="12" fill="#EA4335" font-weight="700">ISR</text>
  <text x="20" y="238" font-size="9" fill="#999">콜백</text>
  <line x1="80" y1="230" x2="760" y2="230" stroke="#BDBDBD" stroke-width="1"/>

  <!-- IDLE 감지 콜백 1 -->
  <rect x="225" y="217" width="40" height="20" rx="3" fill="#EA4335" opacity="0.8"/>
  <text x="245" y="231" text-anchor="middle" font-size="8" fill="white">콜백1</text>

  <!-- IDLE 감지 콜백 2 -->
  <rect x="455" y="217" width="40" height="20" rx="3" fill="#EA4335" opacity="0.8"/>
  <text x="475" y="231" text-anchor="middle" font-size="8" fill="white">콜백2</text>

  <!-- 콜백 → 링버퍼 복사 화살표 -->
  <line x1="245" y1="240" x2="245" y2="285" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="475" y1="240" x2="475" y2="285" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- === 링 버퍼 === -->
  <text x="20" y="300" font-size="12" fill="#34A853" font-weight="700">링 버퍼</text>
  <text x="20" y="313" font-size="9" fill="#999">소프트웨어</text>
  <line x1="80" y1="305" x2="760" y2="305" stroke="#BDBDBD" stroke-width="1"/>

  <!-- 링 버퍼 데이터 구간 1 -->
  <rect x="230" y="292" width="80" height="20" rx="3" fill="#34A853" opacity="0.6"/>
  <text x="270" y="307" text-anchor="middle" font-size="9" fill="white">5바이트 저장</text>

  <!-- 링 버퍼 데이터 구간 2 -->
  <rect x="460" y="292" width="100" height="20" rx="3" fill="#34A853" opacity="0.6"/>
  <text x="510" y="307" text-anchor="middle" font-size="9" fill="white">10바이트 저장</text>

  <!-- === 메인 루프 === -->
  <text x="20" y="348" font-size="12" fill="#7B1FA2" font-weight="700">메인</text>
  <text x="20" y="361" font-size="9" fill="#999">루프</text>
  <line x1="80" y1="355" x2="760" y2="355" stroke="#BDBDBD" stroke-width="1"/>

  <!-- 메인 루프 읽기 -->
  <rect x="310" y="342" width="60" height="20" rx="3" fill="#7B1FA2" opacity="0.5"/>
  <text x="340" y="357" text-anchor="middle" font-size="8" fill="white">read 5B</text>

  <rect x="570" y="342" width="70" height="20" rx="3" fill="#7B1FA2" opacity="0.5"/>
  <text x="605" y="357" text-anchor="middle" font-size="8" fill="white">read 10B</text>

  <!-- 수직 점선: IDLE 감지 시점 -->
  <line x1="245" y1="65" x2="245" y2="370" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="475" y1="65" x2="475" y2="370" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- 범례 -->
  <rect x="550" y="55" width="220" height="95" rx="6" fill="white" stroke="#E0E0E0"/>
  <text x="560" y="72" font-size="11" font-weight="600" fill="#333">범례</text>
  <rect x="560" y="80" width="15" height="12" rx="2" fill="#1A73E8" opacity="0.7"/>
  <text x="580" y="91" font-size="10" fill="#555">UART 데이터</text>
  <rect x="560" y="97" width="15" height="12" rx="2" fill="#FFA500" opacity="0.6"/>
  <text x="580" y="108" font-size="10" fill="#555">DMA 기록</text>
  <rect x="560" y="114" width="15" height="12" rx="2" fill="#EA4335" opacity="0.8"/>
  <text x="580" y="125" font-size="10" fill="#555">ISR 콜백 (짧음!)</text>
  <rect x="560" y="131" width="15" height="12" rx="2" fill="#34A853" opacity="0.6"/>
  <text x="580" y="142" font-size="10" fill="#555">링 버퍼 저장</text>
</svg>
