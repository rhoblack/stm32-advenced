<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA4335"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">스파게티 코드 vs 레이어드 아키텍처</text>

  <!-- 왼쪽: 스파게티 코드 -->
  <rect x="20" y="50" width="350" height="330" rx="8" fill="#FFF3F3" stroke="#EA4335" stroke-width="2"/>
  <text x="195" y="75" text-anchor="middle" font-size="15" font-weight="700" fill="#EA4335">main.c 하나에 모든 코드</text>

  <!-- 스파게티 블록들 -->
  <rect x="40" y="95" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="100" y="117" text-anchor="middle" font-size="12" fill="#B71C1C">GPIO 초기화</text>

  <rect x="180" y="95" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="240" y="117" text-anchor="middle" font-size="12" fill="#B71C1C">UART 송수신</text>

  <rect x="40" y="145" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="100" y="167" text-anchor="middle" font-size="12" fill="#B71C1C">DMA 설정</text>

  <rect x="180" y="145" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="240" y="167" text-anchor="middle" font-size="12" fill="#B71C1C">SPI LCD</text>

  <rect x="40" y="195" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="100" y="217" text-anchor="middle" font-size="12" fill="#B71C1C">I2C 센서</text>

  <rect x="180" y="195" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="240" y="217" text-anchor="middle" font-size="12" fill="#B71C1C">스텝모터</text>

  <rect x="40" y="245" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="100" y="267" text-anchor="middle" font-size="12" fill="#B71C1C">RTC 알람</text>

  <rect x="180" y="245" width="120" height="35" rx="4" fill="#FFCDD2"/>
  <text x="240" y="267" text-anchor="middle" font-size="12" fill="#B71C1C">로그 출력</text>

  <!-- 스파게티 연결선 (엉킨 화살표) -->
  <line x1="160" y1="112" x2="180" y2="112" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="160" y1="112" x2="180" y2="162" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="100" y1="130" x2="240" y2="145" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="240" y1="180" x2="100" y2="195" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="160" y1="212" x2="180" y2="262" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="240" y1="230" x2="100" y2="245" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="300" y1="162" x2="300" y2="250" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="40" y1="162" x2="40" y2="250" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <text x="195" y="310" text-anchor="middle" font-size="13" fill="#B71C1C" font-weight="600">모든 것이 모든 것에 의존</text>
  <text x="195" y="330" text-anchor="middle" font-size="12" fill="#B71C1C">"버그 하나 → 전체 코드 수색"</text>
  <text x="195" y="365" text-anchor="middle" font-size="28" fill="#EA4335">&#x2717;</text>

  <!-- 오른쪽: 레이어드 아키텍처 -->
  <rect x="420" y="50" width="360" height="330" rx="8" fill="#F1F8E9" stroke="#34A853" stroke-width="2"/>
  <text x="600" y="75" text-anchor="middle" font-size="15" font-weight="700" fill="#34A853">4계층 레이어드 아키텍처</text>

  <!-- App 레이어 -->
  <rect x="460" y="90" width="280" height="45" rx="6" fill="#EA4335" opacity="0.9"/>
  <text x="600" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="white">App</text>
  <text x="600" y="126" text-anchor="middle" font-size="11" fill="white">main(), CLI, UI</text>

  <!-- Service 레이어 -->
  <rect x="460" y="145" width="280" height="45" rx="6" fill="#FBBC04" opacity="0.9"/>
  <text x="600" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Service</text>
  <text x="600" y="181" text-anchor="middle" font-size="11" fill="#333">clock, sensor, gfx</text>

  <!-- Driver 레이어 -->
  <rect x="460" y="200" width="280" height="45" rx="6" fill="#34A853" opacity="0.9"/>
  <text x="600" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="white">Driver</text>
  <text x="600" y="236" text-anchor="middle" font-size="11" fill="white">uart, spi, i2c, tim, gpio, stepper</text>

  <!-- HAL 레이어 -->
  <rect x="460" y="255" width="280" height="45" rx="6" fill="#1A73E8" opacity="0.9"/>
  <text x="600" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="white">HAL</text>
  <text x="600" y="291" text-anchor="middle" font-size="11" fill="white">ST 제공 HAL 라이브러리</text>

  <!-- 의존성 화살표 (단방향) -->
  <line x1="755" y1="130" x2="755" y2="150" stroke="#34A853" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="755" y1="185" x2="755" y2="205" stroke="#34A853" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="755" y1="240" x2="755" y2="260" stroke="#34A853" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="600" y="325" text-anchor="middle" font-size="13" fill="#1B5E20" font-weight="600">계층별 책임 분리</text>
  <text x="600" y="345" text-anchor="middle" font-size="12" fill="#1B5E20">"센서 버그 → Driver만 확인"</text>
  <text x="600" y="370" text-anchor="middle" font-size="28" fill="#34A853">&#x2713;</text>
</svg>
