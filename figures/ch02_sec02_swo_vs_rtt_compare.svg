<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"  font-family='"Noto Sans KR", "Malgun Gothic", sans-serif' viewBox="0 0 800 500">

  <!-- 배경 -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">그림 02-4. SWO/ITM vs SEGGER RTT 비교</text>

  <!-- 테이블 전체 테두리 -->
  <rect x="40" y="52" width="720" height="292" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- 헤더 행 배경 -->
  <rect x="40" y="52" width="720" height="44" rx="6" fill="#333333"/>

  <!-- 헤더 텍스트 -->
  <text x="160" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">항목</text>
  <line x1="280" y1="52" x2="280" y2="344" stroke="#CCCCCC" stroke-width="1"/>
  <text x="430" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A73E8">SWO / ITM</text>
  <line x1="560" y1="52" x2="560" y2="344" stroke="#CCCCCC" stroke-width="1"/>
  <text x="660" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#34A853">SEGGER RTT</text>

  <!-- 열 배경색 -->
  <rect x="281" y="96" width="278" height="248" fill="#E8F0FE" opacity="0.4"/>
  <rect x="561" y="96" width="198" height="248" fill="#E6F4EA" opacity="0.4"/>

  <!-- 행 1 -->
  <rect x="40" y="96" width="720" height="50" fill="transparent"/>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#CCCCCC" stroke-width="1"/>
  <text x="160" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">하드웨어 요구</text>
  <text x="160" y="137" text-anchor="middle" font-size="12" fill="#666666">전용 인터페이스</text>
  <text x="420" y="118" text-anchor="middle" font-size="13" fill="#333333">SWO 핀(PB3) 필요</text>
  <text x="420" y="137" text-anchor="middle" font-size="12" fill="#666666">TPIU 하드웨어 유닛 사용</text>
  <text x="660" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">없음</text>
  <text x="660" y="137" text-anchor="middle" font-size="12" fill="#666666">RAM 버퍼만 사용</text>

  <!-- 행 2 -->
  <line x1="40" y1="146" x2="760" y2="146" stroke="#CCCCCC" stroke-width="1"/>
  <text x="160" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">최대 속도</text>
  <text x="160" y="187" text-anchor="middle" font-size="12" fill="#666666">데이터 전송률</text>
  <text x="420" y="175" text-anchor="middle" font-size="13" fill="#333333">~2 Mbps</text>
  <text x="660" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">수십 Mbps</text>
  <text x="660" y="187" text-anchor="middle" font-size="12" fill="#666666">메모리 접근 속도</text>

  <!-- 행 3 -->
  <line x1="40" y1="196" x2="760" y2="196" stroke="#CCCCCC" stroke-width="1"/>
  <text x="160" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">CPU 오버헤드</text>
  <text x="160" y="237" text-anchor="middle" font-size="12" fill="#666666">코드 실행 영향</text>
  <text x="420" y="218" text-anchor="middle" font-size="13" fill="#333333">낮음</text>
  <text x="420" y="237" text-anchor="middle" font-size="12" fill="#666666">ITM 하드웨어가 처리</text>
  <text x="660" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">매우 낮음</text>
  <text x="660" y="237" text-anchor="middle" font-size="12" fill="#666666">메모리 쓰기만 수행</text>

  <!-- 행 4 -->
  <line x1="40" y1="246" x2="760" y2="246" stroke="#CCCCCC" stroke-width="1"/>
  <text x="160" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">설정 복잡도</text>
  <text x="160" y="287" text-anchor="middle" font-size="12" fill="#666666">초기 설정 난이도</text>
  <text x="420" y="268" text-anchor="middle" font-size="13" fill="#333333">중간</text>
  <text x="420" y="287" text-anchor="middle" font-size="12" fill="#666666">CubeIDE SWV 설정 필요</text>
  <text x="660" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">낮음</text>
  <text x="660" y="287" text-anchor="middle" font-size="12" fill="#666666">헤더 파일 추가만</text>

  <!-- 행 5 -->
  <line x1="40" y1="296" x2="760" y2="296" stroke="#CCCCCC" stroke-width="1"/>
  <text x="160" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">블로킹 여부</text>
  <text x="160" y="337" text-anchor="middle" font-size="12" fill="#666666">버퍼 가득 시 동작</text>
  <text x="420" y="318" text-anchor="middle" font-size="13" fill="#C62828">가능</text>
  <text x="420" y="337" text-anchor="middle" font-size="12" fill="#666666">버퍼 가득 시 대기 발생</text>
  <text x="660" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">최소화</text>
  <text x="660" y="337" text-anchor="middle" font-size="12" fill="#666666">Drop 모드로 손실 처리</text>

  <!-- 추천 사용 시나리오 박스 -->
  <rect x="40" y="360" width="350" height="110" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2"/>
  <rect x="40" y="360" width="350" height="32" rx="6" fill="#1A73E8"/>
  <text x="215" y="381" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">SWO/ITM 권장 환경</text>
  <text x="58" y="408" font-size="13" fill="#333333">• NUCLEO 보드 + CubeIDE 환경</text>
  <text x="58" y="428" font-size="13" fill="#333333">• 빠른 시작, 별도 라이브러리 불필요</text>
  <text x="58" y="448" font-size="13" fill="#333333">• 이 교재 Ch02~Ch05 기본 백엔드</text>

  <rect x="410" y="360" width="350" height="110" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="2"/>
  <rect x="410" y="360" width="350" height="32" rx="6" fill="#34A853"/>
  <text x="585" y="381" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">SEGGER RTT 권장 환경</text>
  <text x="428" y="408" font-size="13" fill="#333333">• 고속 로그 필요 시 (RTOS, DMA 등)</text>
  <text x="428" y="428" font-size="13" fill="#333333">• J-Link 디버거 보유 시</text>
  <text x="428" y="448" font-size="13" fill="#333333">• SWO 핀 사용 불가 환경</text>

  <!-- 하단 메모 -->
  <rect x="40" y="482" width="720" height="12" rx="2" fill="transparent"/>
  <text x="400" y="492" text-anchor="middle" font-size="11" fill="#999999">※ 두 방식 모두 logger.c 추상화 레이어를 통해 동일한 LOG_x() 매크로로 사용 가능 (Ch02-9 참조)</text>
</svg>
