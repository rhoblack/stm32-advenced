<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"  font-family='"Noto Sans KR", "Malgun Gothic", sans-serif' viewBox="0 0 800 500">

  <!-- 배경 -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">그림 02-8. LOG_LEVEL별 플래시(.text) 사용량 비교</text>

  <!-- 차트 영역 배경 -->
  <rect x="30" y="50" width="530" height="380" rx="6" fill="#F8F9FA" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- Y축 레이블 (LOG_LEVEL 설정) -->
  <!-- 행 1: LOG_DEBUG (4) -->
  <rect x="40" y="72" width="150" height="48" rx="4" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="115" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A73E8">LOG_DEBUG</text>
  <text x="115" y="109" text-anchor="middle" font-size="11" fill="#555555">레벨 4 (전체 출력)</text>

  <!-- 막대 1 -->
  <rect x="196" y="75" width="320" height="42" rx="3" fill="#1A73E8"/>
  <text x="524" y="98" text-anchor="start" font-size="12" fill="#333333" font-weight="bold">  기준 크기 (100%)</text>
  <!-- 수치 -->
  <text x="508" y="98" text-anchor="end" font-size="13" font-weight="bold" fill="#FFFFFF">~28 KB</text>

  <!-- 행 2: LOG_INFO (3) -->
  <rect x="40" y="136" width="150" height="48" rx="4" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="115" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#34A853">LOG_INFO</text>
  <text x="115" y="173" text-anchor="middle" font-size="11" fill="#555555">레벨 3</text>

  <!-- 막대 2 -->
  <rect x="196" y="139" width="262" height="42" rx="3" fill="#34A853"/>
  <text x="465" y="162" text-anchor="end" font-size="13" font-weight="bold" fill="#FFFFFF">~23 KB</text>
  <text x="468" y="162" text-anchor="start" font-size="12" fill="#34A853" font-weight="bold">  ~5 KB 절감</text>

  <!-- 행 3: LOG_WARN (2) -->
  <rect x="40" y="200" width="150" height="48" rx="4" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1.5"/>
  <text x="115" y="219" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF6D00">LOG_WARN</text>
  <text x="115" y="237" text-anchor="middle" font-size="11" fill="#555555">레벨 2 (권장)</text>

  <!-- 막대 3 -->
  <rect x="196" y="203" width="200" height="42" rx="3" fill="#FF6D00"/>
  <text x="392" y="227" text-anchor="end" font-size="13" font-weight="bold" fill="#FFFFFF">~18 KB</text>
  <text x="404" y="227" text-anchor="start" font-size="12" fill="#FF6D00" font-weight="bold">~10 KB 절감</text>
  <!-- 릴리즈 권장 배지 -->
  <rect x="196" y="248" width="92" height="16" rx="3" fill="#FF6D00"/>
  <text x="242" y="260" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold">릴리즈 빌드 권장</text>

  <!-- 행 4: LOG_ERROR (1) -->
  <rect x="40" y="268" width="150" height="48" rx="4" fill="#FEECEC" stroke="#EA4335" stroke-width="1.5"/>
  <text x="115" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="#EA4335">LOG_ERROR</text>
  <text x="115" y="305" text-anchor="middle" font-size="11" fill="#555555">레벨 1</text>

  <!-- 막대 4 -->
  <rect x="196" y="271" width="136" height="42" rx="3" fill="#EA4335"/>
  <text x="328" y="295" text-anchor="end" font-size="13" font-weight="bold" fill="#FFFFFF">~12 KB</text>
  <text x="340" y="295" text-anchor="start" font-size="12" fill="#EA4335" font-weight="bold">~16 KB 절감</text>

  <!-- 행 5: LOG_NONE (0) -->
  <rect x="40" y="332" width="150" height="48" rx="4" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="115" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#757575">LOG_NONE</text>
  <text x="115" y="369" text-anchor="middle" font-size="11" fill="#555555">레벨 0 (로그 없음)</text>

  <!-- 막대 5 -->
  <rect x="196" y="335" width="68" height="42" rx="3" fill="#9E9E9E"/>
  <text x="260" y="359" text-anchor="end" font-size="12" font-weight="bold" fill="#FFFFFF">~6 KB</text>
  <text x="272" y="359" text-anchor="start" font-size="12" fill="#9E9E9E" font-weight="bold">~22 KB 절감</text>

  <!-- X축 -->
  <line x1="196" y1="390" x2="520" y2="390" stroke="#999999" stroke-width="1.5"/>
  <text x="358" y="410" text-anchor="middle" font-size="12" fill="#666666">.text 섹션 크기 (상대적 크기, 예시 수치)</text>

  <!-- X축 눈금 -->
  <line x1="196" y1="388" x2="196" y2="393" stroke="#999999" stroke-width="1.5"/>
  <text x="196" y="406" text-anchor="middle" font-size="11" fill="#666666">0</text>
  <line x1="276" y1="388" x2="276" y2="393" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="356" y1="388" x2="356" y2="393" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="436" y1="388" x2="436" y2="393" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="516" y1="388" x2="516" y2="393" stroke="#999999" stroke-width="1.5"/>

  <!-- 그리드 라인 (세로) -->
  <line x1="276" y1="70" x2="276" y2="388" stroke="#EEEEEE" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="356" y1="70" x2="356" y2="388" stroke="#EEEEEE" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="436" y1="70" x2="436" y2="388" stroke="#EEEEEE" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 오른쪽 설명 박스 -->
  <rect x="575" y="50" width="210" height="380" rx="6" fill="#F8F9FA" stroke="#CCCCCC" stroke-width="1.5"/>
  <rect x="575" y="50" width="210" height="36" rx="6" fill="#333333"/>
  <text x="680" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">최적화 가이드</text>

  <rect x="590" y="100" width="180" height="68" rx="4" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="680" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">로그 레벨 절감 효과</text>
  <text x="680" y="137" text-anchor="middle" font-size="12" fill="#333333">레벨을 낮출수록</text>
  <text x="680" y="154" text-anchor="middle" font-size="12" fill="#333333">플래시 절약 효과</text>

  <rect x="590" y="182" width="180" height="80" rx="4" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1.5"/>
  <text x="680" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">릴리즈 빌드 권장</text>
  <rect x="598" y="207" width="164" height="20" rx="3" fill="#FF6D00"/>
  <text x="680" y="221" text-anchor="middle" font-size="11" font-family="monospace" fill="#FFFFFF">LOG_LEVEL = LOG_WARN</text>
  <text x="680" y="250" text-anchor="middle" font-size="12" fill="#666666">WARN + ERROR만 출력</text>

  <rect x="590" y="276" width="180" height="80" rx="4" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="680" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A73E8">.map 파일 확인 방법</text>
  <text x="680" y="314" text-anchor="middle" font-size="12" fill="#333333">빌드 후 .map 파일에서</text>
  <text x="680" y="332" text-anchor="middle" font-size="12" fill="#333333">Section .text Size 확인</text>
  <rect x="598" y="342" width="164" height="8" rx="2" fill="#1A73E8" opacity="0.3"/>

  <rect x="590" y="370" width="180" height="46" rx="4" fill="#FEECEC" stroke="#EA4335" stroke-width="1"/>
  <text x="680" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">개발 빌드</text>
  <rect x="598" y="394" width="164" height="18" rx="3" fill="#EA4335" opacity="0.7"/>
  <text x="680" y="407" text-anchor="middle" font-size="11" font-family="monospace" fill="#FFFFFF">LOG_LEVEL = LOG_DEBUG</text>

  <!-- 하단 메모 -->
  <rect x="30" y="445" width="760" height="42" rx="4" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-size="12" fill="#555555" font-weight="bold">* 위 수치는 예시입니다.</text>
  <text x="400" y="480" text-anchor="middle" font-size="12" fill="#666666">실제 프로젝트에서는 .map 파일 또는 빌드 출력의 "text" 섹션 크기를 직접 측정하여 최적화하세요.</text>
</svg>
