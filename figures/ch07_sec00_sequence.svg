<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <text x="375" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#212121">TIM Driver 시퀀스 다이어그램</text>
  <text x="375" y="45" text-anchor="middle" font-size="11" fill="#888">App → TIM Driver → HAL → TIM 하드웨어</text>

  <!-- 참가자 박스 -->
  <rect x="40" y="60" width="100" height="35" rx="6" fill="#EA4335" opacity="0.85"/>
  <text x="90" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="600">main() / App</text>

  <rect x="220" y="60" width="110" height="35" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="275" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="600">tim_driver</text>

  <rect x="410" y="60" width="100" height="35" rx="6" fill="#1A73E8" opacity="0.85"/>
  <text x="460" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="600">HAL_TIM</text>

  <rect x="590" y="60" width="110" height="35" rx="6" fill="#616161"/>
  <text x="645" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="600">TIM2 HW</text>

  <!-- 생명선 -->
  <line x1="90" y1="95" x2="90" y2="460" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="275" y1="95" x2="275" y2="460" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="95" x2="460" y2="460" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="645" y1="95" x2="645" y2="460" stroke="#616161" stroke-width="1.5" stroke-dasharray="4,3"/>

  <defs>
    <marker id="seqArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="seqArrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA4335"/>
    </marker>
  </defs>

  <!-- 1. 초기화 -->
  <rect x="15" y="115" width="720" height="85" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>
  <text x="25" y="128" font-size="10" fill="#34A853" font-weight="700">초기화 단계</text>

  <line x1="90" y1="140" x2="275" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="183" y="135" text-anchor="middle" font-size="11" fill="#333">tim_driver_init()</text>

  <line x1="275" y1="160" x2="460" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="368" y="155" text-anchor="middle" font-size="10" fill="#333">HAL_TIM_Base_Start_IT()</text>

  <line x1="460" y1="180" x2="645" y2="180" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="553" y="175" text-anchor="middle" font-size="10" fill="#333">PSC/ARR 레지스터 설정</text>

  <!-- 2. 주기 인터럽트 루프 -->
  <rect x="15" y="210" width="720" height="100" rx="4" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1"/>
  <text x="25" y="223" font-size="10" fill="#1A73E8" font-weight="700">주기 인터럽트 (반복)</text>

  <line x1="645" y1="240" x2="460" y2="240" stroke="#EA4335" stroke-width="1.5" marker-end="url(#seqArrowRed)"/>
  <text x="553" y="235" text-anchor="middle" font-size="10" fill="#EA4335">UEV 인터럽트 (ARR 도달)</text>

  <line x1="460" y1="260" x2="275" y2="260" stroke="#EA4335" stroke-width="1.5" marker-end="url(#seqArrowRed)"/>
  <text x="368" y="255" text-anchor="middle" font-size="10" fill="#EA4335">HAL_TIM_PeriodElapsedCallback()</text>

  <line x1="275" y1="285" x2="90" y2="285" stroke="#EA4335" stroke-width="1.5" marker-end="url(#seqArrowRed)"/>
  <text x="183" y="280" text-anchor="middle" font-size="10" fill="#EA4335">사용자 정의 콜백 동작</text>

  <!-- 3. PWM 설정 -->
  <rect x="15" y="320" width="720" height="70" rx="4" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1"/>
  <text x="25" y="333" font-size="10" fill="#F57F17" font-weight="700">PWM 듀티 변경</text>

  <line x1="90" y1="350" x2="275" y2="350" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="183" y="345" text-anchor="middle" font-size="11" fill="#333">pwm_set_duty(50)</text>

  <line x1="275" y1="370" x2="460" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="368" y="365" text-anchor="middle" font-size="10" fill="#333">__HAL_TIM_SET_COMPARE()</text>

  <!-- 4. 런타임 주기 변경 -->
  <rect x="15" y="400" width="720" height="55" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="25" y="413" font-size="10" fill="#7B1FA2" font-weight="700">런타임 주기 변경</text>

  <line x1="90" y1="430" x2="275" y2="430" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="183" y="425" text-anchor="middle" font-size="11" fill="#333">tim_set_period_ms(1000)</text>

  <line x1="275" y1="445" x2="460" y2="445" stroke="#333" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="368" y="440" text-anchor="middle" font-size="10" fill="#333">PSC/ARR 재계산 + 레지스터 갱신</text>
</svg>
