<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      .layer-app { fill: #EA4335; }
      .layer-service { fill: #FBBC04; }
      .layer-driver { fill: #34A853; }
      .layer-hal { fill: #1A73E8; }
      .text-title { font-size: 18px; font-weight: bold; fill: white; }
      .text-label { font-size: 14px; fill: white; font-family: 'Noto Sans KR', sans-serif; }
      .text-small { font-size: 12px; fill: #333; font-family: 'Noto Sans KR', sans-serif; }
      .border { stroke: #333; stroke-width: 2; }
      .line { stroke: #333; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="500" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">
    Ch11 아키텍처 (v0.9 → v1.1)
  </text>

  <!-- App Layer (빨강) -->
  <rect x="50" y="80" width="900" height="100" class="layer-app border" rx="5"/>
  <text x="60" y="105" class="text-title">App Layer</text>
  <text x="60" y="130" class="text-small">main() — 온습도 센서 + RTC 알람 통합</text>
  <text x="60" y="150" class="text-small">sensor_start_measurement() → sensor_check_alarm() → rtc_set_alarm_b()</text>

  <!-- Service Layer (노랑) -->
  <rect x="50" y="200" width="900" height="120" class="layer-service border" rx="5"/>
  <text x="60" y="225" class="text-title">Service Layer</text>

  <g>
    <rect x="70" y="245" width="250" height="60" fill="white" class="border" rx="3"/>
    <text x="80" y="265" class="text-small" font-weight="bold">alarm_service (Ch09)</text>
    <text x="80" y="285" class="text-small">RTC 알람 FSM</text>
  </g>

  <g>
    <rect x="360" y="245" width="250" height="60" fill="white" class="border" rx="3"/>
    <text x="370" y="265" class="text-small" font-weight="bold">sensor_service (NEW)</text>
    <text x="370" y="285" class="text-small">온습도 FSM + 임계값</text>
  </g>

  <g>
    <rect x="650" y="245" width="250" height="60" fill="white" class="border" rx="3"/>
    <text x="660" y="265" class="text-small" font-weight="bold">clock_service (Ch09)</text>
    <text x="660" y="285" class="text-small">RTC 시각 관리</text>
  </g>

  <!-- Driver Layer (초록) -->
  <rect x="50" y="340" width="900" height="140" class="layer-driver border" rx="5"/>
  <text x="60" y="365" class="text-title">Driver Layer</text>

  <g>
    <rect x="70" y="385" width="180" height="80" fill="white" class="border" rx="3"/>
    <text x="80" y="410" class="text-small" font-weight="bold">i2c_driver (NEW)</text>
    <text x="80" y="430" class="text-small">· i2c_master_transmit()</text>
    <text x="80" y="450" class="text-small">· i2c_master_receive()</text>
  </g>

  <g>
    <rect x="290" y="385" width="180" height="80" fill="white" class="border" rx="3"/>
    <text x="300" y="410" class="text-small" font-weight="bold">sht31_driver (NEW)</text>
    <text x="300" y="430" class="text-small">· sht31_init()</text>
    <text x="300" y="450" class="text-small">· sht31_read_temp_humid()</text>
  </g>

  <g>
    <rect x="510" y="385" width="180" height="80" fill="white" class="border" rx="3"/>
    <text x="520" y="410" class="text-small" font-weight="bold">rtc_driver (Ch09)</text>
    <text x="520" y="430" class="text-small">· rtc_get/set_time()</text>
    <text x="520" y="450" class="text-small">· rtc_set_alarm_a/b()</text>
  </g>

  <g>
    <rect x="730" y="385" width="180" height="80" fill="white" class="border" rx="3"/>
    <text x="740" y="410" class="text-small" font-weight="bold">tim_driver (Ch07)</text>
    <text x="740" y="430" class="text-small">· tim_pwm_start()</text>
    <text x="740" y="450" class="text-small">· tim_get_counter()</text>
  </g>

  <!-- HAL Layer (파랑) -->
  <rect x="50" y="500" width="900" height="80" class="layer-hal border" rx="5"/>
  <text x="60" y="525" class="text-title">HAL Layer (STM32CubeIDE)</text>
  <text x="60" y="550" class="text-small">HAL_I2C_Master_Transmit/Receive() | HAL_RTC_GetTime/SetAlarm() | HAL_TIM_PWM_Start()</text>

  <!-- Hardware -->
  <rect x="50" y="600" width="900" height="80" class="border" fill="#E8E8E8" rx="5"/>
  <text x="60" y="625" font-weight="bold" class="text-small">하드웨어</text>

  <g>
    <rect x="100" y="640" width="120" height="30" fill="white" class="border" rx="2"/>
    <text x="110" y="660" class="text-small">I2C2 (PB10/PB3)</text>
  </g>

  <g>
    <rect x="280" y="640" width="120" height="30" fill="white" class="border" rx="2"/>
    <text x="290" y="660" class="text-small">SHT31 센서</text>
  </g>

  <g>
    <rect x="460" y="640" width="120" height="30" fill="white" class="border" rx="2"/>
    <text x="470" y="660" class="text-small">RTC 백업 도메인</text>
  </g>

  <g>
    <rect x="640" y="640" width="120" height="30" fill="white" class="border" rx="2"/>
    <text x="650" y="660" class="text-small">TIM4 (PWM)</text>
  </g>

  <g>
    <rect x="820" y="640" width="110" height="30" fill="white" class="border" rx="2"/>
    <text x="830" y="660" class="text-small">모터 + LED</text>
  </g>

  <!-- 범례: 화살표 -->
  <line x1="50" y1="600" x2="50" y2="500" class="line"/>
  <text x="20" y="555" class="text-small">향상</text>

</svg>
