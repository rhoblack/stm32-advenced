<svg xmlns="http://www.w3.org/2000/svg" width="800" height="470" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 470">
  <defs>
    <marker id="arr11" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Ch11 아키텍처 위치 — I2C + SHT31 + Sensor Service (v0.9 → v1.1)</text>

  <!-- App Layer -->
  <rect x="50" y="45" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="67" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>
  <rect x="65" y="75" width="140" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="135" y="95" text-anchor="middle" font-size="11" fill="#C62828">main.c (슈퍼루프)</text>
  <rect x="220" y="75" width="170" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="305" y="95" text-anchor="middle" font-size="11" fill="#C62828">sensor 측정/RTC 통합</text>
  <rect x="405" y="75" width="150" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="480" y="95" text-anchor="middle" font-size="11" fill="#C62828">Button EXTI (PC13)</text>
  <rect x="570" y="75" width="160" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="650" y="95" text-anchor="middle" font-size="11" fill="#C62828">Log 출력 (Ch02)</text>

  <line x1="400" y1="115" x2="400" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr11)"/>

  <!-- Service Layer -->
  <rect x="50" y="150" width="700" height="75" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="172" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>
  <rect x="65" y="182" width="155" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="142" y="200" text-anchor="middle" font-size="11" fill="#E65100">alarm_service</text>
  <text x="142" y="213" text-anchor="middle" font-size="9" fill="#E65100">Ch09 기존</text>
  <rect x="240" y="182" width="205" height="35" rx="5" fill="#FFF3E0" stroke="#FBBC04" stroke-width="2"/>
  <text x="342" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">sensor_service ★NEW</text>
  <text x="342" y="212" text-anchor="middle" font-size="9" fill="#E65100">온습도 FSM + 임계값</text>
  <rect x="465" y="182" width="270" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="600" y="200" text-anchor="middle" font-size="11" fill="#E65100">clock_service (Ch09)</text>
  <text x="600" y="213" text-anchor="middle" font-size="9" fill="#E65100">RTC 시각 관리</text>

  <line x1="400" y1="225" x2="400" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arr11)"/>

  <!-- Driver Layer -->
  <rect x="50" y="260" width="700" height="75" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="282" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>
  <rect x="65" y="290" width="170" height="35" rx="5" fill="#A5D6A7" stroke="#34A853" stroke-width="2"/>
  <text x="150" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">i2c_driver ★NEW</text>
  <text x="150" y="320" text-anchor="middle" font-size="9" fill="#1B5E20">+i2c_master_transmit/receive</text>
  <rect x="250" y="290" width="170" height="35" rx="5" fill="#A5D6A7" stroke="#34A853" stroke-width="2"/>
  <text x="335" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">sht31_driver ★NEW</text>
  <text x="335" y="320" text-anchor="middle" font-size="9" fill="#1B5E20">+sht31_read_temp_humid</text>
  <rect x="435" y="290" width="140" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="505" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">rtc_driver</text>
  <text x="505" y="320" text-anchor="middle" font-size="9" fill="#555">Ch09 기존</text>
  <rect x="590" y="290" width="140" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="660" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">tim_driver</text>
  <text x="660" y="320" text-anchor="middle" font-size="9" fill="#555">Ch07 기존</text>

  <line x1="400" y1="335" x2="400" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arr11)"/>

  <!-- HAL Layer -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="392" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
  <rect x="70" y="398" width="110" height="22" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="125" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">HAL_I2C</text>
  <rect x="195" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="245" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_RTC</text>
  <rect x="310" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="360" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_TIM</text>
  <rect x="425" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="475" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_GPIO</text>
  <rect x="540" y="398" width="90" height="22" rx="4" fill="#BBDEFB"/>
  <text x="585" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">SWO/ITM</text>

  <!-- 버전 뱃지 -->
  <rect x="300" y="438" width="200" height="22" rx="11" fill="#1A73E8"/>
  <text x="400" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="white">v1.1 — Ch11 완성</text>
</svg>
