<svg xmlns="http://www.w3.org/2000/svg" width="800" height="470" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 470">
  <defs>
    <marker id="arr14" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Ch14 아키텍처 위치 — I2C DMA 심화</text>

  <!-- App Layer -->
  <rect x="50" y="45" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="67" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>
  <rect x="65" y="75" width="195" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="162" y="92" text-anchor="middle" font-size="11" fill="#C62828">sensor_app.c</text>
  <text x="162" y="103" text-anchor="middle" font-size="9" fill="#C62828">측정 요청/UI 갱신</text>
  <rect x="278" y="75" width="195" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="375" y="92" text-anchor="middle" font-size="11" fill="#C62828">ui_service.c</text>
  <text x="375" y="103" text-anchor="middle" font-size="9" fill="#C62828">화면 데이터 소비</text>
  <rect x="490" y="75" width="240" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="610" y="92" text-anchor="middle" font-size="11" fill="#C62828">cli_handler.c</text>
  <text x="610" y="103" text-anchor="middle" font-size="9" fill="#C62828">sensor read 명령</text>

  <line x1="400" y1="115" x2="400" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr14)"/>

  <!-- Service Layer -->
  <rect x="50" y="150" width="700" height="75" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="172" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>
  <rect x="130" y="182" width="230" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="245" y="200" text-anchor="middle" font-size="11" fill="#E65100">sensor_service</text>
  <text x="245" y="213" text-anchor="middle" font-size="9" fill="#E65100">온습도 데이터 집계/알람</text>
  <rect x="380" y="182" width="230" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="495" y="200" text-anchor="middle" font-size="11" fill="#E65100">gfx_service</text>
  <text x="495" y="213" text-anchor="middle" font-size="9" fill="#E65100">LCD 화면 구성</text>

  <line x1="400" y1="225" x2="400" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arr14)"/>

  <!-- Driver Layer -->
  <rect x="50" y="260" width="700" height="75" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="282" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>
  <rect x="65" y="290" width="185" height="35" rx="5" fill="#A5D6A7" stroke="#34A853" stroke-width="2"/>
  <text x="157" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">i2c_driver ★Ch14 업그레이드</text>
  <text x="157" y="319" text-anchor="middle" font-size="9" fill="#1B5E20">폴링→DMA 전환 ★ Ch14 핵심</text>
  <rect x="265" y="290" width="155" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="342" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">sht31_driver</text>
  <text x="342" y="320" text-anchor="middle" font-size="9" fill="#555">비동기 측정 루프/콜백 체인</text>
  <rect x="435" y="290" width="140" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="505" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">spi_driver</text>
  <text x="505" y="320" text-anchor="middle" font-size="9" fill="#555">SPI DMA (Ch12)</text>
  <rect x="590" y="290" width="140" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="660" y="307" text-anchor="middle" font-size="11" fill="#1B5E20">uart_driver</text>
  <text x="660" y="320" text-anchor="middle" font-size="9" fill="#555">UART DMA (Ch06)</text>

  <line x1="400" y1="335" x2="400" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arr14)"/>

  <!-- HAL Layer -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="392" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
  <rect x="70" y="398" width="130" height="22" rx="4" fill="#90CAF9" stroke="#1A73E8"/>
  <text x="135" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">HAL_I2C_DMA</text>
  <rect x="215" y="398" width="110" height="22" rx="4" fill="#BBDEFB"/>
  <text x="270" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_DMA</text>
  <rect x="340" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="390" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_SPI</text>
  <rect x="455" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="505" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_UART</text>

  <!-- 버전 뱃지 -->
  <rect x="270" y="438" width="260" height="22" rx="11" fill="#1A73E8"/>
  <text x="400" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ch14 — I2C DMA 업그레이드</text>
</svg>
