<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="460" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
  </defs>

  <!-- 전체 배경 -->
  <rect x="0" y="0" width="1000" height="460" fill="#F8F9FA"/>

  <!-- 제목 -->
  <text x="500" y="34" font-size="17" font-weight="bold" text-anchor="middle" fill="#1A1A2E">
    누적 성장! RTC 시각 → 시침 각도 → 모터 스텝 변환 (Ch09 + Ch10 통합)
  </text>

  <!-- ════════════════════════════════════════════
       상단: 변환 흐름 박스 (5단계)
       ════════════════════════════════════════════ -->

  <!-- 박스 1: RTC 시각 -->
  <rect x="20"  y="55" width="140" height="90" fill="#E8F5E9" stroke="#34A853" stroke-width="2" rx="8"/>
  <text x="90"  y="80"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1B5E20">RTC 시각</text>
  <text x="90"  y="105" font-size="22" font-weight="bold" text-anchor="middle" fill="#2E7D32">14:30</text>
  <text x="90"  y="134" font-size="12" text-anchor="middle" fill="#666">(시 : 분)</text>

  <!-- 화살표 1 -->
  <line x1="160" y1="100" x2="200" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="180" y="92"  font-size="11" text-anchor="middle" fill="#888">①</text>
  <text x="180" y="116" font-size="11" text-anchor="middle" fill="#888">12h 변환</text>

  <!-- 박스 2: 12시간 형식 -->
  <rect x="200" y="55" width="140" height="90" fill="#E8F5E9" stroke="#34A853" stroke-width="2" rx="8"/>
  <text x="270" y="80"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1B5E20">12h 형식</text>
  <text x="270" y="105" font-size="22" font-weight="bold" text-anchor="middle" fill="#2E7D32">2:30</text>
  <text x="270" y="134" font-size="12" text-anchor="middle" fill="#666">14 % 12 = 2</text>

  <!-- 화살표 2 -->
  <line x1="340" y1="100" x2="380" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="360" y="92"  font-size="11" text-anchor="middle" fill="#888">②</text>
  <text x="360" y="116" font-size="11" text-anchor="middle" fill="#888">각도 계산</text>

  <!-- 박스 3: 시침 각도 -->
  <rect x="380" y="55" width="140" height="90" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2" rx="8"/>
  <text x="450" y="80"  font-size="13" font-weight="bold" text-anchor="middle" fill="#1565C0">시침 각도</text>
  <text x="450" y="105" font-size="22" font-weight="bold" text-anchor="middle" fill="#0D47A1">75°</text>
  <text x="450" y="134" font-size="12" text-anchor="middle" fill="#666">2×30 + 30×0.5</text>

  <!-- 화살표 3 -->
  <line x1="520" y1="100" x2="560" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="540" y="92"  font-size="11" text-anchor="middle" fill="#888">③</text>
  <text x="540" y="116" font-size="11" text-anchor="middle" fill="#888">스텝 변환</text>

  <!-- 박스 4: 목표 스텝 -->
  <rect x="560" y="55" width="155" height="90" fill="#FFF8E1" stroke="#FBBC04" stroke-width="2" rx="8"/>
  <text x="637" y="80"  font-size="13" font-weight="bold" text-anchor="middle" fill="#E65100">목표 스텝</text>
  <text x="637" y="105" font-size="22" font-weight="bold" text-anchor="middle" fill="#E65100">853</text>
  <text x="637" y="134" font-size="12" text-anchor="middle" fill="#666">75×4096÷360</text>

  <!-- 화살표 4 -->
  <line x1="715" y1="100" x2="755" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="735" y="92"  font-size="11" text-anchor="middle" fill="#888">④</text>
  <text x="735" y="116" font-size="11" text-anchor="middle" fill="#888">이동 스텝</text>

  <!-- 박스 5: 모터 회전 -->
  <rect x="755" y="55" width="220" height="90" fill="#FFEBEE" stroke="#EA4335" stroke-width="2" rx="8"/>
  <text x="865" y="80"  font-size="13" font-weight="bold" text-anchor="middle" fill="#C62828">모터 회전</text>
  <text x="865" y="105" font-size="17" font-weight="bold" text-anchor="middle" fill="#EA4335">853 − current</text>
  <text x="865" y="125" font-size="13" font-weight="bold" text-anchor="middle" fill="#EA4335">= Δ delta</text>
  <text x="865" y="140" font-size="12" text-anchor="middle" fill="#666">(최단 경로)</text>

  <!-- ════════════════════════════════════════════
       하단: 상세 계산 박스
       ════════════════════════════════════════════ -->
  <rect x="20" y="165" width="960" height="280" fill="white" stroke="#1A73E8" stroke-width="2" rx="10"/>

  <!-- 헤더 -->
  <rect x="20" y="165" width="960" height="36" fill="#1565C0" rx="10"/>
  <rect x="20" y="187" width="960" height="14" fill="#1565C0"/>
  <text x="500" y="190" font-size="15" font-weight="bold" text-anchor="middle" fill="white">📐 상세 계산 공식 (예: 14:30 기준)</text>

  <!-- Step 1 -->
  <rect x="40" y="212" width="8" height="55" fill="#34A853" rx="3"/>
  <text x="58"  y="230" font-size="13" font-weight="bold" fill="#1B5E20">Step 1 — 12시간 형식 변환</text>
  <text x="58"  y="250" font-size="13" fill="#333" font-family="monospace">hour_12 = hour % 12</text>
  <text x="58"  y="268" font-size="12" fill="#555">예: 14시 → 14 % 12 = 2 → 오후 2시 = 오전 2시와 동일한 시침 위치</text>

  <!-- Step 2 -->
  <rect x="40" y="278" width="8" height="55" fill="#1A73E8" rx="3"/>
  <text x="58"  y="296" font-size="13" font-weight="bold" fill="#1565C0">Step 2 — 시침 각도 계산 (0° ~ 360°)</text>
  <text x="58"  y="316" font-size="13" fill="#333" font-family="monospace">angle = (hour_12 × 30) + (minute × 0.5)</text>
  <text x="58"  y="334" font-size="12" fill="#555">예: (2 × 30) + (30 × 0.5) = 60 + 15 = <tspan font-weight="bold" fill="#0D47A1">75°</tspan></text>

  <!-- Step 3 -->
  <rect x="500" y="212" width="8" height="55" fill="#FBBC04" rx="3"/>
  <text x="518" y="230" font-size="13" font-weight="bold" fill="#E65100">Step 3 — 모터 스텝 변환 (0 ~ 4095)</text>
  <text x="518" y="250" font-size="13" fill="#333" font-family="monospace">steps = (angle × 4096) / 360</text>
  <text x="518" y="268" font-size="12" fill="#555">예: (75 × 4096) / 360 = 307200 / 360 = <tspan font-weight="bold" fill="#E65100">853 스텝</tspan></text>

  <!-- Step 4 -->
  <rect x="500" y="278" width="8" height="55" fill="#EA4335" rx="3"/>
  <text x="518" y="296" font-size="13" font-weight="bold" fill="#C62828">Step 4 — 이동량(delta) 계산</text>
  <text x="518" y="316" font-size="13" fill="#333" font-family="monospace">delta = target_steps − current_steps</text>
  <text x="518" y="334" font-size="12" fill="#555">최단 경로 선택: delta &gt; 2048이면 역방향이 더 짧음</text>

  <!-- 핵심 요약 -->
  <rect x="40" y="348" width="920" height="85" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="6"/>
  <text x="500" y="371" font-size="14" font-weight="bold" text-anchor="middle" fill="#1B5E20">💡 핵심 원리</text>
  <text x="60"  y="393" font-size="13" fill="#2E7D32">• 매초 RTC 인터럽트 발생 → 분(minute)이 변경된 경우에만 위 4단계 실행 → CPU 부하 최소화</text>
  <text x="60"  y="413" font-size="13" fill="#2E7D32">• 소프트웨어 위치: 0 ~ 4095 (12비트, 360° 매핑) — 시침이 정확히 64개 위치(풀스텝)에 멈춤</text>
  <text x="60"  y="430" font-size="12" fill="#555">• 정전 후 재부팅 시: rtc_get_time()으로 현재 시각 읽어 즉시 정확한 위치로 복구 가능</text>
</svg>
