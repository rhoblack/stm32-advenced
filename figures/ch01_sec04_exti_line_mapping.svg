<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1A73E8"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9E9E9E"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34A853"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="900" height="550" fill="none" stroke="#E0E0E0" stroke-width="1.5" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="44" fill="#1A73E8" rx="8"/>
  <rect x="0" y="36" width="900" height="8" fill="#1A73E8"/>
  <text x="450" y="27" text-anchor="middle" fill="white" font-size="16" font-weight="bold">STM32F411 EXTI 라인 매핑 구조</text>

  <!-- ===== MAIN TABLE ===== -->
  <!-- Column headers: GPIO Ports -->
  <!-- Table starts at x=30, y=60 -->
  <!-- Col widths: Pin(50), PA(80), PB(80), PC(80), PD(80), PE(80) = 450px total, then arrow space, then EXTI col -->

  <!-- Header row background -->
  <rect x="30" y="58" width="490" height="26" fill="#E8F0FE" rx="2"/>

  <!-- Header texts -->
  <text x="55" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">핀 번호</text>
  <text x="133" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">PA</text>
  <text x="213" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">PB</text>
  <text x="293" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">PC</text>
  <text x="373" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">PD</text>
  <text x="453" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">PE</text>

  <!-- EXTI header -->
  <rect x="670" y="58" width="100" height="26" fill="#E8F0FE" rx="2"/>
  <text x="720" y="75" text-anchor="middle" fill="#1A73E8" font-size="11" font-weight="bold">EXTI 라인</text>

  <!-- Convergence label -->
  <text x="590" y="75" text-anchor="middle" fill="#757575" font-size="9">MUX 선택</text>

  <!-- Define row data: [pin_num, row_y, exti_highlight, pa_highlight, pc_highlight_text] -->
  <!-- Rows for pins 0,1,2,3,4,5,6, ..., 13, 14, 15 -->
  <!-- We show: 0,1,2,3,4,5,6, [gap], 13, 14, 15 -->

  <!-- Row height = 22, starting y = 84 -->

  <!-- Helper: draw a table row -->
  <!-- Row 0 -->
  <rect x="30" y="84" width="490" height="22" fill="white" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="84" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="55" y="99" text-anchor="middle" fill="#212121" font-size="10" font-weight="bold">0</text>
  <text x="133" y="99" text-anchor="middle" fill="#212121" font-size="10">PA0</text>
  <text x="213" y="99" text-anchor="middle" fill="#212121" font-size="10">PB0</text>
  <text x="293" y="99" text-anchor="middle" fill="#212121" font-size="10">PC0</text>
  <text x="373" y="99" text-anchor="middle" fill="#212121" font-size="10">PD0</text>
  <text x="453" y="99" text-anchor="middle" fill="#212121" font-size="10">PE0</text>
  <!-- Arrow to EXTI -->
