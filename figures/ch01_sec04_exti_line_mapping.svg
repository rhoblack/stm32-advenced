  <text x="213" y="121" text-anchor="middle" fill="#212121" font-size="10">PB1</text>
  <text x="293" y="121" text-anchor="middle" fill="#212121" font-size="10">PC1</text>
  <text x="373" y="121" text-anchor="middle" fill="#212121" font-size="10">PD1</text>
  <text x="453" y="121" text-anchor="middle" fill="#212121" font-size="10">PE1</text>
  <line x1="522" y1="117" x2="668" y2="117" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <rect x="670" y="106" width="100" height="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="121" text-anchor="middle" fill="#757575" font-size="10">EXTI 1</text>

  <!-- Row 2 -->
  <rect x="30" y="128" width="490" height="22" fill="white" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="128" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="55" y="143" text-anchor="middle" fill="#212121" font-size="10" font-weight="bold">2</text>
  <text x="133" y="143" text-anchor="middle" fill="#212121" font-size="10">PA2</text>
  <text x="213" y="143" text-anchor="middle" fill="#212121" font-size="10">PB2</text>
  <text x="293" y="143" text-anchor="middle" fill="#212121" font-size="10">PC2</text>
  <text x="373" y="143" text-anchor="middle" fill="#212121" font-size="10">PD2</text>
  <text x="453" y="143" text-anchor="middle" fill="#212121" font-size="10">PE2</text>
  <line x1="522" y1="139" x2="668" y2="139" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <rect x="670" y="128" width="100" height="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="143" text-anchor="middle" fill="#757575" font-size="10">EXTI 2</text>

  <!-- Row 3 -->
  <rect x="30" y="150" width="490" height="22" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="150" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="55" y="165" text-anchor="middle" fill="#212121" font-size="10" font-weight="bold">3</text>
  <text x="133" y="165" text-anchor="middle" fill="#212121" font-size="10">PA3</text>
  <text x="213" y="165" text-anchor="middle" fill="#212121" font-size="10">PB3</text>
  <text x="293" y="165" text-anchor="middle" fill="#212121" font-size="10">PC3</text>
  <text x="373" y="165" text-anchor="middle" fill="#212121" font-size="10">PD3</text>
  <text x="453" y="165" text-anchor="middle" fill="#212121" font-size="10">PE3</text>
  <line x1="522" y1="161" x2="668" y2="161" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <rect x="670" y="150" width="100" height="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="165" text-anchor="middle" fill="#757575" font-size="10">EXTI 3</text>

  <!-- Row 4 -->
  <rect x="30" y="172" width="490" height="22" fill="white" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="172" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="55" y="187" text-anchor="middle" fill="#212121" font-size="10" font-weight="bold">4</text>
  <text x="133" y="187" text-anchor="middle" fill="#212121" font-size="10">PA4</text>
  <text x="213" y="187" text-anchor="middle" fill="#212121" font-size="10">PB4</text>
  <text x="293" y="187" text-anchor="middle" fill="#212121" font-size="10">PC4</text>
  <text x="373" y="187" text-anchor="middle" fill="#212121" font-size="10">PD4</text>
  <text x="453" y="187" text-anchor="middle" fill="#212121" font-size="10">PE4</text>
  <line x1="522" y1="183" x2="668" y2="183" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <rect x="670" y="172" width="100" height="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="187" text-anchor="middle" fill="#757575" font-size="10">EXTI 4</text>

  <!-- Row 5: PA5 highlighted (green - LED output, EXTI not needed) -->
  <rect x="30" y="194" width="490" height="22" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="194" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
  <text x="55" y="209" text-anchor="middle" fill="#212121" font-size="10" font-weight="bold">5</text>
  <!-- PA5 highlighted cell -->
  <rect x="93" y="196" width="78" height="18" fill="#34A853" rx="2"/>
  <text x="132" y="209" text-anchor="middle" fill="white" font-size="9" font-weight="bold">PA5 ← LD2</text>
  <text x="213" y="209" text-anchor="middle" fill="#212121" font-size="10">PB5</text>
  <text x="293" y="209" text-anchor="middle" fill="#212121" font-size="10">PC5</text>
  <text x="373" y="209" text-anchor="middle" fill="#212121" font-size="10">PD5</text>
  <text x="453" y="209" text-anchor="middle" fill="#212121" font-size="10">PE5</text>
  <!-- Dashed arrow (EXTI not used) -->
