  <!-- EXTI box -->
  <rect x="670" y="84" width="100" height="22" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="720" y="99" text-anchor="middle" fill="#757575" font-size="10">EXTI 0</text>

  <!-- Row 1 -->
  <rect x="30" y="106" width="490" height="22" fill="#FAFAFA" stroke="#E8E8E8" stroke-width="0.5"/>
  <rect x="30" y="106" width="50" height="22" fill="#F5F5F5" stroke="#E8E8E8" stroke-width="0.5"/>
