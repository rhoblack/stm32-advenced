<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">PSC · ARR · CCR — 주기를 만드는 세 개의 톱니바퀴</text>

  <!-- 클럭 소스 -->
  <rect x="30" y="60" width="130" height="60" rx="8" fill="#1A73E8" opacity="0.85"/>
  <text x="95" y="85" text-anchor="middle" font-size="13" fill="white" font-weight="700">시스템 클럭</text>
  <text x="95" y="105" text-anchor="middle" font-size="12" fill="white">84 MHz (APB1)</text>

  <!-- 화살표 1 -->
  <defs>
    <marker id="gearArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
  <line x1="160" y1="90" x2="200" y2="90" stroke="#333" stroke-width="2" marker-end="url(#gearArrow)"/>

  <!-- PSC (큰 기어) -->
  <rect x="210" y="50" width="150" height="80" rx="10" fill="#FBBC04" opacity="0.85"/>
  <text x="285" y="78" text-anchor="middle" font-size="14" fill="white" font-weight="700">PSC (Prescaler)</text>
  <text x="285" y="98" text-anchor="middle" font-size="11" fill="white">분주기 = "큰 기어"</text>
  <text x="285" y="118" text-anchor="middle" font-size="10" fill="white">값: 8399 → ÷8400</text>

  <!-- 계산식 1 -->
  <rect x="210" y="140" width="150" height="30" rx="4" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1"/>
  <text x="285" y="160" text-anchor="middle" font-size="11" fill="#333" font-weight="600">f_cnt = 84M / 8400 = 10kHz</text>

  <!-- 화살표 2 -->
  <line x1="360" y1="90" x2="410" y2="90" stroke="#333" stroke-width="2" marker-end="url(#gearArrow)"/>

  <!-- 카운터 -->
  <rect x="420" y="50" width="150" height="80" rx="10" fill="#34A853" opacity="0.85"/>
  <text x="495" y="78" text-anchor="middle" font-size="14" fill="white" font-weight="700">카운터 (CNT)</text>
  <text x="495" y="98" text-anchor="middle" font-size="11" fill="white">0 → ARR 까지 증가</text>
  <text x="495" y="118" text-anchor="middle" font-size="10" fill="white">10kHz로 카운트</text>

  <!-- 화살표 3 -->
  <line x1="570" y1="90" x2="620" y2="90" stroke="#333" stroke-width="2" marker-end="url(#gearArrow)"/>

  <!-- ARR (작은 기어) -->
  <rect x="630" y="50" width="140" height="80" rx="10" fill="#EA4335" opacity="0.85"/>
  <text x="700" y="78" text-anchor="middle" font-size="14" fill="white" font-weight="700">ARR (Auto-Reload)</text>
  <text x="700" y="98" text-anchor="middle" font-size="11" fill="white">상한 = "작은 기어"</text>
  <text x="700" y="118" text-anchor="middle" font-size="10" fill="white">값: 9999 → 10000카운트</text>

  <!-- 계산식 2 -->
  <rect x="630" y="140" width="140" height="30" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="1"/>
  <text x="700" y="160" text-anchor="middle" font-size="11" fill="#333" font-weight="600">T = 10000 / 10kHz = 1초</text>

  <!-- 결과 -->
  <line x1="700" y1="170" x2="700" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#gearArrow)"/>

  <rect x="580" y="200" width="190" height="35" rx="6" fill="#212121"/>
  <text x="675" y="223" text-anchor="middle" font-size="14" fill="#FFD600" font-weight="700">UEV 인터럽트! (1초마다)</text>

  <!-- 마스터 공식 -->
  <rect x="100" y="260" width="600" height="100" rx="10" fill="#F5F5F5" stroke="#333" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" font-size="15" font-weight="700" fill="#212121">마스터 공식</text>
  <text x="400" y="315" text-anchor="middle" font-size="16" fill="#1A73E8" font-weight="700">주기(T) = (PSC + 1) × (ARR + 1) / f_clk</text>
  <text x="400" y="345" text-anchor="middle" font-size="13" fill="#555">예: T = (8399 + 1) × (9999 + 1) / 84,000,000 = 8400 × 10000 / 84M = 1.0초</text>
</svg>
