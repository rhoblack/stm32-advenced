<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#212121">HAL Mock 기반 단위 테스트 구조</text>

  <!-- Production Build (Left) -->
  <rect x="30" y="50" width="290" height="280" rx="8" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2"/>
  <text x="175" y="74" text-anchor="middle" font-weight="bold" fill="#1A73E8">실제 빌드 (Production)</text>

  <rect x="50" y="88" width="250" height="45" rx="5" fill="#EA4335" fill-opacity="0.2" stroke="#EA4335"/>
  <text x="175" y="108" text-anchor="middle" font-size="12">App / Service 레이어</text>
  <text x="175" y="124" text-anchor="middle" font-size="11" fill="#555">sensor_service_test_trigger()</text>

  <rect x="50" y="145" width="250" height="45" rx="5" fill="#34A853" fill-opacity="0.2" stroke="#34A853"/>
  <text x="175" y="165" text-anchor="middle" font-size="12">Driver 레이어</text>
  <text x="175" y="181" text-anchor="middle" font-size="11" fill="#555">sht31_driver.c (실제 I2C)</text>

  <rect x="50" y="202" width="250" height="45" rx="5" fill="#1A73E8" fill-opacity="0.2" stroke="#1A73E8"/>
  <text x="175" y="222" text-anchor="middle" font-size="12">HAL 레이어</text>
  <text x="175" y="238" text-anchor="middle" font-size="11" fill="#555">HAL_I2C_Master_Transmit()</text>

  <rect x="50" y="259" width="250" height="45" rx="5" fill="#607D8B" fill-opacity="0.2" stroke="#607D8B"/>
  <text x="175" y="279" text-anchor="middle" font-size="12">Hardware</text>
  <text x="175" y="295" text-anchor="middle" font-size="11" fill="#555">NUCLEO-F411RE 실물</text>

  <!-- Test Build (Right) -->
  <rect x="380" y="50" width="290" height="280" rx="8" fill="#FFF3E0" stroke="#FBBC04" stroke-width="2"/>
  <text x="525" y="74" text-anchor="middle" font-weight="bold" fill="#E37400">테스트 빌드 (Test)</text>

  <rect x="400" y="88" width="250" height="45" rx="5" fill="#EA4335" fill-opacity="0.2" stroke="#EA4335"/>
  <text x="525" y="108" text-anchor="middle" font-size="12">동일: App / Service 레이어</text>
  <text x="525" y="124" text-anchor="middle" font-size="11" fill="#555">sensor_service_test_trigger()</text>

  <rect x="400" y="145" width="250" height="45" rx="5" fill="#34A853" fill-opacity="0.2" stroke="#34A853"/>
  <text x="525" y="165" text-anchor="middle" font-size="12">동일: Driver 레이어</text>
  <text x="525" y="181" text-anchor="middle" font-size="11" fill="#555">sht31_driver.c (인터페이스 동일)</text>

  <!-- Mock HAL (highlighted) -->
  <rect x="400" y="202" width="250" height="45" rx="5" fill="#FBBC04" fill-opacity="0.5" stroke="#E37400" stroke-width="2"/>
  <text x="525" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#E37400">Mock HAL (교체!)</text>
  <text x="525" y="234" text-anchor="middle" font-size="11" fill="#555">hal_mock_i2c.c (가짜 응답)</text>

  <!-- No Hardware -->
  <rect x="400" y="259" width="250" height="45" rx="5" fill="#ECEFF1" stroke="#B0BEC5" stroke-dasharray="6"/>
  <text x="525" y="279" text-anchor="middle" font-size="12" fill="#90A4AE">Hardware 불필요</text>
  <text x="525" y="295" text-anchor="middle" font-size="11" fill="#B0BEC5">PC에서 실행 가능!</text>

  <!-- Replace arrow -->
  <line x1="300" y1="225" x2="398" y2="225" stroke="#E37400" stroke-width="2.5" marker-end="url(#marr)"/>
  <text x="349" y="218" text-anchor="middle" font-size="11" fill="#E37400" font-weight="bold">Mock</text>
  <text x="349" y="232" text-anchor="middle" font-size="11" fill="#E37400">교체</text>

  <!-- Bottom note -->
  <rect x="30" y="345" width="640" height="28" rx="5" fill="#E8F5E9" stroke="#34A853"/>
  <text x="350" y="363" text-anchor="middle" font-size="12" fill="#2E7D32">핵심: 테스트 대상 코드는 변경 없이 HAL 계층만 Mock으로 교체 → 의존성 주입(DI) 원리</text>

  <defs>
    <marker id="marr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#E37400"/>
    </marker>
  </defs>
</svg>
