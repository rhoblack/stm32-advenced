<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
    </style>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="#F8F9FA" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">GFX 추상화 계층 — "무엇을" vs "어떻게"</text>

  <!-- 왼쪽: Ch12 방식 (나쁜 예) -->
  <rect x="30" y="50" width="290" height="300" rx="8" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="175" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">Ch12 방식 (직접 호출)</text>
  <text x="175" y="93" text-anchor="middle" font-size="11" fill="#C62828">main.c가 LCD Driver를 직접 조작</text>

  <rect x="50" y="105" width="250" height="60" rx="6" fill="#EA4335" fill-opacity="0.2" stroke="#EA4335" stroke-width="1.5"/>
  <text x="175" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">main.c</text>
  <text x="175" y="148" text-anchor="middle" font-size="10" fill="#B71C1C">ILI9341_Fill_Color(BLACK);</text>
  <text x="175" y="162" text-anchor="middle" font-size="10" fill="#B71C1C">ILI9341_Draw_String(x, y, str);</text>

  <!-- 긴 화살표 -->
  <line x1="175" y1="165" x2="175" y2="220" stroke="#C62828" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="195" y="197" font-size="10" fill="#C62828">직접 호출</text>

  <rect x="50" y="220" width="250" height="55" rx="6" fill="#34A853" fill-opacity="0.2" stroke="#34A853" stroke-width="1.5"/>
  <text x="175" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">ili9341_driver.c</text>
  <text x="175" y="265" text-anchor="middle" font-size="10" fill="#1B5E20">ILI9341 전용 저수준 함수들</text>

  <text x="175" y="305" text-anchor="middle" font-size="11" fill="#C62828">⚠ 문제: LCD 교체 시</text>
  <text x="175" y="321" text-anchor="middle" font-size="11" fill="#C62828">main.c 전체 수정 필요!</text>

  <!-- 오른쪽: Ch13 방식 (좋은 예) -->
  <rect x="380" y="50" width="290" height="300" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="525" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Ch13 방식 (레이어 분리)</text>
  <text x="525" y="93" text-anchor="middle" font-size="11" fill="#1B5E20">UI Service가 GFX를 통해 추상화</text>

  <rect x="400" y="105" width="250" height="40" rx="6" fill="#EA4335" fill-opacity="0.2" stroke="#EA4335" stroke-width="1.5"/>
  <text x="525" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">UI Service</text>

  <line x1="525" y1="145" x2="525" y2="175" stroke="#43A047" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="545" y="165" font-size="10" fill="#43A047">추상 호출</text>

  <rect x="400" y="175" width="250" height="55" rx="6" fill="#FBBC04" fill-opacity="0.3" stroke="#F57F17" stroke-width="2"/>
  <text x="525" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">GFX Service</text>
  <text x="525" y="216" text-anchor="middle" font-size="10" fill="#E65100">GFX_DrawString(x, y, str);</text>
  <text x="525" y="230" text-anchor="middle" font-size="10" fill="#E65100">GFX_FillRect(x, y, w, h);</text>

  <line x1="525" y1="230" x2="525" y2="260" stroke="#43A047" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="545" y="250" font-size="10" fill="#43A047">위임</text>

  <rect x="400" y="260" width="250" height="40" rx="6" fill="#34A853" fill-opacity="0.2" stroke="#34A853" stroke-width="1.5"/>
  <text x="525" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">LCD Driver</text>

  <text x="525" y="318" text-anchor="middle" font-size="11" fill="#1B5E20">✅ LCD 교체 시</text>
  <text x="525" y="334" text-anchor="middle" font-size="11" fill="#1B5E20">GFX Service 내부만 수정!</text>

  <!-- 중앙 VS 표시 -->
  <text x="350" y="200" text-anchor="middle" font-size="22" font-weight="bold" fill="#9E9E9E">vs</text>
</svg>
