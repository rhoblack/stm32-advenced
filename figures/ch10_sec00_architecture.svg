<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <style>
      .hal-bg     { fill: #E8F0FF; stroke: #1A73E8; stroke-width: 2; }
      .driver-bg  { fill: #E8F5E9; stroke: #34A853; stroke-width: 2; }
      .service-bg { fill: #FFF8E1; stroke: #FBBC04; stroke-width: 2; }
      .app-bg     { fill: #FFEBEE; stroke: #EA4335; stroke-width: 2; }
      .text-title  { font-size: 18px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
      .text-normal { font-size: 14px; font-family: 'Noto Sans KR', sans-serif; }
      .text-small  { font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
      .highlight   { stroke: #FF6D00; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="450" y="32" class="text-title" text-anchor="middle" fill="#1A1A2E">v1.0 아키텍처: 4계층 통합</text>
  <text x="450" y="54" class="text-small" text-anchor="middle" fill="#666">RTC(Ch09) + Motor Driver(Ch10) = 첫 완전한 응용 프로젝트 (스마트 시계)</text>

  <!-- ===== App 레이어 (최상단) ===== -->
  <rect x="50" y="70" width="800" height="100" class="app-bg" rx="8"/>
  <text x="70" y="98" class="text-title" fill="#EA4335">Application Layer</text>
  <text x="80" y="126" class="text-normal">main() / Smart Clock Application</text>
  <text x="80" y="150" class="text-small" fill="#666">• clock_service_init() • clock_service_on_rtc_tick() (매초 호출)</text>

  <!-- 화살표: App → Service (아래 방향, 의존성) -->
  <line x1="200" y1="170" x2="200" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="170" x2="450" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="170" x2="720" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Service 레이어 ===== -->
  <rect x="50" y="210" width="800" height="140" class="service-bg" rx="8"/>
  <text x="70" y="238" class="text-title" fill="#E65100">Service Layer</text>

  <!-- Alarm Service (Ch09) -->
  <rect x="80" y="253" width="200" height="80" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5" rx="5"/>
  <text x="180" y="278" class="text-normal" text-anchor="middle" font-weight="bold">alarm_service.c</text>
  <text x="180" y="296" class="text-small" text-anchor="middle">(Ch09)</text>
  <text x="180" y="313" class="text-small" text-anchor="middle" fill="#666">Alarm FSM</text>

  <!-- Clock Service (Ch10) — 새로 추가 -->
  <rect x="350" y="253" width="200" height="80" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5" rx="5"/>
  <rect x="350" y="253" width="200" height="80" class="highlight"/>
  <text x="450" y="278" class="text-normal" text-anchor="middle" font-weight="bold">clock_service.c</text>
  <text x="450" y="296" class="text-small" text-anchor="middle">(Ch10) ⭐ NEW</text>
  <text x="450" y="313" class="text-small" text-anchor="middle" fill="#666">RTC + Motor 조율</text>

  <!-- Log Service (Ch02) -->
  <rect x="620" y="253" width="200" height="80" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5" rx="5"/>
  <text x="720" y="278" class="text-normal" text-anchor="middle" font-weight="bold">log_service.c</text>
  <text x="720" y="296" class="text-small" text-anchor="middle">(Ch02)</text>
  <text x="720" y="313" class="text-small" text-anchor="middle" fill="#666">LOG_I/D/W/E</text>

  <!-- 화살표: Service → Driver (아래 방향, 의존성) -->
  <line x1="200" y1="350" x2="200" y2="388" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="350" x2="450" y2="388" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="350" x2="720" y2="388" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Driver 레이어 ===== -->
  <rect x="50" y="390" width="800" height="140" class="driver-bg" rx="8"/>
  <text x="70" y="418" class="text-title" fill="#34A853">Driver Layer</text>

  <!-- RTC Driver (Ch09) -->
  <rect x="80" y="433" width="200" height="80" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="5"/>
  <text x="180" y="458" class="text-normal" text-anchor="middle" font-weight="bold">rtc_driver.c</text>
  <text x="180" y="476" class="text-small" text-anchor="middle">(Ch09)</text>
  <text x="180" y="493" class="text-small" text-anchor="middle" fill="#666">rtc_get_time()</text>

  <!-- Stepper Driver (Ch10) — 새로 추가 -->
  <rect x="350" y="433" width="200" height="80" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="5"/>
  <rect x="350" y="433" width="200" height="80" class="highlight"/>
  <text x="450" y="458" class="text-normal" text-anchor="middle" font-weight="bold">stepper_driver.c</text>
  <text x="450" y="476" class="text-small" text-anchor="middle">(Ch10) ⭐ NEW</text>
  <text x="450" y="493" class="text-small" text-anchor="middle" fill="#666">stepper_move_steps()</text>

  <!-- UART Driver (Ch04) -->
  <rect x="620" y="433" width="200" height="80" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="5"/>
  <text x="720" y="458" class="text-normal" text-anchor="middle" font-weight="bold">uart_driver.c</text>
  <text x="720" y="476" class="text-small" text-anchor="middle">(Ch04)</text>
  <text x="720" y="493" class="text-small" text-anchor="middle" fill="#666">uart_send_data()</text>

  <!-- 화살표: Driver → HAL (아래 방향, 의존성) -->
  <line x1="200" y1="530" x2="200" y2="568" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="530" x2="450" y2="568" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="530" x2="720" y2="568" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== HAL 레이어 (최하단) ===== -->
  <rect x="50" y="570" width="800" height="100" class="hal-bg" rx="8"/>
  <text x="70" y="598" class="text-title" fill="#1A73E8">HAL (Hardware Abstraction Layer)</text>
  <text x="80" y="626" class="text-normal">GPIO, UART, TIM, RTC (STM32F4xx)</text>
  <text x="80" y="650" class="text-small" fill="#666">• GPIO: 28BYJ-48 코일 제어 • RTC: 시각 데이터 • UART: 로그 출력</text>

  <!-- 범례 -->
  <rect x="50" y="685" width="12" height="12" fill="#EA4335" rx="2"/>
  <text x="68" y="696" class="text-small" fill="#EA4335">App</text>
  <rect x="150" y="685" width="12" height="12" fill="#FBBC04" rx="2"/>
  <text x="168" y="696" class="text-small" fill="#E65100">Service</text>
  <rect x="270" y="685" width="12" height="12" fill="#34A853" rx="2"/>
  <text x="288" y="696" class="text-small" fill="#34A853">Driver</text>
  <rect x="380" y="685" width="12" height="12" fill="#1A73E8" rx="2"/>
  <text x="398" y="696" class="text-small" fill="#1A73E8">HAL</text>
  <text x="500" y="696" class="text-small" fill="#FF6D00">⭐ = Ch10에서 새로 추가</text>
  <text x="50" y="712" class="text-small" fill="#888">↓ 화살표 방향 = 의존성 (상위 레이어가 하위 레이어를 호출)</text>
</svg>
