<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hal-bg { fill: #E8F0FF; stroke: #1A73E8; stroke-width: 2; }
      .driver-bg { fill: #E8F5E9; stroke: #34A853; stroke-width: 2; }
      .service-bg { fill: #FFF8E1; stroke: #FBBC04; stroke-width: 2; }
      .app-bg { fill: #FFEBEE; stroke: #EA4335; stroke-width: 2; }
      .text-title { font-size: 18px; font-weight: bold; }
      .text-normal { font-size: 14px; }
      .text-small { font-size: 12px; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .highlight { stroke: #FF6D00; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="450" y="30" class="text-title" text-anchor="middle" fill="#1A1A2E">
    v1.0 아키텍처: 4계층 통합
  </text>
  <text x="450" y="55" class="text-small" text-anchor="middle" fill="#666">
    RTC(Ch09) + Motor Driver(Ch10) = 첫 완전한 응용 프로젝트 (스마트 시계)
  </text>

  <!-- HAL 레이어 -->
  <rect x="50" y="100" width="800" height="110" class="hal-bg" rx="8"/>
  <text x="70" y="130" class="text-title" fill="#1A73E8">HAL (Hardware Abstraction Layer)</text>
  <text x="80" y="160" class="text-normal">GPIO, UART, TIM, RTC (STM32F4xx)</text>
  <text x="80" y="185" class="text-small" fill="#666">• GPIO: 28BYJ-48 코일 제어 • RTC: 시각 데이터 • UART: 로그 출력</text>

  <!-- Driver 레이어 -->
  <rect x="50" y="240" width="800" height="130" class="driver-bg" rx="8"/>
  <text x="70" y="270" class="text-title" fill="#34A853">Driver Layer</text>

  <!-- RTC Driver (Ch09) -->
  <rect x="80" y="290" width="200" height="70" fill="#E8F5E9" stroke="#34A853" stroke-width="1" rx="5"/>
  <text x="180" y="315" class="text-normal" text-anchor="middle" font-weight="bold">rtc_driver.c</text>
  <text x="180" y="335" class="text-small" text-anchor="middle">(Ch09)</text>
  <text x="180" y="350" class="text-small" text-anchor="middle" fill="#666">rtc_get_time()</text>

  <!-- Stepper Driver (Ch10) — 새로 추가 -->
  <rect x="350" y="290" width="200" height="70" fill="#E8F5E9" stroke="#34A853" stroke-width="2" rx="5"/>
  <rect x="350" y="290" width="200" height="70" class="highlight"/>
  <text x="450" y="315" class="text-normal" text-anchor="middle" font-weight="bold">stepper_driver.c</text>
  <text x="450" y="335" class="text-small" text-anchor="middle">(Ch10) ⭐ NEW</text>
  <text x="450" y="350" class="text-small" text-anchor="middle" fill="#666">stepper_move_steps()</text>

  <!-- UART Driver (Ch04) -->
  <rect x="620" y="290" width="200" height="70" fill="#E8F5E9" stroke="#34A853" stroke-width="1" rx="5"/>
  <text x="720" y="315" class="text-normal" text-anchor="middle" font-weight="bold">uart_driver.c</text>
  <text x="720" y="335" class="text-small" text-anchor="middle">(Ch04)</text>
  <text x="720" y="350" class="text-small" text-anchor="middle" fill="#666">uart_send_data()</text>

  <!-- Service 레이어 -->
  <rect x="50" y="400" width="800" height="130" class="service-bg" rx="8"/>
  <text x="70" y="430" class="text-title" fill="#FBBC04">Service Layer</text>

  <!-- Alarm Service (Ch09) -->
  <rect x="80" y="450" width="200" height="70" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1" rx="5"/>
  <text x="180" y="475" class="text-normal" text-anchor="middle" font-weight="bold">alarm_service.c</text>
  <text x="180" y="495" class="text-small" text-anchor="middle">(Ch09)</text>
  <text x="180" y="510" class="text-small" text-anchor="middle" fill="#666">Alarm FSM</text>

  <!-- Clock Service (Ch10) — 새로 추가 -->
  <rect x="350" y="450" width="200" height="70" fill="#FFF8E1" stroke="#FBBC04" stroke-width="2" rx="5"/>
  <rect x="350" y="450" width="200" height="70" class="highlight"/>
  <text x="450" y="475" class="text-normal" text-anchor="middle" font-weight="bold">clock_service.c</text>
  <text x="450" y="495" class="text-small" text-anchor="middle">(Ch10) ⭐ NEW</text>
  <text x="450" y="510" class="text-small" text-anchor="middle" fill="#666">RTC + Motor 조율</text>

  <!-- Log Service (Ch02) -->
  <rect x="620" y="450" width="200" height="70" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1" rx="5"/>
  <text x="720" y="475" class="text-normal" text-anchor="middle" font-weight="bold">log_service.c</text>
  <text x="720" y="495" class="text-small" text-anchor="middle">(Ch02)</text>
  <text x="720" y="510" class="text-small" text-anchor="middle" fill="#666">LOG_I/D/W/E</text>

  <!-- App 레이어 -->
  <rect x="50" y="560" width="800" height="100" class="app-bg" rx="8"/>
  <text x="70" y="590" class="text-title" fill="#EA4335">Application Layer</text>
  <text x="80" y="620" class="text-normal">main() / Smart Clock Application</text>
  <text x="80" y="645" class="text-small" fill="#666">• clock_service_init() • clock_service_on_rtc_tick() (매초 호출)</text>

  <!-- 화살표: 의존성 -->
  <path d="M 180 290 L 180 360" class="arrow"/>
  <path d="M 450 290 L 450 360" class="arrow"/>
  <path d="M 720 290 L 720 360" class="arrow"/>

  <path d="M 180 450 L 180 520" class="arrow"/>
  <path d="M 450 450 L 450 520" class="arrow"/>
  <path d="M 720 450 L 720 520" class="arrow"/>

  <path d="M 180 520 L 200 560" class="arrow"/>
  <path d="M 450 520 L 450 560" class="arrow"/>
  <path d="M 720 520 L 700 560" class="arrow"/>

  <!-- 범례 -->
  <text x="50" y="680" class="text-small" fill="#1A73E8">■ HAL</text>
  <text x="150" y="680" class="text-small" fill="#34A853">■ Driver</text>
  <text x="270" y="680" class="text-small" fill="#FBBC04">■ Service</text>
  <text x="400" y="680" class="text-small" fill="#EA4335">■ App</text>
  <text x="500" y="680" class="text-small" fill="#FF6D00">⭐ = Ch10에서 새로 추가</text>
</svg>
