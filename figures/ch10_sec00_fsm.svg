<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .state-idle    { fill: #E8F5E9; stroke: #34A853; stroke-width: 2.5; }
      .state-syncing { fill: #E3F2FD; stroke: #1A73E8; stroke-width: 2.5; }
      .state-error   { fill: #FFEBEE; stroke: #EA4335; stroke-width: 2.5; }
      .state-text    { font-size: 15px; font-weight: bold; text-anchor: middle; font-family: 'Noto Sans KR', sans-serif; }
      .sub-text      { font-size: 12px; text-anchor: middle; fill: #555; font-family: 'Noto Sans KR', sans-serif; }
      .label         { font-size: 12px; fill: #333; font-family: 'Noto Sans KR', sans-serif; }
      .title         { font-size: 17px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#333"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1A73E8"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#EA4335"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#34A853"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="400" y="30" class="title" text-anchor="middle" fill="#1A1A2E">Clock Service FSM — 3개 상태와 전이</text>
  <text x="400" y="50" class="label" text-anchor="middle" fill="#666">clock_service.c 내부 상태 관리 (Ch08 FSM 패턴 적용)</text>

  <!-- 초기 화살표 -->
  <line x1="40" y1="200" x2="105" y2="200" stroke="#34A853" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="58" y="193" class="label" fill="#34A853">초기화</text>

  <!-- IDLE 상태 (좌측 중앙) -->
  <ellipse cx="200" cy="200" rx="85" ry="55" class="state-idle"/>
  <text x="200" y="194" class="state-text" fill="#2E7D32">IDLE</text>
  <text x="200" y="210" class="sub-text">동기화 대기</text>
  <text x="200" y="224" class="sub-text">코일 비활성</text>

  <!-- SYNCING 상태 (우측 상단) -->
  <ellipse cx="580" cy="150" rx="95" ry="55" class="state-syncing"/>
  <text x="580" y="144" class="state-text" fill="#1565C0">SYNCING</text>
  <text x="580" y="160" class="sub-text">RTC 시각 읽기</text>
  <text x="580" y="174" class="sub-text">모터 이동 중</text>

  <!-- ERROR 상태 (우측 하단) -->
  <ellipse cx="580" cy="340" rx="85" ry="55" class="state-error"/>
  <text x="580" y="334" class="state-text" fill="#C62828">ERROR</text>
  <text x="580" y="350" class="sub-text">RTC/하드웨어</text>
  <text x="580" y="364" class="sub-text">오류 발생</text>

  <!-- 전이 1: IDLE → SYNCING (매초 RTC 틱) -->
  <path d="M 280 175 Q 390 100 482 145" fill="none" stroke="#1A73E8" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="310" y="100" width="130" height="38" rx="4" fill="white" stroke="#1A73E8" stroke-width="1"/>
  <text x="375" y="117" class="label" text-anchor="middle" font-weight="bold" fill="#1565C0">on_rtc_tick() 호출</text>
  <text x="375" y="131" class="label" text-anchor="middle" fill="#555">/ RTC 시각 읽기 + 스텝 계산</text>

  <!-- 전이 2: SYNCING → IDLE (모터 이동 완료) -->
  <path d="M 482 165 Q 390 230 282 215" fill="none" stroke="#34A853" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="310" y="198" width="130" height="38" rx="4" fill="white" stroke="#34A853" stroke-width="1"/>
  <text x="375" y="215" class="label" text-anchor="middle" font-weight="bold" fill="#2E7D32">모터 이동 완료</text>
  <text x="375" y="229" class="label" text-anchor="middle" fill="#555">/ 상태 → IDLE</text>

  <!-- 전이 3: IDLE → ERROR (RTC 오류) -->
  <path d="M 270 235 Q 340 330 490 340" fill="none" stroke="#EA4335" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="295" y="295" width="130" height="28" rx="4" fill="white" stroke="#EA4335" stroke-width="1"/>
  <text x="360" y="308" class="label" text-anchor="middle" fill="#C62828">RTC 오류 감지</text>
  <text x="360" y="320" class="label" text-anchor="middle" fill="#555">/ 오류 로그</text>

  <!-- 전이 4: SYNCING → ERROR (하드웨어 오류) -->
  <line x1="580" y1="205" x2="580" y2="282" stroke="#EA4335" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="588" y="230" width="120" height="28" rx="4" fill="white" stroke="#EA4335" stroke-width="1"/>
  <text x="648" y="243" class="label" text-anchor="middle" fill="#C62828">하드웨어 오류</text>
  <text x="648" y="256" class="label" text-anchor="middle" fill="#555">/ 모터 정지</text>

  <!-- 전이 5: ERROR → IDLE (복구) -->
  <path d="M 497 340 Q 380 420 280 230" fill="none" stroke="#34A853" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <rect x="310" y="390" width="130" height="28" rx="4" fill="white" stroke="#34A853" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="375" y="403" class="label" text-anchor="middle" fill="#2E7D32">재시작/복구</text>
  <text x="375" y="415" class="label" text-anchor="middle" fill="#555">/ 상태 초기화</text>

  <!-- 상태 설명 표 -->
  <rect x="40" y="430" width="720" height="58" fill="#F5F5F5" stroke="#CCC" stroke-width="1" rx="5"/>
  <text x="55" y="450" class="label" font-weight="bold" fill="#2E7D32">IDLE:</text>
  <text x="105" y="450" class="label">코일 OFF, RTC 틱 대기 (정상 상태)</text>
  <text x="55" y="467" class="label" font-weight="bold" fill="#1565C0">SYNCING:</text>
  <text x="120" y="467" class="label">RTC 시각 읽기 → 각도 계산 → 모터 이동 중</text>
  <text x="430" y="450" class="label" font-weight="bold" fill="#C62828">ERROR:</text>
  <text x="480" y="450" class="label">RTC 응답 없음 또는 모터 과부하</text>
  <text x="430" y="467" class="label" font-weight="bold" fill="#555">패턴:</text>
  <text x="475" y="467" class="label">Ch08 Stopwatch FSM과 동일한 구조 적용</text>
</svg>
