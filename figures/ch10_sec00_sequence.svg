<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="580" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580">
  <defs>
    <style>
      .actor   { font-size: 12px; font-weight: bold; text-anchor: middle; font-family: 'Noto Sans KR', sans-serif; }
      .msg     { font-size: 12px; fill: #333; font-family: 'Noto Sans KR', sans-serif; }
      .ret     { font-size: 11px; fill: #888; font-style: italic; font-family: 'Noto Sans KR', sans-serif; }
      .note    { font-size: 11px; font-family: 'Noto Sans KR', sans-serif; }
      .title   { font-size: 16px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
      .tl      { stroke: #BDBDBD; stroke-width: 1; stroke-dasharray: 4,3; }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arr-ret" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="500" y="25" class="title" text-anchor="middle" fill="#1A1A2E">RTC 1초 틱 → Clock Service → Motor 구동 시퀀스</text>
  <text x="500" y="44" class="note" text-anchor="middle" fill="#666">매초 RTC 인터럽트 발생 → 분 변경 시에만 모터 구동</text>

  <!-- 액터 박스 (5개) -->
  <!-- 1) RTC ISR -->
  <rect x="30" y="55" width="110" height="38" fill="#FFEBEE" stroke="#EA4335" stroke-width="1.5" rx="4"/>
  <text x="85" y="79" class="actor" fill="#C62828">RTC ISR</text>

  <!-- 2) Clock Service -->
  <rect x="210" y="55" width="110" height="38" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5" rx="4"/>
  <text x="265" y="79" class="actor" fill="#E65100">Clock Service</text>

  <!-- 3) RTC Driver -->
  <rect x="390" y="55" width="110" height="38" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="4"/>
  <text x="445" y="79" class="actor" fill="#2E7D32">rtc_driver</text>

  <!-- 4) Stepper Driver -->
  <rect x="570" y="55" width="120" height="38" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5" rx="4"/>
  <text x="630" y="79" class="actor" fill="#2E7D32">stepper_driver</text>

  <!-- 5) Motor HW -->
  <rect x="770" y="55" width="110" height="38" fill="#E8F0FF" stroke="#1A73E8" stroke-width="1.5" rx="4"/>
  <text x="825" y="79" class="actor" fill="#1565C0">Motor (HW)</text>

  <!-- 생명선 -->
  <line x1="85"  y1="93" x2="85"  y2="520" class="tl"/>
  <line x1="265" y1="93" x2="265" y2="520" class="tl"/>
  <line x1="445" y1="93" x2="445" y2="520" class="tl"/>
  <line x1="630" y1="93" x2="630" y2="520" class="tl"/>
  <line x1="825" y1="93" x2="825" y2="520" class="tl"/>

  <!-- ① RTC ISR 발생 -->
  <rect x="55" y="115" width="60" height="22" fill="#FFCDD2" stroke="#EA4335" stroke-width="1" rx="2"/>
  <text x="85" y="131" class="note" text-anchor="middle" fill="#C62828">매초 발생</text>

  <!-- ② ISR → Clock Service: on_rtc_tick() -->
  <line x1="85" y1="148" x2="257" y2="148" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="175" y="143" class="msg" text-anchor="middle" font-weight="bold">clock_service_on_rtc_tick()</text>

  <!-- 활성화 박스 Clock Service -->
  <rect x="258" y="148" width="14" height="200" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1"/>

  <!-- ③ Clock Service → rtc_driver: rtc_get_time() -->
  <line x1="272" y1="175" x2="437" y2="175" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="355" y="170" class="msg" text-anchor="middle">rtc_get_time()</text>

  <!-- 활성화 박스 rtc_driver -->
  <rect x="438" y="175" width="14" height="30" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>

  <!-- ④ rtc_driver → Clock Service: 시각 반환 -->
  <line x1="438" y1="205" x2="273" y2="205" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-ret)"/>
  <text x="355" y="200" class="ret" text-anchor="middle">→ {hour=14, min=30, sec=0}</text>

  <!-- ⑤ Clock Service 계산 (내부 처리) -->
  <rect x="272" y="220" width="115" height="45" fill="#FFF9C4" stroke="#F9A825" stroke-width="1" rx="3"/>
  <text x="330" y="235" class="note" text-anchor="middle" font-weight="bold">각도/스텝 계산</text>
  <text x="330" y="248" class="note" text-anchor="middle">14:30 → 75° → 853스텝</text>
  <text x="330" y="261" class="note" text-anchor="middle">분 변경? Yes → 이동</text>

  <!-- ⑥ Clock Service → stepper_driver: stepper_move_steps() -->
  <line x1="272" y1="280" x2="622" y2="280" stroke="#34A853" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="450" y="274" class="msg" text-anchor="middle" font-weight="bold">stepper_move_steps(delta, 50)</text>

  <!-- 활성화 박스 stepper_driver -->
  <rect x="623" y="280" width="14" height="100" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>

  <!-- ⑦ stepper_driver → Motor: GPIO 코일 여자 시퀀스 -->
  <line x1="637" y1="305" x2="817" y2="305" stroke="#1A73E8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="300" class="msg" text-anchor="middle">GPIO 코일 여자 (A→AB→B→BC…)</text>

  <!-- ⑧ Motor 물리 회전 -->
  <rect x="795" y="315" width="60" height="50" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1" rx="2"/>
  <text x="825" y="335" class="note" text-anchor="middle" fill="#1565C0">시침</text>
  <text x="825" y="350" class="note" text-anchor="middle" fill="#1565C0">회전</text>
  <text x="825" y="363" class="note" text-anchor="middle" fill="#1565C0">→ 75°</text>

  <!-- ⑨ stepper_driver → Clock Service: 완료 -->
  <line x1="623" y1="380" x2="273" y2="380" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-ret)"/>
  <text x="450" y="375" class="ret" text-anchor="middle">← 이동 완료</text>

  <!-- 활성화 박스 닫힘 (Clock Service 완료) -->
  <!-- ⑩ Clock Service → ISR: 반환 -->
  <line x1="258" y1="400" x2="93" y2="400" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-ret)"/>
  <text x="175" y="395" class="ret" text-anchor="middle">← 처리 완료</text>

  <!-- 하단 노트 박스들 -->
  <rect x="30" y="430" width="195" height="75" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1" rx="4"/>
  <text x="40" y="448" class="note" font-weight="bold" fill="#E65100">매초 반복:</text>
  <text x="40" y="463" class="note">• 1초마다 RTC 인터럽트 발생</text>
  <text x="40" y="478" class="note">• 분(minute) 변경 시에만</text>
  <text x="40" y="493" class="note">  모터 구동 → CPU 부하 최소화</text>

  <rect x="340" y="430" width="210" height="75" fill="#E8F5E9" stroke="#34A853" stroke-width="1" rx="4"/>
  <text x="350" y="448" class="note" font-weight="bold" fill="#2E7D32">실시간 동기화:</text>
  <text x="350" y="463" class="note">• RTC 시각 = 시침 위치 항상 일치</text>
  <text x="350" y="478" class="note">• 정전 후 재부팅 시 RTC에서</text>
  <text x="350" y="493" class="note">  정확한 위치로 자동 복구</text>

  <rect x="670" y="430" width="210" height="75" fill="#E8F0FF" stroke="#1A73E8" stroke-width="1" rx="4"/>
  <text x="680" y="448" class="note" font-weight="bold" fill="#1565C0">레이어 역할 분리:</text>
  <text x="680" y="463" class="note">• Clock Service: 조율 로직</text>
  <text x="680" y="478" class="note">• rtc_driver: 시각 데이터 제공</text>
  <text x="680" y="493" class="note">• stepper_driver: 모터 제어</text>
</svg>
