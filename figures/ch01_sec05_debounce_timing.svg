<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#212121"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#1A73E8"/>
    </marker>
    <marker id="arrowRightBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A73E8"/>
    </marker>
    <marker id="arrowRightGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1000" height="620" fill="#FAFAFA"/>

  <!-- 제목 -->
  <rect x="0" y="0" width="1000" height="50" fill="#212121"/>
  <text x="500" y="32" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">버튼 채터링 &amp; 소프트웨어 디바운싱 타이밍 다이어그램</text>

  <!-- ===== 공통 시간 축 설정 ===== -->
  <!-- x=160 (0ms) ~ x=940 (100ms) = 780px = 100ms → 1ms = 7.8px -->
  <!-- 시간 눈금 레이블 (상단) -->
  <text x="160" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">0ms</text>
  <text x="238" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">10ms</text>
  <text x="316" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">20ms</text>
  <text x="394" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">30ms</text>
  <text x="472" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">40ms</text>
  <text x="550" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">50ms</text>
  <text x="628" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">60ms</text>
  <text x="706" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">70ms</text>
  <text x="784" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">80ms</text>
  <text x="862" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">90ms</text>
  <text x="940" y="65" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#555" text-anchor="middle">100ms</text>

  <!-- ============================================================ -->
  <!-- 행 1: 실제 버튼 신호 -->
  <!-- ============================================================ -->
  <rect x="10" y="72" width="980" height="120" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="10" y="72" width="980" height="30" rx="8" fill="#424242"/>
  <rect x="10" y="90" width="980" height="12" fill="#424242"/>
  <text x="500" y="91" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">행 1: 실제 버튼 신호 (채터링 포함)</text>

  <!-- 신호 레이블 -->
  <text x="80" y="127" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle" font-weight="bold">버튼</text>
  <text x="80" y="141" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle">신호</text>
  <!-- H 레이블 -->
  <text x="150" y="107" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">HIGH</text>
  <text x="150" y="177" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">LOW</text>

  <!-- 버튼 누르기 전: HIGH (버튼 안 눌림 = HIGH, 풀업) -->
  <polyline points="160,108 299,108" fill="none" stroke="#34A853" stroke-width="3"/>

  <!-- 버튼 누름 시작: 채터링 구간 (30ms~80ms) -->
  <!-- 30ms = x:394, 80ms = x:784 -->
  <!-- 채터링 파형: 지그재그 -->
  <polyline points="299,108 299,172 308,172 308,108 318,108 318,172 330,172 330,108 342,108 342,172 356,172 356,108 370,108 370,172 382,172 382,108 390,108"
            fill="none" stroke="#EA4335" stroke-width="2.5"/>

  <!-- 안정 LOW 구간 (약 40ms 이후 안정) -->
  <polyline points="390,172 660,172" fill="none" stroke="#34A853" stroke-width="3"/>

  <!-- 버튼 떼기 채터링 (80ms~85ms) -->
  <polyline points="660,172 660,108 668,108 668,172 676,172 676,108 682,108 682,172 688,172"
            fill="none" stroke="#EA4335" stroke-width="2.5"/>

  <!-- 안정 HIGH (85ms 이후) -->
  <polyline points="688,108 940,108" fill="none" stroke="#34A853" stroke-width="3"/>

  <!-- 채터링 구간 강조 박스 (누름 채터링) -->
  <rect x="299" y="100" width="91" height="78" rx="3" fill="#FFEBEE" opacity="0.6" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="345" y="97" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#EA4335" text-anchor="middle">채터링!</text>

  <!-- 채터링 구간 강조 박스 (놓음 채터링) -->
  <rect x="660" y="100" width="28" height="78" rx="3" fill="#FFEBEE" opacity="0.6" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 50ms 디바운스 윈도우 브라켓 (30ms~80ms) -->
  <!-- 30ms=x:394, 80ms=x:784 → 하지만 첫 엣지는 x:299(20ms 부근) -->
  <!-- 첫 엣지 x:299(~18ms), 50ms 후 x:299+390=x:689(~68ms) -->
  <line x1="299" y1="185" x2="689" y2="185" stroke="#1A73E8" stroke-width="2"/>
  <line x1="299" y1="180" x2="299" y2="190" stroke="#1A73E8" stroke-width="2"/>
  <line x1="689" y1="180" x2="689" y2="190" stroke="#1A73E8" stroke-width="2"/>
  <text x="494" y="182" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1A73E8" text-anchor="middle">← 50ms 디바운스 윈도우 →</text>

  <!-- ============================================================ -->
  <!-- 행 2: EXTI 인터럽트 발생 -->
  <!-- ============================================================ -->
  <rect x="10" y="205" width="980" height="120" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="10" y="205" width="980" height="30" rx="8" fill="#EA4335"/>
  <rect x="10" y="223" width="980" height="12" fill="#EA4335"/>
  <text x="500" y="224" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">행 2: EXTI 인터럽트 발생 (매 엣지마다)</text>

  <!-- 신호 레이블 -->
  <text x="80" y="268" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle" font-weight="bold">EXTI</text>
  <text x="80" y="282" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle">인터럽트</text>

  <!-- 기준선 -->
  <line x1="160" y1="290" x2="940" y2="290" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- 인터럽트 펄스들 (채터링마다 발생) - 점선 세로선 -->
  <!-- 첫 번째 엣지 (x=299) -->
  <line x1="299" y1="248" x2="299" y2="308" stroke="#EA4335" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="294,248 304,248 299,240" fill="#EA4335"/>

  <!-- 두 번째 엣지 (x=308) -->
  <line x1="308" y1="255" x2="308" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="303,255 313,255 308,247" fill="#EA4335"/>

  <!-- 세 번째 엣지 (x=318) -->
  <line x1="318" y1="255" x2="318" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="313,255 323,255 318,247" fill="#EA4335"/>

  <!-- 네 번째 엣지 (x=330) -->
  <line x1="330" y1="255" x2="330" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="325,255 335,255 330,247" fill="#EA4335"/>

  <!-- 다섯 번째 (x=342) -->
  <line x1="342" y1="255" x2="342" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="337,255 347,255 342,247" fill="#EA4335"/>

  <!-- 여섯 번째 (x=356) -->
  <line x1="356" y1="255" x2="356" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="351,255 361,255 356,247" fill="#EA4335"/>

  <!-- 일곱 번째 (x=370) -->
  <line x1="370" y1="255" x2="370" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="365,255 375,255 370,247" fill="#EA4335"/>

  <!-- 여덟 번째 (x=382) -->
  <line x1="382" y1="255" x2="382" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="377,255 387,255 382,247" fill="#EA4335"/>

  <!-- 놓음 채터링 엣지들 -->
  <line x1="660" y1="255" x2="660" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="655,255 665,255 660,247" fill="#EA4335"/>
  <line x1="668" y1="255" x2="668" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="663,255 673,255 668,247" fill="#EA4335"/>
  <line x1="676" y1="255" x2="676" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="671,255 681,255 676,247" fill="#EA4335"/>
  <line x1="682" y1="255" x2="682" y2="308" stroke="#EA4335" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="677,255 687,255 682,247" fill="#EA4335"/>

  <!-- 경고 레이블 -->
  <rect x="160" y="308" width="680" height="12" rx="3" fill="#FFEBEE"/>
  <text x="500" y="319" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle" font-weight="bold">⚠ 채터링으로 인해 다수의 인터럽트 발생! (1번 누름인데 여러 번 처리될 위험)</text>

  <!-- ============================================================ -->
  <!-- 행 3: 소프트웨어 처리 결과 -->
  <!-- ============================================================ -->
  <rect x="10" y="338" width="980" height="140" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="10" y="338" width="980" height="30" rx="8" fill="#34A853"/>
  <rect x="10" y="356" width="980" height="12" fill="#34A853"/>
  <text x="500" y="357" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">행 3: 소프트웨어 디바운싱 처리 결과</text>

  <!-- 신호 레이블 -->
  <text x="80" y="395" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle" font-weight="bold">처리</text>
  <text x="80" y="409" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle">결과</text>

  <!-- 기준선 -->
  <line x1="160" y1="415" x2="940" y2="415" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- 첫 번째 엣지만 처리 (실선 세로 화살표, 초록) -->
  <line x1="299" y1="370" x2="299" y2="432" stroke="#34A853" stroke-width="3"/>
  <polygon points="294,370 304,370 299,362" fill="#34A853"/>
  <text x="299" y="360" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#34A853" text-anchor="middle">처리!</text>

  <!-- 처리 이벤트 박스 -->
  <rect x="305" y="373" width="90" height="30" rx="4" fill="#34A853"/>
  <text x="350" y="386" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">LED 토글 실행</text>
  <text x="350" y="397" font-family="Noto Sans KR, sans-serif" font-size="8" fill="white" text-anchor="middle">lastTick 갱신</text>

  <!-- 무시된 엣지들 (X 표시) -->
  <!-- x=308 -->
  <line x1="303" y1="392" x2="313" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="313" y1="392" x2="303" y2="402" stroke="#EA4335" stroke-width="2"/>
  <text x="308" y="416" font-family="Noto Sans KR, sans-serif" font-size="8" fill="#EA4335" text-anchor="middle">무시</text>
  <!-- x=318 -->
  <line x1="313" y1="392" x2="323" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="323" y1="392" x2="313" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- x=330 -->
  <line x1="325" y1="392" x2="335" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="335" y1="392" x2="325" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- x=342 -->
  <line x1="337" y1="392" x2="347" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="347" y1="392" x2="337" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- x=356 -->
  <line x1="351" y1="392" x2="361" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="361" y1="392" x2="351" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- x=370 -->
  <line x1="365" y1="392" x2="375" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="375" y1="392" x2="365" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- x=382 -->
  <line x1="377" y1="392" x2="387" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="387" y1="392" x2="377" y2="402" stroke="#EA4335" stroke-width="2"/>
  <!-- 놓음 채터링 무시 -->
  <line x1="655" y1="392" x2="665" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="665" y1="392" x2="655" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="663" y1="392" x2="673" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="673" y1="392" x2="663" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="671" y1="392" x2="681" y2="402" stroke="#EA4335" stroke-width="2"/>
  <line x1="681" y1="392" x2="671" y2="402" stroke="#EA4335" stroke-width="2"/>

  <!-- 50ms 윈도우 브라켓 (행 3) -->
  <line x1="299" y1="436" x2="689" y2="436" stroke="#1A73E8" stroke-width="2.5"/>
  <line x1="299" y1="430" x2="299" y2="442" stroke="#1A73E8" stroke-width="2.5"/>
  <line x1="689" y1="430" x2="689" y2="442" stroke="#1A73E8" stroke-width="2.5"/>
  <polygon points="294,436 299,431 299,441" fill="#1A73E8"/>
  <polygon points="694,436 689,431 689,441" fill="#1A73E8"/>
  <text x="494" y="453" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1A73E8" text-anchor="middle" font-weight="bold">← 50ms 디바운스 윈도우 (이 구간 내 인터럽트 무시) →</text>

  <!-- 성공 레이블 -->
  <rect x="710" y="373" width="220" height="40" rx="5" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <text x="820" y="389" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#1B5E20" text-anchor="middle" font-weight="bold">✓ 1회만 처리 성공!</text>
  <text x="820" y="405" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">채터링 제거 완료</text>

  <!-- ===== 하단: 코드 스니펫 박스 ===== -->
  <rect x="10" y="490" width="980" height="120" rx="8" fill="#263238" stroke="#37474F" stroke-width="2"/>
  <rect x="10" y="490" width="980" height="30" rx="8" fill="#37474F"/>
  <rect x="10" y="508" width="980" height="12" fill="#37474F"/>
  <text x="500" y="510" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="#80CBC4" text-anchor="middle">HAL_GetTick() 기반 디바운싱 코드 패턴</text>

  <!-- 코드 라인들 -->
  <text x="30" y="538" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">void HAL_GPIO_EXTI_Callback(uint16_t GPIO_Pin) {</text>
  <text x="30" y="555" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">    if (GPIO_Pin == GPIO_PIN_13) {</text>
  <text x="30" y="572" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">        </text>
  <text x="76" y="572" font-family="Courier New, monospace" font-size="12" fill="#FFCC80">if</text>
  <text x="100" y="572" font-family="Courier New, monospace" font-size="12" fill="#90A4AE"> (HAL_GetTick() - lastTick &gt; </text>
  <text x="403" y="572" font-family="Courier New, monospace" font-size="12" fill="#80CBC4" font-weight="bold">50</text>
  <text x="417" y="572" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">) {    </text>
  <text x="490" y="572" font-family="Courier New, monospace" font-size="12" fill="#A5D6A7">// 50ms 이상 경과 시만 처리</text>
  <text x="30" y="589" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">            HAL_GPIO_TogglePin(GPIOA, GPIO_PIN_5);    </text>
  <text x="530" y="589" font-family="Courier New, monospace" font-size="12" fill="#A5D6A7">// LED 토글</text>
  <text x="30" y="606" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">            lastTick = HAL_GetTick();    </text>
  <text x="340" y="606" font-family="Courier New, monospace" font-size="12" fill="#A5D6A7">// 타임스탬프 갱신 (다음 50ms 윈도우 시작)</text>
  <text x="30" y="620" font-family="Courier New, monospace" font-size="12" fill="#90A4AE">} } }</text>
</svg>
