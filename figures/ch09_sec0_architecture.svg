<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <defs>
    <marker id="arr9a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">v0.8 → v0.9 아키텍처 — RTC + Alarm FSM 추가</text>

  <!-- App Layer -->
  <rect x="50" y="50" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="72" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>

  <rect x="70" y="80" width="140" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="140" y="100" text-anchor="middle" font-size="11" fill="#C62828">main.c (슈퍼루프)</text>

  <rect x="225" y="80" width="150" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="300" y="100" text-anchor="middle" font-size="11" fill="#C62828">Button EXTI (PC13)</text>

  <rect x="390" y="80" width="120" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#C62828">CLI (Ch06)</text>

  <rect x="525" y="80" width="100" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="575" y="100" text-anchor="middle" font-size="11" fill="#C62828">Log (Ch02)</text>

  <!-- 화살표: App → Service -->
  <line x1="300" y1="120" x2="300" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr9a)"/>
  <line x1="450" y1="120" x2="450" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr9a)"/>

  <!-- Service Layer -->
  <rect x="50" y="160" width="700" height="80" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="182" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>

  <rect x="70" y="192" width="200" height="38" rx="5" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="170" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">stopwatch_service (Ch08)</text>
  <text x="170" y="225" text-anchor="middle" font-size="9" fill="#E65100">FSM: IDLE/RUNNING/PAUSED</text>

  <rect x="290" y="192" width="210" height="38" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>
  <text x="395" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">alarm_service ★ NEW</text>
  <text x="395" y="225" text-anchor="middle" font-size="9" fill="#E65100">FSM: IDLE/ARMED/TRIGGERED/ACK</text>

  <!-- 미래 Service -->
  <rect x="520" y="192" width="110" height="38" rx="5" fill="none" stroke="#FBBC04" stroke-dasharray="5,3"/>
  <text x="575" y="215" text-anchor="middle" font-size="10" fill="#999">Ch10: clock</text>

  <rect x="640" y="192" width="100" height="38" rx="5" fill="none" stroke="#FBBC04" stroke-dasharray="5,3"/>
  <text x="690" y="215" text-anchor="middle" font-size="10" fill="#999">Ch11: sensor</text>

  <!-- 화살표: Service → Driver -->
  <line x1="170" y1="230" x2="170" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr9a)"/>
  <line x1="395" y1="230" x2="395" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr9a)"/>

  <!-- Driver Layer -->
  <rect x="50" y="275" width="700" height="80" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="297" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>

  <rect x="70" y="305" width="120" height="38" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="130" y="323" text-anchor="middle" font-size="11" fill="#1B5E20">uart_driver</text>
  <text x="130" y="337" text-anchor="middle" font-size="9" fill="#555">Ch04~06</text>

  <rect x="205" y="305" width="110" height="38" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="260" y="323" text-anchor="middle" font-size="11" fill="#1B5E20">dma_driver</text>
  <text x="260" y="337" text-anchor="middle" font-size="9" fill="#555">Ch05</text>

  <rect x="330" y="305" width="160" height="38" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="410" y="323" text-anchor="middle" font-size="11" fill="#1B5E20">tim_driver (확장)</text>
  <text x="410" y="337" text-anchor="middle" font-size="9" fill="#555">Ch07~08</text>

  <rect x="505" y="305" width="160" height="38" rx="5" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2.5"/>
  <text x="585" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">rtc_driver ★ NEW</text>
  <text x="585" y="337" text-anchor="middle" font-size="9" fill="#1B5E20">시간/알람/Wake-up</text>

  <rect x="680" y="305" width="60" height="38" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="710" y="327" text-anchor="middle" font-size="10" fill="#1B5E20">log</text>

  <!-- 화살표: Driver → HAL -->
  <line x1="400" y1="355" x2="400" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arr9a)"/>

  <!-- HAL Layer -->
  <rect x="50" y="395" width="700" height="60" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="417" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>

  <rect x="70" y="425" width="90" height="22" rx="4" fill="#BBDEFB"/>
  <text x="115" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_UART</text>

  <rect x="175" y="425" width="80" height="22" rx="4" fill="#BBDEFB"/>
  <text x="215" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_DMA</text>

  <rect x="270" y="425" width="80" height="22" rx="4" fill="#BBDEFB"/>
  <text x="310" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_TIM</text>

  <rect x="365" y="425" width="90" height="22" rx="4" fill="#BBDEFB"/>
  <text x="410" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_TIMEx</text>

  <rect x="470" y="425" width="100" height="22" rx="4" fill="#90CAF9" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="520" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">HAL_RTC ★</text>

  <rect x="585" y="425" width="80" height="22" rx="4" fill="#BBDEFB"/>
  <text x="625" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_GPIO</text>

  <rect x="680" y="425" width="60" height="22" rx="4" fill="#BBDEFB"/>
  <text x="710" y="440" text-anchor="middle" font-size="10" fill="#0D47A1">SWO</text>

  <!-- 범례 -->
  <rect x="200" y="475" width="15" height="12" fill="#EA4335" opacity="0.3"/>
  <text x="220" y="486" font-size="11" fill="#555">App</text>
  <rect x="270" y="475" width="15" height="12" fill="#FBBC04" opacity="0.3"/>
  <text x="290" y="486" font-size="11" fill="#555">Service</text>
  <rect x="350" y="475" width="15" height="12" fill="#34A853" opacity="0.3"/>
  <text x="370" y="486" font-size="11" fill="#555">Driver</text>
  <rect x="420" y="475" width="15" height="12" fill="#1A73E8" opacity="0.3"/>
  <text x="440" y="486" font-size="11" fill="#555">HAL</text>

  <!-- 버전 뱃지 -->
  <rect x="530" y="472" width="200" height="24" rx="12" fill="#E65100"/>
  <text x="630" y="489" text-anchor="middle" font-size="12" font-weight="bold" fill="white">v0.9 — Ch09 RTC + Alarm</text>
</svg>
