<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#212121"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#1A73E8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#34A853"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#757575"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="700" fill="#FAFAFA"/>

  <!-- 제목 -->
  <rect x="0" y="0" width="900" height="50" fill="#212121"/>
  <text x="450" y="32" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">MX_GPIO_Init() 실행 흐름도</text>

  <!-- ===== 블록 1: MX_GPIO_Init() 호출 ===== -->
  <!-- 타원 시작점 -->
  <ellipse cx="340" cy="95" rx="160" ry="28" fill="#1A73E8"/>
  <text x="340" y="100" font-family="Noto Sans KR, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">MX_GPIO_Init() 호출</text>
  <!-- 설명 주석 -->
  <rect x="540" y="78" width="280" height="36" rx="5" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1"/>
  <text x="550" y="95" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1A73E8">CubeMX가 자동 생성하는</text>
  <text x="550" y="110" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1A73E8">GPIO 초기화 함수 (시작점)</text>
  <line x1="505" y1="95" x2="540" y2="95" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 화살표 1→2 -->
  <line x1="340" y1="123" x2="340" y2="148" stroke="#212121" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- ===== 블록 2: 클럭 활성화 ===== -->
  <rect x="130" y="150" width="420" height="70" rx="8" fill="white" stroke="#34A853" stroke-width="2.5"/>
  <rect x="130" y="150" width="420" height="28" rx="8" fill="#34A853"/>
  <rect x="130" y="166" width="420" height="12" fill="#34A853"/>
  <text x="340" y="169" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">__HAL_RCC_GPIOA_CLK_ENABLE()</text>
  <text x="340" y="196" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">AHB1 버스에 GPIOA 클럭 공급 활성화</text>
  <text x="340" y="212" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#555" text-anchor="middle">+ __HAL_RCC_GPIOC_CLK_ENABLE() (PC13용)</text>
  <!-- 주석 -->
  <rect x="575" y="153" width="285" height="40" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="585" y="168" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#E65100" font-weight="bold">클럭 없이는 GPIO 동작 불가!</text>
  <text x="585" y="184" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#E65100">RCC 레지스터 비트 설정</text>
  <line x1="550" y1="173" x2="575" y2="173" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 화살표 2→3 -->
  <line x1="340" y1="220" x2="340" y2="248" stroke="#212121" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="355" y="238" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">구조체 준비</text>

  <!-- ===== 블록 3: GPIO_InitTypeDef 구조체 ===== -->
  <rect x="100" y="250" width="480" height="120" rx="8" fill="white" stroke="#1A73E8" stroke-width="2.5"/>
  <rect x="100" y="250" width="480" height="28" rx="8" fill="#1A73E8"/>
  <rect x="100" y="266" width="480" height="12" fill="#1A73E8"/>
  <text x="340" y="269" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">GPIO_InitTypeDef 구조체 설정</text>

  <!-- 구조체 필드 -->
  <rect x="120" y="288" width="200" height="22" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="145" y="304" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1A73E8" font-weight="bold">.Pin</text>
  <text x="220" y="304" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121">= GPIO_PIN_5 (PA5)</text>

  <rect x="340" y="288" width="220" height="22" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="360" y="304" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1A73E8" font-weight="bold">.Mode</text>
  <text x="405" y="304" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121">= GPIO_MODE_OUTPUT_PP</text>

  <rect x="120" y="316" width="200" height="22" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="145" y="332" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#34A853" font-weight="bold">.Pull</text>
  <text x="185" y="332" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121">= GPIO_NOPULL</text>

  <rect x="340" y="316" width="220" height="22" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="360" y="332" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#34A853" font-weight="bold">.Speed</text>
  <text x="405" y="332" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121">= GPIO_SPEED_FREQ_LOW</text>

  <!-- 주석 -->
  <rect x="600" y="253" width="270" height="80" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="610" y="270" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#6A1B9A" font-weight="bold">GPIO_InitTypeDef 구조체:</text>
  <text x="610" y="285" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#6A1B9A">• Pin: 어떤 핀인지</text>
  <text x="610" y="299" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#6A1B9A">• Mode: 입출력 방식</text>
  <text x="610" y="313" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#6A1B9A">• Pull: 내부 저항 설정</text>
  <text x="610" y="327" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#6A1B9A">• Speed: 슬루율 제한</text>
  <line x1="580" y1="290" x2="600" y2="290" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 화살표 3→4 -->
  <line x1="340" y1="370" x2="340" y2="398" stroke="#212121" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="355" y="388" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575">초기화 실행</text>

  <!-- ===== 블록 4: HAL_GPIO_Init ===== -->
  <rect x="130" y="400" width="420" height="70" rx="8" fill="white" stroke="#34A853" stroke-width="2.5"/>
  <rect x="130" y="400" width="420" height="28" rx="8" fill="#34A853"/>
  <rect x="130" y="416" width="420" height="12" fill="#34A853"/>
  <text x="340" y="419" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">HAL_GPIO_Init(GPIOx, &amp;GPIO_InitStruct)</text>
  <text x="340" y="446" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">레지스터 직접 설정 수행</text>
  <text x="340" y="462" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#555" text-anchor="middle">MODER / OTYPER / OSPEEDR / PUPDR 레지스터 쓰기</text>
  <!-- 주석 -->
  <rect x="575" y="403" width="285" height="50" rx="5" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>
  <text x="585" y="420" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1B5E20" font-weight="bold">HAL 드라이버 내부 동작:</text>
  <text x="585" y="435" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1B5E20">구조체 → 레지스터 비트 변환</text>
  <text x="585" y="450" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1B5E20">하드웨어에 즉시 반영</text>
  <line x1="550" y1="425" x2="575" y2="425" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- 화살표 4→5 -->
  <line x1="340" y1="470" x2="340" y2="498" stroke="#212121" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- ===== 블록 5: 결과 ===== -->
  <rect x="80" y="500" width="520" height="100" rx="8" fill="white" stroke="#EA4335" stroke-width="2.5"/>
  <rect x="80" y="500" width="520" height="28" rx="8" fill="#EA4335"/>
  <rect x="80" y="516" width="520" height="12" fill="#EA4335"/>
  <text x="340" y="519" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">초기화 결과</text>

  <!-- PA5 결과 -->
  <rect x="100" y="540" width="230" height="44" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="215" y="557" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">PA5 (LD2 LED)</text>
  <text x="215" y="574" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle">Output Push-Pull / Low 출력</text>

  <!-- PC13 결과 -->
  <rect x="350" y="540" width="230" height="44" rx="5" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="465" y="557" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#1A73E8" text-anchor="middle" font-weight="bold">PC13 (B1 버튼)</text>
  <text x="465" y="574" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#212121" text-anchor="middle">Input Pull-Up (기본 HIGH)</text>

  <!-- 완료 타원 -->
  <ellipse cx="340" cy="635" rx="140" ry="25" fill="#212121"/>
  <text x="340" y="641" font-family="Noto Sans KR, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">초기화 완료</text>
  <line x1="340" y1="600" x2="340" y2="610" stroke="#212121" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- 단계 번호 표시 -->
  <circle cx="95" cy="95" r="16" fill="#1A73E8"/>
  <text x="95" y="100" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <circle cx="95" cy="185" r="16" fill="#34A853"/>
  <text x="95" y="190" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <circle cx="75" cy="310" r="16" fill="#1A73E8"/>
  <text x="75" y="315" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <circle cx="95" cy="435" r="16" fill="#34A853"/>
  <text x="95" y="440" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <circle cx="55" cy="550" r="16" fill="#EA4335"/>
  <text x="55" y="555" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">5</text>
</svg>
