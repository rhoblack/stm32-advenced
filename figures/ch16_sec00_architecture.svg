  <rect x="130" y="75" width="210" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335"/>
  <text x="235" y="92" text-anchor="middle" font-size="11" fill="#C62828">cli_app.c</text>
  <text x="235" y="103" text-anchor="middle" font-size="9" fill="#C62828">CLI 명령 처리</text>
  <rect x="370" y="75" width="270" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335" stroke-width="2"/>
  <text x="505" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">protocol_app.c ★NEW Ch16</text>
  <text x="505" y="103" text-anchor="middle" font-size="9" fill="#C62828">PC 대시보드 프레임 ★ Ch16</text>

  <line x1="400" y1="115" x2="400" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr16)"/>

