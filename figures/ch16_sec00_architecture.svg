<svg xmlns="http://www.w3.org/2000/svg" width="800" height="530" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 530">
  <defs>
    <marker id="arr16" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Ch16 아키텍처 위치 — Protocol App + PC 대시보드</text>

  <!-- App Layer -->
  <rect x="50" y="45" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
