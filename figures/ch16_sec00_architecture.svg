  <line x1="400" y1="425" x2="400" y2="452" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arr16)"/>

  <!-- PC (Python) 섹션 -->
  <rect x="50" y="457" width="700" height="30" rx="8" fill="#9C27B0" opacity="0.12" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#6A1B9A">PC (Python) — pyserial 수신 스레드 + PyQt5 실시간 대시보드</text>

  <!-- 버전 뱃지 -->
  <rect x="265" y="496" width="270" height="22" rx="11" fill="#1A73E8"/>
  <text x="400" y="511" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ch16 — PC 대시보드 연동</text>
</svg>
