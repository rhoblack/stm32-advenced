  <text x="572" y="308" text-anchor="middle" font-size="10" fill="#1B5E20">sht31_driver</text>
  <text x="572" y="321" text-anchor="middle" font-size="9" fill="#555">Ch11</text>
  <rect x="635" y="291" width="105" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="687" y="308" text-anchor="middle" font-size="10" fill="#1B5E20">ili9341_driver</text>
  <text x="687" y="321" text-anchor="middle" font-size="9" fill="#555">Ch12</text>

  <line x1="400" y1="335" x2="400" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arr16)"/>

  <!-- HAL Layer -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="392" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
