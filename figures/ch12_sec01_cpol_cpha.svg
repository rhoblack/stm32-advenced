<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="460" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <style>
      text { font-family: 'Noto Sans KR', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1A1A2E; }
      .mode  { font-size: 13px; font-weight: 700; fill: white; }
      .label { font-size: 12px; fill: #333; font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .highlight { font-size: 12px; fill: #EA4335; font-weight: 700; }
    </style>
  </defs>

  <rect width="800" height="460" fill="#FAFAFA" rx="8"/>
  <rect x="20" y="20" width="760" height="420" fill="white" rx="6" stroke="#E0E0E0" stroke-width="1"/>

  <text x="400" y="50" text-anchor="middle" class="title">CPOL / CPHA — SPI 4가지 모드</text>
  <text x="400" y="68" text-anchor="middle" class="small">CPOL: 유휴 시 클럭 레벨 | CPHA: 샘플링 엣지 (0=첫번째, 1=두번째)</text>

  <!-- Mode 0: CPOL=0, CPHA=0 -->
  <rect x="40" y="85" width="170" height="22" fill="#1A73E8" rx="3"/>
  <text x="125" y="100" text-anchor="middle" class="mode">Mode 0 (CPOL=0, CPHA=0)</text>
  <!-- SCLK -->
  <text x="50" y="125" class="small" fill="#1A73E8">SCLK</text>
  <polyline points="80,135 105,135 105,115 145,115 145,135 185,135 185,115 225,115 225,135 200,135" fill="none" stroke="#1A73E8" stroke-width="2"/>
  <!-- 샘플 포인트 -->
  <circle cx="105" cy="115" r="4" fill="#EA4335"/>
  <circle cx="185" cy="115" r="4" fill="#EA4335"/>
  <text x="125" y="150" text-anchor="middle" class="highlight">↑ 상승 엣지 샘플</text>
  <text x="125" y="163" text-anchor="middle" class="small">ILI9341 기본 모드</text>

  <!-- Mode 1: CPOL=0, CPHA=1 -->
  <rect x="220" y="85" width="170" height="22" fill="#34A853" rx="3"/>
  <text x="305" y="100" text-anchor="middle" class="mode">Mode 1 (CPOL=0, CPHA=1)</text>
  <text x="230" y="125" class="small" fill="#34A853">SCLK</text>
  <polyline points="260,135 285,135 285,115 325,115 325,135 365,135 365,115 405,115 405,135 390,135" fill="none" stroke="#34A853" stroke-width="2"/>
  <circle cx="325" cy="135" r="4" fill="#EA4335"/>
  <circle cx="405" cy="135" r="4" fill="#EA4335"/>
  <text x="305" y="150" text-anchor="middle" class="highlight">↓ 하강 엣지 샘플</text>

  <!-- Mode 2: CPOL=1, CPHA=0 -->
  <rect x="40" y="195" width="170" height="22" fill="#FBBC04" rx="3"/>
  <text x="125" y="210" text-anchor="middle" class="mode">Mode 2 (CPOL=1, CPHA=0)</text>
  <text x="50" y="235" class="small" fill="#9a7000">SCLK</text>
  <polyline points="80,225 105,225 105,245 145,245 145,225 185,225 185,245 225,245 225,225 200,225" fill="none" stroke="#FBBC04" stroke-width="2"/>
  <circle cx="105" cy="245" r="4" fill="#EA4335"/>
  <circle cx="185" cy="245" r="4" fill="#EA4335"/>
  <text x="125" y="260" text-anchor="middle" class="highlight">↓ 하강 엣지 샘플</text>
  <text x="125" y="273" text-anchor="middle" class="small">유휴=HIGH</text>

  <!-- Mode 3: CPOL=1, CPHA=1 -->
  <rect x="220" y="195" width="170" height="22" fill="#EA4335" rx="3"/>
  <text x="305" y="210" text-anchor="middle" class="mode">Mode 3 (CPOL=1, CPHA=1)</text>
  <text x="230" y="235" class="small" fill="#EA4335">SCLK</text>
  <polyline points="260,225 285,225 285,245 325,245 325,225 365,225 365,245 405,245 405,225 390,225" fill="none" stroke="#EA4335" stroke-width="2"/>
  <circle cx="325" cy="225" r="4" fill="#1A73E8"/>
  <circle cx="405" cy="225" r="4" fill="#1A73E8"/>
  <text x="305" y="260" text-anchor="middle" class="highlight">↑ 상승 엣지 샘플</text>
  <text x="305" y="273" text-anchor="middle" class="small">유휴=HIGH</text>

  <!-- 정리 표 -->
  <rect x="440" y="85" width="320" height="200" fill="#F8F9FA" rx="5" stroke="#DEE2E6" stroke-width="1"/>
  <text x="600" y="108" text-anchor="middle" class="label">모드 비교 요약</text>
  <!-- 헤더 -->
  <rect x="440" y="113" width="320" height="22" fill="#1A1A2E" rx="2"/>
  <text x="490" y="128" text-anchor="middle" class="mode" font-size="11">모드</text>
  <text x="560" y="128" text-anchor="middle" class="mode" font-size="11">CPOL</text>
  <text x="630" y="128" text-anchor="middle" class="mode" font-size="11">CPHA</text>
  <text x="720" y="128" text-anchor="middle" class="mode" font-size="11">샘플 엣지</text>
  <!-- 행 -->
  <text x="490" y="152" text-anchor="middle" class="small">Mode 0</text>
  <text x="560" y="152" text-anchor="middle" class="small">0</text>
  <text x="630" y="152" text-anchor="middle" class="small">0</text>
  <text x="720" y="152" text-anchor="middle" class="small" fill="#1A73E8">상승(↑)</text>
  <text x="490" y="174" text-anchor="middle" class="small">Mode 1</text>
  <text x="560" y="174" text-anchor="middle" class="small">0</text>
  <text x="630" y="174" text-anchor="middle" class="small">1</text>
  <text x="720" y="174" text-anchor="middle" class="small" fill="#34A853">하강(↓)</text>
  <text x="490" y="196" text-anchor="middle" class="small">Mode 2</text>
  <text x="560" y="196" text-anchor="middle" class="small">1</text>
  <text x="630" y="196" text-anchor="middle" class="small">0</text>
  <text x="720" y="196" text-anchor="middle" class="small" fill="#FBBC04">하강(↓)</text>
  <text x="490" y="218" text-anchor="middle" class="small">Mode 3</text>
  <text x="560" y="218" text-anchor="middle" class="small">1</text>
  <text x="630" y="218" text-anchor="middle" class="small">1</text>
  <text x="720" y="218" text-anchor="middle" class="small" fill="#EA4335">상승(↑)</text>
  <line x1="440" y1="135" x2="760" y2="135" stroke="#DEE2E6" stroke-width="1"/>
  <line x1="440" y1="160" x2="760" y2="160" stroke="#DEE2E6" stroke-width="0.5"/>
  <line x1="440" y1="182" x2="760" y2="182" stroke="#DEE2E6" stroke-width="0.5"/>
  <line x1="440" y1="204" x2="760" y2="204" stroke="#DEE2E6" stroke-width="0.5"/>
  <line x1="530" y1="113" x2="530" y2="228" stroke="#DEE2E6" stroke-width="0.5"/>
  <line x1="600" y1="113" x2="600" y2="228" stroke="#DEE2E6" stroke-width="0.5"/>
  <line x1="670" y1="113" x2="670" y2="228" stroke="#DEE2E6" stroke-width="0.5"/>

  <!-- 하단 팁 -->
  <rect x="40" y="310" width="720" height="50" fill="#E8F5E9" rx="5" stroke="#34A853" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" class="label" fill="#34A853">💡 ILI9341 실무 설정</text>
  <text x="400" y="350" text-anchor="middle" class="small">CubeMX: SPI Mode = Full-Duplex Master | CPOL = Low | CPHA = 1 Edge → Mode 0 | 최대 42MHz</text>

  <!-- 하단 주석 -->
  <rect x="40" y="375" width="720" height="40" fill="#FFF3E0" rx="5" stroke="#FBBC04" stroke-width="1"/>
  <text x="400" y="392" text-anchor="middle" class="small" fill="#9a7000">⚠ 슬레이브 데이터시트에서 CPOL/CPHA 확인 필수 — 모드 불일치 시 데이터 오류 발생</text>
  <text x="400" y="408" text-anchor="middle" class="small" fill="#9a7000">로직 애널라이저로 SCLK 유휴 레벨과 첫 번째 데이터 엣지를 확인하여 모드 검증</text>
</svg>
