<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="645" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 645">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1565C0"/>
    </marker>
    <marker id="arr-org" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#BF360C"/>
    </marker>
    <style>text { font-family: 'Noto Sans KR', sans-serif; }</style>
  </defs>

  <!-- 전체 배경 -->
  <rect x="0" y="0" width="1000" height="645" fill="#F5F7FA"/>

  <!-- 제목 -->
  <text x="500" y="36" font-size="18" font-weight="bold" text-anchor="middle" fill="#1A1A2E">
    ULN2003 드라이버 회로도: STM32 GPIO → 모터 코일 신호 증폭
  </text>

  <!-- ══════════════════════════════════════════════════
       회로도 패널
       ══════════════════════════════════════════════════ -->
  <rect x="18" y="48" width="964" height="370" fill="white" stroke="#BDBDBD" stroke-width="1.5" rx="10"/>

  <!-- ── +3.3V 전원 (STM32 상단 중앙) ── -->
  <!-- STM32 box center X = 28 + 204/2 = 130 -->
  <line x1="130" y1="58" x2="130" y2="98" stroke="#C62828" stroke-width="3"/>
  <text x="130" y="55" font-size="13" font-weight="bold" text-anchor="middle" fill="#C62828">+3.3V</text>

  <!-- ── +5V 전원 (모터 상단 중앙, ULN2003 COM 분기) ── -->
  <!-- Motor box center X = 736 + 232/2 = 852 -->
  <!-- +5V 수직선 -->
  <line x1="852" y1="58" x2="852" y2="98" stroke="#BF360C" stroke-width="3"/>
  <text x="852" y="55" font-size="13" font-weight="bold" text-anchor="middle" fill="#BF360C">+5V</text>
  <!-- +5V 분기 노드 -->
  <circle cx="852" cy="70" r="5" fill="#BF360C"/>
  <!-- +5V → ULN2003 COM (좌측으로, y=70 수평) -->
  <line x1="852" y1="70" x2="614" y2="70" stroke="#BF360C" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="614" y1="70" x2="614" y2="98" stroke="#BF360C" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="614" cy="70" r="4" fill="#BF360C"/>
  <text x="733" y="65" font-size="11" text-anchor="middle" fill="#BF360C" font-weight="bold">COM 공통 (+5V)</text>

  <!-- ══════ STM32 GPIO 박스: x=28, y=98, w=204, h=240 ══════ -->
  <rect x="28" y="98" width="204" height="240" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5" rx="8"/>
  <text x="130" y="126" font-size="15" font-weight="bold" text-anchor="middle" fill="#0D47A1">STM32</text>
  <text x="130" y="147" font-size="14" text-anchor="middle" fill="#1565C0">GPIO</text>
  <text x="130" y="168" font-size="12" text-anchor="middle" fill="#666">3.3V / 수 mA</text>
  <line x1="42"  y1="176" x2="218" y2="176" stroke="#BBDEFB" stroke-width="1"/>

  <!-- GPIO 핀 라벨 -->
  <text x="44"  y="204" font-size="13" font-family="monospace" fill="#0D47A1" font-weight="bold">PB0</text>
  <text x="92"  y="204" font-size="13" fill="#555">(코일 A)</text>
  <text x="44"  y="232" font-size="13" font-family="monospace" fill="#0D47A1" font-weight="bold">PB1</text>
  <text x="92"  y="232" font-size="13" fill="#555">(코일 B)</text>
  <text x="44"  y="260" font-size="13" font-family="monospace" fill="#0D47A1" font-weight="bold">PB4</text>
  <text x="92"  y="260" font-size="13" fill="#555">(코일 C)</text>
  <text x="44"  y="288" font-size="13" font-family="monospace" fill="#0D47A1" font-weight="bold">PB5</text>
  <text x="92"  y="288" font-size="13" fill="#555">(코일 D)</text>

  <!-- 출력 핀 점 (STM32 우측) -->
  <circle cx="232" cy="200" r="5" fill="#1565C0"/>
  <circle cx="232" cy="228" r="5" fill="#1565C0"/>
  <circle cx="232" cy="256" r="5" fill="#1565C0"/>
  <circle cx="232" cy="284" r="5" fill="#1565C0"/>

  <!-- STM32 GND: 박스 하단 중앙 → GND 버스 -->
  <line x1="130" y1="338" x2="130" y2="374" stroke="#333" stroke-width="2.5"/>

  <!-- ══════ GPIO → ULN2003 연결 ══════ -->
  <text x="300" y="193" font-size="11" text-anchor="middle" fill="#1565C0" font-weight="bold">HIGH→ON</text>
  <line x1="232" y1="200" x2="364" y2="200" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="232" y1="228" x2="364" y2="228" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="232" y1="256" x2="364" y2="256" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="232" y1="284" x2="364" y2="284" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- ══════ ULN2003 IC 박스: x=366, y=98, w=248, h=258 ══════ -->
  <rect x="366" y="98" width="248" height="258" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5" rx="10"/>
  <text x="490" y="126" font-size="15" font-weight="bold" text-anchor="middle" fill="#1B5E20">ULN2003</text>
  <text x="490" y="146" font-size="13" text-anchor="middle" fill="#388E3C">(Darlington Array)</text>

  <!-- 내부 박스 -->
  <rect x="382" y="155" width="216" height="140" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1" rx="6"/>
  <text x="490" y="180" font-size="13" text-anchor="middle" fill="#1B5E20" font-weight="bold">4채널 달링턴 트랜지스터</text>
  <text x="490" y="200" font-size="12" text-anchor="middle" fill="#2E7D32">프리휠링 다이오드 내장</text>
  <text x="490" y="218" font-size="12" text-anchor="middle" fill="#2E7D32">(역기전력 자동 보호)</text>
  <text x="490" y="238" font-size="12" text-anchor="middle" fill="#2E7D32">최대 500 mA / 채널</text>
  <text x="490" y="256" font-size="12" text-anchor="middle" fill="#2E7D32">50V 내압</text>
  <text x="490" y="284" font-size="12" text-anchor="middle" fill="#388E3C">pin8: GND  /  pin9: COM(+5V)</text>

  <!-- IN 핀 점 + 라벨 -->
  <circle cx="366" cy="200" r="5" fill="#1565C0"/>
  <circle cx="366" cy="228" r="5" fill="#1565C0"/>
  <circle cx="366" cy="256" r="5" fill="#1565C0"/>
  <circle cx="366" cy="284" r="5" fill="#1565C0"/>
  <text x="378" y="196" font-size="11" font-family="monospace" fill="#1565C0">IN1</text>
  <text x="378" y="224" font-size="11" font-family="monospace" fill="#1565C0">IN2</text>
  <text x="378" y="252" font-size="11" font-family="monospace" fill="#1565C0">IN3</text>
  <text x="378" y="280" font-size="11" font-family="monospace" fill="#1565C0">IN4</text>

  <!-- OUT 핀 점 + 라벨 -->
  <circle cx="614" cy="200" r="5" fill="#BF360C"/>
  <circle cx="614" cy="228" r="5" fill="#BF360C"/>
  <circle cx="614" cy="256" r="5" fill="#BF360C"/>
  <circle cx="614" cy="284" r="5" fill="#BF360C"/>
  <text x="602" y="196" font-size="11" font-family="monospace" text-anchor="end" fill="#BF360C">OUT1</text>
  <text x="602" y="224" font-size="11" font-family="monospace" text-anchor="end" fill="#BF360C">OUT2</text>
  <text x="602" y="252" font-size="11" font-family="monospace" text-anchor="end" fill="#BF360C">OUT3</text>
  <text x="602" y="280" font-size="11" font-family="monospace" text-anchor="end" fill="#BF360C">OUT4</text>

  <!-- ULN2003 GND(pin8): 박스 하단 중앙 → GND 버스 -->
  <line x1="490" y1="356" x2="490" y2="374" stroke="#333" stroke-width="2.5"/>

  <!-- ══════ ULN2003 → 모터 연결 ══════ -->
  <text x="676" y="192" font-size="12" text-anchor="middle" fill="#BF360C" font-weight="bold">코일 A</text>
  <text x="676" y="220" font-size="12" text-anchor="middle" fill="#BF360C" font-weight="bold">코일 B</text>
  <text x="676" y="248" font-size="12" text-anchor="middle" fill="#BF360C" font-weight="bold">코일 C</text>
  <text x="676" y="276" font-size="12" text-anchor="middle" fill="#BF360C" font-weight="bold">코일 D</text>
  <line x1="614" y1="200" x2="734" y2="200" stroke="#BF360C" stroke-width="2.5" marker-end="url(#arr-org)"/>
  <line x1="614" y1="228" x2="734" y2="228" stroke="#BF360C" stroke-width="2.5" marker-end="url(#arr-org)"/>
  <line x1="614" y1="256" x2="734" y2="256" stroke="#BF360C" stroke-width="2.5" marker-end="url(#arr-org)"/>
  <line x1="614" y1="284" x2="734" y2="284" stroke="#BF360C" stroke-width="2.5" marker-end="url(#arr-org)"/>

  <!-- ══════ 28BYJ-48 모터 박스: x=736, y=98, w=232, h=258 ══════ -->
  <rect x="736" y="98" width="232" height="258" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5" rx="8"/>
  <text x="852" y="126" font-size="15" font-weight="bold" text-anchor="middle" fill="#BF360C">28BYJ-48</text>
  <text x="852" y="147" font-size="14" text-anchor="middle" fill="#E65100">스텝 모터</text>
  <line x1="750" y1="157" x2="954" y2="157" stroke="#FFB74D" stroke-width="1"/>

  <!-- 모터 입력 점 -->
  <circle cx="736" cy="200" r="5" fill="#BF360C"/>
  <circle cx="736" cy="228" r="5" fill="#BF360C"/>
  <circle cx="736" cy="256" r="5" fill="#BF360C"/>
  <circle cx="736" cy="284" r="5" fill="#BF360C"/>

  <text x="852" y="180" font-size="13" text-anchor="middle" fill="#555">5V DC / 500mA</text>
  <text x="852" y="200" font-size="13" text-anchor="middle" fill="#555">4상 / 기어비 64:1</text>
  <text x="852" y="222" font-size="12" text-anchor="middle" fill="#888">풀스텝: 64스텝/회전</text>
  <text x="852" y="240" font-size="12" text-anchor="middle" fill="#888">5.625° / 스텝</text>
  <line x1="750" y1="252" x2="954" y2="252" stroke="#FFB74D" stroke-width="1"/>
  <text x="852" y="272" font-size="12" text-anchor="middle" fill="#E65100" font-weight="bold">COM 선 (빨강) → +5V</text>
  <text x="852" y="290" font-size="12" text-anchor="middle" fill="#888">코일: 주황/황/분홍/파랑</text>
  <text x="852" y="308" font-size="12" text-anchor="middle" fill="#888">OUT1~OUT4에 각각 연결</text>
  <text x="852" y="336" font-size="11" text-anchor="middle" fill="#AAA">(모터 측 GND = ULN2003이</text>
  <text x="852" y="350" font-size="11" text-anchor="middle" fill="#AAA">전류 싱크로 처리)</text>

  <!-- ══════ GND 공통 버스 ══════ -->
  <!-- 공통 GND 수평 버스: STM32 ↔ ULN2003 연결 -->
  <line x1="130" y1="374" x2="490" y2="374" stroke="#333" stroke-width="3"/>

  <!-- 접점 dot: STM32 (버스 합류 지점) -->
  <circle cx="130" cy="374" r="5" fill="#333"/>
  <!-- 접점 dot: ULN2003 (버스 합류 지점) -->
  <circle cx="490" cy="374" r="5" fill="#333"/>

  <!-- GND 심볼 — STM32 하단 (x=130) -->
  <line x1="113" y1="377" x2="147" y2="377" stroke="#333" stroke-width="2.5"/>
  <line x1="119" y1="384" x2="141" y2="384" stroke="#333" stroke-width="2"/>
  <line x1="125" y1="391" x2="135" y2="391" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="407" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">GND</text>

  <!-- GND 심볼 — ULN2003 하단 (x=490) -->
  <line x1="473" y1="377" x2="507" y2="377" stroke="#333" stroke-width="2.5"/>
  <line x1="479" y1="384" x2="501" y2="384" stroke="#333" stroke-width="2"/>
  <line x1="485" y1="391" x2="495" y2="391" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="407" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">GND</text>

  <!-- 공통 GND 버스 라벨 -->
  <text x="310" y="370" font-size="11" text-anchor="middle" fill="#555" font-style="italic">공통 GND</text>

  <!-- ══════════════════════════════════════════════════
       설명 박스
       ══════════════════════════════════════════════════ -->
  <rect x="18" y="432" width="964" height="198" fill="white" stroke="#1A73E8" stroke-width="2" rx="10"/>

  <!-- 헤더 -->
  <rect x="18" y="432" width="964" height="32" fill="#1565C0" rx="10"/>
  <rect x="18" y="450" width="964" height="14" fill="#1565C0"/>
  <text x="500" y="453" font-size="15" font-weight="bold" text-anchor="middle" fill="white">ULN2003의 역할</text>

  <!-- 세로 구분선 -->
  <line x1="500" y1="464" x2="500" y2="628" stroke="#E0E0E0" stroke-width="1"/>
  <!-- 가로 구분선 -->
  <line x1="28" y1="548" x2="972" y2="548" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ① 레벨 변환 (좌상) -->
  <rect x="28"  y="468" width="6" height="72" fill="#1565C0" rx="3"/>
  <text x="44"  y="487" font-size="13" font-weight="bold" fill="#0D47A1">① 레벨 변환</text>
  <text x="44"  y="506" font-size="13" fill="#333">STM32 3.3V 신호 → 모터 5V 레벨로 변환</text>
  <text x="44"  y="524" font-size="12" fill="#666">GPIO 출력: 3.3V / 수mA → 직접 모터 구동 불가</text>
  <text x="44"  y="540" font-size="12" fill="#666">드라이버 IC를 통해 5V / 500mA로 변환 공급</text>

  <!-- ② 전류 증폭 (우상) -->
  <rect x="510" y="468" width="6" height="72" fill="#2E7D32" rx="3"/>
  <text x="526" y="487" font-size="13" font-weight="bold" fill="#1B5E20">② 전류 증폭</text>
  <text x="526" y="506" font-size="13" fill="#333">mA → 최대 500mA/채널 증폭</text>
  <text x="526" y="524" font-size="12" fill="#666">달링턴 트랜지스터 쌍 → 전류 이득 수천 배</text>
  <text x="526" y="540" font-size="12" fill="#666">4채널 독립 동작, 동시 활성 가능</text>

  <!-- ③ Active-High (좌하) -->
  <rect x="28"  y="554" width="6" height="70" fill="#E65100" rx="3"/>
  <text x="44"  y="573" font-size="13" font-weight="bold" fill="#BF360C">③ Active-High 동작</text>
  <text x="44"  y="592" font-size="13" fill="#333">입력 HIGH → 내부 트랜지스터 ON</text>
  <text x="44"  y="610" font-size="12" fill="#666">→ 출력이 GND로 당겨져 코일에 전류 흐름</text>
  <text x="44"  y="625" font-size="12" fill="#666">오픈 컬렉터 방식 (전류 싱크)</text>

  <!-- ④ 역기전력 + 경고 (우하) -->
  <rect x="510" y="554" width="6" height="70" fill="#F9A825" rx="3"/>
  <text x="526" y="573" font-size="13" font-weight="bold" fill="#E65100">④ 역기전력 보호</text>
  <text x="526" y="592" font-size="12" fill="#666">내장 프리휠링 다이오드 → 코일 역기전력 흡수</text>
  <!-- 경고 인라인 -->
  <rect x="526" y="600" width="444" height="26" fill="#FFF3E0" stroke="#FF9800" stroke-width="1" rx="4"/>
  <text x="536" y="617" font-size="12" font-weight="bold" fill="#E65100">⚠</text>
  <text x="554" y="617" font-size="12" fill="#555">모터를 GPIO에 직접 연결하면 핀 영구 손상! 반드시 드라이버 사용</text>
</svg>
