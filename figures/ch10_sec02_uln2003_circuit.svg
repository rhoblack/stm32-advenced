<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ic-box { fill: #E8F5E9; stroke: #34A853; stroke-width: 2; }
      .gpio-line { stroke: #1A73E8; stroke-width: 2; }
      .motor-line { stroke: #FF6F00; stroke-width: 2.5; }
      .text-title { font-size: 16px; font-weight: bold; }
      .text-normal { font-size: 12px; }
      .text-small { font-size: 10px; }
      .pin-label { font-size: 9px; }
    </style>
  </defs>

  <!-- 제목 -->
  <text x="500" y="30" class="text-title" text-anchor="middle" fill="#1A1A2E">
    ULN2003 드라이버 회로도: STM32 GPIO → 모터 코일 신호 증폭
  </text>

  <!-- STM32 GPIO (좌측) -->
  <rect x="30" y="80" width="120" height="120" fill="#EFF6FF" stroke="#1A73E8" stroke-width="2" rx="5"/>
  <text x="90" y="105" class="text-normal" text-anchor="middle" font-weight="bold">STM32</text>
  <text x="90" y="125" class="text-normal" text-anchor="middle">GPIO</text>
  <text x="90" y="145" class="text-small" text-anchor="middle" fill="#666">3.3V, mA</text>

  <!-- GPIO 핀들 -->
  <text x="50" y="155" class="pin-label">PB0 (A)</text>
  <text x="50" y="175" class="pin-label">PB1 (B)</text>
  <text x="50" y="195" class="pin-label">PB4 (C)</text>
  <text x="50" y="215" class="pin-label">PB5 (D)</text>

  <!-- ULN2003 IC -->
  <rect x="320" y="80" width="160" height="200" class="ic-box" rx="8"/>
  <text x="400" y="110" class="text-normal" text-anchor="middle" font-weight="bold">ULN2003</text>
  <text x="400" y="130" class="text-small" text-anchor="middle">(Darlington Array)</text>

  <!-- ULN2003 입력 핀 (좌측) -->
  <circle cx="320" cy="160" r="4" fill="#1A73E8"/>
  <text x="305" y="165" class="pin-label" text-anchor="end">IN1 (A)</text>

  <circle cx="320" cy="190" r="4" fill="#1A73E8"/>
  <text x="305" y="195" class="pin-label" text-anchor="end">IN2 (B)</text>

  <circle cx="320" cy="220" r="4" fill="#1A73E8"/>
  <text x="305" y="225" class="pin-label" text-anchor="end">IN3 (C)</text>

  <circle cx="320" cy="250" r="4" fill="#1A73E8"/>
  <text x="305" y="255" class="pin-label" text-anchor="end">IN4 (D)</text>

  <!-- ULN2003 출력 핀 (우측) -->
  <circle cx="480" cy="160" r="4" fill="#FF6F00"/>
  <text x="495" y="165" class="pin-label">OUT1 (A)</text>

  <circle cx="480" cy="190" r="4" fill="#FF6F00"/>
  <text x="495" y="195" class="pin-label">OUT2 (B)</text>

  <circle cx="480" cy="220" r="4" fill="#FF6F00"/>
  <text x="495" y="225" class="pin-label">OUT3 (C)</text>

  <circle cx="480" cy="250" r="4" fill="#FF6F00"/>
  <text x="495" y="255" class="pin-label">OUT4 (D)</text>

  <!-- 입력 신호 -->
  <line x1="150" y1="155" x2="320" y2="160" class="gpio-line" stroke-dasharray="3,3"/>
  <line x1="150" y1="175" x2="320" y2="190" class="gpio-line" stroke-dasharray="3,3"/>
  <line x1="150" y1="195" x2="320" y2="220" class="gpio-line" stroke-dasharray="3,3"/>
  <line x1="150" y1="215" x2="320" y2="250" class="gpio-line" stroke-dasharray="3,3"/>

  <!-- 모터 코일 (우측) -->
  <rect x="650" y="140" width="100" height="120" fill="#FFE0B2" stroke="#FF6F00" stroke-width="2" rx="5"/>
  <text x="700" y="170" class="text-normal" text-anchor="middle" font-weight="bold">28BYJ-48</text>
  <text x="700" y="190" class="text-small" text-anchor="middle">스텝 모터</text>
  <text x="700" y="210" class="text-small" text-anchor="middle" fill="#666">12V, 500mA</text>

  <!-- 모터 코일 피드 -->
  <line x1="480" y1="160" x2="650" y2="160" class="motor-line"/>
  <text x="560" y="155" class="pin-label" fill="#FF6F00">Coil A</text>

  <line x1="480" y1="190" x2="650" y2="185" class="motor-line"/>
  <text x="560" y="180" class="pin-label" fill="#FF6F00">Coil B</text>

  <line x1="480" y1="220" x2="650" y2="210" class="motor-line"/>
  <text x="560" y="205" class="pin-label" fill="#FF6F00">Coil C</text>

  <line x1="480" y1="250" x2="650" y2="235" class="motor-line"/>
  <text x="560" y="230" class="pin-label" fill="#FF6F00">Coil D</text>

  <!-- 전원 공급 -->
  <line x1="100" y1="50" x2="100" y2="80" stroke="#EA4335" stroke-width="3"/>
  <text x="100" y="45" class="pin-label" text-anchor="middle" fill="#EA4335" font-weight="bold">+3.3V</text>

  <line x1="700" y1="50" x2="700" y2="140" stroke="#FF6F00" stroke-width="3"/>
  <text x="700" y="45" class="pin-label" text-anchor="middle" fill="#FF6F00" font-weight="bold">+12V</text>

  <line x1="100" y1="200" x2="100" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="700" y1="300" x2="700" y2="260" stroke="#333" stroke-width="2"/>
  <text x="50" y="305" class="pin-label" fill="#333">GND</text>
  <text x="750" y="305" class="pin-label" fill="#333">GND</text>

  <!-- 설명 박스 -->
  <rect x="50" y="350" width="900" height="130" fill="#F0F4FF" stroke="#1A73E8" stroke-width="2" rx="5"/>

  <text x="70" y="375" class="text-normal" font-weight="bold" fill="#1A73E8">ULN2003의 역할:</text>

  <text x="70" y="400" class="text-small">
    ① <tspan font-weight="bold">레벨 변환:</tspan> STM32의 3.3V 신호를 12V로 변환
  </text>

  <text x="70" y="420" class="text-small">
    ② <tspan font-weight="bold">전류 증폭:</tspan> mA 급 신호를 A 급 신호로 증폭 (최대 500mA/채널)
  </text>

  <text x="70" y="440" class="text-small">
    ③ <tspan font-weight="bold">Active-Low:</tspan> 입력을 LOW로 설정하면 출력이 ON (다이오드 보호 기능 포함)
  </text>

  <text x="70" y="460" class="text-small" fill="#666">
    💡 팁: 모터를 직접 STM32에 연결하면 GPIO가 손상됩니다. 반드시 드라이버를 사용하세요!
  </text>
</svg>
