<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <rect width="700" height="360" fill="#F8F9FA" rx="8"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1A1A">Ch18 아키텍처 위치 — 디버깅 인프라는 전 레이어에 적용</text>

  <!-- App Layer -->
  <rect x="40" y="50" width="620" height="55" rx="6" fill="#EA4335" fill-opacity="0.15" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="80" font-size="14" font-weight="bold" fill="#C62828">App Layer</text>
  <text x="80" y="97" font-size="11" fill="#555">cli_app.c · protocol_app.c · ui_service.c</text>

  <!-- Service Layer -->
  <rect x="40" y="115" width="620" height="55" rx="6" fill="#FBBC04" fill-opacity="0.2" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="145" font-size="14" font-weight="bold" fill="#E37400">Service Layer</text>
  <text x="80" y="162" font-size="11" fill="#555">clock_service.c · sensor_service.c · gfx_service.c</text>

  <!-- Driver Layer -->
  <rect x="40" y="180" width="620" height="55" rx="6" fill="#34A853" fill-opacity="0.15" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="210" font-size="14" font-weight="bold" fill="#256429">Driver Layer</text>
  <text x="80" y="227" font-size="11" fill="#555">uart_driver.c · spi_driver.c · i2c_driver.c · rtc_driver.c · stepper_driver.c</text>

  <!-- HAL Layer -->
  <rect x="40" y="245" width="620" height="55" rx="6" fill="#1A73E8" fill-opacity="0.15" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="275" font-size="14" font-weight="bold" fill="#1558B0">HAL Layer</text>
  <text x="80" y="292" font-size="11" fill="#555">STM32 HAL Library (ST 제공) · DMA · NVIC · Peripheral 레지스터</text>

  <!-- Ch18 디버깅 인프라 — 오버레이 표시 -->
  <rect x="490" y="50" width="170" height="250" rx="6" fill="none" stroke="#FF6D00" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="575" y="44" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF6D00">Ch18</text>
  <text x="575" y="315" text-anchor="middle" font-size="11" fill="#FF6D00">디버깅 인프라</text>
  <text x="575" y="330" text-anchor="middle" font-size="11" fill="#FF6D00">(전 레이어 적용)</text>

  <!-- 디버깅 툴 목록 -->
  <text x="500" y="75" font-size="10" fill="#FF6D00">Watch / Live Expr</text>
  <text x="500" y="90" font-size="10" fill="#FF6D00">Memory View</text>
  <text x="500" y="140" font-size="10" fill="#FF6D00">FSM 상태 로그</text>
  <text x="500" y="155" font-size="10" fill="#FF6D00">서비스 반환값</text>
  <text x="500" y="205" font-size="10" fill="#FF6D00">HAL 반환코드</text>
  <text x="500" y="220" font-size="10" fill="#FF6D00">DMA 상태 확인</text>
  <text x="500" y="270" font-size="10" fill="#FF6D00">HardFault Handler</text>
  <text x="500" y="285" font-size="10" fill="#FF6D00">CFSR / 레지스터</text>
</svg>
