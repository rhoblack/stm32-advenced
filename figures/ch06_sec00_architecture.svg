<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">프로젝트 아키텍처 v0.6 — UART DMA + 링 버퍼</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#888">주황 강조 = DMA 경로 | 초록 = 구현됨 | 회색 = 향후 예정</text>

  <!-- App 레이어 -->
  <rect x="30" y="65" width="740" height="100" rx="8" fill="#EA4335" opacity="0.08" stroke="#EA4335" stroke-width="2"/>
  <text x="50" y="85" font-size="14" font-weight="700" fill="#EA4335">App</text>

  <rect x="50" y="95" width="100" height="55" rx="6" fill="#EA4335" opacity="0.85"/>
  <text x="100" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="600">main()</text>
  <text x="100" y="126" text-anchor="middle" font-size="9" fill="white">v0.1</text>

  <rect x="170" y="95" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="220" y="112" text-anchor="middle" font-size="11" fill="#999">cli_app</text>
  <text x="220" y="126" text-anchor="middle" font-size="9" fill="#BBB">Ch15</text>

  <!-- Service 레이어 -->
  <rect x="30" y="165" width="740" height="100" rx="8" fill="#FBBC04" opacity="0.08" stroke="#FBBC04" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="185" font-size="14" font-weight="700" fill="#F57F17">Service</text>

  <rect x="50" y="195" width="100" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="100" y="212" text-anchor="middle" font-size="11" fill="#999">clock_service</text>
  <text x="100" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch10</text>

  <rect x="170" y="195" width="110" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="225" y="212" text-anchor="middle" font-size="11" fill="#999">sensor_service</text>
  <text x="225" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <!-- Driver 레이어 -->
  <rect x="30" y="265" width="740" height="130" rx="8" fill="#34A853" opacity="0.08" stroke="#34A853" stroke-width="2"/>
  <text x="50" y="285" font-size="14" font-weight="700" fill="#34A853">Driver</text>

  <rect x="50" y="300" width="90" height="55" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="95" y="322" text-anchor="middle" font-size="11" fill="white" font-weight="600">logger</text>
  <text x="95" y="340" text-anchor="middle" font-size="9" fill="white">v0.2</text>

  <!-- ★ uart_driver v0.6 DMA (주황 강조) -->
  <rect x="155" y="300" width="130" height="60" rx="6" fill="#34A853" opacity="0.85" stroke="#FFA500" stroke-width="3"/>
  <text x="220" y="318" text-anchor="middle" font-size="11" fill="white" font-weight="700">uart_driver</text>
  <text x="220" y="332" text-anchor="middle" font-size="9" fill="#FFD600">v0.6 DMA</text>
  <text x="220" y="346" text-anchor="middle" font-size="8" fill="white">+ 링 버퍼</text>

  <!-- 미래 Driver -->
  <rect x="300" y="300" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="345" y="322" text-anchor="middle" font-size="11" fill="#999">tim_driver</text>
  <text x="345" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch07</text>

  <rect x="405" y="300" width="90" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="450" y="322" text-anchor="middle" font-size="11" fill="#999">rtc_driver</text>
  <text x="450" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch09</text>

  <rect x="510" y="300" width="95" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="557" y="322" text-anchor="middle" font-size="11" fill="#999">sht31_driver</text>
  <text x="557" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <rect x="615" y="300" width="80" height="55" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="655" y="322" text-anchor="middle" font-size="10" fill="#999">ili9341</text>
  <text x="655" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch12</text>

  <!-- HAL 레이어 -->
  <rect x="30" y="395" width="740" height="75" rx="8" fill="#1A73E8" opacity="0.08" stroke="#1A73E8" stroke-width="2"/>
  <text x="50" y="415" font-size="14" font-weight="700" fill="#1A73E8">HAL</text>

  <rect x="50" y="425" width="710" height="30" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="405" y="445" text-anchor="middle" font-size="12" fill="white" font-weight="600">ST HAL — HAL_GPIO / HAL_UART / HAL_DMA / HAL_TIM / HAL_SPI / HAL_I2C / HAL_RTC</text>

  <!-- DMA 횡단 영역 (주황) -->
  <rect x="30" y="480" width="740" height="30" rx="8" fill="#FFF3E0" stroke="#FFA500" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="499" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">DMA 컨트롤러 (횡단): DMA1 Stream5(RX) + Stream6(TX) — CPU 개입 없이 데이터 전송</text>

  <!-- 횡단 관심사: 로그 -->
  <rect x="30" y="520" width="740" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="539" text-anchor="middle" font-size="12" fill="#7B1FA2" font-weight="600">횡단 관심사: LOG_E/W/I/D 매크로 — 모든 계층에서 사용 (v0.2~)</text>

  <!-- 의존 화살표: main() → uart_driver -->
  <defs>
    <marker id="depArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
    <marker id="dmaArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFA500"/>
    </marker>
  </defs>
  <line x1="100" y1="150" x2="220" y2="300" stroke="#34A853" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#depArrow)"/>
  <text x="125" y="220" font-size="10" fill="#34A853" font-weight="600">uart_send()</text>

  <!-- DMA 경로 화살표 -->
  <line x1="220" y1="360" x2="220" y2="425" stroke="#FFA500" stroke-width="2.5" marker-end="url(#dmaArrow)"/>
  <text x="240" y="395" font-size="10" fill="#FFA500" font-weight="600">DMA</text>
</svg>
