<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500"  viewBox="0 0 1000 500">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: bold; fill: #000; }
      .label { font-size: 12px; fill: #333; font-family: 'Noto Sans KR', sans-serif; }
      .code { font-size: 11px; fill: #000; font-family: 'monospace'; }
      .step-box { fill: #E8F4F8; stroke: #1A73E8; stroke-width: 1; }
      .step-title { font-size: 11px; font-weight: bold; fill: #1A73E8; }
    </style>
  </defs>

  <text x="500" y="30" class="title" text-anchor="middle">
    CRC-8 계산 단계별 과정 (데이터: 0xBE, 0x00)
  </text>

  <!-- Step 1 -->
  <g>
    <rect x="50" y="60" width="220" height="100" class="step-box" rx="3"/>
    <text x="60" y="80" class="step-title">[Step 1] 초기화</text>
    <text x="60" y="100" class="code">crc = 0xFF</text>
    <text x="60" y="120" class="code">다항식 = 0x31</text>
    <text x="60" y="140" class="code">데이터 = {0xBE, 0x00}</text>
  </g>

  <!-- Step 2 -->
  <g>
    <rect x="310" y="60" width="220" height="100" class="step-box" rx="3"/>
    <text x="320" y="80" class="step-title">[Step 2] 첫번째 바이트</text>
    <text x="320" y="100" class="code">data[0] = 0xBE</text>
    <text x="320" y="120" class="code">crc ^= 0xBE → 0x41</text>
    <text x="320" y="140" class="code">8비트 처리 시작</text>
  </g>

  <!-- Step 3 -->
  <g>
    <rect x="570" y="60" width="220" height="100" class="step-box" rx="3"/>
    <text x="580" y="80" class="step-title">[Step 3] 비트별 처리</text>
    <text x="580" y="100" class="code">8번 반복:</text>
    <text x="580" y="120" class="code">if (crc & 0x80):</text>
    <text x="580" y="140" class="code">  crc = (crc << 1) ^ 0x31</text>
  </g>

  <!-- Step 4 -->
  <g>
    <rect x="830" y="60" width="120" height="100" class="step-box" rx="3"/>
    <text x="840" y="80" class="step-title">[Step 4] 완료</text>
    <text x="840" y="100" class="code">crc &= 0xFF</text>
    <text x="840" y="120" class="code">다음 바이트</text>
    <text x="840" y="140" class="code">또는 반환</text>
  </g>

  <!-- 중간 박스: CRC 계산 테이블 -->
  <rect x="50" y="200" width="900" height="270" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="3"/>

  <text x="70" y="225" class="title">CRC-8 계산 예시 (0xBE 처리 중)</text>

  <!-- 테이블 헤더 -->
  <g>
    <rect x="70" y="240" width="50" height="25" fill="#E8E8E8" stroke="#999"/>
    <text x="95" y="258" class="label" text-anchor="middle">Bit</text>

    <rect x="120" y="240" width="60" height="25" fill="#E8E8E8" stroke="#999"/>
    <text x="150" y="258" class="label" text-anchor="middle">CRC</text>

    <rect x="180" y="240" width="60" height="25" fill="#E8E8E8" stroke="#999"/>
    <text x="210" y="258" class="label" text-anchor="middle">MSB</text>

    <rect x="240" y="240" width="100" height="25" fill="#E8E8E8" stroke="#999"/>
    <text x="290" y="258" class="label" text-anchor="middle">동작</text>

    <rect x="340" y="240" width="60" height="25" fill="#E8E8E8" stroke="#999"/>
    <text x="370" y="258" class="label" text-anchor="middle">결과</text>
  </g>

  <!-- 테이블 행들 -->
  <g>
    <rect x="70" y="265" width="50" height="20" fill="white" stroke="#ccc"/>
    <text x="95" y="279" class="code" text-anchor="middle">0</text>

    <rect x="120" y="265" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="150" y="279" class="code" text-anchor="middle">0x41</text>

    <rect x="180" y="265" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="210" y="279" class="code" text-anchor="middle">0</text>

    <rect x="240" y="265" width="100" height="20" fill="white" stroke="#ccc"/>
    <text x="290" y="279" class="code" text-anchor="middle">Shift (<<1)</text>

    <rect x="340" y="265" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="370" y="279" class="code" text-anchor="middle">0x82</text>
  </g>

  <g>
    <rect x="70" y="285" width="50" height="20" fill="white" stroke="#ccc"/>
    <text x="95" y="299" class="code" text-anchor="middle">1</text>

    <rect x="120" y="285" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="150" y="299" class="code" text-anchor="middle">0x82</text>

    <rect x="180" y="285" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="210" y="299" class="code" text-anchor="middle">1</text>

    <rect x="240" y="285" width="100" height="20" fill="white" stroke="#ccc"/>
    <text x="290" y="299" class="code" text-anchor="middle">Shift + XOR</text>

    <rect x="340" y="285" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="370" y="299" class="code" text-anchor="middle">0x05</text>
  </g>

  <g>
    <rect x="70" y="305" width="50" height="20" fill="white" stroke="#ccc"/>
    <text x="95" y="319" class="code" text-anchor="middle">2~7</text>

    <rect x="120" y="305" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="150" y="319" class="code" text-anchor="middle">...</text>

    <rect x="180" y="305" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="210" y="319" class="code" text-anchor="middle">...</text>

    <rect x="240" y="305" width="100" height="20" fill="white" stroke="#ccc"/>
    <text x="290" y="319" class="code" text-anchor="middle">(반복)</text>

    <rect x="340" y="305" width="60" height="20" fill="white" stroke="#ccc"/>
    <text x="370" y="319" class="code" text-anchor="middle">...</text>
  </g>

  <g>
    <rect x="70" y="325" width="50" height="20" fill="#FBBC04" stroke="#ccc"/>
    <text x="95" y="339" class="code" text-anchor="middle">8</text>

    <rect x="120" y="325" width="60" height="20" fill="#FBBC04" stroke="#ccc"/>
    <text x="150" y="339" class="code" text-anchor="middle">0xAC</text>

    <rect x="180" y="325" width="60" height="20" fill="#FBBC04" stroke="#ccc"/>
    <text x="210" y="339" class="code" text-anchor="middle">-</text>

    <rect x="240" y="325" width="100" height="20" fill="#FBBC04" stroke="#ccc"/>
    <text x="290" y="339" class="code" text-anchor="middle">1바이트 완료</text>

    <rect x="340" y="325" width="60" height="20" fill="#FBBC04" stroke="#ccc"/>
    <text x="370" y="339" class="code" text-anchor="middle">0xAC</text>
  </g>

  <!-- 설명 -->
  <text x="70" y="380" class="label">
    결과: 0xBE의 CRC-8 = 0xAC (다항식 0x31, 초기값 0xFF)
  </text>

  <text x="70" y="410" class="label">
    검증: SHT31이 응답한 CRC와 계산한 CRC가 일치하면 데이터 무결성 보장
  </text>

</svg>
