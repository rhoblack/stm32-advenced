<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .text-title  { font-size: 16px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
      .text-normal { font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
      .text-small  { font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="450" y="30" class="text-title" text-anchor="middle" fill="#1A1A2E">28BYJ-48 내부 구조: 기어 감속 (64:1)</text>
  <text x="450" y="50" class="text-small" text-anchor="middle" fill="#666">내부 모터 코어 → 다단 기어 감속 → 출력축 저속 고토크</text>

  <!-- 모터 코어 -->
  <circle cx="120" cy="200" r="50" fill="#FFE0B2" stroke="#FF6F00" stroke-width="2"/>
  <text x="120" y="192" class="text-small" text-anchor="middle" font-weight="bold">모터 코어</text>
  <text x="120" y="207" class="text-small" text-anchor="middle">4상 코일</text>
  <text x="120" y="222" class="text-small" text-anchor="middle" fill="#FF6F00">고속 회전</text>
  <text x="120" y="270" class="text-normal" text-anchor="middle" font-weight="bold">입력</text>
  <text x="120" y="288" class="text-small" text-anchor="middle">내부 로터</text>
  <text x="120" y="303" class="text-small" text-anchor="middle">고속 / 저토크</text>

  <!-- 화살표 -->
  <line x1="170" y1="200" x2="230" y2="200" stroke="#FF6F00" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="193" class="text-small" fill="#FF6F00" text-anchor="middle">구동</text>

  <!-- 기어 감속 박스 -->
  <rect x="240" y="140" width="300" height="120" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" rx="8"/>
  <text x="390" y="168" class="text-normal" text-anchor="middle" font-weight="bold" fill="#1B5E20">다단 기어 감속</text>

  <!-- 기어 시각화 (작은 기어 → 큰 기어 반복) -->
  <circle cx="280" cy="200" r="18" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="280" y="205" class="text-small" text-anchor="middle">소</text>
  <circle cx="320" cy="200" r="28" fill="#81C784" stroke="#388E3C" stroke-width="1.5"/>
  <text x="320" y="205" class="text-small" text-anchor="middle">대</text>
  <circle cx="368" cy="200" r="18" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="368" y="205" class="text-small" text-anchor="middle">소</text>
  <circle cx="410" cy="200" r="28" fill="#81C784" stroke="#388E3C" stroke-width="1.5"/>
  <text x="410" y="205" class="text-small" text-anchor="middle">대</text>
  <circle cx="456" cy="200" r="18" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="456" y="205" class="text-small" text-anchor="middle">소</text>
  <circle cx="498" cy="200" r="28" fill="#66BB6A" stroke="#388E3C" stroke-width="2"/>
  <text x="498" y="205" class="text-small" text-anchor="middle" fill="white">대</text>

  <text x="390" y="245" class="text-small" text-anchor="middle" fill="#1B5E20">총 기어비 64:1 (소형→대형 감속 반복)</text>

  <text x="390" y="280" class="text-normal" text-anchor="middle" font-weight="bold">기어박스</text>
  <text x="390" y="298" class="text-small" text-anchor="middle">기어비 64:1</text>
  <text x="390" y="313" class="text-small" text-anchor="middle">회전수 ÷64 / 토크 ×64</text>

  <!-- 화살표 -->
  <line x1="540" y1="200" x2="600" y2="200" stroke="#388E3C" stroke-width="2" marker-end="url(#arr)"/>
  <text x="570" y="193" class="text-small" fill="#388E3C" text-anchor="middle">감속</text>

  <!-- 출력축 -->
  <circle cx="660" cy="200" r="50" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="660" y="192" class="text-small" text-anchor="middle" font-weight="bold">출력축</text>
  <text x="660" y="207" class="text-small" text-anchor="middle">저속 회전</text>
  <text x="660" y="222" class="text-small" text-anchor="middle" fill="#2E7D32">고토크</text>
  <text x="660" y="270" class="text-normal" text-anchor="middle" font-weight="bold">출력</text>
  <text x="660" y="288" class="text-small" text-anchor="middle" fill="#2E7D32" font-weight="bold">64 스텝/회전</text>
  <text x="660" y="303" class="text-small" text-anchor="middle" fill="#2E7D32" font-weight="bold">5.625°/스텝</text>

  <!-- 공식 박스 -->
  <rect x="50" y="340" width="800" height="140" fill="#F0F4FF" stroke="#1A73E8" stroke-width="2" rx="6"/>
  <text x="450" y="363" class="text-normal" text-anchor="middle" font-weight="bold" fill="#1A1A2E">스텝 각도 계산:</text>

  <!-- 계산 공식 표 -->
  <rect x="70" y="375" width="240" height="90" fill="white" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text x="190" y="393" class="text-small" text-anchor="middle" font-weight="bold" fill="#333">풀 스텝 (Full Step)</text>
  <text x="190" y="410" class="text-small" text-anchor="middle">360° ÷ 64 스텝</text>
  <text x="190" y="428" class="text-small" text-anchor="middle" fill="#2E7D32" font-weight="bold">= 5.625°/스텝</text>
  <text x="190" y="446" class="text-small" text-anchor="middle" fill="#666">→ 코일 4단계 시퀀스 (A→B→C→D)</text>
  <text x="190" y="460" class="text-small" text-anchor="middle" fill="#666">→ 시침 64개 위치에 정확히 멈춤</text>

  <rect x="330" y="375" width="240" height="90" fill="white" stroke="#BDBDBD" stroke-width="1" rx="4"/>
  <text x="450" y="393" class="text-small" text-anchor="middle" font-weight="bold" fill="#333">하프 스텝 (Half Step)</text>
  <text x="450" y="410" class="text-small" text-anchor="middle">360° ÷ 128 스텝</text>
  <text x="450" y="428" class="text-small" text-anchor="middle" fill="#1A73E8" font-weight="bold">= 2.8125°/스텝</text>
  <text x="450" y="446" class="text-small" text-anchor="middle" fill="#666">→ 코일 8단계 시퀀스</text>
  <text x="450" y="460" class="text-small" text-anchor="middle" fill="#666">→ 더 부드러운 회전</text>

  <rect x="590" y="375" width="235" height="90" fill="#FFFDE7" stroke="#F9A825" stroke-width="1" rx="4"/>
  <text x="707" y="393" class="text-small" text-anchor="middle" font-weight="bold" fill="#E65100">소프트웨어 위치 인덱스</text>
  <text x="707" y="410" class="text-small" text-anchor="middle">0 ~ 4095 (12비트 정수)</text>
  <text x="707" y="428" class="text-small" text-anchor="middle" fill="#666">= 0° ~ 360° 매핑</text>
  <text x="707" y="446" class="text-small" text-anchor="middle" fill="#666">steps = (angle × 4096) / 360</text>
  <text x="707" y="460" class="text-small" text-anchor="middle" fill="#666">motor_position %= 4096</text>
</svg>
