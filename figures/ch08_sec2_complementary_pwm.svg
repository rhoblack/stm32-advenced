<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450"  font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 450">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Complementary PWM 파형 — 시소(Seesaw) 비유</text>

  <!-- 시간축 -->
  <line x1="60" y1="400" x2="760" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="770" y="405" font-size="12" fill="#555">시간 t</text>
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- CH1 (주 출력) 파형 -->
  <text x="30" y="75" font-size="13" font-weight="bold" fill="#1A73E8">CH1</text>
  <text x="30" y="90" font-size="10" fill="#1A73E8">(주 출력)</text>

  <!-- CH1 HIGH 구간 -->
  <polyline points="80,110 80,60 350,60 350,110 500,110 500,60 680,60 680,110 750,110"
            fill="none" stroke="#1A73E8" stroke-width="3"/>
  <text x="215" y="55" text-anchor="middle" font-size="11" fill="#1A73E8">HIGH (듀티 비율)</text>
  <text x="425" y="125" text-anchor="middle" font-size="11" fill="#999">LOW</text>

  <!-- CH1N (보상 출력) 파형 -->
  <text x="20" y="195" font-size="13" font-weight="bold" fill="#EA4335">CH1N</text>
  <text x="20" y="210" font-size="10" fill="#EA4335">(보상 출력)</text>

  <!-- CH1N 반전 파형 (Dead-time 포함) -->
  <polyline points="80,230 80,230 95,230 95,180 335,180 335,230 515,230 515,180 665,180 665,230 750,230"
            fill="none" stroke="#EA4335" stroke-width="3"/>
  <text x="215" y="175" text-anchor="middle" font-size="11" fill="#EA4335">HIGH (반전)</text>
  <text x="590" y="175" text-anchor="middle" font-size="11" fill="#EA4335">HIGH (반전)</text>

  <!-- Dead-time 표시 -->
  <rect x="80" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>
  <rect x="335" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>
  <rect x="350" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>
  <rect x="500" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>
  <rect x="665" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>
  <rect x="680" y="250" width="15" height="25" fill="#FBBC04" opacity="0.5" stroke="#E65100" stroke-dasharray="3,2"/>

  <!-- Dead-time 라벨 -->
  <line x1="87" y1="280" x2="87" y2="310" stroke="#E65100" stroke-dasharray="3,2"/>
  <text x="120" y="305" font-size="12" font-weight="bold" fill="#E65100">Dead-time</text>
  <text x="120" y="320" font-size="10" fill="#E65100">(둘 다 OFF)</text>

  <!-- 시소 비유 영역 -->
  <rect x="80" y="340" width="670" height="50" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-dasharray="5,3"/>
  <text x="120" y="362" font-size="12" fill="#795548">시소 비유:</text>
  <text x="280" y="362" font-size="12" fill="#795548">CH1 올라가면 CH1N 내려감 (항상 반대).</text>
  <text x="400" y="380" font-size="12" fill="#E65100" font-weight="bold">방향 전환 순간 = Dead-time = 둘 다 중간 높이 (양쪽 OFF)</text>

  <!-- 범례 -->
  <line x1="100" y1="420" x2="130" y2="420" stroke="#1A73E8" stroke-width="3"/>
  <text x="135" y="425" font-size="11" fill="#555">CH1 (PA8)</text>
  <line x1="250" y1="420" x2="280" y2="420" stroke="#EA4335" stroke-width="3"/>
  <text x="285" y="425" font-size="11" fill="#555">CH1N (PB13)</text>
  <rect x="420" y="413" width="15" height="12" fill="#FBBC04" opacity="0.5" stroke="#E65100"/>
  <text x="440" y="425" font-size="11" fill="#555">Dead-time 구간</text>

  <!-- 듀티 / 주기 표시 -->
  <line x1="80" y1="140" x2="350" y2="140" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="215" y="155" text-anchor="middle" font-size="11" fill="#34A853">듀티 (CCR)</text>
  <line x1="80" y1="145" x2="80" y2="135" stroke="#34A853" stroke-width="1.5"/>
  <line x1="350" y1="145" x2="350" y2="135" stroke="#34A853" stroke-width="1.5"/>

  <line x1="80" y1="160" x2="500" y2="160" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="290" y="173" text-anchor="middle" font-size="11" fill="#555">1주기 (ARR+1)</text>
  <line x1="80" y1="165" x2="80" y2="155" stroke="#555" stroke-width="1"/>
  <line x1="500" y1="165" x2="500" y2="155" stroke="#555" stroke-width="1"/>
</svg>