<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family='"Noto Sans KR", "Malgun Gothic", sans-serif'>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">그림 02-1. SWO/ITM 신호 경로</text>

  <!-- MCU 내부 영역 -->
  <rect x="20" y="55" width="510" height="300" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="30" y="78" font-size="13" font-weight="bold" fill="#1A73E8">MCU 내부 (STM32F411RE)</text>

  <!-- CPU Core 박스 -->
  <rect x="35" y="100" width="110" height="70" rx="6" fill="#1A73E8" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="90" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">CPU Core</text>
  <text x="90" y="148" text-anchor="middle" font-size="12" fill="#FFFFFF">(Cortex-M4)</text>

  <!-- 화살표: CPU → ITM -->
  <line x1="145" y1="135" x2="170" y2="135" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ITM 박스 -->
  <rect x="172" y="90" width="130" height="90" rx="6" fill="#1A73E8" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="237" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">ITM</text>
  <text x="237" y="136" text-anchor="middle" font-size="11" fill="#FFFFFF">(Instrumentation</text>
  <text x="237" y="153" text-anchor="middle" font-size="11" fill="#FFFFFF">Trace Macrocell)</text>
  <text x="237" y="171" text-anchor="middle" font-size="11" fill="#BDD7FF">포트 0~31</text>

  <!-- 화살표: ITM → TPIU -->
  <line x1="302" y1="135" x2="327" y2="135" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- TPIU 박스 -->
  <rect x="329" y="100" width="120" height="70" rx="6" fill="#1A73E8" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="389" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">TPIU</text>
  <text x="389" y="146" text-anchor="middle" font-size="11" fill="#FFFFFF">(Trace Port</text>
  <text x="389" y="162" text-anchor="middle" font-size="11" fill="#FFFFFF">Interface Unit)</text>

  <!-- 화살표: TPIU → SWO 핀 -->
  <line x1="449" y1="135" x2="474" y2="135" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- SWO 핀 박스 -->
  <rect x="476" y="108" width="42" height="54" rx="21" fill="#1A73E8" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="497" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">SWO</text>
  <text x="497" y="148" text-anchor="middle" font-size="11" fill="#FFFFFF">핀</text>
  <text x="497" y="165" text-anchor="middle" font-size="11" fill="#FFFFFF">(PB3)</text>

  <!-- 화살표: SWO 핀 → ST-LINK (MCU 외부) -->
  <line x1="533" y1="135" x2="568" y2="135" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ST-LINK 영역 -->
  <rect x="570" y="85" width="120" height="100" rx="6" fill="#F8F9FA" stroke="#666666" stroke-width="2"/>
  <text x="630" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">ST-LINK</text>
  <text x="630" y="127" text-anchor="middle" font-size="12" fill="#666666">(NUCLEO 내장)</text>
  <text x="630" y="148" text-anchor="middle" font-size="11" fill="#666666">USB ↔ SWO</text>
  <text x="630" y="165" text-anchor="middle" font-size="11" fill="#666666">변환 처리</text>

  <!-- 화살표: ST-LINK → USB 케이블 -->
  <line x1="690" y1="135" x2="718" y2="135" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- USB 케이블 라벨 -->
  <rect x="720" y="108" width="60" height="54" rx="6" fill="#F8F9FA" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="750" y="130" text-anchor="middle" font-size="12" fill="#666666">USB</text>
  <text x="750" y="148" text-anchor="middle" font-size="12" fill="#666666">케이블</text>

  <!-- PC 영역 -->
  <rect x="570" y="230" width="210" height="110" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2"/>
  <text x="675" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A73E8">PC (호스트)</text>
  <rect x="585" y="265" width="180" height="32" rx="4" fill="#1A73E8"/>
  <text x="675" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">STM32CubeIDE SWV Console</text>
  <rect x="585" y="303" width="180" height="30" rx="4" fill="#FFFFFF" stroke="#1A73E8" stroke-width="1"/>
  <text x="675" y="323" text-anchor="middle" font-size="12" fill="#333333">printf() 출력 실시간 표시</text>

  <!-- 화살표: USB → PC (수직) -->
  <line x1="750" y1="162" x2="750" y2="195" stroke="#333333" stroke-width="2"/>
  <line x1="750" y1="195" x2="690" y2="195" stroke="#333333" stroke-width="2"/>
  <line x1="690" y1="195" x2="690" y2="228" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- MCU 내부 영역 하단 소개 -->
  <rect x="35" y="240" width="505" height="100" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>
  <text x="50" y="264" font-size="13" font-weight="bold" fill="#1A73E8">데이터 흐름 요약</text>
  <text x="50" y="285" font-size="12" fill="#333333">① 사용자 코드: printf() 또는 ITM_SendChar() 호출</text>
  <text x="50" y="304" font-size="12" fill="#333333">② ITM이 데이터를 TPIU로 전달 (SWO 프로토콜 인코딩)</text>
  <text x="50" y="323" font-size="12" fill="#333333">③ SWO 핀(PB3) → ST-LINK → USB → PC SWV 콘솔에 표시</text>

  <!-- 하단 주석 -->
  <rect x="20" y="420" width="760" height="42" rx="4" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="36" y="438" font-size="12" fill="#666666" font-weight="bold">※ 주의사항</text>
  <text x="36" y="456" font-size="12" fill="#666666">* SWO 핀 = PB3 | NUCLEO-F411RE에서 SB12 점퍼 연결 확인 필요 | CubeIDE Debugger → SWV Enable + Core Clock 일치 필수</text>
</svg>
