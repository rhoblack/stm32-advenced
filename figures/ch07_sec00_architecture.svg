<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">프로젝트 아키텍처 v0.7 — TIM Driver 추가</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#888">초록 강조 = 신규 tim_driver | 진한 초록 = 기존 구현 | 회색 = 향후 예정</text>

  <!-- App 레이어 -->
  <rect x="30" y="65" width="740" height="80" rx="8" fill="#EA4335" opacity="0.08" stroke="#EA4335" stroke-width="2"/>
  <text x="50" y="85" font-size="14" font-weight="700" fill="#EA4335">App</text>

  <rect x="50" y="95" width="100" height="40" rx="6" fill="#EA4335" opacity="0.85"/>
  <text x="100" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="600">main()</text>
  <text x="100" y="126" text-anchor="middle" font-size="9" fill="white">v0.1</text>

  <rect x="170" y="95" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="220" y="112" text-anchor="middle" font-size="11" fill="#999">cli_app</text>
  <text x="220" y="126" text-anchor="middle" font-size="9" fill="#BBB">Ch15</text>

  <!-- Service 레이어 -->
  <rect x="30" y="165" width="740" height="80" rx="8" fill="#FBBC04" opacity="0.08" stroke="#FBBC04" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="185" font-size="14" font-weight="700" fill="#F57F17">Service</text>

  <rect x="50" y="195" width="100" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="100" y="212" text-anchor="middle" font-size="11" fill="#999">clock_service</text>
  <text x="100" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch10</text>

  <rect x="170" y="195" width="110" height="40" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="225" y="212" text-anchor="middle" font-size="11" fill="#999">sensor_service</text>
  <text x="225" y="226" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <!-- Driver 레이어 -->
  <rect x="30" y="265" width="740" height="100" rx="8" fill="#34A853" opacity="0.08" stroke="#34A853" stroke-width="2"/>
  <text x="50" y="285" font-size="14" font-weight="700" fill="#34A853">Driver</text>

  <rect x="50" y="300" width="90" height="50" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="95" y="322" text-anchor="middle" font-size="11" fill="white" font-weight="600">logger</text>
  <text x="95" y="340" text-anchor="middle" font-size="9" fill="white">v0.2</text>

  <rect x="155" y="300" width="130" height="50" rx="6" fill="#34A853" opacity="0.85"/>
  <text x="220" y="318" text-anchor="middle" font-size="11" fill="white" font-weight="600">uart_driver</text>
  <text x="220" y="332" text-anchor="middle" font-size="9" fill="#FFD600">v0.6 DMA</text>
  <text x="220" y="346" text-anchor="middle" font-size="8" fill="white">+ 링 버퍼</text>

  <!-- ★ 신규 tim_driver (강조) -->
  <rect x="300" y="300" width="120" height="50" rx="6" fill="#34A853" opacity="0.85" stroke="#FFD600" stroke-width="3"/>
  <text x="360" y="318" text-anchor="middle" font-size="11" fill="white" font-weight="700">tim_driver</text>
  <text x="360" y="336" text-anchor="middle" font-size="10" fill="#FFD600" font-weight="700">v0.7 NEW</text>

  <!-- 미래 Driver -->
  <rect x="435" y="300" width="90" height="50" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="480" y="322" text-anchor="middle" font-size="11" fill="#999">rtc_driver</text>
  <text x="480" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch09</text>

  <rect x="540" y="300" width="100" height="50" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="590" y="322" text-anchor="middle" font-size="11" fill="#999">sht31_driver</text>
  <text x="590" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch11</text>

  <rect x="655" y="300" width="100" height="50" rx="6" fill="#E0E0E0" stroke="#BDBDBD"/>
  <text x="705" y="322" text-anchor="middle" font-size="10" fill="#999">ili9341</text>
  <text x="705" y="340" text-anchor="middle" font-size="9" fill="#BBB">Ch12</text>

  <!-- HAL 레이어 -->
  <rect x="30" y="395" width="740" height="70" rx="8" fill="#1A73E8" opacity="0.08" stroke="#1A73E8" stroke-width="2"/>
  <text x="50" y="415" font-size="14" font-weight="700" fill="#1A73E8">HAL</text>

  <rect x="50" y="425" width="710" height="30" rx="4" fill="#1A73E8" opacity="0.7"/>
  <text x="405" y="445" text-anchor="middle" font-size="12" fill="white" font-weight="600">ST HAL — HAL_GPIO / HAL_UART / HAL_DMA / HAL_TIM / HAL_SPI / HAL_I2C / HAL_RTC</text>

  <!-- DMA 횡단 영역 -->
  <rect x="30" y="480" width="740" height="30" rx="8" fill="#FFF3E0" stroke="#FFA500" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="502" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">DMA 컨트롤러 (횡단): UART DMA (v0.6) — CPU 개입 없이 데이터 전송</text>

  <!-- 횡단 관심사: 로그 -->
  <rect x="30" y="520" width="740" height="30" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="540" text-anchor="middle" font-size="12" fill="#7B1FA2" font-weight="600">횡단 관심사: LOG_E/W/I/D 매크로 — 모든 계층에서 사용 (v0.2~)</text>

  <!-- 의존 화살표: main() → tim_driver -->
  <defs>
    <marker id="depArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
    <marker id="newArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFD600"/>
    </marker>
  </defs>
  <line x1="100" y1="135" x2="220" y2="300" stroke="#34A853" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#depArrow)"/>
  <line x1="100" y1="135" x2="360" y2="300" stroke="#FFD600" stroke-width="2.5" marker-end="url(#newArrow)"/>
  <text x="250" y="210" font-size="10" fill="#FFD600" font-weight="600">tim_start()</text>
  <text x="130" y="230" font-size="10" fill="#34A853" font-weight="600">uart_send()</text>

  <!-- tim_driver → HAL -->
  <line x1="360" y1="350" x2="360" y2="425" stroke="#34A853" stroke-width="2" marker-end="url(#depArrow)"/>
  <text x="380" y="390" font-size="10" fill="#34A853" font-weight="600">HAL_TIM</text>
</svg>
