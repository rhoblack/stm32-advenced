<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Noto Sans KR', sans-serif" font-size="14">
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">TIM1 (Advanced) vs TIM2~5 (GP) 비교</text>

  <!-- GP Timer (왼쪽) -->
  <rect x="30" y="55" width="340" height="340" rx="8" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A73E8">GP Timer (TIM2~5)</text>
  <text x="200" y="100" text-anchor="middle" font-size="12" fill="#555">APB1 (84MHz) · TIM2/5=32bit, TIM3/4=16bit</text>

  <!-- GP 기능 박스들 -->
  <rect x="50" y="115" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="120" y="140" text-anchor="middle" font-size="12">카운터 (Up/Down)</text>

  <rect x="210" y="115" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="280" y="140" text-anchor="middle" font-size="12">UEV 인터럽트</text>

  <rect x="50" y="170" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="120" y="195" text-anchor="middle" font-size="12">PWM (CH1~4)</text>

  <rect x="210" y="170" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="280" y="195" text-anchor="middle" font-size="12">Input Capture</text>

  <rect x="50" y="225" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="120" y="250" text-anchor="middle" font-size="12">Output Compare</text>

  <rect x="210" y="225" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="280" y="250" text-anchor="middle" font-size="12">DMA 트리거</text>

  <!-- GP 없는 기능 -->
  <rect x="50" y="285" width="300" height="40" rx="5" fill="#FFF" stroke="#BDBDBD" stroke-dasharray="5,3"/>
  <text x="200" y="310" text-anchor="middle" font-size="12" fill="#999">Complementary / Dead-time / Break → 없음</text>

  <rect x="50" y="335" width="300" height="40" rx="5" fill="#FFF" stroke="#BDBDBD" stroke-dasharray="5,3"/>
  <text x="200" y="360" text-anchor="middle" font-size="12" fill="#999">MOE (Main Output Enable) → 없음</text>

  <!-- Advanced Timer (오른쪽) -->
  <rect x="410" y="55" width="350" height="340" rx="8" fill="#FCE4EC" stroke="#EA4335" stroke-width="2"/>
  <text x="585" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#EA4335">Advanced Timer (TIM1)</text>
  <text x="585" y="100" text-anchor="middle" font-size="12" fill="#555">APB2 (84MHz) · 16bit · 안전 기능 탑재</text>

  <!-- GP와 동일 기능 -->
  <rect x="430" y="115" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="500" y="140" text-anchor="middle" font-size="12">카운터 (Up/Down)</text>

  <rect x="590" y="115" width="150" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="665" y="140" text-anchor="middle" font-size="12">UEV 인터럽트</text>

  <rect x="430" y="170" width="140" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="500" y="195" text-anchor="middle" font-size="12">PWM (CH1~4)</text>

  <rect x="590" y="170" width="150" height="40" rx="5" fill="#BBDEFB" stroke="#1A73E8"/>
  <text x="665" y="195" text-anchor="middle" font-size="12">Input Capture</text>

  <!-- Advanced 전용 (강조) -->
  <rect x="430" y="230" width="310" height="40" rx="5" fill="#F8BBD0" stroke="#EA4335" stroke-width="2"/>
  <text x="585" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">★ Complementary PWM (CH1N~CH3N)</text>
  <text x="585" y="265" text-anchor="middle" font-size="10" fill="#C62828">상보 출력 3쌍 (CH1+CH1N, CH2+CH2N, CH3+CH3N)</text>

  <rect x="430" y="280" width="310" height="40" rx="5" fill="#F8BBD0" stroke="#EA4335" stroke-width="2"/>
  <text x="585" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">★ Dead-time Generator (DTG)</text>
  <text x="585" y="315" text-anchor="middle" font-size="10" fill="#C62828">BDTR 레지스터 · shoot-through 방지</text>

  <rect x="430" y="330" width="150" height="45" rx="5" fill="#F8BBD0" stroke="#EA4335" stroke-width="2"/>
  <text x="505" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">★ Break Input</text>
  <text x="505" y="368" text-anchor="middle" font-size="9" fill="#C62828">비상 정지</text>

  <rect x="590" y="330" width="150" height="45" rx="5" fill="#F8BBD0" stroke="#EA4335" stroke-width="2"/>
  <text x="665" y="353" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">★ MOE 비트</text>
  <text x="665" y="368" text-anchor="middle" font-size="9" fill="#C62828">출력 안전 잠금</text>

  <!-- 화살표 연결: 공통 -->
  <text x="390" y="145" text-anchor="middle" font-size="20" fill="#34A853">=</text>
  <text x="390" y="200" text-anchor="middle" font-size="20" fill="#34A853">=</text>
  <text x="390" y="310" text-anchor="middle" font-size="20" fill="#EA4335">+</text>
</svg>