<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .coil-a { fill: #FF6B6B; stroke: #C92A2A; stroke-width: 2; }
      .coil-b { fill: #4ECDC4; stroke: #1A9B8E; stroke-width: 2; }
      .coil-c { fill: #95E1D3; stroke: #38A169; stroke-width: 2; }
      .coil-d { fill: #FFD93D; stroke: #F0A500; stroke-width: 2; }
      .text-title { font-size: 16px; font-weight: bold; }
      .text-normal { font-size: 12px; }
      .text-small { font-size: 10px; }
      .table-cell { text-anchor: middle; font-size: 11px; }
    </style>
  </defs>

  <!-- 제목 -->
  <text x="500" y="30" class="text-title" text-anchor="middle" fill="#1A1A2E">
    28BYJ-48 4개 코일과 여자 시퀀스
  </text>
  <text x="500" y="50" class="text-small" text-anchor="middle" fill="#666">
    풀 스텝 (Full Step): 4개 스텝으로 완전 회전 / 하프 스텝 (Half Step): 8개 스텝으로 더 미세한 제어
  </text>

  <!-- 코일 배치 (원형) -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 코일 A (상단) -->
  <rect x="170" y="60" width="60" height="40" class="coil-a" rx="5"/>
  <text x="200" y="85" class="text-normal" text-anchor="middle" font-weight="bold" fill="white">A</text>

  <!-- 코일 B (우측) -->
  <rect x="310" y="170" width="60" height="40" class="coil-b" rx="5"/>
  <text x="340" y="195" class="text-normal" text-anchor="middle" font-weight="bold" fill="white">B</text>

  <!-- 코일 C (하단) -->
  <rect x="170" y="320" width="60" height="40" class="coil-c" rx="5"/>
  <text x="200" y="345" class="text-normal" text-anchor="middle" font-weight="bold" fill="white">C</text>

  <!-- 코일 D (좌측) -->
  <rect x="30" y="170" width="60" height="40" class="coil-d" rx="5"/>
  <text x="60" y="195" class="text-normal" text-anchor="middle" font-weight="bold" fill="#333">D</text>

  <!-- 중심 -->
  <circle cx="200" cy="200" r="8" fill="#333"/>
  <text x="200" y="205" class="text-small" text-anchor="middle" fill="white" font-weight="bold">회전축</text>

  <!-- 여자 시퀀스 테이블 -->
  <text x="550" y="100" class="text-normal" text-anchor="start" font-weight="bold">풀 스텝 시퀀스 (4 스텝):</text>

  <!-- 테이블 헤더 -->
  <rect x="500" y="120" width="450" height="25" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>
  <text x="520" y="137" class="table-cell">Step</text>
  <text x="620" y="137" class="table-cell">A</text>
  <text x="720" y="137" class="table-cell">B</text>
  <text x="820" y="137" class="table-cell">C</text>
  <text x="920" y="137" class="table-cell">D</text>

  <!-- Step 0: A 활성 -->
  <rect x="500" y="145" width="450" height="25" fill="#FFF8E1" stroke="#999" stroke-width="1"/>
  <text x="520" y="162" class="table-cell">0</text>
  <rect x="605" y="147" width="30" height="21" fill="#FF6B6B" stroke="#C92A2A"/>
  <text x="620" y="162" class="table-cell" fill="white" font-weight="bold">ON</text>
  <text x="720" y="162" class="table-cell">-</text>
  <text x="820" y="162" class="table-cell">-</text>
  <text x="920" y="162" class="table-cell">-</text>

  <!-- Step 1: A+B 활성 -->
  <rect x="500" y="170" width="450" height="25" fill="#FFF8E1" stroke="#999" stroke-width="1"/>
  <text x="520" y="187" class="table-cell">1</text>
  <rect x="605" y="172" width="30" height="21" fill="#FF6B6B" stroke="#C92A2A"/>
  <text x="620" y="187" class="table-cell" fill="white" font-weight="bold">ON</text>
  <rect x="705" y="172" width="30" height="21" fill="#4ECDC4" stroke="#1A9B8E"/>
  <text x="720" y="187" class="table-cell" fill="white" font-weight="bold">ON</text>
  <text x="820" y="187" class="table-cell">-</text>
  <text x="920" y="187" class="table-cell">-</text>

  <!-- Step 2: B 활성 -->
  <rect x="500" y="195" width="450" height="25" fill="#FFF8E1" stroke="#999" stroke-width="1"/>
  <text x="520" y="212" class="table-cell">2</text>
  <text x="620" y="212" class="table-cell">-</text>
  <rect x="705" y="197" width="30" height="21" fill="#4ECDC4" stroke="#1A9B8E"/>
  <text x="720" y="212" class="table-cell" fill="white" font-weight="bold">ON</text>
  <text x="820" y="212" class="table-cell">-</text>
  <text x="920" y="212" class="table-cell">-</text>

  <!-- Step 3: B+C 활성 -->
  <rect x="500" y="220" width="450" height="25" fill="#FFF8E1" stroke="#999" stroke-width="1"/>
  <text x="520" y="237" class="table-cell">3</text>
  <text x="620" y="237" class="table-cell">-</text>
  <rect x="705" y="222" width="30" height="21" fill="#4ECDC4" stroke="#1A9B8E"/>
  <text x="720" y="237" class="table-cell" fill="white" font-weight="bold">ON</text>
  <rect x="805" y="222" width="30" height="21" fill="#95E1D3" stroke="#38A169"/>
  <text x="820" y="237" class="table-cell" fill="white" font-weight="bold">ON</text>
  <text x="920" y="237" class="table-cell">-</text>

  <!-- 하프 스텝 섹션 -->
  <text x="550" y="310" class="text-normal" text-anchor="start" font-weight="bold">하프 스텝 시퀀스 (8 스텝, 절반의 정밀도):</text>

  <!-- 간단한 설명 -->
  <rect x="500" y="340" width="450" height="100" fill="#F0F4FF" stroke="#1A73E8" stroke-width="2" rx="5"/>

  <text x="520" y="365" class="text-normal" font-weight="bold" fill="#1A73E8">하프 스텝 동작:</text>
  <text x="520" y="385" class="text-small">• 1개 코일만 활성 OR 2개 코일 동시 활성 (교대)</text>
  <text x="520" y="402" class="text-small">• 총 8개 스텝 = 한 바퀴 완전 회전</text>
  <text x="520" y="419" class="text-small">• 풀 스텝 대비 정밀도 2배, 토크 약간 감소</text>

  <text x="520" y="440" class="text-small" fill="#666" font-style="italic">
    현재 프로젝트에서는 풀 스텝(4 스텝) 사용 → 시침이 정확히 64개 위치에 멈춤
  </text>
</svg>
