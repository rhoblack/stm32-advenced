<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="560" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560">
  <defs>
    <style>
      .driver-bg  { fill: #E8F5E9; stroke: #34A853; stroke-width: 2; }
      .service-bg { fill: #FFF8E1; stroke: #FBBC04; stroke-width: 2; }
      .app-bg     { fill: #FFEBEE; stroke: #EA4335; stroke-width: 2; }
      .text-title  { font-size: 15px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; }
      .text-normal { font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
      .text-small  { font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }
      .code-box   { fill: #1E1E2E; stroke: #666; stroke-width: 1; }
      .code-text  { font-size: 11px; font-family: monospace; fill: #CDD6F4; }
      .highlight  { stroke: #FF6D00; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="500" y="28" class="text-title" text-anchor="middle" fill="#1A1A2E">
    Clock Service 아키텍처: RTC + Motor 조율 (Service 레이어)
  </text>
  <text x="500" y="46" class="text-small" text-anchor="middle" fill="#666">
    Service 레이어가 여러 Driver를 조율하여 완전한 응용(스마트 시계) 제공 | 의존성 방향: App → Service → Driver
  </text>

  <!-- ===== Application Layer (상단) ===== -->
  <rect x="30" y="60" width="480" height="90" class="app-bg" rx="8"/>
  <text x="50" y="82" class="text-title" fill="#EA4335">Application Layer</text>
  <text x="40" y="100" class="text-normal">main() / Smart Clock App</text>
  <rect x="40" y="108" width="460" height="30" class="code-box" rx="3"/>
  <text x="45" y="120" class="code-text">clock_service_init();</text>
  <text x="45" y="133" class="code-text">clock_service_on_rtc_tick();   // 매초 RTC ISR에서 호출</text>

  <!-- 화살표: App → Service (의존성) -->
  <line x1="170" y1="150" x2="170" y2="188" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="270" y1="150" x2="270" y2="188" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="172" class="text-small" fill="#555">의존 (사용)</text>

  <!-- ===== Clock Service Layer (중단) — 강조 ===== -->
  <rect x="30" y="190" width="480" height="140" class="service-bg" rx="8"/>
  <rect x="30" y="190" width="480" height="140" class="highlight"/>
  <text x="50" y="212" class="text-title" fill="#E65100">Clock Service (Service 레이어) ⭐ NEW</text>
  <text x="40" y="228" class="text-small" fill="#666">clock_service.c — RTC 시각과 시침 위치를 동기화하는 조율 로직</text>

  <!-- 내부 박스 2개 -->
  <rect x="45"  y="238" width="200" height="78" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1" rx="4"/>
  <text x="145" y="256" class="text-normal" text-anchor="middle" font-weight="bold">상태 관리 (FSM)</text>
  <text x="145" y="271" class="text-small" text-anchor="middle" fill="#666">IDLE: 코일 OFF, 틱 대기</text>
  <text x="145" y="283" class="text-small" text-anchor="middle" fill="#666">SYNCING: 모터 이동 중</text>
  <text x="145" y="295" class="text-small" text-anchor="middle" fill="#666">ERROR: 하드웨어 오류</text>
  <text x="145" y="308" class="text-small" text-anchor="middle" fill="#666">→ clock_service.c Ch08 FSM 적용</text>

  <rect x="265" y="238" width="232" height="78" fill="#FFF8E1" stroke="#FBBC04" stroke-width="1" rx="4"/>
  <text x="381" y="256" class="text-normal" text-anchor="middle" font-weight="bold">조율 로직</text>
  <text x="381" y="271" class="text-small" text-anchor="middle" fill="#666">rtc_get_time() → 시각 읽기</text>
  <text x="381" y="283" class="text-small" text-anchor="middle" fill="#666">각도 = 시×30 + 분×0.5</text>
  <text x="381" y="295" class="text-small" text-anchor="middle" fill="#666">스텝 = 각도 × 4096 / 360</text>
  <text x="381" y="308" class="text-small" text-anchor="middle" fill="#666">→ stepper_move_steps(delta)</text>

  <!-- 화살표: Service → Driver (의존성) -->
  <line x1="145" y1="330" x2="145" y2="368" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="330" x2="380" y2="368" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="265" y="355" class="text-small" text-anchor="middle" fill="#555">의존 (사용)</text>

  <!-- ===== Driver Layer (하단) ===== -->
  <rect x="30" y="370" width="480" height="100" class="driver-bg" rx="8"/>
  <text x="50" y="393" class="text-title" fill="#34A853">Driver Layer</text>

  <rect x="45" y="405" width="200" height="55" fill="#E8F5E9" stroke="#34A853" stroke-width="1" rx="4"/>
  <text x="145" y="423" class="text-normal" text-anchor="middle" font-weight="bold">rtc_driver.c (Ch09)</text>
  <text x="145" y="438" class="text-small" text-anchor="middle" fill="#666">rtc_get_time()</text>
  <text x="145" y="452" class="text-small" text-anchor="middle" fill="#666">→ {hour, min, sec} 반환</text>

  <rect x="265" y="405" width="232" height="55" fill="#E8F5E9" stroke="#34A853" stroke-width="1" rx="4"/>
  <text x="381" y="423" class="text-normal" text-anchor="middle" font-weight="bold">stepper_driver.c (Ch10)</text>
  <text x="381" y="438" class="text-small" text-anchor="middle" fill="#666">stepper_move_steps(delta, ms)</text>
  <text x="381" y="452" class="text-small" text-anchor="middle" fill="#666">stepper_get_position()</text>

  <!-- 우측: 동작 흐름 설명 -->
  <rect x="550" y="60" width="420" height="410" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="8"/>
  <text x="760" y="85" class="text-normal" text-anchor="middle" font-weight="bold" fill="#1A1A2E">Clock Service 동작 흐름:</text>

  <rect x="565" y="100" width="390" height="65" fill="#FFFFFF" stroke="#999" stroke-width="1" rx="4"/>
  <text x="575" y="118" class="text-small" font-weight="bold" fill="#EA4335">① 초기화 (clock_service_init)</text>
  <text x="575" y="133" class="text-small" fill="#666">• stepper_init() — 모터 초기화</text>
  <text x="575" y="148" class="text-small" fill="#666">• rtc_get_time() → 현재 시각으로 시침 위치 설정</text>
  <text x="575" y="160" class="text-small" fill="#666">• 정전 후 재부팅 시 RTC 기준으로 자동 복구</text>

  <rect x="565" y="180" width="390" height="95" fill="#FFFFFF" stroke="#999" stroke-width="1" rx="4"/>
  <text x="575" y="198" class="text-small" font-weight="bold" fill="#EA4335">② 매초 틱 (clock_service_on_rtc_tick)</text>
  <text x="575" y="213" class="text-small" fill="#666">• rtc_get_time() — 현재 시각 읽기</text>
  <text x="575" y="228" class="text-small" fill="#666">• 분(minute) 변경 여부 확인</text>
  <text x="575" y="243" class="text-small" fill="#666">• 변경 시: 목표 스텝 계산 → stepper_move_steps()</text>
  <text x="575" y="258" class="text-small" fill="#666">• CPU 부하 최소화: 분 변경 시에만 모터 구동</text>
  <text x="575" y="270" class="text-small" fill="#666">• FSM 상태: IDLE → SYNCING → IDLE</text>

  <rect x="565" y="290" width="390" height="60" fill="#FFFFFF" stroke="#999" stroke-width="1" rx="4"/>
  <text x="575" y="308" class="text-small" font-weight="bold" fill="#EA4335">③ 각도/스텝 계산 공식</text>
  <text x="575" y="323" class="text-small" fill="#666">• 시침 각도 = 시×30 + 분×0.5 (예: 14:30 → 75°)</text>
  <text x="575" y="338" class="text-small" fill="#666">• 목표 스텝 = 각도 × 4096 / 360 (예: 75° → 853)</text>
  <text x="575" y="348" class="text-small" fill="#666">• delta = 목표 스텝 − 현재 스텝 (최단 경로 이동)</text>

  <rect x="565" y="365" width="390" height="50" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1" rx="4"/>
  <text x="575" y="383" class="text-small" font-weight="bold" fill="#2E7D32">④ 레이어 역할 분리의 핵심 원칙</text>
  <text x="575" y="398" class="text-small" fill="#1B5E20">• Clock Service: "언제, 얼마나" 조율 → 비즈니스 로직</text>
  <text x="575" y="409" class="text-small" fill="#1B5E20">• stepper_driver: "어떻게" 하드웨어 제어 → 구현 세부사항</text>

  <!-- 요약 -->
  <rect x="30" y="485" width="940" height="58" fill="#F0F4FF" stroke="#1A73E8" stroke-width="1" rx="5"/>
  <text x="500" y="504" class="text-normal" text-anchor="middle" font-weight="bold" fill="#1565C0">
    의존성 방향: App → Service → Driver → HAL (상위가 하위를 사용, 화살표 = 의존 방향)
  </text>
  <text x="500" y="521" class="text-small" text-anchor="middle" fill="#666">
    App은 clock_service API만 알면 됨. rtc_driver / stepper_driver의 구현 세부사항은 Service 계층 아래에 캡슐화됨.
  </text>
  <text x="500" y="535" class="text-small" text-anchor="middle" fill="#666">
    테스트 시 rtc_driver / stepper_driver를 Mock으로 교체 가능 — 계층 분리의 이점
  </text>
</svg>
