<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340"  font-family="'Noto Sans KR', sans-serif" font-size="13" viewBox="0 0 800 340">
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#212121">SWO(Ch02) vs UART(Ch04) — 두 가지 출력 경로 비교</text>

  <!-- MCU 블록 -->
  <rect x="30" y="80" width="200" height="180" rx="10" fill="#F5F5F5" stroke="#333" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#333">STM32F411RE</text>

  <!-- SWO 경로 (위) -->
  <rect x="50" y="120" width="80" height="30" rx="5" fill="#9C27B0" opacity="0.15" stroke="#9C27B0"/>
  <text x="90" y="140" text-anchor="middle" font-size="10" fill="#7B1FA2" font-weight="600">ITM/SWO</text>

  <!-- UART 경로 (아래) -->
  <rect x="50" y="195" width="80" height="30" rx="5" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="2"/>
  <text x="90" y="215" text-anchor="middle" font-size="10" fill="#34A853" font-weight="700">USART2</text>

  <!-- ST-Link 블록 -->
  <rect x="310" y="80" width="160" height="100" rx="10" fill="#FFF3E0" stroke="#FF6F00" stroke-width="2"/>
  <text x="390" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">ST-Link</text>
  <text x="390" y="125" text-anchor="middle" font-size="10" fill="#888">(NUCLEO 내장)</text>

  <!-- SWO 선 -->
  <line x1="130" y1="135" x2="310" y2="120" stroke="#9C27B0" stroke-width="2" marker-end="url(#swoArr)"/>
  <text x="220" y="118" text-anchor="middle" font-size="10" fill="#9C27B0" font-weight="600">SWO 핀</text>

  <!-- Virtual COM Port 표시 -->
  <rect x="310" y="195" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
  <text x="390" y="215" text-anchor="middle" font-size="11" fill="#34A853" font-weight="700">Virtual COM Port</text>
  <text x="390" y="232" text-anchor="middle" font-size="9" fill="#666">PA2(TX) / PA3(RX)</text>

  <!-- UART 선 -->
  <line x1="130" y1="210" x2="310" y2="215" stroke="#34A853" stroke-width="3" marker-end="url(#uartArr)"/>
  <text x="220" y="205" text-anchor="middle" font-size="10" fill="#34A853" font-weight="700">UART 핀</text>

  <!-- PC 블록 -->
  <rect x="560" y="80" width="200" height="180" rx="10" fill="#E3F2FD" stroke="#1A73E8" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#1A73E8">PC</text>

  <!-- 디버거 -->
  <rect x="580" y="120" width="160" height="35" rx="5" fill="#9C27B0" opacity="0.15" stroke="#9C27B0"/>
  <text x="660" y="142" text-anchor="middle" font-size="11" fill="#7B1FA2" font-weight="600">STM32CubeIDE</text>
  <text x="660" y="152" text-anchor="middle" font-size="9" fill="#9C27B0">디버거 전용 (SWV Console)</text>

  <!-- 터미널 -->
  <rect x="580" y="195" width="160" height="35" rx="5" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="2"/>
  <text x="660" y="217" text-anchor="middle" font-size="11" fill="#34A853" font-weight="700">시리얼 터미널</text>
  <text x="660" y="227" text-anchor="middle" font-size="9" fill="#34A853">PuTTY / TeraTerm / 등</text>

  <!-- ST-Link → PC 연결 -->
  <line x1="470" y1="125" x2="580" y2="135" stroke="#9C27B0" stroke-width="2"/>
  <line x1="470" y1="220" x2="580" y2="215" stroke="#34A853" stroke-width="3"/>
  <text x="525" y="112" text-anchor="middle" font-size="10" fill="#9C27B0">SWD</text>
  <text x="525" y="238" text-anchor="middle" font-size="10" fill="#34A853" font-weight="700">USB CDC</text>

  <!-- 비교 테이블 -->
  <rect x="30" y="280" width="740" height="50" rx="8" fill="#F9F9F9" stroke="#E0E0E0"/>
  <text x="130" y="300" text-anchor="middle" font-size="11" fill="#7B1FA2" font-weight="600">SWO: 디버거에게만 말한다 (청진기)</text>
  <text x="130" y="318" text-anchor="middle" font-size="10" fill="#999">디버거 연결 필수, 코드 변경 없음</text>
  <text x="530" y="300" text-anchor="middle" font-size="11" fill="#34A853" font-weight="700">UART: 누구에게나 말한다 (목소리)</text>
  <text x="530" y="318" text-anchor="middle" font-size="10" fill="#999">디버거 없이도 동작, PC/라즈베리파이/다른 MCU</text>

  <defs>
    <marker id="swoArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9C27B0"/>
    </marker>
    <marker id="uartArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34A853"/>
    </marker>
  </defs>
</svg>
