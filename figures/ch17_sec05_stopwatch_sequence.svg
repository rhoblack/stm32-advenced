<svg xmlns="http://www.w3.org/2000/svg" width="820" height="450" font-family="'Noto Sans KR', sans-serif" viewBox="0 0 820 450">
  <rect width="820" height="450" fill="#F8F9FA" rx="12"/>
  <text x="410" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">시나리오 2: 스톱워치(Stopwatch) 시퀀스 다이어그램</text>
  <text x="410" y="52" text-anchor="middle" font-size="11" fill="#666">Button EXTI → Stopwatch FSM 전이 → LCD + UART 동기화</text>

  <!-- 참가자 (간격 확대: 중심 간격 155px) -->
  <rect x="20"  y="70" width="90" height="36" fill="#607D8B" rx="5"/>
  <text x="65"  y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Button HW</text>
  <text x="65"  y="98" text-anchor="middle" font-size="9" fill="white">(EXTI)</text>

  <rect x="155" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="200" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">tim_driver</text>
  <text x="200" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <rect x="310" y="70" width="90" height="36" fill="#EA4335" rx="5"/>
  <text x="355" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">stopwatch_app</text>
  <text x="355" y="98" text-anchor="middle" font-size="9" fill="white">(App)</text>

  <rect x="465" y="70" width="90" height="36" fill="#FBBC04" rx="5"/>
  <text x="510" y="85" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">ui_service</text>
  <text x="510" y="98" text-anchor="middle" font-size="9" fill="#333">(Service)</text>

  <rect x="620" y="70" width="90" height="36" fill="#34A853" rx="5"/>
  <text x="665" y="85" text-anchor="middle" font-size="10" fill="white" font-weight="bold">uart_driver</text>
  <text x="665" y="98" text-anchor="middle" font-size="9" fill="white">(Driver)</text>

  <!-- 생명선 -->
  <line x1="65"  y1="106" x2="65"  y2="440" stroke="#607D8B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="200" y1="106" x2="200" y2="440" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="355" y1="106" x2="355" y2="440" stroke="#EA4335" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="510" y1="106" x2="510" y2="440" stroke="#FBBC04" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="665" y1="106" x2="665" y2="440" stroke="#34A853" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ① 시작: IDLE → RUNNING (짧은 버튼) -->
  <text x="20" y="131" font-size="10" fill="#888">① 시작</text>
  <rect x="65" y="134" width="290" height="15" fill="#ECEFF1" rx="2"/>
  <text x="210" y="145" text-anchor="middle" font-size="9" fill="#455A64">HAL_GPIO_EXTI_Callback(BTN_SHORT)</text>
  <line x1="65" y1="149" x2="350" y2="149" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- FSM 상태 전이 박스 -->
  <rect x="310" y="155" width="90" height="26" fill="#FFEBEE" stroke="#EA4335" rx="3"/>
  <text x="355" y="167" text-anchor="middle" font-size="9" fill="#C62828">FSM: IDLE</text>
  <text x="355" y="178" text-anchor="middle" font-size="9" fill="#C62828">→ RUNNING</text>

  <!-- TIM2 시작 (y=198) — 박스 너비 확대로 텍스트 수용 -->
  <rect x="200" y="182" width="155" height="16" fill="#FFEBEE" rx="2"/>
  <text x="277" y="194" text-anchor="middle" font-size="9" fill="#C62828">HAL_TIM_Base_Start_IT(TIM2)</text>
  <line x1="355" y1="198" x2="205" y2="198" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- UI 갱신 (y=218) -->
  <rect x="355" y="208" width="155" height="15" fill="#FFEBEE" rx="2"/>
  <text x="432" y="219" text-anchor="middle" font-size="9" fill="#C62828">ui_update_stopwatch(0)</text>
  <line x1="355" y1="223" x2="505" y2="223" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- ② RUNNING — 매 10ms tick -->
  <text x="20" y="248" font-size="10" fill="#888">② Tick</text>
  <!-- 2줄 텍스트로 긴 함수명 표현 -->
  <rect x="200" y="240" width="155" height="26" fill="#E8F5E9" rx="2"/>
  <text x="277" y="252" text-anchor="middle" font-size="9" fill="#2E7D32">TIM_PeriodElapsedCallback()</text>
  <text x="277" y="263" text-anchor="middle" font-size="9" fill="#2E7D32">— 10ms 주기 인터럽트</text>
  <line x1="200" y1="266" x2="350" y2="266" stroke="#34A853" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr2)"/>

  <!-- UI Tick 갱신 (y=288) -->
  <rect x="355" y="273" width="155" height="15" fill="#FFEBEE" rx="2"/>
  <text x="432" y="284" text-anchor="middle" font-size="9" fill="#C62828">ui_update_stopwatch(elapsed)</text>
  <line x1="355" y1="288" x2="505" y2="288" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- ③ 일시정지: RUNNING → PAUSED -->
  <text x="20" y="302" font-size="10" fill="#888">③ 일시정지</text>
  <rect x="65" y="305" width="290" height="15" fill="#ECEFF1" rx="2"/>
  <text x="210" y="316" text-anchor="middle" font-size="9" fill="#455A64">BTN_SHORT (RUNNING 중)</text>
  <line x1="65" y1="320" x2="350" y2="320" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="310" y="326" width="90" height="26" fill="#FFEBEE" stroke="#EA4335" rx="3"/>
  <text x="355" y="338" text-anchor="middle" font-size="9" fill="#C62828">FSM: RUNNING</text>
  <text x="355" y="349" text-anchor="middle" font-size="9" fill="#C62828">→ PAUSED</text>

  <!-- TIM2 정지 (y=368) — 박스 너비 확대 -->
  <rect x="200" y="358" width="155" height="15" fill="#FFEBEE" rx="2"/>
  <text x="277" y="369" text-anchor="middle" font-size="9" fill="#C62828">HAL_TIM_Base_Stop_IT(TIM2)</text>
  <line x1="355" y1="373" x2="205" y2="373" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- ④ 기록: PAUSED → IDLE + UART 전송 -->
  <text x="20" y="398" font-size="10" fill="#888">④ 기록</text>
  <rect x="65" y="390" width="290" height="15" fill="#ECEFF1" rx="2"/>
  <text x="210" y="401" text-anchor="middle" font-size="9" fill="#455A64">BTN_LONG → IDLE (리셋)</text>
  <line x1="65" y1="405" x2="350" y2="405" stroke="#607D8B" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="355" y="413" width="310" height="15" fill="#FFEBEE" rx="2"/>
  <text x="510" y="424" text-anchor="middle" font-size="9" fill="#C62828">uart_send_frame(STOPWATCH_RECORD, elapsed)</text>
  <line x1="355" y1="428" x2="660" y2="428" stroke="#EA4335" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- 마커 정의 -->
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
