<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="1100" height="500">
  <defs>
    <marker id="arrowRight" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#424242"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="10" refX="4" refY="9" orient="auto">
      <polygon points="0 0, 8 0, 4 10" fill="#424242"/>
    </marker>
    <marker id="arrowDownGray" markerWidth="8" markerHeight="10" refX="4" refY="9" orient="auto">
      <polygon points="0 0, 8 0, 4 10" fill="#757575"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1100" height="500" fill="#FAFAFA"/>

  <!-- 제목 -->
  <rect x="0" y="0" width="1100" height="50" fill="#212121"/>
  <text x="550" y="32" font-family="Noto Sans KR, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">버튼 입력 신호 → CPU ISR 하드웨어 경로</text>

  <!-- ===== 블록 1: 버튼 ===== -->
  <!-- 버튼 심볼 -->
  <rect x="30" y="130" width="130" height="130" rx="10" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="3"/>
  <text x="95" y="160" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#212121" text-anchor="middle">버튼</text>
  <text x="95" y="178" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#757575" text-anchor="middle">B1 / PC13</text>
  <!-- 버튼 심볼 SVG -->
  <circle cx="95" cy="215" r="20" fill="none" stroke="#9E9E9E" stroke-width="3"/>
  <circle cx="95" cy="215" r="10" fill="#616161"/>
  <line x1="75" y1="215" x2="55" y2="215" stroke="#9E9E9E" stroke-width="2.5"/>
  <line x1="115" y1="215" x2="135" y2="215" stroke="#9E9E9E" stroke-width="2.5"/>
  <text x="95" y="253" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575" text-anchor="middle">물리 버튼</text>

  <!-- 신호 이름 화살표 1 -->
  <line x1="160" y1="195" x2="195" y2="195" stroke="#424242" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="178" y="188" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">PC13</text>
  <text x="178" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">신호</text>

  <!-- ===== 블록 2: GPIO 핀 ===== -->
  <rect x="195" y="130" width="140" height="130" rx="10" fill="#E3F2FD" stroke="#1A73E8" stroke-width="3"/>
  <text x="265" y="155" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#1A73E8" text-anchor="middle">GPIO 핀</text>
  <rect x="210" y="163" width="110" height="22" rx="4" fill="#1A73E8"/>
  <text x="265" y="178" font-family="Noto Sans KR, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">GPIOC_PIN13</text>
  <text x="265" y="205" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">Mode:</text>
  <text x="265" y="220" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">INPUT_PULLUP</text>
  <text x="265" y="238" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">Falling Edge 감지</text>

  <!-- 신호 이름 화살표 2 -->
  <line x1="335" y1="195" x2="370" y2="195" stroke="#424242" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="353" y="188" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">EXTI</text>
  <text x="353" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">라인13</text>

  <!-- ===== 블록 3: EXTI 컨트롤러 ===== -->
  <rect x="370" y="110" width="155" height="170" rx="10" fill="#E8F5E9" stroke="#34A853" stroke-width="3"/>
  <text x="448" y="135" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#34A853" text-anchor="middle">EXTI 컨트롤러</text>
  <rect x="385" y="143" width="125" height="22" rx="4" fill="#34A853"/>
  <text x="448" y="158" font-family="Noto Sans KR, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">EXTI13 라인</text>
  <text x="448" y="185" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">SYSCFG_EXTICR</text>
  <text x="448" y="200" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">PC13 선택 설정</text>
  <text x="448" y="220" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">엣지 트리거:</text>
  <text x="448" y="235" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">Falling Edge</text>
  <text x="448" y="255" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">EXTI_IMR 설정</text>

  <!-- 신호 이름 화살표 3 -->
  <line x1="525" y1="195" x2="560" y2="195" stroke="#424242" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="543" y="188" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">IRQ</text>
  <text x="543" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">신호</text>

  <!-- ===== 블록 4: NVIC ===== -->
  <rect x="560" y="120" width="145" height="150" rx="10" fill="#FFF9C4" stroke="#FBBC04" stroke-width="3"/>
  <text x="633" y="145" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#F57F17" text-anchor="middle">NVIC</text>
  <rect x="575" y="153" width="115" height="22" rx="4" fill="#FBBC04"/>
  <text x="633" y="168" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle" font-weight="bold">EXTI15_10_IRQn</text>
  <text x="633" y="195" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#F57F17" text-anchor="middle">PreemptPriority</text>
  <text x="633" y="210" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle" font-weight="bold">= 5</text>
  <text x="633" y="230" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#F57F17" text-anchor="middle">SubPriority</text>
  <text x="633" y="245" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle" font-weight="bold">= 0</text>

  <!-- 신호 이름 화살표 4 -->
  <line x1="705" y1="195" x2="740" y2="195" stroke="#424242" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="723" y="188" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">CPU</text>
  <text x="723" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">인터럽트</text>

  <!-- ===== 블록 5: CPU 코어 ===== -->
  <rect x="740" y="130" width="130" height="130" rx="10" fill="#FFEBEE" stroke="#EA4335" stroke-width="3"/>
  <text x="805" y="158" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="#EA4335" text-anchor="middle">CPU 코어</text>
  <rect x="755" y="165" width="100" height="22" rx="4" fill="#EA4335"/>
  <text x="805" y="180" font-family="Noto Sans KR, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">ISR 진입</text>
  <text x="805" y="205" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#B71C1C" text-anchor="middle">현재 컨텍스트</text>
  <text x="805" y="220" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">저장 후 분기</text>
  <text x="805" y="240" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">벡터 테이블</text>
  <text x="805" y="255" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#212121" text-anchor="middle">참조</text>

  <!-- 신호 이름 화살표 5 -->
  <line x1="870" y1="195" x2="905" y2="195" stroke="#424242" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="888" y="188" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">함수</text>
  <text x="888" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">호출</text>

  <!-- ===== 블록 6: HAL 핸들러 ===== -->
  <rect x="905" y="100" width="170" height="190" rx="10" fill="#EDE7F6" stroke="#7C4DFF" stroke-width="3"/>
  <text x="990" y="123" font-family="Noto Sans KR, sans-serif" font-size="11" font-weight="bold" fill="#4A148C" text-anchor="middle">HAL IRQ 핸들러</text>
  <rect x="915" y="130" width="150" height="40" rx="5" fill="#7C4DFF"/>
  <text x="990" y="146" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">EXTI15_10_IRQHandler()</text>
  <text x="990" y="161" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle">CubeMX 자동 생성</text>

  <!-- 아래 화살표 -->
  <line x1="990" y1="170" x2="990" y2="183" stroke="#424242" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="915" y="185" width="150" height="35" rx="5" fill="#9575CD"/>
  <text x="990" y="198" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">HAL_GPIO_EXTI_</text>
  <text x="990" y="212" font-family="Noto Sans KR, sans-serif" font-size="9" fill="white" text-anchor="middle">IRQHandler(GPIO_PIN_13)</text>

  <!-- 아래 화살표 2 -->
  <line x1="990" y1="220" x2="990" y2="233" stroke="#424242" stroke-width="2" marker-end="url(#arrowDown)"/>

  <rect x="915" y="235" width="150" height="35" rx="5" fill="#CE93D8" stroke="#7C4DFF" stroke-width="1"/>
  <text x="990" y="248" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle" font-weight="bold">HAL_GPIO_EXTI_</text>
  <text x="990" y="263" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#4A148C" text-anchor="middle">Callback(GPIO_PIN_13)</text>
  <text x="990" y="283" font-family="Noto Sans KR, sans-serif" font-size="9" fill="#212121" text-anchor="middle">← 사용자 코드 작성</text>

  <!-- ===== 하단 참고 박스 ===== -->
  <rect x="30" y="310" width="1040" height="70" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
  <rect x="30" y="310" width="1040" height="28" rx="8" fill="#424242"/>
  <rect x="30" y="326" width="1040" height="12" fill="#424242"/>
  <text x="550" y="328" font-family="Noto Sans KR, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">EXTI 공유 핸들러 메커니즘</text>
  <text x="550" y="358" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#212121" text-anchor="middle">EXTI15_10_IRQHandler: EXTI10 ~ EXTI15 (6개 핀) 모두 이 하나의 핸들러 공유</text>
  <text x="550" y="374" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#EA4335" text-anchor="middle">HAL_GPIO_EXTI_Callback 내부에서 GPIO_Pin 매개변수로 어느 핀인지 분기 처리 필요</text>

  <!-- 단계 번호 표시 - 가로 배치 -->
  <circle cx="95" cy="105" r="16" fill="#9E9E9E"/>
  <text x="95" y="110" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <circle cx="265" cy="105" r="16" fill="#1A73E8"/>
  <text x="265" y="110" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <circle cx="448" cy="85" r="16" fill="#34A853"/>
  <text x="448" y="90" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <circle cx="633" cy="95" r="16" fill="#F9A825"/>
  <text x="633" y="100" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <circle cx="805" cy="105" r="16" fill="#EA4335"/>
  <text x="805" y="110" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <circle cx="990" cy="75" r="16" fill="#7C4DFF"/>
  <text x="990" y="80" font-family="Noto Sans KR, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">6</text>

  <!-- 하단 레이블 -->
  <text x="95" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#757575" text-anchor="middle">물리 하드웨어</text>
  <text x="265" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#1A73E8" text-anchor="middle">GPIO 레지스터</text>
  <text x="448" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#34A853" text-anchor="middle">EXTI 컨트롤러</text>
  <text x="633" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#F9A825" text-anchor="middle">인터럽트 컨트롤러</text>
  <text x="805" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#EA4335" text-anchor="middle">ARM Cortex-M4</text>
  <text x="990" y="400" font-family="Noto Sans KR, sans-serif" font-size="10" fill="#7C4DFF" text-anchor="middle">HAL 드라이버</text>

  <!-- 점선 구분선 -->
  <line x1="30" y1="410" x2="1070" y2="410" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- 레이어 구분 텍스트 -->
  <text x="430" y="430" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#555" text-anchor="middle">← 하드웨어 레이어</text>
  <text x="550" y="430" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#212121" text-anchor="middle" font-weight="bold">|</text>
  <text x="700" y="430" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#555" text-anchor="middle">소프트웨어 레이어 →</text>

  <!-- 전체 흐름 화살표 레이블 -->
  <text x="550" y="460" font-family="Noto Sans KR, sans-serif" font-size="13" fill="#212121" text-anchor="middle" font-weight="bold">버튼 누름 → 사용자 콜백 실행까지: 수 마이크로초 내 완료</text>

  <!-- HAL 레이어 박스 -->
  <rect x="30" y="468" width="1040" height="25" rx="5" fill="#E8EAF6"/>
  <text x="550" y="484" font-family="Noto Sans KR, sans-serif" font-size="11" fill="#3949AB" text-anchor="middle">if (GPIO_Pin == GPIO_PIN_13) { /* B1 버튼 처리 */ }  ← Callback 내 분기 패턴</text>
</svg>
