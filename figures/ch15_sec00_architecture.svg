<svg xmlns="http://www.w3.org/2000/svg" width="800" height="490" font-family="'Noto Sans KR', sans-serif" font-size="14" viewBox="0 0 800 490">
  <defs>
    <marker id="arr15" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Ch15 아키텍처 위치 — CLI App 레이어 신규</text>

  <!-- App Layer -->
  <rect x="50" y="45" width="700" height="70" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="2"/>
  <text x="80" y="67" font-size="11" fill="#EA4335" font-weight="bold">App Layer</text>
  <rect x="65" y="75" width="195" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335" stroke-width="2"/>
  <text x="162" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">cli_app.c ★NEW</text>
  <text x="162" y="103" text-anchor="middle" font-size="9" fill="#C62828">CLI 초기화 / 루프</text>
  <rect x="275" y="75" width="200" height="30" rx="5" fill="#FFCDD2" stroke="#EA4335" stroke-width="2"/>
  <text x="375" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">cmd_table.c ★NEW</text>
  <text x="375" y="103" text-anchor="middle" font-size="9" fill="#C62828">커맨드 테이블</text>
  <rect x="490" y="75" width="240" height="30" rx="5" fill="none" stroke="#EA4335" stroke-dasharray="5,3"/>
  <text x="610" y="95" text-anchor="middle" font-size="10" fill="#999">protocol_app.c (Ch16 예정)</text>

  <line x1="400" y1="115" x2="400" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arr15)"/>

  <!-- Service Layer -->
  <rect x="50" y="150" width="700" height="75" rx="8" fill="#FBBC04" opacity="0.12" stroke="#FBBC04" stroke-width="2"/>
  <text x="80" y="172" font-size="11" fill="#E65100" font-weight="bold">Service Layer</text>
  <rect x="65" y="182" width="155" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="142" y="200" text-anchor="middle" font-size="11" fill="#E65100">clock_service</text>
  <text x="142" y="213" text-anchor="middle" font-size="9" fill="#E65100">Ch09 기존</text>
  <rect x="232" y="182" width="155" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="309" y="200" text-anchor="middle" font-size="11" fill="#E65100">sensor_service</text>
  <text x="309" y="213" text-anchor="middle" font-size="9" fill="#E65100">Ch11 기존</text>
  <rect x="400" y="182" width="145" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="472" y="200" text-anchor="middle" font-size="11" fill="#E65100">ui_service</text>
  <text x="472" y="213" text-anchor="middle" font-size="9" fill="#E65100">Ch13 기존</text>
  <rect x="558" y="182" width="175" height="35" rx="5" fill="#FFF8E1" stroke="#FBBC04"/>
  <text x="645" y="200" text-anchor="middle" font-size="11" fill="#E65100">rtc_service</text>
  <text x="645" y="213" text-anchor="middle" font-size="9" fill="#E65100">Ch09 기존</text>

  <line x1="400" y1="225" x2="400" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arr15)"/>

  <!-- Driver Layer -->
  <rect x="50" y="260" width="700" height="75" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="2"/>
  <text x="80" y="282" font-size="11" fill="#1B5E20" font-weight="bold">Driver Layer</text>
  <rect x="60" y="291" width="125" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="122" y="307" text-anchor="middle" font-size="10" fill="#1B5E20">uart_driver</text>
  <text x="122" y="320" text-anchor="middle" font-size="9" fill="#555">DMA TX/RX</text>
  <rect x="195" y="291" width="125" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="257" y="307" text-anchor="middle" font-size="10" fill="#1B5E20">sht31_driver</text>
  <text x="257" y="320" text-anchor="middle" font-size="9" fill="#555">I2C DMA</text>
  <rect x="330" y="291" width="125" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="392" y="307" text-anchor="middle" font-size="10" fill="#1B5E20">ili9341_driver</text>
  <text x="392" y="320" text-anchor="middle" font-size="9" fill="#555">SPI DMA</text>
  <rect x="465" y="291" width="125" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="527" y="307" text-anchor="middle" font-size="10" fill="#1B5E20">stepper_driver</text>
  <text x="527" y="320" text-anchor="middle" font-size="9" fill="#555">스텝모터</text>
  <rect x="600" y="291" width="140" height="35" rx="5" fill="#C8E6C9" stroke="#34A853"/>
  <text x="670" y="307" text-anchor="middle" font-size="10" fill="#1B5E20">ring_buf</text>
  <text x="670" y="320" text-anchor="middle" font-size="9" fill="#555">Ch06 재사용</text>

  <line x1="400" y1="335" x2="400" y2="365" stroke="#555" stroke-width="1.5" marker-end="url(#arr15)"/>

  <!-- HAL Layer -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1A73E8" opacity="0.12" stroke="#1A73E8" stroke-width="2"/>
  <text x="80" y="392" font-size="11" fill="#1A73E8" font-weight="bold">HAL Layer</text>
  <rect x="70" y="398" width="110" height="22" rx="4" fill="#BBDEFB"/>
  <text x="125" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_UART</text>
  <rect x="195" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="245" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_I2C</text>
  <rect x="310" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="360" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_SPI</text>
  <rect x="425" y="398" width="100" height="22" rx="4" fill="#BBDEFB"/>
  <text x="475" y="413" text-anchor="middle" font-size="10" fill="#0D47A1">HAL_TIM</text>

  <!-- 버전 뱃지 -->
  <rect x="285" y="438" width="230" height="22" rx="11" fill="#1A73E8"/>
  <text x="400" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Ch15 — CLI App 완성</text>
</svg>
