<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .pin-box { fill: #FBBC04; stroke: #333; stroke-width: 1; }
      .pin-label { fill: #333; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }
      .pin-desc { fill: #666; font-size: 11px; }
      .title { fill: #333; font-size: 18px; font-weight: bold; }
      .section { fill: none; stroke: #ddd; stroke-width: 1; }
    </style>
  </defs>

  <text x="400" y="35" class="title" text-anchor="middle">ILI9341 LCD 핀 배치 및 연결</text>

  <!-- IC Symbol -->
  <rect x="350" y="80" width="100" height="250" fill="none" stroke="#333" stroke-width="2"/>
  <text x="400" y="105" class="pin-label" text-anchor="middle" font-weight="bold">ILI9341</text>

  <!-- Pin list (left side) -->
  <g>
    <text x="60" y="140" class="pin-label" font-weight="bold">📍 핀 배치:</text>
    
    <!-- VCC -->
    <rect x="50" y="160" width="80" height="30" class="pin-box"/>
    <text x="90" y="182" class="pin-label" text-anchor="middle">VCC (3.3V)</text>
    <line x1="130" y1="175" x2="350" y2="120" stroke="#333" stroke-width="1"/>

    <!-- SCL (SCLK) -->
    <rect x="50" y="200" width="80" height="30" class="pin-box"/>
    <text x="90" y="222" class="pin-label" text-anchor="middle">SCL (SCLK)</text>
    <line x1="130" y1="215" x2="350" y2="160" stroke="#333" stroke-width="1"/>

    <!-- SDA (MOSI) -->
    <rect x="50" y="240" width="80" height="30" class="pin-box"/>
    <text x="90" y="262" class="pin-label" text-anchor="middle">SDA (MOSI)</text>
    <line x1="130" y1="255" x2="350" y2="200" stroke="#333" stroke-width="1"/>

    <!-- GND -->
    <rect x="50" y="280" width="80" height="30" class="pin-box"/>
    <text x="90" y="302" class="pin-label" text-anchor="middle">GND</text>
    <line x1="130" y1="295" x2="350" y2="280" stroke="#333" stroke-width="1"/>
  </g>

  <!-- Control Pins (right side) -->
  <g>
    <text x="650" y="140" class="pin-label" font-weight="bold">🎛️ 제어핀:</text>

    <!-- D/C Pin -->
    <rect x="520" y="160" width="120" height="30" class="pin-box" fill="#4285F4"/>
    <text x="580" y="182" class="pin-label" text-anchor="middle" font-weight="bold">D/C (PA4)</text>
    <line x1="520" y1="175" x2="450" y2="140" stroke="#333" stroke-width="2"/>
    <text x="530" y="200" class="pin-desc">명령어(0)/데이터(1)</text>

    <!-- CS Pin -->
    <rect x="520" y="210" width="120" height="30" class="pin-box" fill="#34A853"/>
    <text x="580" y="232" class="pin-label" text-anchor="middle" font-weight="bold">CS (PA3)</text>
    <line x1="520" y1="225" x2="450" y2="220" stroke="#333" stroke-width="2"/>
    <text x="530" y="250" class="pin-desc">칩 선택 (0=선택)</text>

    <!-- RESET Pin -->
    <rect x="520" y="260" width="120" height="30" class="pin-box" fill="#EA4335"/>
    <text x="580" y="282" class="pin-label" text-anchor="middle" font-weight="bold">RESET (PA5)</text>
    <line x1="520" y1="275" x2="450" y2="300" stroke="#333" stroke-width="2"/>
    <text x="530" y="300" class="pin-desc">초기화 신호</text>
  </g>

  <!-- STM32 Mapping -->
  <g>
    <text x="400" y="400" class="pin-label" font-weight="bold" text-anchor="middle">STM32F411 핀 매핑:</text>
    
    <text x="150" y="430" class="pin-desc">PB3 ← SCL (SPI1)</text>
    <text x="150" y="455" class="pin-desc">PB5 ← SDA (SPI1)</text>
    <text x="450" y="430" class="pin-desc">PA3 ← CS</text>
    <text x="450" y="455" class="pin-desc">PA4 ← D/C</text>
    <text x="450" y="480" class="pin-desc">PA5 ← RESET</text>
  </g>
</svg>
