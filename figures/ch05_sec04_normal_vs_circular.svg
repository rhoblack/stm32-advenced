<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320"  font-family="'Noto Sans KR', sans-serif" font-size="13" viewBox="0 0 720 320">
  <text x="360" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A2E">Normal 모드 vs Circular 모드</text>

  <!-- ===== Normal Mode ===== -->
  <text x="180" y="55" text-anchor="middle" font-weight="700" fill="#1A73E8" font-size="15">Normal 모드</text>
  <text x="180" y="72" text-anchor="middle" font-size="11" fill="#666">일회성 배달</text>

  <!-- Buffer boxes Normal -->
  <rect x="50" y="85" width="260" height="35" rx="6" fill="#E3F2FD" stroke="#1A73E8" stroke-width="1.5"/>
  <rect x="50" y="85" width="65" height="35" rx="0" fill="#1A73E8" opacity="0.3"/>
  <text x="82" y="107" text-anchor="middle" font-size="10" fill="#1A73E8">[0]</text>
  <rect x="115" y="85" width="65" height="35" rx="0" fill="#1A73E8" opacity="0.3"/>
  <text x="147" y="107" text-anchor="middle" font-size="10" fill="#1A73E8">[1]</text>
  <rect x="180" y="85" width="65" height="35" rx="0" fill="#1A73E8" opacity="0.3"/>
  <text x="212" y="107" text-anchor="middle" font-size="10" fill="#1A73E8">[2]</text>
  <rect x="245" y="85" width="65" height="35" rx="0" fill="#1A73E8" opacity="0.1"/>
  <text x="277" y="107" text-anchor="middle" font-size="10" fill="#999">[3]</text>

  <!-- Arrow under Normal -->
  <line x1="50" y1="130" x2="245" y2="130" stroke="#1A73E8" stroke-width="2.5" marker-end="url(#na05)"/>
  <text x="150" y="148" text-anchor="middle" font-size="11" fill="#1A73E8">전송 방향 →</text>

  <!-- Stop sign -->
  <rect x="248" y="123" width="62" height="20" rx="10" fill="#EA4335"/>
  <text x="279" y="137" text-anchor="middle" fill="white" font-size="10" font-weight="700">STOP</text>

  <!-- Normal description -->
  <text x="180" y="178" text-anchor="middle" font-size="11" fill="#333">전송 완료 → 정지</text>
  <text x="180" y="195" text-anchor="middle" font-size="11" fill="#333">다시 전송하려면 Start 재호출</text>
  <text x="180" y="215" text-anchor="middle" font-size="11" fill="#666">적합: UART TX, LCD 프레임</text>

  <!-- ===== Circular Mode ===== -->
  <text x="540" y="55" text-anchor="middle" font-weight="700" fill="#FF6D00" font-size="15">Circular 모드</text>
  <text x="540" y="72" text-anchor="middle" font-size="11" fill="#666">회전초밥 벨트</text>

  <!-- Circular buffer (ring) -->
  <circle cx="540" cy="160" r="65" fill="none" stroke="#FF6D00" stroke-width="3"/>
  <circle cx="540" cy="160" r="35" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1"/>
  <text x="540" y="164" text-anchor="middle" font-size="10" fill="#FF6D00" font-weight="600">자동 반복</text>

  <!-- Buffer segments on circle -->
  <rect x="528" y="88" width="24" height="18" rx="3" fill="#FF6D00" opacity="0.8"/>
  <text x="540" y="101" text-anchor="middle" font-size="9" fill="white">[0]</text>

  <rect x="590" y="115" width="24" height="18" rx="3" fill="#FF6D00" opacity="0.6"/>
  <text x="602" y="128" text-anchor="middle" font-size="9" fill="white">[1]</text>

  <rect x="600" y="165" width="24" height="18" rx="3" fill="#FF6D00" opacity="0.4"/>
  <text x="612" y="178" text-anchor="middle" font-size="9" fill="white">[2]</text>

  <rect x="575" y="205" width="24" height="18" rx="3" fill="#FF6D00" opacity="0.3"/>
  <text x="587" y="218" text-anchor="middle" font-size="9" fill="white">[3]</text>

  <rect x="528" y="218" width="24" height="18" rx="3" fill="#FF6D00" opacity="0.2"/>
  <text x="540" y="231" text-anchor="middle" font-size="9" fill="#FF6D00">[0]...</text>

  <!-- Circular arrow -->
  <path d="M 555 92 A 65 65 0 1 1 535 230" fill="none" stroke="#FF6D00" stroke-width="2" marker-end="url(#ca05)"/>

  <!-- Half/Complete markers -->
  <line x1="540" y1="95" x2="540" y2="82" stroke="#34A853" stroke-width="2"/>
  <text x="540" y="78" text-anchor="middle" font-size="9" fill="#34A853" font-weight="600">TC</text>

  <line x1="605" y1="160" x2="618" y2="160" stroke="#FBBC04" stroke-width="2"/>
  <text x="645" y="164" text-anchor="middle" font-size="9" fill="#E65100" font-weight="600">HT</text>

  <!-- Circular description -->
  <text x="540" y="258" text-anchor="middle" font-size="11" fill="#333">전송 완료 → 자동 재시작</text>
  <text x="540" y="275" text-anchor="middle" font-size="11" fill="#333">HT(반완료) + TC(완료) 콜백</text>
  <text x="540" y="295" text-anchor="middle" font-size="11" fill="#666">적합: UART RX, ADC 연속 변환</text>

  <!-- VS divider -->
  <line x1="360" y1="50" x2="360" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="340" y="140" width="40" height="25" rx="12" fill="#1A1A2E"/>
  <text x="360" y="157" text-anchor="middle" fill="white" font-size="12" font-weight="700">VS</text>

  <defs>
    <marker id="na05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A73E8"/>
    </marker>
    <marker id="ca05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6D00"/>
    </marker>
  </defs>
</svg>
