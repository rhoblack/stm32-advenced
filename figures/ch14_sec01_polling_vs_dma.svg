<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="'Noto Sans KR', sans-serif">
  <rect width="820" height="400" fill="#FAFAFA" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">폴링 vs DMA — CPU 타임라인 비교 (SHT31 측정 1사이클 기준)</text>

  <!-- ===== 폴링 방식 ===== -->
  <text x="20" y="60" font-size="13" font-weight="bold" fill="#EA4335">■ 폴링(Polling) 방식 — CPU 블로킹</text>
  <!-- 타임라인 배경 -->
  <rect x="20" y="68" width="780" height="40" rx="4" fill="#EEEEEE" stroke="#BDBDBD"/>

  <!-- CPU: I2C_Transmit (blocked) -->
  <rect x="20" y="68" width="120" height="40" rx="0" fill="#EA4335" opacity="0.85"/>
  <text x="80" y="83" text-anchor="middle" font-size="10" fill="white" font-weight="bold">I2C TX</text>
  <text x="80" y="97" text-anchor="middle" font-size="10" fill="white">CPU 블로킹</text>

  <!-- 대기 (SHT31 처리) -->
  <rect x="140" y="68" width="200" height="40" rx="0" fill="#FFCDD2" stroke="#E53935"/>
  <text x="240" y="83" text-anchor="middle" font-size="10" fill="#B71C1C">SHT31 측정 대기</text>
  <text x="240" y="97" text-anchor="middle" font-size="10" fill="#B71C1C">HAL_Delay(15ms)</text>

  <!-- CPU: I2C_Receive (blocked) -->
  <rect x="340" y="68" width="120" height="40" rx="0" fill="#EA4335" opacity="0.85"/>
  <text x="400" y="83" text-anchor="middle" font-size="10" fill="white" font-weight="bold">I2C RX</text>
  <text x="400" y="97" text-anchor="middle" font-size="10" fill="white">CPU 블로킹</text>

  <!-- CPU: 나머지 작업 -->
  <rect x="460" y="68" width="340" height="40" rx="0" fill="#E8F5E9" stroke="#34A853"/>
  <text x="630" y="88" text-anchor="middle" font-size="11" fill="#1B5E20">다른 작업 가능 구간</text>

  <!-- 타임라인 눈금 -->
  <line x1="20" y1="108" x2="800" y2="108" stroke="#BDBDBD" stroke-width="1"/>
  <text x="20" y="120" font-size="9" fill="#888">0ms</text>
  <text x="140" y="120" font-size="9" fill="#888">3ms</text>
  <text x="340" y="120" font-size="9" fill="#888">18ms</text>
  <text x="460" y="120" font-size="9" fill="#888">21ms</text>
  <text x="800" y="120" font-size="9" fill="#888">500ms</text>

  <!-- CPU 점유율 표시 -->
  <rect x="620" y="68" width="160" height="40" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="2"/>
  <text x="700" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">CPU 점유: ~4.2%</text>
  <text x="700" y="100" text-anchor="middle" font-size="10" fill="#B71C1C">(21ms / 500ms 블로킹)</text>

  <!-- ===== DMA 방식 ===== -->
  <text x="20" y="160" font-size="13" font-weight="bold" fill="#34A853">■ DMA 방식 — CPU 해방</text>
  <rect x="20" y="168" width="780" height="40" rx="4" fill="#EEEEEE" stroke="#BDBDBD"/>

  <!-- CPU: Transmit_DMA 설정 (짧음) -->
  <rect x="20" y="168" width="20" height="40" rx="0" fill="#34A853" opacity="0.85"/>
  <text x="30" y="192" text-anchor="middle" font-size="9" fill="white">TX</text>

  <!-- CPU: 다른 작업 (해방) -->
  <rect x="40" y="168" width="300" height="40" rx="0" fill="#E8F5E9" stroke="#34A853"/>
  <text x="190" y="183" text-anchor="middle" font-size="11" fill="#1B5E20">다른 작업 수행 (LCD 갱신, UART 로그 등)</text>
  <text x="190" y="198" text-anchor="middle" font-size="11" fill="#1B5E20">← CPU 완전 해방 구간 →</text>

  <!-- DMA 작업 표시 (하단 바) -->
  <rect x="40" y="170" width="20" height="10" rx="0" fill="#1A73E8" opacity="0.7"/>
  <text x="50" y="179" text-anchor="middle" font-size="8" fill="white">I2C DMA TX</text>

  <!-- Callback (TX 완료) -->
  <rect x="140" y="168" width="20" height="40" rx="0" fill="#FBBC04"/>
  <text x="150" y="183" text-anchor="middle" font-size="8" fill="#333">CB</text>
  <text x="150" y="196" text-anchor="middle" font-size="8" fill="#333">TX</text>
  <text x="150" y="209" text-anchor="middle" font-size="8" fill="#333">완료</text>

  <!-- DMA RX -->
  <rect x="160" y="170" width="20" height="10" rx="0" fill="#1A73E8" opacity="0.7"/>

  <!-- Callback (RX 완료) -->
  <rect x="320" y="168" width="20" height="40" rx="0" fill="#FBBC04"/>
  <text x="330" y="183" text-anchor="middle" font-size="8" fill="#333">CB</text>
  <text x="330" y="196" text-anchor="middle" font-size="8" fill="#333">RX</text>
  <text x="330" y="209" text-anchor="middle" font-size="8" fill="#333">완료</text>

  <!-- 이후 CPU 자유 -->
  <rect x="340" y="168" width="460" height="40" rx="0" fill="#E8F5E9" stroke="#34A853"/>
  <text x="570" y="191" text-anchor="middle" font-size="11" fill="#1B5E20">다른 작업 계속 수행 (CPU 완전 해방)</text>

  <!-- DMA 방식 타임라인 눈금 -->
  <line x1="20" y1="208" x2="800" y2="208" stroke="#BDBDBD" stroke-width="1"/>
  <text x="20" y="220" font-size="9" fill="#888">0ms</text>
  <text x="140" y="220" font-size="9" fill="#888">3ms</text>
  <text x="320" y="220" font-size="9" fill="#888">18ms</text>
  <text x="800" y="220" font-size="9" fill="#888">500ms</text>

  <!-- CPU 점유율 표시 -->
  <rect x="620" y="168" width="160" height="40" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
  <text x="700" y="184" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">CPU 점유: ~0.2%</text>
  <text x="700" y="200" text-anchor="middle" font-size="10" fill="#1B5E20">(콜백 처리 ~1ms만 사용)</text>

  <!-- ===== 비교 표 ===== -->
  <rect x="20" y="240" width="780" height="130" rx="8" fill="white" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="410" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">성능 비교 요약</text>

  <!-- 표 헤더 -->
  <rect x="20" y="268" width="780" height="26" rx="0" fill="#F5F5F5"/>
  <text x="120" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">항목</text>
  <text x="360" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#EA4335">폴링 방식</text>
  <text x="600" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#34A853">DMA 방식</text>
  <line x1="20" y1="294" x2="800" y2="294" stroke="#BDBDBD"/>
  <line x1="240" y1="268" x2="240" y2="370" stroke="#BDBDBD"/>
  <line x1="480" y1="268" x2="480" y2="370" stroke="#BDBDBD"/>

  <text x="120" y="312" text-anchor="middle" font-size="11" fill="#333">CPU 점유율</text>
  <text x="360" y="312" text-anchor="middle" font-size="11" fill="#EA4335">~4.2% (블로킹)</text>
  <text x="600" y="312" text-anchor="middle" font-size="11" fill="#34A853">~0.2% (콜백만)</text>
  <line x1="20" y1="320" x2="800" y2="320" stroke="#EEEEEE"/>

  <text x="120" y="338" text-anchor="middle" font-size="11" fill="#333">코드 복잡도</text>
  <text x="360" y="338" text-anchor="middle" font-size="11" fill="#34A853">낮음 (순차 호출)</text>
  <text x="600" y="338" text-anchor="middle" font-size="11" fill="#FBBC04">높음 (콜백 체인)</text>
  <line x1="20" y1="346" x2="800" y2="346" stroke="#EEEEEE"/>

  <text x="120" y="364" text-anchor="middle" font-size="11" fill="#333">동시 작업</text>
  <text x="360" y="364" text-anchor="middle" font-size="11" fill="#EA4335">불가 (블로킹)</text>
  <text x="600" y="364" text-anchor="middle" font-size="11" fill="#34A853">가능 (LCD/UART 동시)</text>

  <!-- 결론 -->
  <rect x="20" y="378" width="780" height="18" rx="4" fill="#E8F5E9" stroke="#34A853"/>
  <text x="410" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">결론: DMA 방식은 CPU 점유율을 95% 이상 절감 → LCD 갱신 + UART 로그 + I2C 센서 동시 운용 가능</text>
</svg>
