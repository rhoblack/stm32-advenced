<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Noto Sans KR', sans-serif" font-size="13">
  <text x="360" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#1A1A2E">DMA Mem-to-Mem 전송 시퀀스</text>

  <!-- Lifelines -->
  <rect x="50" y="40" width="90" height="30" rx="6" fill="#EA4335" stroke="#EA4335"/>
  <text x="95" y="60" text-anchor="middle" fill="white" font-weight="600" font-size="12">App (main)</text>
  <line x1="95" y1="70" x2="95" y2="380" stroke="#EA4335" stroke-dasharray="4,3" stroke-width="1.5"/>

  <rect x="200" y="40" width="100" height="30" rx="6" fill="#1A73E8" stroke="#1A73E8"/>
  <text x="250" y="60" text-anchor="middle" fill="white" font-weight="600" font-size="12">HAL DMA</text>
  <line x1="250" y1="70" x2="250" y2="380" stroke="#1A73E8" stroke-dasharray="4,3" stroke-width="1.5"/>

  <rect x="370" y="40" width="120" height="30" rx="6" fill="#FF6D00" stroke="#FF6D00"/>
  <text x="430" y="60" text-anchor="middle" fill="white" font-weight="600" font-size="12">DMA Controller</text>
  <line x1="430" y1="70" x2="430" y2="380" stroke="#FF6D00" stroke-dasharray="4,3" stroke-width="1.5"/>

  <rect x="560" y="40" width="100" height="30" rx="6" fill="#616161" stroke="#616161"/>
  <text x="610" y="60" text-anchor="middle" fill="white" font-weight="600" font-size="12">SRAM</text>
  <line x1="610" y1="70" x2="610" y2="380" stroke="#616161" stroke-dasharray="4,3" stroke-width="1.5"/>

  <!-- NVIC -->
  <rect x="540" y="40" width="10" height="30" rx="3" fill="transparent"/>

  <!-- Message 1: Start IT -->
  <line x1="95" y1="100" x2="250" y2="100" stroke="#1A73E8" stroke-width="2" marker-end="url(#arr05s)"/>
  <text x="172" y="95" text-anchor="middle" font-size="11" fill="#1A73E8">HAL_DMA_Start_IT()</text>

  <!-- Message 2: Configure registers -->
  <line x1="250" y1="130" x2="430" y2="130" stroke="#FF6D00" stroke-width="2" marker-end="url(#arr05o)"/>
  <text x="340" y="125" text-anchor="middle" font-size="11" fill="#FF6D00">레지스터 설정 + 전송 시작</text>

  <!-- CPU free zone -->
  <rect x="70" y="145" width="50" height="120" rx="4" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-dasharray="3,3"/>
  <text x="95" y="210" text-anchor="middle" font-size="10" fill="#34A853" transform="rotate(-90, 95, 210)">CPU 자유!</text>

  <!-- Message 3: DMA transfers data -->
  <line x1="430" y1="160" x2="610" y2="160" stroke="#FF6D00" stroke-width="2" marker-end="url(#arr05o)"/>
  <text x="520" y="155" text-anchor="middle" font-size="11" fill="#FF6D00">src → dst (word 단위)</text>

  <line x1="430" y1="185" x2="610" y2="185" stroke="#FF6D00" stroke-width="1.5" marker-end="url(#arr05o)"/>
  <text x="520" y="180" text-anchor="middle" font-size="10" fill="#999">반복 전송...</text>

  <line x1="430" y1="210" x2="610" y2="210" stroke="#FF6D00" stroke-width="1.5" marker-end="url(#arr05o)"/>
  <text x="520" y="205" text-anchor="middle" font-size="10" fill="#999">마지막 word</text>

  <!-- Message 4: TC interrupt -->
  <line x1="430" y1="250" x2="250" y2="250" stroke="#FF6D00" stroke-width="2" marker-end="url(#arr05s)" stroke-dasharray="6,3"/>
  <text x="340" y="245" text-anchor="middle" font-size="11" fill="#FF6D00">TC 인터럽트 (Transfer Complete)</text>

  <!-- Message 5: Callback -->
  <line x1="250" y1="280" x2="95" y2="280" stroke="#1A73E8" stroke-width="2" marker-end="url(#arr05s2)"/>
  <text x="172" y="275" text-anchor="middle" font-size="11" fill="#1A73E8">XferCpltCallback()</text>

  <!-- Message 6: Flag set -->
  <rect x="60" y="295" width="70" height="22" rx="4" fill="#34A853" opacity="0.2" stroke="#34A853"/>
  <text x="95" y="311" text-anchor="middle" font-size="10" fill="#34A853">dma_done = 1</text>

  <!-- Message 7: App processes -->
  <rect x="60" y="330" width="70" height="22" rx="4" fill="#EA4335" opacity="0.2" stroke="#EA4335"/>
  <text x="95" y="346" text-anchor="middle" font-size="10" fill="#EA4335">데이터 검증</text>

  <defs>
    <marker id="arr05s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A73E8"/>
    </marker>
    <marker id="arr05s2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A73E8"/>
    </marker>
    <marker id="arr05o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6D00"/>
    </marker>
  </defs>
</svg>
